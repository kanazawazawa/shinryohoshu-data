site_name: 診療報酬点数表データセット
site_description: 厚生労働省告示「診療報酬の算定方法」点数表を機械可読化した YAML データセットの閲覧用ビュー（R6 / R8 / 改定差分）
site_url: https://kanazawazawa.github.io/shinryohoshu-data/
repo_url: https://github.com/kanazawazawa/shinryohoshu-data
repo_name: kanazawazawa/shinryohoshu-data
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site

theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードへ切替
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードへ切替
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - ja
        - en
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kanazawazawa/shinryohoshu-data

# 巨大データのためビルド時に欠落リンクが出ても fail させない
strict: false
