  part: 第6部 注射
  section: 第1節 注射料
  subsection: 第2款 無菌製剤処理料
raw_text: |
  Ｇ０２０無菌製剤処理料
  - １無菌製剤処理料１（悪性腫瘍に対して用いる薬剤が注射される一部の患者）
      - イ閉鎖式接続器具を使用した場合180点
      - ロイ以外の場合45点
  - ２無菌製剤処理料２（１以外のもの）40点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、皮内注射、皮下注射、筋肉内注射、動脈注射、抗悪性腫瘍剤局所持続注入、肝動脈塞栓を伴う抗悪性腫瘍剤肝動脈内注入、点滴注射、中心静脈注射、植込型カテーテルによる中心静脈注射又は脳脊髄腔注射を行う際に、別に厚生労働大臣が定める患者に対して使用する薬剤について、必要があって無菌製剤処理が行われた場合は、当該患者に係る区分に従い１日につき所定点数を算定する。
