  Ｇ００５－２中心静脈注射用カテーテル挿入1,400点
  - 注１カテーテルの挿入に伴う検査及び画像診断の費用は、所定点数に含まれるものとする。
  - ２６歳未満の乳幼児に対して行った場合は、乳幼児加算として、600点を所定点数に加算する。
  - ３別に厚生労働大臣が定める患者に対して静脈切開法を用いて行った場合は、静脈切開法加算として、2,000点を所定点数に加算する。
