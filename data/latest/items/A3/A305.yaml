code: A305
name: 一類感染症患者入院医療管理料（１日につき）１14日以内の期間
version: r6
points: 9413
unit: 日
chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第3節 特定入院料
raw_text: |
  Ａ３０５一類感染症患者入院医療管理料（１日につき）１14日以内の期間9,413点
  - ２15日以上の期間8,147点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た感染症法第６条第13項に規定する特定感染症指定医療機関又は同条第14項に規定する第一種感染症指定医療機関である保険医療機関において、別に厚生労働大臣が定める感染症患者に対して入院医療管理が行われた場合に算定する。
  なお、同法第19条及び第20条の規定に係る入院の期間を超えた期間は算定しない。
  - ２第１章基本診療料並びに第２章第９部処置及び第13部病理診断のうち次に掲げるものは、一類感染症患者入院医療管理料に含まれるものとする。
      - イ入院基本料
      - ロ入院基本料等加算（臨床研修病院入院診療加算、超急性期脳卒中加算、妊産婦緊急搬送入院加算、医師事務作業補助体制加算、地域加算、離島加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、データ提出加算、入退院支援加算（１のイに限る。）、医療的ケア児（者）入院前支援加算、排尿自立支援加算及び地域医療体制確保加算を除く。）
      - ハ酸素吸入（使用した酸素及び窒素の費用を除く。）
      - ニ留置カテーテル設置
      - ホ第13部第１節の病理標本作製料Ａ３０６特殊疾患入院医療管理料（１日につき）2,090点
  - 注１重度の障害者（重度の意識障害者を含む。）、筋ジストロフィー患者又は難病患者等を主として入院させる病室に関する別に厚生労働大臣が定める施設基準に適合しているものとして、地方厚生局長等に届け出た保険医療機関（療養病棟入院基本料、障害者施設等入院基本料、特殊疾患入院施設管理加算又は特殊疾患病棟入院料を算定する病棟を有しないものに限る。）に入院している患者について、所定点数を算定する。
  - ２当該病室に入院している患者が人工呼吸器を使用している場合は、１日につき所定点数に600点を加算する。
  - ３当該患者が、他の保険医療機関から転院してきた者であって、当該他の保険医療機関において区分番号Ａ２４６に掲げる入退院支援加算３を算定したものである場合には、重症児（者）受入連携加算として、入院初日に限り2,000点を所定点数に加算する。
  - ４当該病室に入院する重度の意識障害（脳卒中の後遺症であるものに限る。）の患者であって、基本診療料の施設基準等第５の３（１）のロに規定する医療区分２の患者又は第６の３（２）のロの④に規定する医療区分１の患者に相当するものについては、注１の規定にかかわらず、次に掲げる点数をそれぞれ算定する。
      - イ医療区分２の患者に相当するもの1,927点
      - ロ医療区分１の患者に相当するもの1,761点
  - ５診療に係る費用（注２及び注３に規定する加算、第２節に規定する臨床研修病院入院診療加算、超急性期脳卒中加算、医師事務作業補助体制加算、特定感染症患者療養環境特別加算、超重症児（者）入院診療加算・準超重症児（者）入院診療加算、地域加算、離島加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、データ提出加算、入退院支援加算（１のロ及び２のロに限る。）、医療的ケア児（者）入院前支援加算、認知症ケア加算及び排尿自立支援加算、第14部その他並びに除外薬剤・注射薬の費用を除く。）は、特殊疾患入院医療管理料に含まれるものとする。
  - ６当該病室に入院する脳卒中又は脳卒中の後遺症の患者（重度の意識障害者、筋ジストロフィー患者及び難病患者等を除く。）であって、基本診療料の施設基準等第５の３（１）のロに規定する医療区分２の患者又は第６の３（２）のロの④に規定する医療区分１の患者に相当するものについては、注１の規定にかかわらず、次に掲げる点数をそれぞれ算定する。
      - イ医療区分２の患者に相当するもの1,734点
      - ロ医療区分１の患者に相当するもの1,588点
  - ７当該病棟に入院している患者のうち、区分番号Ｊ０３８に掲げる人工腎臓、区分番号Ｊ０３８－２に掲げる持続緩徐式血液濾過、区分番号Ｊ０３９に掲げる血漿交換療法又は区分番号Ｊ０４２に掲げる腹膜灌流を行っている慢性腎臓病の患者（注４及び注６に規定する点数を算定する患者を除く。）であって、基本診療料の施設基準等第５の３（１）のロに規定する医療区分２の患者に相当するものについては、注１の規定にかかわらず、2,011点を算定する。
