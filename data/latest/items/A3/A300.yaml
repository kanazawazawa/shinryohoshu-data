code: A300
name: 救命救急入院料（１日につき）
version: r8
points: null
unit: 日
chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第3節 特定入院料
raw_text: |
  Ａ３００救命救急入院料（１日につき）１救命救急入院料１
      - イ３日以内の期間12,379点
      - ロ４日以上７日以内の期間11,240点
      - ハ８日以上の期間9,894点
  - ２救命救急入院料２
      - イ３日以内の期間10,623点
      - ロ４日以上７日以内の期間9,629点
      - ハ８日以上の期間8,469点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、重篤な患者に対して救命救急医療が行われた場合に、当該基準に係る区分に従い、14日（広範囲熱傷特定集中治療管理が必要な状態の患者（注12に規定する加算を算定する患者に限る。）にあっては60日、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者であって、急性血液浄化（腹膜透析を除く。）又は体外式心肺補助（ＥＣＭＯ）を必要とするものにあっては25日、臓器移植を行ったものにあっては30日）を限度として、それぞれ所定点数を算定する。
  - ２当該保険医療機関において、自殺企図等による重篤な患者であって精神疾患を有するもの又はその家族等からの情報等に基づいて、当該保険医療機関の精神保健指定医又は精神科の医師が、当該患者の精神疾患にかかわる診断治療等を行った場合は、精神疾患診断治療初回加算として、当該精神保健指定医等による最初の診療時に限り、次に掲げる点数をそれぞれ所定点数に加算する。
  この場合において、区分番号Ａ２４８に掲げる精神疾患診療体制加算は別に算定できない。
      - イ別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行った場合7,000点
      - ロイ以外の場合3,000点
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において救命救急医療が行われた場合には、当該基準に係る区分に従い、１日につき次に掲げる点数をそれぞれ所定点数に加算する。
      - イ救急体制充実加算１1,500点
      - ロ救急体制充実加算２1,000点
      - ハ救急体制充実加算３500点
  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において救命救急医療が行われた場合には、１日につき100点を所定点数に加算する。
  - ５当該保険医療機関において、急性薬毒物中毒の患者に対して救命救急医療が行われた場合には、入院初日に限り、次に掲げる点数をそれぞれ所定点数に加算する。
      - イ急性薬毒物中毒加算１（機器分析）5,000点
      - ロ急性薬毒物中毒加算２（その他のもの）350点
  - ６別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、15歳未満の重篤な患者に対して救命救急医療が行われた場合には、小児加算として、入院初日に限り5,000点を所定点数に加算する。
  - ７第１章基本診療料並びに第２章第３部検査、第６部注射、第９部処置及び第13部病理診断のうち次に掲げるものは、救命救急入院料に含まれるものとする。
      - イ入院基本料
      - ロ入院基本料等加算（臨床研修病院入院診療加算、超急性期脳卒中加算、妊産婦緊急搬送入院加算、医師事務作業補助体制加算、特定感染症入院医療管理加算、難病等特別入院診療加算（二類感染症患者入院診療加算に限る。）、地域加算、離島加算、口腔管理連携加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、重症患者初期支援充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、術後疼痛管理チーム加算、病棟薬剤業務実施加算３、データ提出加算、入退院支援加算（１のイ及び３に限る。）、認知症ケア加算、せん妄ハイリスク患者ケア加算、精神疾患診療体制加算、排尿自立支援加算及び地域医療体制確保加算を除く。）
      - ハ第２章第３部の各区分の検査（区分番号Ｄ００６－19に掲げるがんゲノムプロファイリング検査（造血器腫瘍又は類縁疾患を対象とする場合に限る。）及び同部第１節第２款の検体検査判断料を除く。）
      - ニ点滴注射
      - ホ中心静脈注射
      - ヘ酸素吸入（使用した酸素及び窒素の費用を除く。）
      - ト留置カテーテル設置
      - チ第13部第１節の病理標本作製料８別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病室に入院している患者に対して、入室後早期から離床等に必要な治療を行った場合に、早期離床・リハビリテーション加算として、入室した日から起算して14日を限度として500点を所定点数に加算する。
  この場合において、同一日に区分番号Ｈ０００に掲げる心大血管疾患リハビリテーション料、Ｈ００１に掲げる脳血管疾患等リハビリテーション料、Ｈ００１－２に掲げる廃用症候群リハビリテーション料、Ｈ００２に掲げる運動器リハビリテーション料、Ｈ００３に掲げる呼吸器リハビリテーション料、Ｈ００７に掲げる障害児（者）リハビリテーション料及びＨ００７－２に掲げるがん患者リハビリテーション料は、算定できない。
  - ９別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病室に入院している患者に対して、入室後早期から必要な栄養管理を行った場合に、早期栄養介入管理加算として、入室した日から起算して７日を限度として250点（入室後早期から経腸栄養を開始した場合は、当該開始日以降は400点）を所定点数に加算する。
  ただし、区分番号Ｂ００１の10に掲げる入院栄養食事指導料は別に算定できない。
  - 10注２のイに該当する場合であって、当該患者に対し、生活上の課題又は精神疾患の治療継続上の課題を確認し、助言又は指導を行った場合は、当該患者の退院時に１回に限り、2,500点を更に所定点数に加算する。
  この場合において、区分番号Ｉ００２－３に掲げる救急患者精神科継続支援料は別に算定できない。
  - 11重症患者の対応に係る体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病室に入院している患者（救命救急入院料１に係る届出を行った保険医療機関の病室に入院した患者に限る。）について、重症患者対応体制強化加算として、当該患者の入院期間に応じ、次に掲げる点数をそれぞれ所定点数に加算する。
      - イ３日以内の期間750点
      - ロ４日以上７日以内の期間500点
      - ハ８日以上14日以内の期間300点
  - 12別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、広範囲熱傷特定集中治療管理が必要な状態の患者に対して救命救急医療が行われた場合には、広範囲熱傷管理加算として、入院日から起算して８日以降60日までの期間に限り、200点を所定点数に加算する。
