code: A303-2
name: 新生児治療回復室入院医療管理料（１日につき）
version: r8
points: 5931
unit: 日
chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第3節 特定入院料
raw_text: |
  Ａ３０３－２新生児治療回復室入院医療管理料（１日につき）5,931点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、必要があって新生児治療回復室入院医療管理が行われた場合に、区分番号Ａ３０２に掲げる新生児特定集中治療室管理料、区分番号Ａ３０２－２に掲げる新生児特定集中治療室重症児対応体制強化管理料及び区分番号Ａ３０３の２に掲げる新生児集中治療室管理料を算定した期間と通算して30日（出生時体重が1,500グラム以上であって、別に厚生労働大臣が定める疾患を主病として入院している新生児にあっては50日、出生時体重が1,000グラム未満の新生児にあっては120日（出生時体重が500グラム以上750グラム未満であって慢性肺疾患の新生児にあっては135日、出生時体重が500グラム未満であって慢性肺疾患の新生児にあっては140日）、出生時体重が1,000グラム以上1,500グラム未満の新生児にあっては90日）を限度として算定する。
  - ２第１章基本診療料並びに第２章第３部検査、第６部注射、第９部処置及び第13部病理診断のうち次に掲げるものは、新生児治療回復室入院医療管理料に含まれるものとする。
      - イ入院基本料
      - ロ入院基本料等加算（臨床研修病院入院診療加算、超急性期脳卒中加算、医師事務作業補助体制加算、特定感染症入院医療管理加算、難病等特別入院診療加算（二類感染症患者入院診療加算に限る。）、地域加算、離島加算、口腔管理連携加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、重症患者初期支援充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、データ提出加算、入退院支援加算（１のイ及び３に限る。）、排尿自立支援加算及び地域医療体制確保加算を除く。）
      - ハ第２章第３部の各区分の検査（同部第１節第２款の検体検査判断料を除く。）
      - ニ点滴注射
      - ホ中心静脈注射
      - ヘ酸素吸入（使用した酸素及び窒素の費用を除く。）
      - トインキュベーター（使用した酸素及び窒素の費用を除く。）
      - チ第13部第１節の病理標本作製料Ａ３０４地域包括医療病棟入院料（１日につき）１地域包括医療病棟入院料１
      - イ入院料１3,367点
      - ロ入院料２3,267点
      - ハ入院料３3,117点
  - ２地域包括医療病棟入院料２
      - イ入院料１3,316点
      - ロ入院料２3,216点
      - ハ入院料３3,066点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟を有する保険医療機関において、当該基準に係る区分に従って、それぞれ所定点数を算定する。
  ただし、90日を超えて入院するものについては、区分番号Ａ１００に掲げる一般病棟入院基本料の地域一般入院料３の例により、算定する。
  - ２入院料１については、緊急入院の患者であって、入院時の主傷病に対して入院中に手術（第二章第十部第一節に掲げるものに限る。
  以下この項において同じ。）を実施しないもの、入院料２については、緊急入院の患者であって入院時の主傷病に対して入院中に手術を実施するもの及び予定された入院の患者であって入院中に手術を実施しないもの、入院料３については予定された入院の患者であって、入院時の主傷病に対して手術を実施するものについて算定する。
  - ３入院した日から起算して14日を限度として、初期加算として、１日につき150点を所定点数に加算する。
  - ４別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の特定入院料は、夜間看護体制特定日減算として、次のいずれにも該当する場合に限り、所定点数の100分の５に相当する点数を減算する。
      - イ年６日以内であること。
      - ロ当該日が属する月が連続する２月以内であること。
  - ５診療に係る費用のうち次に掲げるものは、地域包括医療病棟入院料に含まれるものとする。
      - イ入院基本料
      - ロ入院基本料等加算（臨床研修病院入院診療加算、包括期充実体制加算、救急医療管理加算、在宅患者緊急入院診療加算、医師事務作業補助体制加算、地域加算、離島加算、特定感染症患者療養環境特別加算、特定薬剤治療環境特別加算、栄養サポートチーム加算、口腔管理連携加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、病棟薬剤業務実施加算（１及び２に限る。）、データ提出加算、入退院支援加算（１のロに限る。）、医療的ケア児（者）入院前支援加算、認知症ケア加算、薬剤総合評価調整加算、排尿自立支援加算、地域医療体制確保加算、協力対象施設入所者入院加算及び医療提供機能連携確保加算を除く。）
      - ハ第２章第１部医学管理等（区分番号Ｂ０００からＢ００１－３－３まで、Ｂ００１－６からＢ０１５まで及びＢ２００に掲げる特定保険医療材料（区分番号Ｂ０００からＢ００１－３－３まで及びＢ００１－６からＢ０１５までに掲げるものに係るものに限る。）を除く。）
      - ニ第３部検査（区分番号Ｄ２０６、Ｄ２９５からＤ３２５まで及びＤ４０１からＤ４１９－２まで、Ｄ５００に掲げる薬剤（区分番号Ｄ２０６、Ｄ２９５からＤ３２５まで及びＤ４０１からＤ４１９－２までに掲げる検査に係るものに限る。）及びＤ６００に掲げる特定保険医療材料（区分番号Ｄ２０６、
