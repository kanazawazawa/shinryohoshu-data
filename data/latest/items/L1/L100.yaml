raw_text: |
  Ｌ１００神経ブロック（局所麻酔剤又はボツリヌス毒素使用）１トータルスパイナルブロック、三叉神経半月神経節ブロック、胸部交感神経節ブロック、腹腔神経叢ブロック、頸・胸部硬膜外ブロック、神経根ブロック、下腸間膜動脈神経叢ブロック、上下腹神経叢ブロック1,500点
  - ２眼神経ブロック、上顎神経ブロック、下顎神経ブロック、舌咽神経ブロック、蝶形口蓋神経節ブロック、腰部硬膜外ブロック800点
  - ３腰部交感神経節ブロック、くも膜下脊髄神経ブロック、腰神経叢ブロック570点
  - ４眼瞼痙攣けんけいれん、片側顔面痙攣、痙性斜頸、上肢痙縮又は下肢痙縮の治療目的でボツリヌス毒素を用いた場合400点
  - ５星状神経節ブロック、仙骨部硬膜外ブロック、顔面神経ブロック340点
  - ６腕神経叢ブロック、おとがい神経ブロック、舌神経ブロック、迷走神経ブロック、副神経ブロック、横隔神経ブロック、深頸神経叢ブロック、眼窩上神経ブロック、眼窩下神経ブロック、滑車神経ブロック、耳介側頭神経ブロック、浅頸神経叢ブロック、肩甲背神経ブロック、肩甲上神経ブロック、外側大腿皮神経ブロック、閉鎖神経ブロック、不対神経節ブロック、前頭神経ブロック170点
  - ７頸・胸・腰傍脊椎神経ブロック、上喉頭神経ブロック、肋間神経ブロック、腸骨下腹神経ブロック、腸骨鼠径神経ブロック、大腿神経ブロック、坐骨神経ブロック、陰部神経ブロック、経仙骨孔神経ブロック、後頭神経ブロック、筋皮神経ブロック、正中神経ブロック、尺骨神経ブロック、腋窩神経ブロック、橈骨神経ブロック、仙腸関節枝神経ブロック、頸・胸・腰椎後枝内側枝神経ブロック、脊髄神経前枝神経ブロック90点
  - 注上記以外の神経ブロック（局所麻酔剤又はボツリヌス毒素使用）は、区分番号Ｌ１０２に掲げる神経幹内注射で算定する。
