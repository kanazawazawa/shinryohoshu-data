  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第2節 在宅療養指導管理料
  subsection: 第1款 在宅療養指導管理料
raw_text: |
  Ｃ１０８在宅麻薬等注射指導管理料
  - １悪性腫瘍の場合1,500点
  - ２筋萎縮性側索硬化症又は筋ジストロフィーの場合1,500点
  - ３心不全又は呼吸器疾患の場合1,500点
  - 注１１については、悪性腫瘍の患者であって、入院中の患者以外の末期の患者に対して、在宅における麻薬等の注射に関する指導管理を行った場合に算定する。
  - ２２については、筋萎縮性側索硬化症又は筋ジストロフィーの患者であって、入院中の患者以外の患者に対して、在宅における麻薬等の注射に関する指導管理を行った場合に算定する。
  - ３３については、１又は２に該当しない場合であって、緩和ケアを要する心不全又は呼吸器疾患の患者であって、入院中の患者以外の末期の患者に対して、在宅における麻薬の注射に関する指導管理を行った場合に算定する。
