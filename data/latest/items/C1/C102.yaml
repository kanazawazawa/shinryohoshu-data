chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第2節 在宅療養指導管理料
  subsection: 第1款 在宅療養指導管理料
raw_text: |
  Ｃ１０２在宅自己腹膜灌流指導管理料
  - １在宅自己腹膜灌流指導管理料１4,000点
  - ２在宅自己腹膜灌流指導管理料２1,500点
  - 注１在宅自己腹膜灌流指導管理料１については、在宅自己連続携行式腹膜灌流を行っている入院中の患者以外の患者に対して、在宅自己連続携行式腹膜灌流に関する指導管理を行った場合に算定するものとし、頻回に指導管理を行う必要がある場合は、同一月内の２回目以降１回につき2,000点を月２回に限り算定する。
  - ２当該指導管理料１を算定する同一月内に区分番号Ｊ０３８に掲げる人工腎臓又はＪ０４２に規定する腹膜灌流の１を算定する場合は、注１に規定する２回目以降の費用は、算定しない。
  - ３注１に規定する患者であって継続的に遠隔モニタリングを実施したものに対して当該指導管理を行った場合は、遠隔モニタリング加算として、月１回に限り115点を所定点数に加算する。
  - ４在宅自己腹膜灌流指導管理料２については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、在宅自己連続携行式腹膜灌流を行っている入院中の患者以外の患者に対して、当該指導管理料１を算定している他の保険医療機関の求めに応じて指導管理を行った場合に、一連の治療につき２回に限り算定する。
