raw_text: |
  Ｃ１６６携帯型ディスポーザブル注入ポンプ加算2,500点
  - 注次のいずれかに該当する入院中の患者以外の患者に対して、携帯型ディスポーザブル注入ポンプを使用した場合に、第１款の所定点数に加算する。
      - イ悪性腫瘍の患者であって、在宅において麻薬等の注射を行っている末期の患者
      - ロ悪性腫瘍の患者であって、在宅において抗悪性腫瘍剤等の注射を行っている患者
      - ハイ又はロに該当しない場合であって、緩和ケアを要する心不全、呼吸器疾患又は腎不全の患者に対して、在宅において麻薬の注射を行っている末期の患者
