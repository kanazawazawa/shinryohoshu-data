raw_text: |
  Ｃ１６３特殊カテーテル加算
  - １再利用型カテーテル400点
  - ２間歇導尿用ディスポーザブルカテーテル
      - イ親水性コーティングを有するもの
    - （１）60本以上90本未満の場合1,700点
    - （２）90本以上120本未満の場合1,900点
    - （３）120本以上の場合2,100点
      - ロイ以外のもの1,000点
  - ３間歇バルーンカテーテル1,000点
  - 注在宅自己導尿を行っている入院中の患者以外の患者に対して、再利用型カテーテル、間歇導尿用ディスポーザブルカテーテル又は間歇バルーンカテーテルを使用した場合に、第１款の所定点数に加算する。
