raw_text: |
  Ｃ１１０－２在宅振戦等刺激装置治療指導管理料810点
  - 注１振戦等除去のため植込型脳・脊髄刺激装置を植え込んだ後に、在宅において振戦等管理を行っている入院中の患者以外の患者に対して、在宅振戦等管理に関する指導管理を行った場合に算定する。
  - ２植込術を行った日から起算して３月以内の期間に行った場合には、導入期加算として、140点を所定点数に加算する。
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、在宅振戦等刺激装置治療指導管理料を算定すべき指導管理を情報通信機器を用いて行った場合は、所定点数に代えて、705点を算定する。
