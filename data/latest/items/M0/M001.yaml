code: M001
name: 体外照射
version: r8
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第12部 放射線治療
  section: 第1節 放射線治療管理・実施料
raw_text: |
  Ｍ００１体外照射
  - １エックス線表在治療
      - イ１回目110点
      - ロ２回目33点
  - ２高エネルギー放射線治療
      - イ乳癌に対する全乳房照射の場合（一連につき）41,500点
      - ロその他の場合
    - （１）１門照射を行った場合（１回目）840点
    - （２）１門照射を行った場合（２回目）336点
    - （３）２門以上の照射、運動照射又は原体照射を行った場合（１回目）1,750点
    - （4）２門以上の照射、運動照射又は原体照射を行った場合（２回目）700点
  - ３強度変調放射線治療（ＩＭＲＴ）
      - イ前立腺癌に対する前立腺照射の場合（一連につき）96,500点
      - ロその他の場合3,000点
  - 注１２のイ及び３のイを除き、疾病、部位又は部位数にかかわらず、１回につき算定する。
  - ２２については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関以外の保険医療機関において行われる場合は、所定点数の100分の60に相当する点数により算定する。
  - ３乳癌の患者に対し、全乳房照射を行う場合には２のイにより一連として算定する。
  なお、寡分割照射として１回の線量が2.5Ｇｙ以上の全乳房照射を行う場合は、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に限り算定できる。
  - ４２のイについて、治療を取りやめた等の場合においては、７回目までは10,500点、８回目以上は14,000点を一連として所定点数に代えて算定する。
  - ５３については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める患者に対して、放射線治療を実施した場合に算定する。
  - ６前立腺癌の患者に対し、前立腺照射を行う場合には３のイにより一連として算定する。
  なお、寡分割照射として１回の線量が３Ｇｙ以上の前立腺照射を行う場合は、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に限り算定できる。
  - ７３のイについて、治療を取りやめた等の場合においては、９回目までは24,000点、10回目以上は42,000点を一連として所定点数に代えて算定する。
  - ８術中照射療法を行った場合は、術中照射療法加算として、患者１人につき１日を限度として、5,000点を所定点数に加算する。
  - ９体外照射用固定器具を使用した場合は、体外照射用固定器具加算として、1,000点を所定点数に加算する。
  - 10別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、放射線治療を専ら担当する常勤の医師が画像誘導放射線治療（ＩＧＲＴ）による体外照射を行った場合（イの場合は、乳房照射に係るもの、ロ及びハの場合は、２のロの（３）若しくは（4）又は３に係るものに限る。）には、画像誘導放射線治療加算として、患者１人１日につき１回に限り、次に掲げる区分に従い、いずれかを所定点数に加算する。
  ただし、イについては、２のイに係るものは、一連につき１回に限り、当該加算の点数に代えて2,400点を所定点数に加算し、ハについては、３のイに係るものは、一連につき１回に限り、当該加算の点数に代えて9,000点を所定点数に加算する。
      - イ体表面の位置情報によるもの150点
      - ロ骨構造の位置情報によるもの300点
      - ハ腫瘍の位置情報によるもの450点
  - 11別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、呼吸性移動対策を行った場合は、体外照射呼吸性移動対策加算として、150点を所定点数に加算する。
  ただし、２のイに係るものは、一連につき１回に限り、当該加算の点数に代えて2,400点を所定点数に加算する。
