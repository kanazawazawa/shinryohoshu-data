raw_text: |
  Ｍ００１－３直線加速器による放射線治療（一連につき）１定位放射線治療の場合63,000点
  - ２１以外の場合8,000点
  - 注１定位放射線治療のうち、患者の体幹部に対して行われるものについては、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。
  - ２定位放射線治療について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、呼吸性移動対策を行った場合は、定位放射線治療呼吸性移動対策加算として、所定点数に次の点数を加算する。
      - イ動体追尾法10,000点
      - ロその他5,000点Ｍ００１－４粒子線治療（一連につき）１希少な疾病に対して実施した場合
      - イ重粒子線治療の場合187,500点
      - ロ陽子線治療の場合187,500点
  - ２１以外の特定の疾病に対して実施した場合
      - イ重粒子線治療の場合110,000点
      - ロ陽子線治療の場合110,000点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める患者に対して行われる場合に限り算定する。
  - ２粒子線治療の適応判定体制に関する別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、粒子線治療の適応判定に係る検討が実施された場合には、粒子線治療適応判定加算として、40,000点を所定点数に加算する。
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、放射線治療を担当する専従の医師が策定した照射計画に基づく医学的管理を行った場合には、粒子線治療医学管理加算として、10,000点を所定点数に加算する。
