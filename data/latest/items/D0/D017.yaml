raw_text: |
  Ｄ０１７排泄
  物、滲出物又は分泌物の細菌顕微鏡検査１蛍光顕微鏡、位相差顕微鏡、暗視野装置等を使用するもの65点
  - 注集菌塗抹法を行った場合には、集菌塗抹法加算として、35点を所定点数に加算する。
  - ２保温装置使用アメーバ検査45点
  - ３その他のもの67点
  - 注同一検体について当該検査と区分番号Ｄ００２に掲げる尿沈渣（鏡検法）又は区分番号Ｄ００２－２に掲げる尿沈渣（フローサイトメトリー法）を併せて行った場合は、主たる検査の所定点数のみ算定する。
