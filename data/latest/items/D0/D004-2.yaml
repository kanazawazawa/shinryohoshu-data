raw_text: |
  Ｄ００４－２悪性腫瘍組織検査
  - １悪性腫瘍遺伝子検査
      - イ処理が容易なもの
    - （１）医薬品の適応判定の補助等に用いるもの2,500点
    - （２）その他のもの2,100点
      - ロ処理が複雑なもの5,000点
  - 注１患者から１回に採取した組織等を用いて同一がん種に対してイに掲げる検査を実施した場合は、所定点数にかかわらず、検査の項目数に応じて次に掲げる点数により算定する。
      - イ２項目4,000点
      - ロ３項目6,000点
      - ハ４項目以上8,000点
  - ２患者から１回に採取した組織等を用いて同一がん種に対してロに掲げる検査を実施した場合は、所定点数にかかわらず、検査の項目数に応じて次に掲げる点数により算定する。
      - イ２項目8,000点
      - ロ３項目以上12,000点
  - ２抗悪性腫瘍剤感受性検査2,500点
