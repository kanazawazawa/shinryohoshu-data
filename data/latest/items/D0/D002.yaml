raw_text: |
  Ｄ００２尿沈渣
  （鏡検法）27点
  - 注１同一検体について当該検査と区分番号Ｄ０１７に掲げる排泄物、滲出物又は分泌物の細菌顕微鏡検査を併せて行った場合は、主たる検査の所定点数のみ算定する。
  - ２当該保険医療機関内で検査を行った場合に算定する。
  - ３染色標本による検査を行った場合は、染色標本加算として、９点を所定点数に加算する。
