points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第3部 検査
  section: 第1節 検体検査料
  subsection: 第1款 検体検査実施料
raw_text: |
  Ｄ０２３微生物核酸同定・定量検査
  - １クラミジア・トラコマチス核酸検出188点
  - ２淋菌核酸検出198点
  - ３Ａ群β溶血連鎖球菌核酸検出204点
  - ４ＨＢＶ核酸定量256点
  - ５淋菌及びクラミジア・トラコマチス同時核酸検出262点
  - ６マイコプラズマ核酸検出、インフルエンザ核酸検出291点
  - ７レジオネラ核酸検出292点
  - ８ＥＢウイルス核酸定量310点
  - ９ＨＣＶ核酸検出330点
  - 10ＨＰＶ核酸検出347点
  - 注ＨＰＶ核酸検出については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、細胞診によりベセスダ分類がＡＳＣ－ＵＳと判定された患者又は過去に区分番号Ｋ８６７に掲げる子宮頸部（腟部）切除術、区分番号Ｋ８６７－３に掲げる子宮頸部摘出術（腟部切断術を含む。）若しくは区分番号Ｋ８６７－４に掲げる子宮頸部異形成上皮又は上皮内癌レーザー照射治療を行った患者に対して行った場合に限り算定する。
  - 11ＨＰＶ核酸検出（簡易ジェノタイプ判定）347点
  - 注ＨＰＶ核酸検出（簡易ジェノタイプ判定）については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、細胞診によりベセスダ分類がＡＳＣ－ＵＳと判定された患者又は過去に区分番号Ｋ８６７に掲げる子宮頸部（腟部）切除術、区分番号Ｋ８６７－３に掲げる子宮頸部摘出術（腟部切断術を含む。）若しくは区分番号Ｋ８６７－４に掲げる子宮頸部異形成上皮又は上皮内癌レーザー照射治療を行った患者に対して行った場合に限り算定する。
  - 12腟トリコモナス及びマイコプラズマ・ジェニタリウム核酸同時検出350点
  - 13百日咳菌核酸検出、肺炎クラミジア核酸検出、百日咳菌・パラ百日咳菌核酸同時検出、ヘリコバクター・ピロリ核酸及びクラリスロマイシン耐性遺伝子検出360点
  - 14抗酸菌核酸同定、結核菌群核酸検出410点
  - 15ＨＣＶ核酸定量412点
  - 16マイコバクテリウム・アビウム及びイントラセルラー（ＭＡＣ）核酸検出421点
  - 17ＨＢＶ核酸プレコア変異及びコアプロモーター変異検出、ブドウ球菌メチシリン耐性遺伝子検出、ＳＡＲＳコロナウイルス核酸検出、ＨＴＬＶ－１核酸検出、単純疱疹ウイルス・水痘帯状疱疹ウイルス核酸定量、サイトメガロウイルス核酸定量450点
  - 18ＨＩＶ－１核酸定量520点
  - 注検体の超遠心による濃縮前処理を加えて行った場合は、濃縮前処理加算として、130点を所定点数に加算する。
  - 19ＳＡＲＳ－ＣｏＶ－２核酸検出、ＳＡＲＳ－ＣｏＶ－２・インフルエンザ核酸同時検出、ＳＡＲＳ－ＣｏＶ－２・ＲＳウイルス核酸同時検出、ＳＡＲＳ－ＣｏＶ－２・インフルエンザ・ＲＳウイルス核酸同時検出700点
  - 20サイトメガロウイルス核酸検出801点
  - 21結核菌群リファンピシン耐性遺伝子検出、結核菌群ピラジナミド耐性遺伝子検出、結核菌群イソニアジド耐性遺伝子検出850点
  - 22ウイルス・細菌核酸多項目同時検出（ＳＡＲＳ－ＣｏＶ－２核酸検出を含まないもの）、結核菌群リファンピシン耐性遺伝子及びイソニアジド耐性遺伝子同時検出963点
  - 注ウイルス・細菌核酸多項目同時検出（ＳＡＲＳ－ＣｏＶ－２核酸検出を含まないもの）については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める患者に対して実施した場合に限り算定する。
  - 23ウイルス・細菌核酸多項目同時検出（ＳＡＲＳ－ＣｏＶ－２核酸検出を含む。）1,350点
  - 24細菌核酸・薬剤耐性遺伝子同時検出、ウイルス・細菌核酸多項目同時検出（髄液）1,700点
  - 注１細菌核酸・薬剤耐性遺伝子同時検出については、別に厚生労働大臣が定める施設基準を満たす保険医療機関において実施した場合に算定する。
  - ２ウイルス・細菌核酸多項目同時検出（髄液）については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において実施した場合に限り算定する。
  - 25ＨＰＶジェノタイプ判定2,000点
  - 26ＨＩＶジェノタイプ薬剤耐性6,000点
  - 注６（マイコプラズマ核酸検出に限る。）、７、13（百日咳菌核酸検出及び百日咳菌・パラ百日咳菌核酸同時検出に限る。）又は14（結核菌群核酸検出に限る。）に掲げる検査の結果について、検査実施日のうちに説明した上で文書により情報を提供した場合は、迅速微生物核酸同定・定量検査加算として、100点を所定点数に加算する。
