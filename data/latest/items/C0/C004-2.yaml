chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ００４－２救急患者連携搬送料
  - １救急患者連携搬送料１
      - イ医師、看護師又は救急救命士が同乗して搬送する場合
    - （１）入院中の患者以外の患者の場合2,400点
    - （２）入院初日の患者の場合1,200点
    - （３）入院２日目の患者の場合800点
    - （4）入院３日目の患者の場合600点
      - ロその他の場合
    - （１）入院中の患者以外の患者の場合1,000点
    - （２）入院初日の患者の場合500点
    - （３）入院２日目の患者の場合350点
    - （4）入院３日目の患者の場合200点
  - ２救急患者連携搬送料２
      - イ医師、看護師又は救急救命士が同乗して搬送する場合800点
      - ロその他の場合200点
  - 注１１のイについては、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、救急外来を受診した患者に対する初期診療を実施し、連携する他の保険医療機関において入院医療を提供することが適当と判断した上で、当該他の保険医療機関において入院医療を提供する目的で、自院の医師、看護師又は救急救命士が同乗の上、搬送を行った場合に算定する。
  この場合において、区分番号Ｃ００４に掲げる救急搬送診療料は別に算定できない。
  - ２１のロについては、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、救急外来を受診した患者に対する初期診療を実施し、連携する他の保険医療機関において入院医療を提供することが適当と判断した上で、当該他の保険医療機関において入院医療を提供する目的で、当該患者の搬送手段について調整を行い、当該患者の搬送を行った場合に算定する。
  - ３２のイについては、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、他の保険医療機関で１のロを算定した患者に対して、自院の医師、看護師又は救急救命士が同乗の上、自院へ搬送を行い、入院させた場合に、入院初日に限り算定する。
  この場合において、区分番号Ｃ００４に掲げる救急搬送診療料は別に算定できない。
  - ４２のロについては、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、他の保険医療機関で１のイ又はロを算定した患者を入院させた場合に、入院初日に限り算定する。
  - ５１のイ又は２のイに規定する場合であって、当該搬送に要した時間が30分を超えた場合には、長時間加算として、700点を所定点数に加算する。
