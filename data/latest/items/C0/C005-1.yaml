code: C005-1
name: －３訪問看護遠隔診療補助料（１日につき）
version: r8
points: 265
unit: 日
chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ００５－１－２同一建物居住者訪問看護・指導料（１日につき）１保健師、助産師又は看護師（３の場合を除く。）による場合
      - イ同一日に２人
    - （１）週３日目まで580点
    - （２）週４日目以降680点
      - ロ同一日に３人以上９人以下
    - （１）週３日目まで293点
    - （２）週４日目以降343点
      - ハ同一日に10人以上19人以下
    - （１）月20日目まで290点
    - （２）月21日目以降280点
      - ニ同一日に20人以上49人以下
    - （１）月20日目まで285点
    - （２）月21日目以降275点
      - ホ同一日に50人以上
    - （１）月20日目まで275点
    - （２）月21日目以降265点
  - ２准看護師による場合
      - イ同一日に２人
    - （１）週３日目まで530点
    - （２）週４日目以降630点
      - ロ同一日に３人以上９人以下
    - （１）週３日目まで268点
    - （２）週４日目以降318点
      - ハ同一日に10人以上19人以下
    - （１）月20日目まで266点
    - （２）月21日目以降256点
      - ニ同一日に20人以上49人以下
    - （１）月20日目まで261点
    - （２）月21日目以降251点
      - ホ同一日に50人以上
    - （１）月20日目まで251点
    - （２）月21日目以降241点
  - ３悪性腫瘍の患者に対する緩和ケア、褥瘡ケア又は人工肛門ケア及び人工膀胱ケアに係る専門の研修を受けた看護師による場合1,285点
  - 注１１及び２については、保険医療機関が、在宅で療養を行っている患者（同一建物等居住者に限る。）であって通院が困難なものに対して、診療に基づく訪問看護計画により、看護師等を訪問させて看護又は療養上必要な指導を行った場合に、患者１人について日単位で算定する。
  ただし、別に厚生労働大臣が定める疾病等の患者以外の患者については、区分番号Ｃ００５に掲げる在宅患者訪問看護・指導料（３を除く。）又は区分番号Ｉ０１２に掲げる精神科訪問看護・指導料を算定する日と合わせて週３日（保険医療機関が、診療に基づき患者の急性増悪等により一時的に頻回の訪問看護・指導を行う必要を認めて、訪問看護・指導を行う場合にあっては、１月に１回（別に厚生労働大臣が定めるものについては、月２回）に限り、週７日（当該診療の日から起算して14日以内の期間に行われる場合に限る。））を限度とする。
  - ２３については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、在宅で療養を行っている悪性腫瘍の鎮痛療法若しくは化学療法を行っている患者、真皮を越える褥瘡の状態にある患者（区分番号Ｃ０１３に掲げる在宅患者訪問褥瘡管理指導料を算定する場合にあっては真皮までの状態の患者）又は人工肛門若しくは人工膀胱を造設している者で管理が困難な患者（いずれも同一建物等居住者に限る。）であって通院が困難なものに対して、診療に基づく訪問看護計画により、緩和ケア、褥瘡ケア又は人工肛門ケア及び人工膀胱ケアに係る専門の研修を受けた看護師を訪問させて、他の保険医療機関の看護師若しくは准看護師又は訪問看護ステーションの看護師若しくは准看護師と共同して同一日に看護又は療養上必要な指導を行った場合に、当該患者１人について、それぞれ月１回に限り算定する。
  - ３１及び２については、注１ただし書に規定する別に厚生労働大臣が定める疾病等の患者又は同注ただし書の規定に基づき週７日を限度として所定点数を算定する患者に対して、当該患者に対する診療を担う保険医療機関の保険医が必要と認めて、１日に２回又は３回以上訪問看護・指導を実施した場合は、難病等複数回訪問加算として、同一日に、当該加算又は区分番号Ｉ０１２に掲げる精神科訪問看護・指導料の注11に規定する精神科複数回訪問加算を算定する患者（同一建物等居住者に限る。）の合計人数に応じて次に掲げる区分に従い、１日につき、いずれかを所定点数に加算する。
      - イ１日に２回の場合
    - （１）同一建物内１人又は２人450点
    - （２）同一建物内３人以上９人以下400点
    - （3）同一建物内10人以上19人以下370点
    - （４）同一建物内20人以上49人以下350点
    - （５）同一建物内50人以上330点
      - ロ１日に３回以上の場合
    - （１）同一建物内１人又は２人800点
    - （２）同一建物内３人以上９人以下①月20日目まで720点②月21日目以降690点
    - （3）同一建物内10人以上19人以下①月20日目まで630点②月21日目以降520点
    - （４）同一建物内20人以上49人以下①月20日目まで480点②月21日目以降350点
    - （５）同一建物内50人以上①月20日目まで410点②月21日目以降300点
  - ４１及び２については、同時に複数の看護師等又は看護補助者による訪問看護・指導が必要な者として別に厚生労働大臣が定める者に対して、保険医療機関の看護師等が、当該保険医療機関のその他職員と同時に訪問看護・指導を行うことについて、当該患者又はその家族等の同意を得て、訪問看護・指導を実施した場合には、複数名訪問看護・指導加算として、同一日に、当該加算又は区分番号Ｉ０１２に掲げる精神科訪問看護・指導料の注４に規定する複数名精神科訪問看護・指導加算を算定する患者（同一建物等居住者に限る。）の合計人数に応じて次に掲げる区分に従い、１日につき、いずれかを所定点数に加算する。
  ただし、イ又はロの場合にあっては週１日を、ハの場合にあっては週３日を限度として算定する。
      - イ所定点数を算定する訪問看護・指導を行う看護師等が他の保健師、助産師又は看護師と同時に訪問看護・指導を行う場合
    - （１）同一建物内１人又は２人450点
    - （２）同一建物内３人以上９人以下400点
    - （3）同一建物内10人以上19人以下340点
    - （４）同一建物内20人以上49人以下300点
    - （５）同一建物内50人以上270点
      - ロ所定点数を算定する訪問看護・指導を行う看護師等が他の准看護師と同時に訪問看護・指導を行う場合
    - （１）同一建物内１人又は２人380点
    - （２）同一建物内３人以上９人以下340点
    - （3）同一建物内10人以上19人以下280点
    - （４）同一建物内20人以上49人以下250点
    - （５）同一建物内50人以上220点
      - ハ所定点数を算定する訪問看護・指導を行う看護師等がその他職員と同時に訪問看護・指導を行う場合（別に厚生労働大臣が定める場合を除く。）
    - （１）同一建物内１人又は２人300点
    - （２）同一建物内３人以上９人以下270点
    - （3）同一建物内10人以上19人以下210点
    - （４）同一建物内20人以上49人以下190点
    - （５）同一建物内50人以上160点
      - ニ所定点数を算定する訪問看護・指導を行う看護師等がその他職員と同時に訪問看護・指導を行う場合（別に厚生労働大臣が定める場合に限る。）
    - （１）１日に１回の場合①同一建物内１人又は２人300点②同一建物内３人以上９人以下270点③同一建物内10人以上19人以下210点④同一建物内20人以上49人以下190点⑤同一建物内50人以上160点
    - （２）１日に２回の場合①同一建物内１人又は２人600点②同一建物内３人以上９人以下540点③同一建物内10人以上19人以下380点④同一建物内20人以上49人以下345点⑤同一建物内50人以上330点
    - （３）１日に３回以上の場合①同一建物内１人又は２人1,000点②同一建物内３人以上９人以下900点③同一建物内10人以上19人以下550点④同一建物内20人以上49人以下480点⑤同一建物内50人以上450点
  - ５１及び２については、夜間又は早朝に訪問看護・指導を行った場合は、夜間・早朝訪問看護加算として、同一日に、当該加算又は区分番号Ｉ０１２に掲げる精神科訪問看護・指導料の注６に規定する夜間・早朝訪問看護加算を算定する患者（同一建物等居住者に限る。）の合計人数に応じて次に掲げる区分に従い、１日につき所定点数に加算する。
      - イ同一建物内１人又は２人210点
      - ロ同一建物内３人以上９人以下
    - （１）月15日目まで210点
    - （２）月16日目以降190点
      - ハ同一建物内10人以上19人以下
    - （１）月15日目まで180点
    - （２）月16日目以降130点
      - ニ同一建物内20人以上49人以下
    - （１）月15日目まで120点
    - （２）月16日目以降95点
      - ホ同一建物内50人以上
    - （１）月15日目まで100点
    - （２）月16日目以降80点
  - ６１及び２については、深夜に訪問看護・指導を行った場合は、深夜訪問看護加算として、同一日に、当該加算又は区分番号Ｉ０１２に掲げる精神科訪問看護・指導料の注７に規定する深夜訪問看護加算を算定する患者（同一建物等居住者に限る。）の合計人数に応じて次に掲げる区分に従い、１日につき所定点数に加算する。
      - イ同一建物内１人又は２人420点
      - ロ同一建物内３人以上９人以下
    - （１）月15日目まで420点
    - （２）月16日目以降400点
      - ハ同一建物内10人以上19人以下
    - （１）月15日目まで390点
    - （２）月16日目以降230点
      - ニ同一建物内20人以上49人以下
    - （１）月15日目まで210点
    - （２）月16日目以降150点
      - ホ同一建物内50人以上
    - （１）月15日目まで180点
    - （２）月16日目以降130点
  - ７同一建物居住者訪問看護・指導料を算定した場合には、区分番号Ｃ００５に掲げる在宅患者訪問看護・指導料又は区分番号Ｉ０１２に掲げる精神科訪問看護・指導料は、算定しない。
  - ８区分番号Ｃ００５の注４から注６まで、注８から注11まで、注13から注19まで及び注21の規定は、同一建物居住者訪問看護・指導料について準用する。
  この場合において、同注８中「在宅で療養を行っている患者」とあるのは「在宅で療養を行っている患者（同一建物等居住者に限る。）」と、「在宅患者連携指導加算」とあるのは「同一建物居住者連携指導加算」と、同注９中「在宅で療養を行っている患者」とあるのは「在宅で療養を行っている患者（同一建物等居住者に限る。）」と、「在宅患者緊急時等カンファレンス加算」とあるのは「同一建物居住者緊急時等カンファレンス加算」と、同注10及び同注18中「在宅ターミナルケア加算」とあるのは「同一建物居住者ターミナルケア加算」と読み替えるものとする。
