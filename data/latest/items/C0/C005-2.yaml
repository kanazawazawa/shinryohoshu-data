raw_text: |
  Ｃ００５－２在宅患者訪問点滴注射管理指導料（１週につき）100点
  - 注区分番号Ｃ００５に掲げる在宅患者訪問看護・指導料又は区分番号Ｃ００５－１－２に掲げる同一建物居住者訪問看護・指導料を算定すべき訪問看護・指導を受けている患者又は指定訪問看護事業者（健康保険法第88条第１項に規定する指定訪問看護事業者、介護保険法第41条第１項の規定による指定居宅サービス事業者（訪問看護事業を行う者に限る。）の指定、同法第42条の２第１項の規定による指定地域密着型サービス事業者（訪問看護事業を行う者に限る。）の指定又は同法第53条第１項の規定による指定介護予防サービス事業者（訪問看護事業を行う者に限る。）をいう。）から訪問看護を受けている患者であって、当該患者に対する診療を担う保険医療機関の保険医の診療に基づき、週３日以上の点滴注射を行う必要を認めたものについて、訪問を行う看護師又は准看護師に対して、点滴注射に際し留意すべき事項等を記載した文書を交付して、必要な管理指導を行った場合に、患者１人につき週１回に限り算定する。
