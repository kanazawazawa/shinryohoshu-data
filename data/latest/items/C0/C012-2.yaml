name: 訪問診療薬剤師同時指導料
version: r8
points: 300
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ０１２－２訪問診療薬剤師同時指導料300点
  - 注１訪問診療を実施している保険医療機関の保険医が、在宅での療養を行っている患者（施設入居時等医学総合管理料の対象患者を除く。）であって、通院が困難なものに対して、当該患者の同意を得て、当該患者に対して在宅患者訪問薬剤管理指導を実施している他の保険医療機関若しくは保険薬局又は居宅療養管理指導を実施している病院、診療所若しくは保険薬局の薬剤師と同時に訪問を行うとともに、療養上必要な指導を行った場合に、６月に１回に限り算定する。
  - ２当該保険医療機関を退院した患者に対して退院の日から起算して１月以内に行った指導の費用は、第１章第２部第１節に掲げる入院基本料に含まれるものとする。
