chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ００９在宅患者訪問栄養食事指導料
  - １在宅患者訪問栄養食事指導料１
      - イ単一建物診療患者が１人の場合530点
      - ロ単一建物診療患者が２人以上９人以下の場合480点
      - ハイ及びロ以外の場合440点
  - ２在宅患者訪問栄養食事指導料２
      - イ単一建物診療患者が１人の場合510点
      - ロ単一建物診療患者が２人以上９人以下の場合460点
      - ハイ及びロ以外の場合420点
  - 注１１については、在宅で療養を行っており通院が困難な患者であって、別に厚生労働大臣が定めるものに対して、診療に基づき計画的な医学管理を継続して行い、かつ、保険医療機関の医師の指示に基づき当該保険医療機関の管理栄養士が訪問して具体的な献立等によって栄養管理に係る指導を行った場合に、単一建物診療患者（当該患者が居住する建物に居住する者のうち、管理栄養士が訪問し栄養食事指導を行っているものをいう。
  注２において同じ。）の人数に従い、患者１人につき月２回に限り所定点数を算定する。
  - ２２については、在宅で療養を行っており通院が困難な患者であって、別に厚生労働大臣が定めるものに対して、診療に基づき計画的な医学管理を継続して行い、かつ、保険医療機関の医師の指示に基づき当該保険医療機関以外の管理栄養士が訪問して具体的な献立等によって栄養管理に係る指導を行った場合に、単一建物診療患者の人数に従い、患者１人につき月２回に限り所定点数を算定する。
  - ３在宅患者訪問栄養食事指導に要した交通費は、患家の負担とする。
