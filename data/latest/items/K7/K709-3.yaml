raw_text: |
  Ｋ７０９－３同種死体膵移植術112,570点
  - 注１臓器の移植に関する法律（平成９年法律第104号）第６条第２項に規定する脳死した者の身体から採取された膵を除く死体膵を移植した場合は、移植臓器提供加算として、55,000点を所定点数に加算する。
  - ２膵移植者に係る組織適合性試験の費用は、所定点数に含まれる。
  - ３抗ＨＬＡ抗体検査を行う場合には、抗ＨＬＡ抗体検査加算として、4,000点を所定点数に加算する。
