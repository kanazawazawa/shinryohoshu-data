raw_text: |
  Ｄ４１９その他の検体採取
  - １胃液・十二指腸液採取（一連につき）210点
  - ２胸水・腹水採取（簡単な液検査を含む。）220点
  - 注６歳未満の乳幼児に対して行った場合は、乳幼児加算として、60点を所定点数に加算する。
  - ３動脈血採取（１日につき）60点
  - 注１血液回路から採血した場合は算定しない。
  - ２６歳未満の乳幼児に対して行った場合は、乳幼児加算として、35点を所定点数に加算する。
  - ４前房水採取420点
  - 注６歳未満の乳幼児に対して行った場合は、乳幼児加算として、90点を所定点数に加算する。
  - ５副腎静脈サンプリング（一連につき）4,800点
  - 注１カテーテルの種類、挿入回数によらず一連として算定し、透視、造影剤注入手技、造影剤使用撮影及びエックス線診断の費用は、全て所定点数に含まれるものとする。
  - ２エックス線撮影に用いられたフィルムの費用は、区分番号Ｅ４００に掲げるフィルムの所定点数により算定する。
  - ３６歳未満の乳幼児に対して行った場合は、乳幼児加算として、1,000点を所定点数に加算する。
  - ６鼻腔・咽頭拭い液採取25点Ｄ４１９－２眼内液（前房水・硝子体液）検査1,000点
