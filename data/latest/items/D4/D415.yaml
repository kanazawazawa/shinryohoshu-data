  section: 第4節 診断穿刺・検体採取料
raw_text: |
  Ｄ４１５経気管肺生検法4,800点
  - 注１ガイドシースを用いた超音波断層法を併せて行った場合は、ガイドシース加算として、500点を所定点数に加算する。
  - ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、ＣＴ透視下に当該検査を行った場合は、ＣＴ透視下気管支鏡検査加算として、1,000点を所定点数に加算する。
  - ３プローブ型顕微内視鏡を用いて行った場合は、顕微内視鏡加算として、1,500点を所定点数に加算する。
  ただし、注１に規定するガイドシース加算は別に算定できない。
