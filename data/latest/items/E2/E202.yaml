chapter:
  chapter: 第2章 特掲診療料
  part: 第4部 画像診断
  section: 第3節 コンピューター断層撮影診断料
raw_text: |
  Ｅ２０２磁気共鳴コンピューター断層撮影（ＭＲＩ撮影）（一連につき）１３テスラ以上の機器による場合
      - イ共同利用施設において行われる場合1,720点
      - ロその他の場合1,700点
  - ２1.5テスラ以上３テスラ未満の機器による場合1,330点
  - ３１又は２以外の場合900点
  - 注１１及び２については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。
  - ２１、２及び３を同時に行った場合にあっては、主たる撮影の所定点数のみにより算定する。
  - ３ＭＲＩ撮影（脳血管に対する造影の場合は除く。）について造影剤を使用した場合は、造影剤使用加算として、250点を所定点数に加算する。
  この場合において、造影剤注入手技料及び麻酔料（区分番号Ｌ００８に掲げる声門上器具又は気管挿管による気道確保を伴う閉鎖循環式全身麻酔を除く。）は、加算点数に含まれるものとする。
  - ４ＭＲＩ撮影について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、心臓のＭＲＩ撮影を行った場合は、心臓ＭＲＩ撮影加算として、400点を所定点数に加算する。
  - ５ＭＲＩ撮影について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、乳房のＭＲＩ撮影を行った場合は、乳房ＭＲＩ撮影加算として、100点を所定点数に加算する。
  - ６１のイについては、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合又は診断撮影機器での撮影を目的として別の保険医療機関に依頼し行われる場合に限り算定する。
  - ７ＭＲＩ撮影について、別に厚生労働大臣の定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、15歳未満の小児に対して、麻酔を用いて鎮静を行い、１回で複数の領域を一連で撮影した場合は、小児鎮静下ＭＲＩ撮影加算として、当該撮影の所定点数に100分の80に相当する点数を加算する。
  - ８１について、別に厚生労働大臣の定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、頭部のＭＲＩ撮影を行った場合は、頭部ＭＲＩ撮影加算として、100点を所定点数に加算する。
  - ９ＭＲＩ撮影について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、全身のＭＲＩ撮影を行った場合は、全身ＭＲＩ撮影加算として、600点を所定点数に加算する。
  - 10ＭＲＩ撮影について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、肝エラストグラフィを行った場合は、肝エラストグラフィ加算として、600点を所定点数に加算する。
