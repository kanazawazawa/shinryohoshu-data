  Ｊ０６３留置カテーテル設置40点
  - 注１膀胱洗浄と同時に行う留置カテーテル設置の費用は、膀胱洗浄の所定点数に含まれるものとする。
  - ２区分番号Ｃ１０６に掲げる在宅自己導尿指導管理料又は区分番号Ｃ１０９に掲げる在宅寝たきり患者処置指導管理料を算定している患者に対して行った留置カテーテル設置の費用は算定しない。
