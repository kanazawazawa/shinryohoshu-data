raw_text: |
  Ｊ００３局所陰圧閉鎖処置（入院）（１日につき）１100平方センチメートル未満1,040点
  - ２100平方センチメートル以上200平方センチメートル未満1,060点
  - ３200平方センチメートル以上1,375点
  - 注１初回の貼付に限り、１にあっては1,690点を、２にあっては2,650点を、３にあっては3,300点を、初回加算として、それぞれ所定点数に加算する。
  - ２初回の貼付に限り、持続洗浄を併せて実施した場合は、持続洗浄加算として、500点を所定点数に加算する。
  - ３新生児、３歳未満の乳幼児（新生児を除く。）又は３歳以上６歳未満の幼児に対して行った場合は、新生児局所陰圧閉鎖加算、乳幼児局所陰圧閉鎖加算又は幼児局所陰圧閉鎖加算として、それぞれ所定点数の100分の300、100分の100又は100分の50に相当する点数を所定点数に加算する。
