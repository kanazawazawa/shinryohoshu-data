raw_text: |
  Ｊ０５３皮膚科軟膏処置
  - １100平方センチメートル以上500平方センチメートル未満55点
  - ２500平方センチメートル以上3,000平方センチメートル未満85点
  - ３3,000平方センチメートル以上6,000平方センチメートル未満155点
  - ４6,000平方センチメートル以上270点
  - 注１100平方センチメートル未満の場合は、第１章基本診療料に含まれ、算定できない。
  - ２区分番号Ｃ１０９に掲げる在宅寝たきり患者処置指導管理料を算定している患者に対して行った皮膚科軟膏処置の費用は算定しない。
