raw_text: |
  Ｊ００１－６精神病棟等長期療養患者褥瘡
  等処置（１日につき）30点
  - 注１結核病棟又は精神病棟に入院している患者であって、入院期間が１年を超えるものに対して、次に掲げる処置のいずれかを行った場合に、その種類又は回数にかかわらず、所定点数を算定する。
      - イ創傷処置（熱傷に対するものを除く。）
    - （１）100平方センチメートル以上500平方センチメートル未満
    - （２）500平方センチメートル以上3,000平方センチメートル未満
      - ロ皮膚科軟膏処置
    - （１）100平方センチメートル以上500平方センチメートル未満
    - （２）500平方センチメートル以上3,000平方センチメートル未満２注１に掲げる処置に係る処置料は、所定点数に含まれるものとする。
