raw_text: |
  Ｊ０２４酸素吸入（１日につき）65点
  - 注１使用した精製水の費用は、所定点数に含まれるものとする。
  - ２間歇的陽圧吸入法又は人工呼吸と同時に行った酸素吸入の費用は、それぞれ間歇的陽圧吸入法又は人工呼吸の所定点数に含まれるものとする。
  - ３区分番号Ｃ１０３に掲げる在宅酸素療法指導管理料、区分番号Ｃ１０７に掲げる在宅人工呼吸指導管理料又は区分番号Ｃ１０７－３に掲げる在宅ハイフローセラピー指導管理料を算定している患者に対して行った酸素吸入の費用は算定しない。
