chapter:
  chapter: 第2章 特掲診療料
  part: 第9部 処置
  section: 第1節 処置料
raw_text: |
  Ｊ００１熱傷処置
  - １100平方センチメートル未満135点
  - ２100平方センチメートル以上500平方センチメートル未満147点
  - ３500平方センチメートル以上3,000平方センチメートル未満337点
  - ４3,000平方センチメートル以上6,000平方センチメートル未満630点
  - ５6,000平方センチメートル以上2,250点
  - 注１初回の処置を行った日から起算して２月を経過するまでに行われた場合に限り算定し、それ以降に行う当該処置については、区分番号Ｊ０００に掲げる創傷処置の例により算定する。
  - ２１については、入院中の患者以外の患者及び手術後の患者（入院中の患者に限る。）についてのみ算定する。
  ただし、手術後の患者（入院中の患者に限る。）については手術日から起算して14日を限度として算定する。
  - ３１については、第１度熱傷の場合は第１章基本診療料に含まれ、算定できない。
  - ４４及び５については、６歳未満の乳幼児の場合は、乳幼児加算として、55点を加算する。
