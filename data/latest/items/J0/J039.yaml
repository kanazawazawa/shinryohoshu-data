raw_text: |
  Ｊ０３９血漿
  交換療法（１日につき）4,200点
  - 注１血漿交換療法を夜間に開始し、午前０時以降に終了した場合は、１日として算定する。
  - ２難治性高コレステロール血症に伴う重度尿蛋白を呈する糖尿病性腎症に対するＬＤＬアフェレシス療法については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。
  - ３移植後抗体関連型拒絶反応治療における血漿交換療法については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。
