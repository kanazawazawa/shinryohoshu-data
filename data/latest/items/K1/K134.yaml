  - ９腰椎椎間板経皮的髄核摘出術15,310点
  - 注４から７までに掲げる手術について、２以上の椎間板の摘出を行う場合には、１椎間を増すごとに、複数椎間板加算として、所定点数に所定点数の100分の50に相当する点数を加算する。
