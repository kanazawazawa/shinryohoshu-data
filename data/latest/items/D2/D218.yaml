  part: 第3部 検査
  section: 第3節 生体検査料
raw_text: |
  Ｄ２１８分娩監視装置による諸検査
  - １１時間以内の場合510点
  - ２１時間を超え１時間30分以内の場合700点
  - ３１時間30分を超えた場合890点Ｄ２１９ノンストレステスト（一連につき）210点Ｄ２２０呼吸心拍監視、新生児心拍・呼吸監視、カルジオスコープ（ハートスコープ）、カルジオタコスコープ１１時間以内又は１時間につき50点
  - ２３時間を超えた場合（１日につき）
      - イ７日以内の場合150点
      - ロ７日を超え14日以内の場合130点
      - ハ14日を超えた場合50点
  - 注１心電曲線及び心拍数のいずれも観察した場合に算定する。
  - ２呼吸曲線を同時に観察した場合の費用は、所定点数に含まれるものとする。
  - ３人工呼吸と同時に行った呼吸心拍監視の費用は、人工呼吸の所定点数に含まれるものとする。
  - ４同一の患者につき、区分番号Ｌ００８に掲げる声門上器具又は気管挿管による気道確保を伴う閉鎖循環式全身麻酔と同一日に行われた場合における当該検査の費用は、当該麻酔の費用に含まれる。
