name: 内分泌負荷試験
version: r8
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第3部 検査
  section: 第3節 生体検査料
raw_text: |
  Ｄ２８７内分泌負荷試験
  - １下垂体前葉負荷試験
      - イ成長ホルモン（ＧＨ）（一連として）1,200点
  - 注患者１人につき月２回に限り算定する。
      - ロゴナドトロピン（ＬＨ及びＦＳＨ）（一連として月１回）1,600点
      - ハ甲状腺刺激ホルモン（ＴＳＨ）（一連として月１回）1,200点
      - ニプロラクチン（ＰＲＬ）（一連として月１回）1,200点
      - ホ副腎皮質刺激ホルモン（ＡＣＴＨ）（一連として月１回）1,200点
  - ２下垂体後葉負荷試験（一連として月１回）1,200点
  - ３甲状腺負荷試験（一連として月１回）1,200点
  - ４副甲状腺負荷試験（一連として月１回）1,200点
  - ５副腎皮質負荷試験
      - イ鉱質コルチコイド（一連として月１回）1,200点
      - ロ糖質コルチコイド（一連として月１回）1,200点
  - ６性腺負荷試験（一連として月１回）1,200点
  - 注１１月に3,600点を限度として算定する。
  - ２負荷試験に伴って行った注射、採血及び検体測定の費用は、採血回数及び測定回数にかかわらず、所定点数に含まれるものとする。
  ただし、区分番号Ｄ４１９の５に掲げる副腎静脈サンプリングを行った場合は、当該検査の費用は別に算定できる。
