raw_text: |
  Ｄ２５０平衡機能検査
  - １標準検査（一連につき）20点
  - ２刺激又は負荷を加える特殊検査（１種目につき）120点
  - ３頭位及び頭位変換眼振検査
      - イ赤外線ＣＣＤカメラ等による場合300点
      - ロその他の場合140点
  - ４電気眼振図（誘導数にかかわらず一連につき）
      - イ皿電極により４誘導以上の記録を行った場合400点
      - ロその他の場合260点
  - ５重心動揺計、下肢加重検査、フォースプレート分析、動作分析検査250点
  - ６ビデオヘッドインパルス検査300点
  - 注５について、パワー・ベクトル分析を行った場合には、パワー・ベクトル分析加算として200点を、刺激又は負荷を加えた場合には、刺激又は負荷加算として、１種目につき120点を所定点数に加算する。
