raw_text: |
  Ａ２１９療養環境加算（１日につき）25点
  - 注１床当たりの平均床面積が８平方メートル以上である病室（健康保険法第63条第２項第５号及び高齢者医療確保法第64条第２項第５号に規定する選定療養としての特別の療養環境の提供に係るものを除く。）として保険医療機関が地方厚生局長等に届け出た病室に入院している患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、療養環境加算を算定できるものを現に算定している患者に限る。）について、所定点数に加算する。
