raw_text: |
  Ａ２１８地域加算（１日につき）１１級地18点
  - ２２級地14点
  - ３３級地11点
  - ４４級地７点
  - ５５級地４点
  - 注一般職の職員の給与に関する法律（昭和25年法律第95号）第11条の３第１項に規定する人事院規則で定める地域その他の厚生労働大臣が定める地域に所在する保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を含む。）、第３節の特定入院料又は第４節の短期滞在手術等基本料のうち、地域加算を算定できるものを現に算定している患者に限る。）について、同令で定める級地区分に準じて、所定点数に加算する。
