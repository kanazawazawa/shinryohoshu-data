raw_text: |
  Ａ２２１重症者等療養環境特別加算（１日につき）１個室の場合300点
  - ２２人部屋の場合150点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病室に入院している重症者等（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、重症者等療養環境特別加算を算定できるものを現に算定している患者に限り、小児療養環境特別加算又は無菌治療室管理加算を算定するものを除く。）について、所定点数に加算する。
