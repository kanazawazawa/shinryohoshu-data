  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: |
  Ａ２３３リハビリテーション・栄養・口腔
  連携体制加算（１日につき）１リハビリテーション・栄養・口腔連携体制加算１150点
  - ２リハビリテーション・栄養・口腔連携体制加算２90点
  - 注リハビリテーション、栄養管理及び口腔管理を連携・推進する体制につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者（急性期病院一般入院基本料、急性期一般入院基本料、特定機能病院入院基本料（一般病棟に限る。）又は専門病院入院基本料（７対１入院基本料又は10対１入院基本料に限る。）を現に算定している患者に限る。）について、当該基準に係る区分に従い、リハビリテーション、栄養管理及び口腔管理に係る計画を作成した日から起算して14日を限度として所定点数に加算する。
  この場合において、区分番号Ａ２３３－２に掲げる栄養サポートチーム加算は別に算定できない。
