raw_text: |
  Ａ２３４－３患者サポート体制充実加算（入院初日）70点
  - 注患者に対する支援体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）、第３節の特定入院料又は第４節の短期滞在手術等基本料のうち、患者サポート体制充実加算を算定できるものを現に算定している患者に限る。）について、入院初日に限り所定点数に加算する。
