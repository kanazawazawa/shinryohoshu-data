raw_text: |
  Ａ２４２－２術後疼
  痛管理チーム加算（１日につき）100点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、区分番号Ｌ００８に掲げる声門上器具又は気管挿管による気道確保に伴う閉鎖循環式全身麻酔を伴う手術を行った患者であって、継続して手術後の疼痛管理を要するものに対して、当該保険医療機関の麻酔に従事する医師、看護師、薬剤師等が共同して疼痛管理を行った場合に、当該患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、術後疼痛管理チーム加算を算定できるものを現に算定している患者に限る。）について、手術日の翌日から起算して３日を限度として所定点数に加算する。
