raw_text: |
  Ａ２０４－２臨床研修病院入院診療加算（入院初日）１基幹型40点
  - ２協力型20点
  - 注医師法（昭和23年法律第201号）第16条の２第１項に規定する都道府県知事の指定する病院であって、別に厚生労働大臣が定める施設基準を満たす保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）、第３節の特定入院料又は第４節の短期滞在手術等基本料のうち、臨床研修病院入院診療加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、現に臨床研修を実施している期間について、入院初日に限り所定点数に加算する。
