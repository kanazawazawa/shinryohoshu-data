raw_text: |
  Ａ２０５－３妊産婦緊急搬送入院加算（入院初日）7,000点
  - 注産科又は産婦人科を標榜する保険医療機関であって、別に厚生労働大臣が定める施設基準を満たすものにおいて、入院医療を必要とする異常が疑われ救急用の自動車等で緊急に搬送された妊産婦を入院させた場合に、当該患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、妊産婦緊急搬送入院加算を算定できるものを現に算定している患者に限る。）について、入院初日に限り所定点数に加算する。
