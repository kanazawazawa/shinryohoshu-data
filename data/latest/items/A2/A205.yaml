raw_text: |
  Ａ２０５救急医療管理加算（１日につき）１救急医療管理加算１1,050点
  - ２救急医療管理加算２420点
  - 注１救急医療管理加算は、地域における救急医療体制の計画的な整備のため、入院可能な診療応需の態勢を確保する保険医療機関であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、当該態勢を確保している日に救急医療を受け、緊急に入院を必要とする重症患者として入院した患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、救急医療管理加算を算定できるものを現に算定している患者に限る。）について、当該患者の状態に従い、入院した日から起算して７日を限度として所定点数に加算する。
  ただし、別に厚生労働大臣が定める施設基準に該当する保険医療機関において、救急医療管理加算２を算定する患者については、本文の規定にかかわらず、入院した日から起算して７日を限度として、210点を所定点数に加算する。
  - ２救急医療管理加算を算定する患者が６歳未満である場合には、乳幼児加算として、400点を更に所定点数に加算する。
  - ３救急医療管理加算を算定する患者が６歳以上15歳未満である場合には、小児加算として、200点を更に所定点数に加算する。
