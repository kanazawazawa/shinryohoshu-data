raw_text: |
  Ａ２４７認知症ケア加算（１日につき）１認知症ケア加算１
      - イ14日以内の期間186点
      - ロ15日以上の期間39点
  - ２認知症ケア加算２
      - イ14日以内の期間115点
      - ロ15日以上の期間31点
  - ３認知症ケア加算３
      - イ14日以内の期間47点
      - ロ15日以上の期間13点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、認知症ケア加算を算定できるものを現に算定している患者に限る。）であって別に厚生労働大臣が定めるものに対して必要なケアを行った場合に、当該基準に係る区分に従い、当該患者が入院した日から起算し、当該患者の入院期間に応じ、それぞれ所定点数に加算する。
  この場合において、区分番号Ａ２３０－４に掲げる精神科リエゾンチーム加算（認知症ケア加算１を算定する場合に限る。）又は区分番号Ａ２４７－２に掲げるせん妄ハイリスク患者ケア加算は別に算定できない。
  - ２身体的拘束を実施した日は、所定点数の100分の20に相当する点数により算定する。
