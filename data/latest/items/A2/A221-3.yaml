  Ａ２２１－３産科管理加算（１日につき）１病院の場合250点
  - ２有床診療所の場合50点
  - 注母子の心身の安定・安全の確保を図ることができる環境の整備その他の事項につき別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た保険医療機関が、分娩を伴う入院中の患者（分娩が開始した日以降に限る。）について、必要な産科管理を行った場合に、産科管理加算として所定点数に加算する。
