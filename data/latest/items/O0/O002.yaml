  - 注１当該保険医療機関において勤務する職員の賃金の改善を図る体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、入院中の患者以外の患者に対して診療を行った場合に、当該基準に係る区分に従い、それぞれ所定点数を算定する。
  - ２各区分のイについては、外来・在宅ベースアップ評価料（Ⅰ）の１又は３を算定する患者に対して診療を行った場合に算定する。
  - ３各区分のロについては、外来・在宅ベースアップ評価料（Ⅰ）の２を算定する患者に対して診療を行った場合に算定する。
  - ４13から24までに規定する点数については、令和９年６月以降に算定する。
  - ５別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、継続して賃上げに係る取組を実施した保険医療機関については、所定点数に代えて、次に掲げる点数を算定する。
