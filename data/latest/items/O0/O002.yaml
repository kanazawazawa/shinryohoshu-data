  text: 当該保険医療機関において勤務する職員の賃金の改善を図る体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者であって、第１章第２部第１節の入院基本料（特別入院基本料等を含む。）、同部第３節の特定入院料又は同部第４節の短期滞在手術等基本料（短期滞在手術等基本料１を除く。）を算定しているものについて、当該基準に係る区分に従い、それぞれ所定点数を算定する。
- id: 注2
  text: |
    251から500までに規定する点数については、令和９年６月以降において算定する。
