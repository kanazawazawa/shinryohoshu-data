raw_text: |
  Ｌ００８－３体温調節療法（一連につき）１中心静脈留置型経皮的体温調節装置を用いる場合5,000点
  - ２ウォーターパッド特定加温装置を用いる場合11,000点
  - 注１１については、急性重症脳障害を伴う発熱患者に対して、中心静脈留置型経皮的体温調節装置を用いて体温調節を行った場合に、一連につき１回に限り算定する。
  - ２１については、注１に規定する場合のほか、別に厚生労働大臣が定める施設基準を満たす保険医療機関において、重症熱中症又は偶発性低体温症の患者に対して、中心静脈留置型経皮的体温調節装置を用いて体温調節を行った場合に、一連につき１回に限り算定する。
  - ３２については、別に厚生労働大臣が定める施設基準を満たす保険医療機関において、重症熱中症又は偶発性低体温症の患者に対して、ウォーターパッド特定加温装置を用いて体温調節を行った場合に、一連につき１回に限り算定する。
