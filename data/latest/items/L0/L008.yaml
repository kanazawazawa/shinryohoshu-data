raw_text: |
  Ｌ００８に掲げる声門上器具又は気管挿管による気道確保を伴う閉鎖循環式全身
  麻酔を除く。）は、所定点数に含まれるものとする。
  - ６ＣＴ撮影について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、全身外傷に対して行った場合には、外傷全身ＣＴ加算として、800点を所定点数に加算する。
  - ７ＣＴ撮影のイ、ロ又はハについて、別に厚生労働大臣が定める施設基準を満たす保険医療機関において、大腸のＣＴ撮影（炭酸ガス等の注入を含む。）を行った場合は、大腸ＣＴ撮影加算として、それぞれ620点又は500点を所定点数に加算する。
  この場合において、造影剤注入手技料及び麻酔料（区分番号Ｌ００８に掲げる声門上器具又は気管挿管による気道確保を伴う閉鎖循環式全身麻酔を除く。）は、所定点数に含まれるものとする。
  - ８ＣＴ撮影のイの（１）又はロの（１）については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合又は診断撮影機器での撮影を目的として別の保険医療機関に依頼し行われる場合に限り算定する。
