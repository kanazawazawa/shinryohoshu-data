chapter:
  chapter: 第2章 特掲診療料
  part: 第11部 麻酔
  section: 第1節 麻酔料
raw_text: |
  Ｌ００６球後麻酔及び顔面・頭頸
  部の伝達麻酔（瞬目麻酔及び眼輪筋内浸潤麻酔を含む。）150点Ｌ００７吸入麻酔又は静脈麻酔による深鎮静（声門上器具又は気管挿管による気道確保を伴わないもの）１麻酔に従事する医師が専従で実施する場合2,600点
  - ２麻酔に従事する医師の指導下で麻酔を専従で実施する場合1,700点
  - ３麻酔を専従で実施する場合900点
  - ４１から３まで以外の場合600点
  - 注１１について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、当該保険医療機関の麻酔に従事する医師（麻酔科につき医療法第６条の６第１項に規定する厚生労働大臣の許可を受けた者に限る。
  以下この節において同じ。）が行った場合に算定する。
  - ２２について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、当該保険医療機関の麻酔に従事する医師の指導下で行った場合に算定する。
  - ３１及び２について、実施時間が２時間を超えた場合は、麻酔管理時間加算として、30分又はその端数を増すごとに、それぞれ780点、510点を所定点数に加算する。
  - ４酸素を使用した場合は、その価格を10円で除して得た点数（酸素と併せて窒素を使用した場合は、それぞれの価格を10円で除して得た点数を合算した点数）を加算する。
  酸素及び窒素の価格は、別に厚生労働大臣が定める。
  - ５３歳以上６歳未満の幼児に対して吸入麻酔又は静脈麻酔による深鎮静を行った場合は、幼児加算として、所定点数にそれぞれ所定点数の100分の10に相当する点数を加算する。
  - ６吸入麻酔又は静脈麻酔による深鎮静（声門上器具又は気管挿管による気道確保を伴わないもの）と同一日に行った区分番号Ｄ２２０に掲げる呼吸心拍監視、区分番号Ｄ２２３に掲げる経皮的動脈血酸素飽和度測定、区分番号Ｄ２２４に掲げる終末呼気炭酸ガス濃度測定及び区分番号Ｄ２２８に掲げる深部体温計による深部体温測定の費用は、所定点数に含まれるものとする。
