code: L009
name: 麻酔管理料（Ⅰ）
version: r8
points: 250
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第11部 麻酔
  section: 第1節 麻酔料
raw_text: |
  Ｌ００９麻酔管理料（Ⅰ）１硬膜外麻酔又は脊椎麻酔を行った場合250点
  - ２声門上器具又は気管挿管による気道確保を伴う閉鎖循環式全身麻酔を行った場合1,050点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、当該保険医療機関の麻酔に従事する医師が行った場合に算定する。
  - ２１について、帝王切開術の麻酔を行った場合は、帝王切開術時麻酔加算として、700点を所定点数に加算する。
  - ３区分番号Ｌ０１０に掲げる麻酔管理料（Ⅱ）を算定している場合は算定できない。
  - ４区分番号Ｋ０１７、Ｋ０２０、Ｋ１３６－２、Ｋ１４２－２の１、Ｋ１５１－２、Ｋ１５４－２、Ｋ１６９の１、Ｋ１７２、Ｋ１７５の２、Ｋ１７７、Ｋ３１４の２、Ｋ３７９－２の２、Ｋ３９４の２、Ｋ３９５、Ｋ４０３の２、Ｋ４１５の２、Ｋ５１４の９、Ｋ５１４－４、Ｋ５１９、Ｋ５２９の１、Ｋ５２９－２の１、Ｋ５２９－２の２、Ｋ５５２、Ｋ５５３の３、Ｋ５５３－２の２、Ｋ５５３－２の３、Ｋ５５５の３、Ｋ５５８、Ｋ５６０の１のイからＫ５６０の１のハまで、Ｋ５６０の２、Ｋ５６０の３のイからＫ５６０の３のニまで、Ｋ５６０の４、Ｋ５６０の５、Ｋ５６０－２の２のニ、Ｋ５６７の３、Ｋ５７９－２の２、Ｋ５８０の２、Ｋ５８１の３、Ｋ５８２の２、Ｋ５８２の３、Ｋ５８３、Ｋ５８４の２、Ｋ５８５、Ｋ５８６の２、Ｋ５８７、Ｋ５９２－２、Ｋ６０５－２、Ｋ６０５－４、Ｋ６１０の１、Ｋ６４５、Ｋ６４５－２、Ｋ６７５の４、Ｋ６７５の５、Ｋ６７７－２の１、Ｋ６９５の４から７まで、Ｋ６９７－５、Ｋ６９７－７、Ｋ７０３、Ｋ７０４、Ｋ８０１の１、Ｋ８０３の２、Ｋ８０３の４及びＫ８０３－２に掲げる手術に当たって、区分番号Ｌ００８に掲げる声門上器具又は気管挿管による気道確保を伴う閉鎖循環式全身麻酔の実施時間が８時間を超えた場合は、長時間麻酔管理加算として、7,500点を所定点数に加算する。
  - ５２について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者に対して、当該保険医療機関の薬剤師が、病棟等において薬剤関連業務を実施している薬剤師等と連携して、周術期に必要な薬学的管理を行った場合は、周術期薬剤管理加算として、75点を所定点数に加算する。
