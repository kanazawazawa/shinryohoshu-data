  Ｋ５１４－６生体部分肺移植術130,260点
  - 注１生体部分肺を移植した場合は、生体部分肺の摘出のために要した提供者の療養上の費用として、この表に掲げる所定点数により算定した点数を加算する。
  - ２肺移植者に係る組織適合性試験の費用は、所定点数に含まれる。
  - ３抗ＨＬＡ抗体検査を行う場合には、抗ＨＬＡ抗体検査加算として、4,000点を所定点数に加算する。
  - ４両側肺を移植した場合は、両側肺移植加算として、45,000点を所定点数に加算する。
