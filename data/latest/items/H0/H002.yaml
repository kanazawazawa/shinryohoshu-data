code: H002
name: 運動器リハビリテーション料
version: r8
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第7部 リハビリテーション
  section: 第1節 リハビリテーション料
raw_text: |
  Ｈ００２運動器リハビリテーション料
  - １運動器リハビリテーション料（Ⅰ）（１単位）
      - イ理学療法士による場合185点
      - ロ作業療法士による場合185点
      - ハ医師による場合185点
  - ２運動器リハビリテーション料（Ⅱ）（１単位）
      - イ理学療法士による場合170点
      - ロ作業療法士による場合170点
      - ハ医師による場合170点
  - ３運動器リハビリテーション料（Ⅲ）（１単位）
      - イ理学療法士による場合85点
      - ロ作業療法士による場合85点
      - ハ医師による場合85点
      - ニイからハまで以外の場合85点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める患者に対して個別療法であるリハビリテーションを行った場合に、当該基準に係る区分に従って、それぞれ発症、手術若しくは急性増悪又は最初に診断された日から150日を限度として所定点数を算定する。
  ただし、別に厚生労働大臣が定める患者について、治療を継続することにより状態の改善が期待できると医学的に判断される場合その他の別に厚生労働大臣が定める場合には、150日を超えて所定点数を算定することができる。
  - ２注１本文に規定する別に厚生労働大臣が定める患者であって入院中のもの又は入院中の患者以外の患者（大腿骨頸部骨折の患者であって、当該保険医療機関を退院したもの又は他の保険医療機関を退院したもの（区分番号Ａ２４６の注４に掲げる地域連携診療計画加算を算定した患者に限る。）に限る。）に対してリハビリテーションを行った場合は、入院した日から起算して14日を限度として、早期リハビリテーション加算として、１単位につき60点（入院した日から起算して４日目以降は１単位につき25点）を所定点数に加算する。
  ただし、他の保険医療機関から転院してきた患者については、転院前の保険医療機関に入院した日を起算日とする。
  また、入院中の患者以外の患者については、退院前の入院日を起算日とする。
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、注１本文に規定する別に厚生労働大臣が定める患者であって入院中のもの又は入院中の患者以外の患者（大腿骨頸部骨折の患者であって、当該保険医療機関を退院したもの又は他の保険医療機関を退院したもの（区分番号Ａ２４６の注４に掲げる地域連携診療計画加算を算定した患者に限る。）に限る。）に対してリハビリテーションを行った場合は、それぞれ発症、手術又は急性増悪から14日を限度として、初期加算として、１単位につき45点を更に所定点数に加算する。
  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、注１本文に規定する別に厚生労働大臣が定める患者（入院中のものに限る。）であって、リハビリテーションを実施する日において別に厚生労働大臣が定める患者であるものに対してリハビリテーションを行った場合は、発症、手術又は急性増悪から14日を限度として、急性期リハビリテーション加算として、１単位につき50点を更に所定点数に加算する。
  - ５注１本文に規定する別に厚生労働大臣が定める患者であって入院中のもの又は入院中の患者以外の患者（大腿骨頸部骨折の患者であって、当該保険医療機関を退院したもの又は他の保険医療機関を退院したもの（区分番号Ａ２４６の注４に掲げる地域連携診療計画加算を算定した患者に限る。）に限る。）に対して、休日にリハビリテーションを行った場合は、それぞれ発症、手術又は急性増悪から30日目までを限度として、休日リハビリテーション加算として、１単位につき25点を所定点数に加算する。
  - ６注１本文の規定にかかわらず、注１本文に規定する別に厚生労働大臣が定める患者であって、要介護被保険者等以外のものに対して、必要があってそれぞれ発症、手術若しくは急性増悪又は最初に診断された日から150日を超えてリハビリテーションを行った場合は、１月13単位に限り、算定できるものとする。
  - ７注１本文の規定にかかわらず、注１本文に規定する別に厚生労働大臣が定める患者であって、入院中の要介護被保険者等に対して、必要があってそれぞれ発症、手術若しくは急性増悪又は最初に診断された日から150日を超えてリハビリテーションを行った場合は、１月13単位に限り、注１に規定する施設基準に係る区分に従い、次に掲げる点数を算定できるものとする。
      - イ運動器リハビリテーション料（Ⅰ）（１単位）
    - （１）理学療法士による場合111点
    - （2）作業療法士による場合111点
    - （3）医師による場合111点
      - ロ運動器リハビリテーション料（Ⅱ）（１単位）
    - （１）理学療法士による場合102点
    - （2）作業療法士による場合102点
    - （3）医師による場合102点
      - ハ運動器リハビリテーション料（Ⅲ）（１単位）
    - （１）理学療法士による場合51点
    - （2）作業療法士による場合51点
    - （3）医師による場合51点
    - （4）
    - （１）から（3）まで以外の場合51点
  - ８別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、当該保険医療機関における診療報酬の請求状況、診療の内容に関するデータを継続して厚生労働省に提出している場合であって、注１本文に規定する別に厚生労働大臣が定める患者であって入院中の患者以外のものに対してリハビリテーションを行った場合は、リハビリテーションデータ提出加算として、月１回に限り50点を所定点数に加算する。
  - ９１から３まで及び注７にかかわらず、特定の患者に離床を伴わずに20分以上個別療法であるリハビリテーションを行った場合は、所定点数の100分の90に相当する点数により算定する。
  この場合、通則第４号にかかわらず、患者１人につき１日２単位まで算定する。
