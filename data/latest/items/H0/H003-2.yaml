code: H003-2
name: リハビリテーション総合計画評価料
version: r8
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第7部 リハビリテーション
  section: 第1節 リハビリテーション料
raw_text: |
  Ｈ００３－２リハビリテーション総合計画評価料
  - １リハビリテーション総合計画評価料１
      - イ初回の場合300点
      - ロ２回目以降の場合240点
  - ２リハビリテーション総合計画評価料２
      - イ初回の場合240点
      - ロ２回目以降の場合196点
  - 注１１について、心大血管疾患リハビリテーション料（Ⅰ）、脳血管疾患等リハビリテーション料（Ⅰ）、脳血管疾患等リハビリテーション料（Ⅱ）、廃用症候群リハビリテーション料（Ⅰ）、廃用症候群リハビリテーション料（Ⅱ）、運動器リハビリテーション料（Ⅰ）、運動器リハビリテーション料（Ⅱ）、呼吸器リハビリテーション料（Ⅰ）、がん患者リハビリテーション料又は認知症患者リハビリテーション料に係る別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届出を行った保険医療機関において、医師、看護師、理学療法士、作業療法士、言語聴覚士等の多職種が共同してリハビリテーション計画を策定し、当該計画に基づき心大血管疾患リハビリテーション料、呼吸器リハビリテーション料、がん患者リハビリテーション料若しくは認知症患者リハビリテーション料を算定すべきリハビリテーションを行った場合又は介護リハビリテーションの利用を予定している患者以外の患者に対し、脳血管疾患等リハビリテーション料、廃用症候群リハビリテーション料又は運動器リハビリテーション料を算定すべきリハビリテーションを行った場合に、患者１人につき１月に１回に限り算定する。
  - ２２について、脳血管疾患等リハビリテーション料（Ⅰ）、脳血管疾患等リハビリテーション料（Ⅱ）、廃用症候群リハビリテーション料（Ⅰ）、廃用症候群リハビリテーション料（Ⅱ）、運動器リハビリテーション料（Ⅰ）又は運動器リハビリテーション料（Ⅱ）に係る別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届出を行った保険医療機関において、医師、看護師、理学療法士、作業療法士、言語聴覚士等の多職種が共同してリハビリテーション計画を策定し、当該計画に基づき、介護リハビリテーションの利用を予定している患者に対し、脳血管疾患等リハビリテーション料、廃用症候群リハビリテーション料又は運動器リハビリテーション料を算定すべきリハビリテーションを行った場合に、患者１人につき１月に１回に限り算定する。
  - ３当該保険医療機関の医師、看護師、理学療法士、作業療法士又は言語聴覚士が、患家等を訪問し、当該患者（区分番号Ａ３０８に掲げる回復期リハビリテーション病棟入院料を算定する患者に限る。）の退院後の住環境等を評価した上で、当該計画を策定した場合に、入院時訪問指導加算として、入院中１回に限り、150点を所定点数に加算する。
  - ４脳血管疾患等リハビリテーション料（Ⅰ）又は脳血管疾患等リハビリテーション料（Ⅱ）に係る別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届出を行った保険医療機関において、別に厚生労働大臣が定める患者に対して、当該保険医療機関の医師、理学療法士又は作業療法士が運動量増加機器を用いたリハビリテーション計画を策定し、当該機器を用いて、脳血管疾患等リハビリテーション料を算定すべきリハビリテーションを行った場合に、運動量増加機器加算として、次に掲げる点数をそれぞれ月１回に限り所定点数に加算する。
      - イ上肢の運動機能障害に対して機器を用いる場合150点
      - ロ下肢の運動機能障害に対して機器を用いる場合150点Ｈ００４摂食機能療法（１日につき）１30分以上の場合185点
  - ２30分未満の場合130点
  - 注１１については、摂食機能障害を有する患者に対して、１月に４回に限り算定する。
  ただし、治療開始日から起算して３月以内の患者については、１日につき算定できる。
  - ２２については、脳卒中の患者であって、摂食機能障害を有するものに対して、脳卒中の発症から14日以内に限り、１日につき算定できる。
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、摂食機能又は嚥下機能の回復に必要な指導管理を行った場合は、摂食嚥下機能回復体制加算として、当該基準に係る区分に従い、患者（ハについては、療養病棟入院料１又は療養病棟入院料２を現に算定しているものに限る。）
      - イ摂食嚥下機能回復体制加算１210点
      - ロ摂食嚥下機能回復体制加算２190点
      - ハ摂食嚥下機能回復体制加算３120点Ｈ００５視能訓練（１日につき）１斜視視能訓練135点
  - ２弱視視能訓練135点Ｈ００６難病患者リハビリテーション料（１日につき）640点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、入院中の患者以外の患者であって別に厚生労働大臣が定める疾患を主病とするもの（別に厚生労働大臣が定める状態にあるものに限る。）に対して、社会生活機能の回復を目的としてリハビリテーションを行った場合に算定する。
  - ２医療機関を退院した患者に対して集中的にリハビリテーションを行った場合は、退院日から起算して３月を限度として、短期集中リハビリテーション実施加算として、退院日から起算した日数に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
