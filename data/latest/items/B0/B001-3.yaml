code: B001-3
name: 生活習慣病管理料（Ⅰ）
version: r8
points: 610
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００１－３生活習慣病管理料（Ⅰ）１脂質異常症を主病とする場合610点
  - ２高血圧症を主病とする場合660点
  - ３糖尿病を主病とする場合760点
  - 注１別に厚生労働大臣が定める施設基準を満たす保険医療機関（許可病床数が200床未満の病院又は診療所に限る。）において、脂質異常症、高血圧症又は糖尿病を主病とする患者（入院中の患者を除く。）に対して、当該患者の同意を得て治療計画を策定し、当該治療計画に基づき、生活習慣に関する総合的な治療管理を行った場合に、月１回に限り算定する。
  ただし、糖尿病を主病とする場合にあっては、別に厚生労働大臣が定める薬剤を投与している場合であって、区分番号Ｃ１０１に掲げる在宅自己注射指導管理料を算定しているときは、算定できない。
  - ２生活習慣病管理を受けている患者に対して行った区分番号Ａ００１の注８に掲げる医学管理、第２章第１部医学管理等（区分番号Ｂ００１の20に掲げる糖尿病合併症管理料、区分番号Ｂ００１の22に掲げるがん性疼痛緩和指導管理料、区分番号Ｂ００１の24に掲げる外来緩和ケア管理料、区分番号Ｂ００１の27に掲げる糖尿病透析予防指導管理料及び区分番号Ｂ００１の37に掲げる慢性腎臓病透析予防指導管理料を除く。）、第３部検査、第６部注射及び第13部病理診断の費用は、生活習慣病管理料（Ⅰ）に含まれるものとする。
  - ３糖尿病を主病とする患者（２型糖尿病の患者であってインスリン製剤を使用していないものに限る。）に対して、血糖自己測定値に基づく指導を行った場合は、血糖自己測定指導加算として、年１回に限り所定点数に500点を加算する。
  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関においては、当該基準に係る区分及び患者の主病に応じて、以下に掲げる点数を所定点数に加算する。
      - イ充実管理加算（脂質異常症を主病とする場合）
    - （１）充実管理加算１30点
    - （２）充実管理加算２20点
    - （3）充実管理加算３10点
      - ロ充実管理加算（高血圧症を主病とする場合）
    - （１）充実管理加算１30点
    - （２）充実管理加算２20点
    - （3）充実管理加算３10点
      - ハ充実管理加算（糖尿病を主病とする場合）
    - （１）充実管理加算１30点
    - （２）充実管理加算２20点
    - （3）充実管理加算３10点
  - ５糖尿病を主病とする患者に対して、診療に基づき、糖尿病合併症の予防、診断又は治療を目的とする眼科診療の必要を認め、患者の同意を得て、患者が眼科を標榜する他の保険医療機関への受診を行うに当たり必要な連携を行った場合は、眼科医療機関連携強化加算として、患者１人につき年１回に限り所定点数に60点を加算する。
  - ６糖尿病を主病とする患者に対して、診療に基づき、歯周病の予防、診断又は治療を目的とする歯科診療の必要を認め、患者の同意を得て、患者が歯科を標榜る他の保険医療機関への受診を行うに当たり必要な連携を行った場合は、歯科医療機関連携強化加算として、患者１人につき年１回に限り所定点数に60点を加算する。
