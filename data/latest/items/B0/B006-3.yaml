  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００６－３退院時リハビリテーション指導料300点
  - 注患者の退院時に当該患者（当該保険医療機関での入院中に、区分番号Ａ２３３に掲げるリハビリテーション・栄養・口腔連携体制加算、区分番号Ａ３０１の注４に掲げる早期離床・リハビリテーション加算、区分番号Ａ３０１－２の注３に掲げる早期離床・リハビリテーション加算、区分番号Ａ３０１－３の注３に掲げる早期離床・リハビリテーション加算、区分番号Ａ３０１－４の注３に掲げる早期離床・リハビリテーション加算、区分番号Ａ３０４の注11に掲げるリハビリテーション・栄養・口腔連携加算又は第７部リハビリテーションの第１節の各区分のいずれかを算定したものに限る。）又はその家族等に対して、退院後の在宅での基本的動作能力若しくは応用的動作能力又は社会的適応能力の回復を図るための訓練等について必要な指導を行った場合に算定する。
  この場合において、同一日に、区分番号Ｂ００５に掲げる退院時共同指導料２（注１の規定により、入院中の保険医療機関の理学療法士、作業療法士又は言語聴覚士が指導等を行った場合に限る。）は、別に算定できない。
