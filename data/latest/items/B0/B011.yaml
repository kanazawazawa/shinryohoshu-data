code: B011
name: 連携強化診療情報提供料
version: r6
points: 150
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ０１１連携強化診療情報提供料150点
  - 注１別に厚生労働大臣が定める施設基準を満たす保険医療機関において、別に厚生労働大臣が定める基準を満たす他の保険医療機関から紹介された患者について、当該患者を紹介した他の保険医療機関からの求めに応じ、患者の同意を得て、診療状況を示す文書を提供した場合（区分番号Ａ０００に掲げる初診料を算定する日を除く。
  ただし、当該保険医療機関に次回受診する日の予約を行った場合はこの限りでない。）に、提供する保険医療機関ごとに患者１人につき月１回に限り算定する。
  - ２注１に該当しない場合であって、注１に規定する別に厚生労働大臣が定める施設基準を満たす外来機能報告対象病院等（医療法第30条の18の４第１項第２号の規定に基づき、同法第30条の18の２第１項第１号の厚生労働省令で定める外来医療を提供する基幹的な病院又は診療所として都道府県が公表したものに限る。）である保険医療機関において、他の保険医療機関（許可病床の数が200未満の病院又は診療所に限る。）から紹介された患者について、当該患者を紹介した他の保険医療機関からの求めに応じ、患者の同意を得て、診療状況を示す文書を提供した場合（区分番号Ａ０００に掲げる初診料を算定する日を除く。
  ただし、当該保険医療機関に次回受診する日の予約を行った場合はこの限りではない。）に、提供する保険医療機関ごとに患者１人につき月１回に限り算定する。
  - ３注１又は注２に該当しない場合であって、別に厚生労働大臣が定める施設基準を満たす保険医療機関において、他の保険医療機関から紹介された患者について、当該患者を紹介した他の保険医療機関からの求めに応じ、患者の同意を得て、診療状況を示す文書を提供した場合（区分番号Ａ０００に掲げる初診料を算定する日を除く。
  ただし、当該保険医療機関に次回受診する日の予約を行った場合はこの限りではない。）に、提供する保険医療機関ごとに患者１人につき月１回に限り算定する。
  - ４注１から注３までのいずれにも該当しない場合であって、別に厚生労働大臣が定める施設基準を満たす保険医療機関において、他の保険医療機関から紹介された難病の患者に対する医療等に関する法律（平成26年法律第50号）第５条第１項に規定する指定難病の患者又はてんかんの患者（当該疾病が疑われる患者を含む。）について、当該患者を紹介した他の保険医療機関からの求めに応じ、患者の同意を得て、診療状況を示す文書を提供した場合（区分番号Ａ０００に掲げる初診料を算定する日を除く。
  ただし、当該保険医療機関に次回受診する日の予約を行った場合はこの限りではない。）に、提供する保険医療機関ごとに患者１人につき月１回に限り算定する。
  - ５注１から注４までのいずれにも該当しない場合であって、注１に規定する別に厚生労働大臣が定める施設基準を満たす保険医療機関において、他の保険医療機関から紹介された妊娠中の患者について、当該患者を紹介した他の保険医療機関からの求めに応じ、患者の同意を得て、診療状況を示す文書を提供した場合（区分番号Ａ０００に掲げる初診料を算定する日を除く。
  ただし、当該保険医療機関に次回受診する日の予約を行った場合はこの限りでない。）に、提供する保険医療機関ごとに患者１人につき３月に１回（別に厚生労働大臣が定める施設基準を満たす保険医療機関において、産科若しくは産婦人科を標榜する保険医療機関から紹介された妊娠中の患者又は産科若しくは産婦人科を標榜する別に厚生労働大臣が定める施設基準を満たす保険医療機関において、他の保険医療機関から紹介された妊娠中の患者について、診療に基づき、頻回の情報提供の必要を認め、当該患者を紹介した他の保険医療機関に情報提供を行った場合にあっては、月１回）に限り算定する。
  - ６区分番号Ｂ００９に掲げる診療情報提供料（Ⅰ）（同一の保険医療機関に対して紹介を行った場合に限る。）を算定した月は、別に算定できない。
