chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００１－２小児科外来診療料（１日につき）１保険薬局において調剤を受けるために処方箋を交付する場合
      - イ初診時604点
      - ロ再診時411点
  - ２１以外の場合
      - イ初診時721点
      - ロ再診時529点
  - 注１別に厚生労働大臣が定める施設基準を満たす保険医療機関において、入院中の患者以外の患者（６歳未満の乳幼児に限る。）に対して診療を行った場合に、保険医療機関単位で算定する。
  - ２区分番号Ａ００１に掲げる再診料の注９に規定する場合、区分番号Ｂ００１－２－11に掲げる小児かかりつけ診療料を算定する場合、第２部第２節第１款在宅療養指導管理料の各区分に掲げる指導管理料を算定している場合又は別に厚生労働大臣が定める薬剤を投与している場合については、算定しない。
  - ３注４に規定する加算、区分番号Ａ０００に掲げる初診料の注７、注８、注10、注15及び注16に規定する加算、区分番号Ａ００１に掲げる再診料の注５、注６及び注19に規定する加算、区分番号Ａ００２に掲げる外来診療料の注８から注10までに規定する加算、通則第３号から第６号までに規定する加算、区分番号Ｂ００１－２－２に掲げる地域連携小児夜間・休日診療料、区分番号Ｂ００１－２－６に掲げる救急外来医学管理料、区分番号Ｂ０１０に掲げる診療情報提供料（Ⅱ）、区分番号Ｂ０１１に掲げる連携強化診療情報提供料、区分番号Ｃ０００に掲げる往診料及び第14部その他を除き、診療に係る費用は、小児科外来診療料に含まれるものとする。
  ただし、区分番号Ａ０００に掲げる初診料の注７及び注８に規定する加算を算定する場合については、それぞれの加算点数から115点を減じた点数を、区分番号Ａ００１に掲げる再診料の注５及び注６に規定する加算並びに区分番号Ａ００２に掲げる外来診療料の注８及び注９に規定する加算を算定する場合については、それぞれの加算点数から70点を減じた点数を算定するものとする。
  - ４１のイ又は２のイについて、別に厚生労働大臣が定める施設基準を満たす保険医療機関において、急性気道感染症、急性中耳炎、急性副鼻腔炎又は急性下痢症により受診した患者であって、診察の結果、抗菌薬の投与の必要性が認められないため抗菌薬を使用しないものに対して、療養上必要な指導及び検査結果の説明を行い、文書により説明内容を提供した場合は、小児抗菌薬適正使用支援加算として、月１回に限り80点を所定点数に加算する。
