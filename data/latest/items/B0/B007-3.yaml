raw_text: |
  Ｂ００７－３退院後訪問栄養食事指導料（１回につき）530点
  - 注１保険医療機関を退院した別に厚生労働大臣が定めるものに対して、円滑な在宅療養への移行及び在宅療養の継続のため、保険医療機関の医師の指示に基づき、当該保険医療機関の管理栄養士が患家等を訪問し、具体的な献立等によって栄養管理に係る指導を行った場合に、当該保険医療機関を退院した日から起算して１月以内（退院日を除く。）の期間に限り、４回を限度として算定する。
  この場合において、区分番号Ｂ００１の９に掲げる外来栄養食事指導料及び区分番号Ｃ００９に掲げる在宅患者訪問栄養食事指導料は別に算定できない。
  - ２注１に掲げる指導に要した交通費は、患家の負担とする。
