raw_text: |
  Ｂ００５－５ハイリスク妊産婦共同管理料（Ⅱ）500点
  - 注区分番号Ａ２３６－２に掲げるハイリスク妊娠管理加算の注又は区分番号Ａ２３７に掲げるハイリスク分娩管理加算の注１に規定する施設基準に適合するものとして届け出た病院である保険医療機関において、ハイリスク妊娠又はハイリスク分娩に関する医学管理が必要であるとして別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た別の保険医療機関から紹介された患者（区分番号Ｂ００５－４に掲げるハイリスク妊産婦共同管理料（Ⅰ）の注に規定する別に厚生労働大臣が定める状態等であるものに限る。）が当該病院に入院中である場合において、当該患者を紹介した別の保険医療機関の保険医と共同してハイリスク妊娠又はハイリスク分娩に関する医学管理を行った場合に、当該病院において、患者１人につき１回算定する。
