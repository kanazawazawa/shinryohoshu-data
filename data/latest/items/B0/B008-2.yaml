chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００８－２薬剤総合評価調整管理料250点
  - 注１入院中の患者以外の患者であって、６種類以上の内服薬（特に規定するものを除く。）が処方されていたものについて、当該処方の内容を総合的に評価及び調整し、当該患者に処方する内服薬が２種類以上減少した場合に、月１回に限り所定点数を算定する。
  - ２処方の内容の調整に当たって、別の保険医療機関又は保険薬局に対して、照会又は情報提供を行った場合、連携管理加算として、50点を所定点数に加算する。
  ただし、連携管理加算を算定した場合において、区分番号Ｂ００９に掲げる診療情報提供料（Ⅰ）（当該別の保険医療機関に対して患者の紹介を行った場合に限る。）は同一日には算定できない。
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、薬剤総合評価調整管理料を算定すべき医学管理を情報通信機器を用いて行った場合は、所定点数に代えて、218点を算定する。
