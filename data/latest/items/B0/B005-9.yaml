raw_text: |
  Ｂ００５－９外来排尿自立指導料200点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、入院中の患者以外の患者であって、別に厚生労働大臣が定めるものに対して、包括的な排尿ケアを行った場合に、患者１人につき、週１回に限り、区分番号Ａ２５１に掲げる排尿自立支援加算を算定した期間と通算して12週を限度として算定する。
  ただし、区分番号Ｃ１０６に掲げる在宅自己導尿指導管理料を算定する場合は、算定できない。
