name: リンパ浮腫指導管理料
version: r8
points: 100
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００１－７リンパ浮腫指導管理料100点
  - 注１保険医療機関に入院中の患者であって、鼠径部、骨盤部若しくは腋窩部のリンパ節郭清を伴う悪性腫瘍に対する手術を行ったもの又は原発性リンパ浮腫と診断されたものに対して、当該手術を行った日の属する月又はその前月若しくは翌月のいずれか（原発性リンパ浮腫と診断されたものにあっては、当該診断がされた日の属する月又はその翌月のいずれか）に、医師又は医師の指示に基づき看護師、理学療法士若しくは作業療法士が、リンパ浮腫の重症化等を抑制するための指導を実施した場合に、入院中１回に限り算定する。
  - ２注１に基づき当該点数を算定した患者であって当該保険医療機関を退院したものに対して、当該保険医療機関又は当該患者の退院後において区分番号Ｂ００５－６の注１に規定する地域連携診療計画に基づいた治療を担う他の保険医療機関（当該患者について区分番号Ｂ００５－６－２に掲げるがん治療連携指導料を算定した場合に限る。）において、退院した日の属する月又はその翌月に注１に規定する指導を再度実施した場合に、当該指導を実施した、いずれかの保険医療機関において、１回に限り算定する。
