  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００７－２退院後訪問指導料580点
  - 注１当該保険医療機関が、保険医療機関を退院した別に厚生労働大臣が定める状態の患者の地域における円滑な在宅療養への移行及び在宅療養の継続のため、患家等を訪問し、当該患者又はその家族等に対して、在宅での療養上の指導を行った場合に、当該患者が退院した日から起算して１月（退院日を除く。）を限度として、５回に限り算定する。
  - ２在宅療養を担う訪問看護ステーション又は他の保険医療機関の保健師、助産師、看護師又は准看護師と同行し、必要な指導を行った場合には、訪問看護同行加算として、退院後１回に限り、20点を所定点数に加算する。
  - ３注１及び注２に掲げる指導に要した交通費は、患家の負担とする。
