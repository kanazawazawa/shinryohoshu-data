name: 退院時共同指導料１
version: r6
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００４退院時共同指導料１
  - １在宅療養支援診療所（地域における退院後の患者に対する在宅療養の提供に主たる責任を有する診療所であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出たものをいう。
  以下この表において同じ。）の場合1,500点
  - ２１以外の場合900点
  - 注１保険医療機関に入院中の患者について、地域において当該患者の退院後の在宅療養を担う保険医療機関（以下この区分番号、区分番号Ｂ００５及び区分番号Ｂ０１５において「在宅療養担当医療機関」という。）の保険医又は当該保険医の指示を受けた保健師、助産師、看護師、准看護師（以下この区分番号及び区分番号Ｂ００５において「看護師等」という。）、薬剤師、管理栄養士、理学療法士、作業療法士、言語聴覚士若しくは社会福祉士が、当該患者の同意を得て、退院後の在宅での療養上必要な説明及び指導を、入院中の保険医療機関の保険医又は看護師等、薬剤師、管理栄養士、理学療法士、作業療法士、言語聴覚士若しくは社会福祉士と共同して行った上で、文書により情報提供した場合に、当該入院中１回に限り、在宅療養担当医療機関において算定する。
  ただし、別に厚生労働大臣が定める疾病等の患者については、在宅療養担当医療機関の保険医又は当該保険医の指示を受けた看護師等が、当該患者が入院している保険医療機関の保険医又は看護師等と１回以上共同して行う場合は、当該入院中２回に限り算定できる。
  - ２注１の場合において、当該患者が別に厚生労働大臣が定める特別な管理を要する状態等にあるときは、特別管理指導加算として、所定点数に200点を加算する。
  - ３区分番号Ａ０００に掲げる初診料、区分番号Ａ００１に掲げる再診料、区分番号Ａ００２に掲げる外来診療料、区分番号Ｂ００２に掲げる開放型病院共同指導料（Ⅰ）、区分番号Ｃ０００に掲げる往診料、区分番号Ｃ００１に掲げる在宅患者訪問診療料（Ⅰ）又は区分番号Ｃ００１－２に掲げる在宅患者訪問診療料（Ⅱ）は別に算定できない。
tiers:
- id: '1'
  name: 在宅療養支援診療所（地域における退院後の患者に対する在宅療養の提供に主たる責任を有する診療所であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出たものをいう。
- id: '2'
  name: 1以外の場合
  points: 900
