  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００１－６肺血栓塞栓症予防管理料305点
  - 注１病院（療養病棟を除く。）又は診療所（療養病床に係るものを除く。）に入院中の患者であって肺血栓塞栓症を発症する危険性が高いもの（結核病棟に入院中の患者においては手術を伴うもの、精神病棟に入院中の患者においては治療上必要があって身体拘束が行われているものに限る。）に対して、肺血栓塞栓症の予防を目的として、必要な機器又は材料を用いて計画的な医学管理を行った場合に、当該入院中１回に限り算定する。
  - ２肺血栓塞栓症の予防を目的として行った処置に用いた機器及び材料の費用は、所定点数に含まれるものとする。
