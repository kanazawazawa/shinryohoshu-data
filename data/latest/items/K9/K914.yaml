raw_text: |
  Ｋ９１４脳死臓器提供管理料40,000点
  - 注１臓器提供者の脳死後に、臓器提供者の身体に対して行われる処置の費用は、所定点数に含まれる。
  - ２臓器提供に関する専門の知識を有する者が臓器提供に係る説明等を行った場合は、脳死臓器提供体制向上加算として、5,000点を所定点数に加算する。
  - ３臓器の移植に関する法律第６条第２項に規定する判定（以下「法的脳死判定」という。）に当たって、次に掲げる画像診断を実施した場合は、各区分に掲げる点数を合算した点数を、所定点数に加算する。
      - イ動脈造影カテーテル法1,920点
      - ロシングルホトンエミッションコンピューター断層撮影800点
      - ハコンピューター断層撮影（造影剤を使用した場合）720点
  - ４臓器提供者に法的脳死判定日以後も継続して次に掲げる手術を実施した場合は、各区分に掲げる点数を合算した点数を、所定点数に加算する。
      - イ大動脈内バルーンパンピング法（ＩＡＢＰ法）2,420点
      - ロ人工心肺1,720点
      - ハ体外式膜型人工肺1,720点
      - ニ経皮的心肺補助法1,790点
      - ホ経皮的循環補助法（ポンプカテーテルを用いたもの）2,110点
      - ヘ補助人工心臓2,860点
      - ト小児補助人工心臓4,960点
      - チ植込型補助人工心臓2,860点
