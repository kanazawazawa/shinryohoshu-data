chapter:
  chapter: 第2章 特掲診療料
  part: 第10部 手術
  section: 第3節 手術医療機器等加算
raw_text: |
  Ｋ９３９－４内視鏡手術用支援機器加算15,000点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、区分番号Ｋ３７４－２、Ｋ３９４－２、Ｋ５０２－５、Ｋ５０４－２、Ｋ５１４－２の２及び３、Ｋ５２９－２、Ｋ５２９－３、Ｋ５５４－２、Ｋ５５５－３、Ｋ６５５－２の３、Ｋ６５５－５の３、Ｋ６５７－２の４、Ｋ６７４－２、Ｋ６９５－２、Ｋ７０２－２の１、Ｋ７０３－２、Ｋ７１９－３、Ｋ７４０－３、Ｋ７５５－２、Ｋ７７３－５、Ｋ７７３－６、Ｋ７７８－２、Ｋ８０３－２、Ｋ８６５－２並びにＫ８７９－２（子宮体がんに限る。）に掲げる手術に当たって、内視鏡手術用支援機器を使用した場合に算定する。
