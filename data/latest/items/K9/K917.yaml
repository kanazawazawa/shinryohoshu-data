raw_text: |
  Ｋ９１７体外受精・顕微授精管理料
  - １体外受精3,200点
  - ２顕微授精
      - イ１個の場合3,800点
      - ロ２個から５個までの場合5,800点
      - ハ６個から９個までの場合9,000点
      - ニ10個以上の場合11,800点
  - 注１体外受精及び顕微授精を同時に実施した場合は、１の所定点数の100分の50に相当する点数及び２の所定点数を合算した点数により算定する。
  - ２２について、受精卵作成の成功率を向上させることを目的として卵子活性化処理を実施した場合は、卵子調整加算として、1,000点を所定点数に加算する。
  - ３新鮮精子を使用して体外受精又は顕微授精を実施した場合は、新鮮精子加算として、1,000点を所定点数に加算する。
