raw_text: |
  Ｋ９２２造血幹細胞移植
  - １骨髄移植
      - イ同種移植の場合66,450点
      - ロ自家移植の場合25,850点
  - ２末梢血幹細胞移植
      - イ同種移植の場合66,450点
      - ロ自家移植の場合30,850点
  - ３臍帯血移植66,450点
  - 注１同種移植を行った場合は、造血幹細胞採取のために要した提供者の療養上の費用として、この表に掲げる所定点数により算定した点数を加算する。
  - ２造血幹細胞移植に当たって薬剤を使用した場合は、薬剤の費用として、第４節に掲げる所定点数を加算する。
  - ３６歳未満の乳幼児の場合は、乳幼児加算として、2,000点を所定点数に加算する。
  - ４造血幹細胞移植に当たって使用した輸血用バッグ及び輸血用針は、所定点数に含まれるものとする。
  - ５同種移植における造血幹細胞移植者に係る組織適合性試験の費用は所定点数に含まれるものとする。
  - ６臍帯血移植に用いられた臍帯血に係る組織適合性試験の費用は、所定点数に含まれるものとする。
  ただし、組織適合性試験に当たってＮＧＳ－ＳＢＴ法を用いた場合においては、ＮＧＳ－ＳＢＴ法実施加算として、2,000点を所定点数に加算する。
  - ７抗ＨＬＡ抗体検査を行う場合には、抗ＨＬＡ抗体検査加算として、4,000点を所定点数に加算する。
  - ８１のイ及び２のイの場合において、非血縁者間移植を実施した場合は、非血縁者間移植加算として、10,000点を所定点数に加算する。
  - ９１及び２については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において同種移植を実施した場合は、コーディネート体制充実加算として、1,500点を所定点数に加算する。
