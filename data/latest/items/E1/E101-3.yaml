  chapter: 第2章 特掲診療料
  part: 第4部 画像診断
  section: 第2節 核医学診断料
raw_text: |
  Ｅ１０１－３ポジトロン断層・コンピューター断層複合撮影（一連の検査につき）１15Ｏ標識ガス剤を用いた場合（一連の検査につき）7,625点２18ＦＤＧを用いた場合（一連の検査につき）8,625点３18Ｆ標識フルシクロビンを用いた場合（一連の検査につき）3,625点
  - ４アミロイドＰＥＴイメージング剤を用いた場合（一連の検査につき）
      - イ放射性医薬品合成設備を用いた場合13,625点
      - ロイ以外の場合3,725点
  - ５ＰＳＭＡイメージング剤を用いた場合（一連の検査につき）3,905点
  - 注１15Ｏ標識ガス剤の合成及び吸入、18ＦＤＧの合成及び注入、18Ｆ標識フルシクロビンの注入、アミロイドＰＥＴイメージング剤の合成（放射性医薬品合成設備を用いた場合に限る。）及び注入並びにＰＳＭＡイメージング剤の調製及び注入に要する費用は、所定点数に含まれる。
  - ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関以外の保険医療機関において行われる場合は、所定点数の100分の80に相当する点数により算定する。
  - ４１から３までについては、新生児、３歳未満の乳幼児（新生児を除く。）又は３歳以上６歳未満の幼児に対して断層撮影を行った場合は、新生児加算、乳幼児加算又は幼児加算として、1,600点、1,000点又は600点を所定点数に加算する。
  ただし、注３の規定により所定点数を算定する場合においては、1,280点、800点又は480点を所定点数に加算する。
