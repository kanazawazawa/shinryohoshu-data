raw_text: |
  Ｋ８８４－３胚移植術
  - １新鮮胚移植の場合7,500点
  - ２凍結・融解胚移植の場合12,000点
  - 注１患者の治療開始日の年齢が40歳未満である場合は、患者１人につき６回に限り、40歳以上43歳未満である場合は、患者１人につき３回に限り算定する。
  - ２アシステッドハッチングを実施した場合は、1,000点を所定点数に加算する。
  - ３高濃度ヒアルロン酸含有培養液を用いた前処置を実施した場合は、1,000点を所定点数に加算する。
  （子宮附属器）
