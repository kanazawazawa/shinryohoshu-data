      - ラ身体的拘束最小化推進体制加算
      - ム病棟薬剤業務実施加算（１又は２に限る。）
  - ウデータ提出加算
  - ヰ入退院支援加算（１のハ又は２のロに限る。）
  - ノ医療的ケア児（者）入院前支援加算
  - オ認知症ケア加算
