  - マ入院料301,491点（生活療養を受ける場合にあっては、1,471点）注１病院の療養病棟（医療法第７条第２項第４号に規定する療養病床（以下「療養病床」という。）に係る病棟として地方厚生局長等に届け出たものをいう。
  以下この表において同じ。）であって、看護配置、看護師比率、看護補助配置その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に係る区分及び当該患者の疾患、状態、ＡＤＬ等について別に厚生労働大臣が定める区分に従い、当該患者ごとにそれぞれ所定点数を算定する。
  ただし、１又は２の入院料１から３まで、10から12まで又は19から21までのいずれかを算定する場合であって、当該病棟において中心静脈栄養を実施している状態にある者の摂食機能又は嚥下機能の回復に必要な体制が確保されていると認められない場合には、それぞれ１又は２の入院料４から６まで、13から15まで又は22から24までのいずれかを算定し、注３のただし書に該当する場合には、当該基準に係る区分に従い、それぞれ１又は２の入院料27を算定する。
  - ２注１に規定する病棟以外の療養病棟については、当分の間、地方厚生局長等に届け出た場合に限り、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、特別入院基本料として、646点（生活療養を受ける場合にあっては、626点）を算定できる。
  - ３療養病棟入院基本料を算定する患者に対して行った第３部検査、第５部投薬、第６部注射、第７部リハビリテーション（別に厚生労働大臣が定めるものに限る。）及び第13部病理診断並びに第４部画像診断及び第９部処置のうち別に厚生労働大臣が定める画像診断及び処置の費用（フィルムの費用を含み、別に厚生労働大臣が定める薬剤及び注射薬（以下この表において「除外薬剤・注射薬」という。）の費用を除く。）は、当該入院基本料に含まれるものとする。
  ただし、患者の急性増悪により、同一の保険医療機関の一般病棟へ転棟又は別の保険医療機関の一般病棟へ転院する場合には、その日から起算して３日前までの当該費用については、この限りでない。
  - ４当該病棟に入院している患者のうち、別に厚生労働大臣が定める状態のものに対して、必要な褥瘡対策を行った場合に、患者の褥瘡の状態に応じて、１日につき次に掲げる点数を所定点数に加算する。
      - イ褥瘡対策加算１15点
      - ロ褥瘡対策加算２５点
  - ５当該患者が他の保険医療機関から転院してきた者であって、当該他の保険医療機関において区分番号Ａ２４６に掲げる入退院支援加算３を算定したものである場合には、重症児（者）受入連携加算として、入院初日に限り2,000点を所定点数に加算する。
  - ６当該病棟に入院している患者のうち、急性期医療を担う他の保険医療機関の一般病棟から転院した患者及び当該保険医療機関（急性期医療を担う保険医療機関に限る。）の一般病棟から転棟した患者については、転院又は転棟した日から起算して14日を限度として、急性期患者支援療養病床初期加算として、１日につき300点を所定点数に加算し、介護老人保健施設、介護医療院、特別養護老人ホーム、軽費老人ホーム、有料老人ホーム等又は自宅から入院した患者については、治療方針に関する患者又はその家族等の意思決定に対する支援を行った場合に、入院した日から起算して14日を限度として、在宅患者支援療養病床初期加算として、１日につき350点を所定点数に加算する。
  - ７当該病棟においては、第２節の各区分に掲げる入院基本料等加算のうち、次に掲げる加算について、同節に規定する算定要件を満たす場合に算定できる。
      - イ地域医療支援病院入院診療加算
      - ロ臨床研修病院入院診療加算
      - ハ紹介受診重点医療機関入院診療加算
      - ニ在宅患者緊急入院診療加算
      - ホ診療録管理体制加算
      - ヘ医師事務作業補助体制加算（50対１補助体制加算、75対１補助体制加算又は100対１補助体制加算に限る。）
      - ト電子的診療情報連携体制整備加算
      - チ乳幼児加算・幼児加算
      - リ超重症児（者）入院診療加算・準超重症児（者）入院診療加算
      - ヌ地域加算
      - ル離島加算
      - ヲＨＩＶ感染者療養環境特別加算
      - ワ療養病棟療養環境加算
      - カ療養病棟療養環境改善加算
      - ヨ重症皮膚潰瘍管理加算
      - タ栄養サポートチーム加算
      - レ口腔管理連携加算
      - ソ医療安全対策加算
      - ツ感染対策向上加算
      - ネ患者サポート体制充実加算
