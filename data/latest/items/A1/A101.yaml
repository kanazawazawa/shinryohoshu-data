    - ミ協力対象施設入所者入院加算６注１に規定する別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出ていた病棟であって、当該基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た病棟については、注２の規定にかかわらず、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当分の間、夜勤時間特別入院基本料として、それぞれの所定点数の100分の70に相当する点数を算定できる。
    ただし、当該点数が注２本文に規定する特別入院基本料の点数を下回る場合は、本文の規定にかかわらず、688点を算定できる。
