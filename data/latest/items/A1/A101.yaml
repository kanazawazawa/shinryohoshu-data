notes:
- id: 注1
  text: |-
    病院（特定機能病院を除く。）の結核病棟（医療法第７条第２項第３号に規定する結核病床に係る病棟として地方厚生局長等に届出のあったものをいう。
    以下この表において同じ。）であって、看護配置、看護師比率その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に係る区分に従い、それぞれ所定点数を算定する。
    ただし、通則第７号に規定する保険医療機関の病棟については、この限りでない。
- id: 注2
  text: |-
    注１に規定する病棟以外の結核病棟については、当分の間、地方厚生局長等に届け出た場合に限り、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、特別入院基本料として、678点を算定できる。
    ただし、注１に規定する別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出ていた病棟であって、当該基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た病棟については、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に適合しなくなった後の直近３月に限り、月平均夜勤時間超過減算として、それぞれの所定点数から100分の15に相当する点数を減算する。
    なお、別に厚生労働大臣が定める場合には、算定できない。
