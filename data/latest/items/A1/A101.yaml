  - マ協力対象施設入所者入院加算８別に厚生労働大臣が指定する期間において、感染症の予防及び感染症の患者に対する医療に関する法律（平成10年法律第114号。
  以下「感染症法」という。）第６条第７項に規定する新型インフルエンザ等感染症の患者及びその疑似症患者が入院した場合に区分番号Ａ１００に掲げる一般病棟入院基本料を算定する旨を地方厚生局長等に届け出た保険医療機関においては、当該患者について、注１の規定にかかわらず、区分番号Ａ１００に掲げる一般病棟入院基本料の例により算定する。
  - ９当該病棟（療養病棟入院料１を算定するものに限る。）に入院している患者のうち、当該保険医療機関において、区分番号Ｊ０３８に掲げる人工腎臓、Ｊ０３８－２に掲げる持続緩徐式血液濾過、Ｊ０３９に掲げる血漿交換療法又はＪ０４２に掲げる腹膜灌流を行っている患者については、慢性維持透析管理加算として、１日につき100点を所定点数に加算する。
  - 10療養病棟入院料１を算定する病棟において、別に厚生労働大臣が定める施設基準に適合するものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者については、在宅復帰機能強化加算として、１日につき50点を所定点数に加算する。
  - 11別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、療養病棟入院基本料を算定する患者について、経腸栄養を開始した場合、経腸栄養管理加算として、入院中１回に限り、経腸栄養を開始した日から起算して７日を限度として、１日につき300点を所定点数に加算する。
  この場合において、区分番号Ａ２３３－２に掲げる栄養サポートチーム加算、区分番号Ｂ００１の10に掲げる入院栄養食事指導料又は区分番号Ｂ００１の11に掲げる集団栄養食事指導料は別に算定できない。
  - 12別に厚生労働大臣が定める施設基準に適合するものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者については、夜間看護加算として、１日につき50点を所定点数に加算する。
  この場合において、注13に規定する看護補助・患者ケア体制充実加算は別に算定できない。
  - 13別に厚生労働大臣が定める施設基準に適合するものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者については、当該基準に係る区分に従い、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
  ただし、当該患者について、身体的拘束を実施した日は、看護補助・患者ケア体制充実加算３の例により所定点数に加算する。
      - イ看護補助・患者ケア体制充実加算１80点
      - ロ看護補助・患者ケア体制充実加算２65点
      - ハ看護補助・患者ケア体制充実加算３55点Ａ１０２結核病棟入院基本料（１日につき）１７対１入院基本料1,836点
  - ２10対１入院基本料1,521点
  - ３13対１入院基本料1,289点
  - ４15対１入院基本料1,107点
