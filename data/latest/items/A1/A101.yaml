  - 注１病院（特定機能病院を除く。）の結核病棟（医療法第７条第２項第３号に規定する結核病床に係る病棟として地方厚生局長等に届出のあったものをいう。
  以下この表において同じ。）であって、看護配置、看護師比率その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に係る区分に従い、それぞれ所定点数を算定する。
  ただし、通則第７号に規定する保険医療機関の病棟については、この限りでない。
  - ２注１に規定する病棟以外の結核病棟については、当分の間、地方厚生局長等に届け出た場合に限り、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、特別入院基本料として、678点を算定できる。
  ただし、注１に規定する別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出ていた病棟であって、当該基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た病棟については、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に適合しなくなった後の直近３月に限り、月平均夜勤時間超過減算として、それぞれの所定点数から100分の15に相当する点数を減算する。
  なお、別に厚生労働大臣が定める場合には、算定できない。
  - ３注１及び注２の規定にかかわらず、別に厚生労働大臣が定める患者については、特別入院基本料を算定する。
  - ４当該病棟の入院患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
      - イ14日以内の期間600点（特別入院基本料等については、500点）
      - ロ15日以上30日以内の期間480点（特別入院基本料等については、400点）
      - ハ31日以上60日以内の期間360点（特別入院基本料等については、300点）
      - ニ61日以上90日以内の期間120点
  - ５当該病棟においては、第２節の各区分に掲げる入院基本料等加算のうち、次に掲げる加算について、同節に規定する算定要件を満たす場合に算定できる。
      - イ地域医療支援病院入院診療加算
      - ロ臨床研修病院入院診療加算
      - ハ紹介受診重点医療機関入院診療加算
      - ニ救急医療管理加算
      - ホ妊産婦緊急搬送入院加算
      - ヘ在宅患者緊急入院診療加算
      - ト診療録管理体制加算
      - チ医師事務作業補助体制加算（50対１補助体制加算、75対１補助体制加算又は100対１補助体制加算に限る。）
      - リ電子的診療情報連携体制整備加算
