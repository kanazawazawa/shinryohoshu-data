  part: 第8部 精神科専門療法
  section: 第2節 薬剤料
raw_text: |
  Ｉ０１１精神科退院指導料320点
  - 注１入院期間が１月を超える精神障害者である患者又はその家族等に対して、精神科の医師、看護師、作業療法士及び精神保健福祉士が共同して、退院後に必要となる保健医療サービス又は福祉サービス等に関する計画を策定し、当該計画に基づき必要な指導を行った場合に、当該入院中１回に限り算定する。
  - ２入院期間が１年を超える精神障害者である患者又はその家族等に対して、精神科の医師、看護師、作業療法士及び精神保健福祉士が共同して、退院後に必要となる保健医療サービス又は福祉サービス等に関する計画を策定し、当該計画に基づき必要な指導を行った場合であって、当該患者が退院したときに、精神科地域移行支援加算として、退院時に１回に限り200点を所定点数に加算する。
