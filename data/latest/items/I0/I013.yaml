chapter:
  chapter: 第2章 特掲診療料
  part: 第8部 精神科専門療法
  section: 第2節 薬剤料
raw_text: |
  Ｉ０１３抗精神病特定薬剤治療指導管理料
  - １持続性抗精神病注射薬剤治療指導管理料
      - イ入院中の患者250点
      - ロ入院中の患者以外の患者250点
  - ２治療抵抗性統合失調症治療指導管理料500点
  - 注１１のイについては、持続性抗精神病注射薬剤を投与している入院中の統合失調症患者に対して、計画的な医学管理を継続して行い、かつ、療養上必要な指導を行った場合に、当該薬剤の投与開始日の属する月及びその翌月にそれぞれ１回に限り、当該薬剤を投与したときに算定する。
  - ２１のロについては、持続性抗精神病注射薬剤を投与している入院中の患者以外の統合失調症患者に対して、計画的な医学管理を継続して行い、かつ、療養上必要な指導を行った場合に、月１回に限り、当該薬剤を投与したときに算定する。
  - ３２については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、治療抵抗性統合失調症治療薬を投与している治療抵抗性統合失調症患者に対して、計画的な医学管理を継続して行い、かつ、当該薬剤の効果及び副作用等について患者に説明し、療養上必要な指導を行った場合に、月１回に限り、当該薬剤を投与したときに算定する。
