name: 精神科在宅患者支援管理料（月１回）
version: r8
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第8部 精神科専門療法
  section: 第2節 薬剤料
raw_text: |
  Ｉ０１６精神科在宅患者支援管理料（月１回）１精神科在宅患者支援管理料１
      - イ別に厚生労働大臣が定める患者のうち、集中的な支援を必要とする者の場合
    - （１）単一建物診療患者１人3,000点
    - （２）単一建物診療患者２人以上2,250点
      - ロ別に厚生労働大臣が定める患者の場合
    - （１）単一建物診療患者１人2,500点
    - （２）単一建物診療患者２人以上1,875点
  - ２精神科在宅患者支援管理料２
      - イ別に厚生労働大臣が定める患者のうち、集中的な支援を必要とする者の場合
    - （１）単一建物診療患者１人2,467点
    - （２）単一建物診療患者２人以上1,850点
      - ロ別に厚生労働大臣が定める患者の場合
    - （１）単一建物診療患者１人2,056点
    - （２）単一建物診療患者２人以上1,542点
  - ３精神科在宅患者支援管理料３
      - イ単一建物診療患者１人2,030点
      - ロ単一建物診療患者２人以上1,248点
  - 注１１については、在宅で療養を行っている通院が困難な患者に対して、当該保険医療機関（別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出たものに限る。）の精神科の医師等が、当該患者又はその家族等の同意を得て、計画的な医学管理の下に、定期的な訪問診療又は訪問診療及び訪問看護を行っている場合（イについては週２回以上、ロについては月２回以上行っている場合に限る。）に、単一建物診療患者の人数に従い、初回算定日の属する月を含めて６月を限度として、月１回に限り算定する。
  - ２２については、在宅で療養を行っている通院が困難な患者に対して、当該保険医療機関（別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出たものに限る。）の精神科の医師等が当該保険医療機関とは別の訪問看護ステーションの保健師、看護師、准看護師又は作業療法士と連携し、当該患者又はその家族等の同意を得て、計画的な医学管理の下に、定期的な訪問診療を行っている場合（イについては当該別の訪問看護ステーションが週２回以上、ロについては当該別の訪問看護ステーションが月２回以上の訪問看護を行っている場合に限る。）に、単一建物診療患者の人数に従い、初回算定日の属する月を含めて６月を限度として、月１回に限り算定する。
  - ３３については、１又は２を算定した患者であって、引き続き訪問診療が必要な患者に対して、当該保険医療機関（別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出たものに限る。）の精神科の医師等が、当該患者又はその家族等の同意を得て、計画的な医学管理の下に、月１回以上の定期的な訪問診療を行っている場合に、単一建物診療患者の人数に従い、精神科在宅患者支援管理料１又は２の初回算定日の属する月を含めて２年を限度として、月１回に限り算定する。
  ただし、１又は２を算定した月には、３を算定することはできない。
  - ４精神科在宅患者支援管理料を算定した場合は、区分番号Ｂ０００に掲げる特定疾患療養管理料、区分番号Ｂ００１の５に掲げる小児科療養指導料、区分番号Ｂ００１の６に掲げるてんかん指導料、区分番号Ｂ００１の７に掲げる難病外来指導管理料、区分番号Ｂ００１の８に掲げる皮膚科特定疾患指導管理料、区分番号Ｂ００１の18に掲げる小児悪性腫瘍患者指導管理料、区分番号Ｂ００７－２に掲げる退院後訪問指導料、区分番号Ｃ００２に掲げる在宅時医学総合管理料、区分番号Ｃ００２－２に掲げる施設入居時等医学総合管理料、区分番号Ｃ００３に掲げる在宅がん医療総合診療料、区分番号Ｃ００７に掲げる訪問看護指示料、区分番号Ｃ０１０に掲げる在宅患者連携指導料、区分番号Ｃ１０９に掲げる在宅寝たきり患者処置指導管理料及び区分番号Ｉ０１２－２に掲げる精神科訪問看護指示料は算定しない。
  - ５別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、情報通信機器を用いた診察（訪問診療と同時に行う場合を除く。）による医学管理を行っている場合に、精神科オンライン在宅管理料として、100点を所定点数に加えて算定できる。
  - ６精神科在宅患者支援管理に要した交通費は、患家の負担とする。
