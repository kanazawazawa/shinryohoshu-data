raw_text: |
  Ｉ００４心身医学療法（１回につき）１入院中の患者150点
  - ２入院中の患者以外の患者
      - イ初診時110点
      - ロ再診時80点
  - 注１精神科を標榜する保険医療機関以外の保険医療機関においても算定できるものとする。
  - ２区分番号Ａ０００に掲げる初診料を算定する初診の日において心身医学療法を行った場合は、診療に要した時間が30分を超えたときに限り算定する。
  - ３入院中の患者については、入院の日から起算して４週間以内の期間に行われる場合にあっては週２回、入院の日から起算して４週間を超える期間に行われる場合にあっては週１回に限り算定する。
  - ４入院中の患者以外の患者については、初診日から起算して４週間以内の期間に行われる場合にあっては週２回、初診日から起算して４週間を超える期間に行われる場合にあっては週１回に限り算定する。
  - ５20歳未満の患者に対して心身医学療法を行った場合は、所定点数に所定点数の100分の200に相当する点数を加算する。
