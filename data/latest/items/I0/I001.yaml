raw_text: |
  Ｉ００１入院精神療法（１回につき）１入院精神療法（Ⅰ）400点
  - ２入院精神療法（Ⅱ）
      - イ入院の日から起算して６月以内の期間に行った場合150点
      - ロ入院の日から起算して６月を超えた期間に行った場合80点
  - 注１１については、入院中の患者について、精神保健指定医が30分以上入院精神療法を行った場合に、入院の日から起算して３月を限度として週３回に限り算定する。
  - ２２については、入院中の患者について、入院の日から起算して４週間以内の期間に行われる場合は週２回を、入院の日から起算して４週間を超える期間に行われる場合は週１回をそれぞれ限度として算定する。
  ただし、重度の精神障害者である患者に対して精神保健指定医が必要と認めて行われる場合は、入院期間にかかわらず週２回に限り算定する。
