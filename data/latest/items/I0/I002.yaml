code: I002
name: 通院・在宅精神療法（１回につき）
version: r8
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第8部 精神科専門療法
  section: 第2節 薬剤料
raw_text: |
  Ｉ００２通院・在宅精神療法（１回につき）１通院精神療法
      - イ精神保健福祉法第29条又は第29条の２の規定による入院措置を経て退院した患者であって、都道府県等が作成する退院後に必要な支援内容等を記載した計画に基づく支援期間にあるものに対して、当該計画において療養を担当することとされている保険医療機関の精神科の医師が行った場合660点
      - ロ区分番号Ａ０００に掲げる初診料を算定する初診の日に行った場合
    - （１）60分以上の場合①精神保健指定医による場合650点②①以外の場合550点
    - （２）精神保健指定医による30分以上60分未満の場合550点
      - ハイ及びロ以外の場合
    - （１）30分以上の場合①精神保健指定医による場合410点②①以外の場合390点
    - （２）30分未満の場合①精神保健指定医による場合315点②①以外の場合290点
  - ２在宅精神療法
      - イ精神保健福祉法第29条又は第29条の２の規定による入院措置を経て退院した患者であって、都道府県等が作成する退院後に必要な支援内容等を記載した計画に基づく支援期間にあるものに対して、当該計画において療養を担当することとされている保険医療機関の精神科の医師が行った場合660点
      - ロ区分番号Ａ０００に掲げる初診料を算定する初診の日に行った場合
    - （１）60分以上の場合①精神保健指定医による場合650点②①以外の場合600点
    - （２）精神保健指定医による30分以上60分未満の場合550点
      - ハイ及びロ以外の場合
    - （１）60分以上の場合①精神保健指定医による場合590点②①以外の場合540点
    - （２）30分以上60分未満の場合①精神保健指定医による場合410点②①以外の場合390点
    - （３）30分未満の場合①精神保健指定医による場合315点②①以外の場合290点
  - 注１入院中の患者以外の患者について、退院後４週間以内の期間に行われる場合にあっては１と２を合わせて週２回、その他の場合にあっては１と２を合わせて週１回に限り算定する。
  ただし、区分番号Ｂ０００に掲げる特定疾患療養管理料及び区分番号Ｂ００１－３－３に掲げる生活習慣病管理料（Ⅱ）を算定している患者については算定しない。
  - ２通院・在宅精神療法は、診療に要した時間が５分を超えたときに限り算定する。
  ただし、区分番号Ａ０００に掲げる初診料を算定する初診の日において通院・在宅精神療法を行った場合は、診療に要した時間が30分を超えたときに限り算定する。
  - ３20歳未満の患者に対して通院・在宅精神療法を行った場合（当該保険医療機関の精神科を最初に受診した日から１年以内の期間に行った場合に限る。）は、320点を所定点数に加算する。
  ただし、注４又は注10に規定する加算を算定した場合は、算定しない。
  - ４特定機能病院若しくは区分番号Ａ３１１－４に掲げる児童・思春期精神科入院医療管理料に係る届出を行った保険医療機関又は当該保険医療機関以外の保険医療機関であって別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、通院・在宅精神療法を行った場合は、児童思春期精神科専門管理加算として、次に掲げる区分に従い、いずれかを所定点数に加算する。
  ただし、ロについては、１回に限り算定する。
  また、注３又は注10に規定する加算を算定した場合は、算定しない。
      - イ16歳未満の患者に通院・在宅精神療法を行った場合
    - （１）当該保険医療機関の精神科を最初に受診した日から２年以内の期間に行った場合500点
    - （２）
    - （１）以外の場合300点
      - ロ20歳未満の患者に60分以上の通院・在宅精神療法を行った場合（当該保険医療機関の精神科を最初に受診した日から３月以内の期間に行った場合に限る。）1,200点
  - ５１のハの（１）並びに２のハの（１）及び（２）については、抗精神病薬を服用している患者について、客観的な指標による当該薬剤の副作用の評価を行った場合は、特定薬剤副作用評価加算として、月１回に限り25点を所定点数に加算する。
  ただし、区分番号Ｉ００２－２に掲げる精神科継続外来支援・指導料の注４に規定する加算を算定する月は、算定しない。
  - ６当該患者に対して、１回の処方において、３種類以上の抗うつ薬又は３種類以上の抗精神病薬を投与した場合であって、別に厚生労働大臣が定める要件を満たさない場合、所定点数の100分の50に相当する点数により算定する。
  - ７１のイを算定する患者に対し、医師の指示を受けた看護師、准看護師又は精神保健福祉士が、月に１回以上、療養の状況等を踏まえ、治療及び社会生活等に係る助言又は指導を継続して行った場合に、措置入院後継続支援加算として、３月に１回に限り275点を所定点数に加算する。
  - ８別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、重点的な支援を要する患者に対して、精神科を担当する医師の指示の下、保健師、看護師又は精神保健福祉士が、当該患者が地域生活を継続するための面接及び関係機関との連絡調整を行った場合に、療養生活継続支援加算として、次に掲げる区分に従い、初回算定日の属する月から起算して１年を限度として、月１回に限り、いずれかを所定点数に加算する。
      - イ直近の入院において、区分番号Ｂ０１５に掲げる精神科退院時共同指導料１を算定した患者の場合500点
      - ロイ以外の患者の場合350点
  - ９別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、心理に関する支援を要する患者に対して、精神科を担当する医師の指示を受けた公認心理師が必要な支援を行った場合に、心理支援加算として、初回算定日の属する月から起算して２年を限度として、月２回に限り280点を所定点数に加算する。
  - 10別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、１を算定する患者であって、20歳未満のものに対して、精神科を担当する医師の指示の下、保健師、看護師、作業療法士、精神保健福祉士又は公認心理師等が共同して必要な支援を行った場合は、児童思春期支援指導加算として、次に掲げる区分に従い、いずれかを所定点数に加算する。
  ただし、イの（１）及びロの（１）については、１回に限り算定する。
  また、注３又は注４に規定する加算を算定した場合は、算定しない。
      - イ児童思春期支援指導加算１
    - （１）60分以上の通院・在宅精神療法を行った場合（当該保険医療機関の精神科を最初に受診した日から３月以内の期間に行った場合に限る。）1,100点
    - （２）
    - （１）以外の場合①当該保険医療機関の精神科を最初に受診した日から２年以内の期間に行った場合490点②①以外の場合290点
      - ロ児童思春期支援指導加算２
    - （１）60分以上の通院・在宅精神療法を行った場合（当該保険医療機関の精神科を最初に受診した日から３月以内の期間に行った場合に限る。）500点
    - （２）（１）以外の場合①当該保険医療機関の精神科を最初に受診した日から１年以内の期間に行った場合400点②①以外の場合100点
  - 11別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、通院・在宅精神療法を行った場合は、次に掲げる区分に従い、いずれかを所定点数に加算する。
      - イ早期診療体制充実加算１
    - （１）当該保険医療機関の精神科を最初に受診した日から３年以内の期間に行った場合50点
    - （２）
    - （１）以外の場合15点
      - ロ早期診療体制充実加算２
    - （１）当該保険医療機関の精神科を最初に受診した日から３年以内の期間に行った場合20点
    - （２）
    - （１）以外の場合15点
      - ハ早期診療体制充実加算３
    - （１）当該保険医療機関の精神科を最初に受診した日から３年以内の期間に行った場合15点
    - （２）
    - （１）以外の場合10点
  - 12１のロの（１）の①若しくは（２）又はハの（１）の①若しくは（２）の①については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、情報通信機器を用いた精神療法を行うことが適当と認められる患者に対し、情報通信機器を用いて行った場合は、所定点数に代えて、それぞれ566点、479点、357点又は274点を算定する。
  ただし、当該患者に対して、１回の処方において、３種類以上の抗うつ薬又は３種類以上の抗精神病薬を投与した場合には、算定できない。
  また、注３から注５まで及び注７から注11までに規定する加算は別に算定できない。
  - 13１のロの（１）の②、１のハの（１）の②、１のハの（２）の②、２のロの（１）の②、２のハの（１）の②、２のハの（２）の②及び２のハの（３）の②において、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関以外の保険医療機関において行われる場合は、所定点数の100分の60に相当する点数を算定する。
  ただし、当該患者に対して、１回の処方において、３種類以上の抗うつ薬又は３種類以上の抗精神病薬を投与した場合には、算定できない。
  また、注９に規定する心理支援加算は別に算定できない。
