chapter:
  chapter: 第2章 特掲診療料
  part: 第8部 精神科専門療法
  section: 第2節 薬剤料
raw_text: |
  Ｉ０１５重度認知症患者デイ・ケア料（１日につき）1,040点
  - 注１精神症状及び行動異常が著しい認知症患者の心身機能の回復又は維持を図るため、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、１日につき６時間以上行った場合に算定する。
  - ２当該療法を最初に算定した日から起算して１年以内の期間に行われる場合にあっては、早期加算として、50点を所定点数に加算する。
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、夜間の精神症状及び行動異常が著しい認知症患者に対して、当該療法に引き続き２時間以上の夜間ケアを行った場合には、当該療法を最初に算定した日から起算して１年以内の期間に限り、夜間ケア加算として、100点を所定点数に加算する。
  - ４重度認知症患者デイ・ケア料を算定した場合は、区分番号Ｉ００８－２に掲げる精神科ショート・ケア、区分番号Ｉ００９に掲げる精神科デイ・ケア、区分番号Ｉ０１０に掲げる精神科ナイト・ケア及び区分番号Ｉ０１０－２に掲げる精神科デイ・ナイト・ケアは算定しない。
