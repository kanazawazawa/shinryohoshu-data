raw_text: 'Ｋ７４０直腸切除・切断術

  - １切除術42,850点

  - ２低位前方切除術71,300点

  - ３超低位前方切除術73,840点

  - ４経肛門吻合を伴う切除術82,840点

  - ５切断術77,120点

  - 注１１から３までについては、人工肛門造設術を併せて実施した場合は、人工肛門造設加算として、2,000点を所定点数に加算する。

  - ２側方リンパ節郭清を併せて行った場合であって、片側のみに行った場合は、片側側方リンパ節郭清加算として、4,250点を、両側に対して行った場合は、両側側方リンパ節郭清加算として、6,380点を所定点数に加算する。

  '
