  Ｄ２５６眼底カメラ撮影
  - １通常の方法の場合
      - イアナログ撮影54点
      - ロデジタル撮影58点
  - ２蛍光眼底法の場合400点
  - ３自発蛍光撮影法の場合510点
  - 注１使用したフィルムの費用として、購入価格を10円で除して得た点数を所定点数に加算する。
  （１のロの場合を除く。）２広角眼底撮影を行った場合は、広角眼底撮影加算として、100点を所定点数に加算する。
