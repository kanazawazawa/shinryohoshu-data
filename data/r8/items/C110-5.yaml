raw_text: 'Ｃ１１０－５在宅舌下神経電気刺激療法指導管理料810点

  - 注別に厚生労働大臣が定める施設基準を満たす保険医療機関において、在宅において舌下神経電気刺激療法を行っている入院中の患者以外の患者に対して、在宅舌下神経電気刺激療法に関する指導管理を行った場合に算定する。

  '
