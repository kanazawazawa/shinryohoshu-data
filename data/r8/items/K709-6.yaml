raw_text: |
  Ｋ７０９－６同種死体膵島移植術56,490点
  - 注１臓器の移植に関する法律第６条第２項に規定する脳死した者の身体から採取された膵島を除く死体膵島を移植した場合は、移植臓器提供加算として、55,000点を所定点数に加算する。
  - ２膵島移植者に係る組織適合性試験の費用は、所定点数に含まれる。
  - ３抗ＨＬＡ抗体検査を行う場合には、抗ＨＬＡ抗体検査加算として、4,000点を所定点数に加算する。
  - ４手術に伴う画像診断及び検査の費用は算定しない。
  （脾）
