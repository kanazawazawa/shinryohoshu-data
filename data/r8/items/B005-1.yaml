chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: 'Ｂ００５－１－２介護支援等連携指導料

  - １介護支援等連携指導料１400点

  - ２介護支援等連携指導料２500点

  - 注１介護支援等連携指導料１については、当該保険医療機関に入院中の患者に対して、当該患者の同意を得て、医師又は医師の指示を受けた看護師、社会福祉士等が介護支援専門員又は相談支援専門員と共同して、患者の心身の状態等を踏まえて導入が望ましい介護サービス又は障害福祉サービス等や退院後に利用可能な介護サービス又は障害福祉サービス等について説明及び指導を行った場合に、当該入院中２回に限り算定する。

  この場合において、同一日に、区分番号Ｂ００５の注３に掲げる加算（介護支援専門員又は相談支援専門員と共同して指導を行った場合に限る。）は、別に算定できない。

  また、当該入院中、介護支援等連携指導料１を算定した場合は、介護支援等連携指導料２は算定できない。

  - ２介護支援等連携指導料２については、当該保険医療機関に入院中の患者（入退院支援加算１の届出を行っている病棟に入院中の患者に限る。）に対して、当該患者の同意を得て、入退院支援及び地域連携業務を担う部門の担当者が、平時から連携体制を構築している介護支援専門員又は相談支援専門員と共同して、患者の心身の状態等を踏まえて導入が望ましい介護サービス又は障害福祉サービス等や退院後に利用可能な介護サービス又は障害福祉サービス等について説明及び指導を行った場合に、当該入院中に２回に限り算定する。

  なお、同一日に、区分番号Ｂ００５の注３に掲げる加算（介護支援専門員又は相談支援専門員と共同して指導を行った場合に限る。）は、別に算定できない。

  '
