raw_text: "Ａ２０８乳幼児加算・幼児加算（１日につき）１乳幼児加算\n    - イ病院の場合（特別入院基本料等を算定する場合を除く。）333点\n    - ロ病院の場合（特別入院基本料等を算定する場合に限る。）289点\n   \
  \ - ハ診療所の場合289点\n- ２幼児加算\n    - イ病院の場合（特別入院基本料等を算定する場合を除く。）283点\n    - ロ病院の場合（特別入院基本料等を算定する場合に限る。）239点\n    - ハ診療所の場合239点\n\
  - 注１乳幼児加算は、保険医療機関に入院している３歳未満の乳幼児（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、乳幼児加算・幼児加算を算定できるものを現に算定している患者に限る。）について、所定点数に加算する。\n\
  - ２幼児加算は、保険医療機関に入院している３歳以上６歳未満の幼児（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、乳幼児加算・幼児加算を算定できるものを現に算定している患者に限る。）について、所定点数に加算する。\n"
