raw_text: |
  Ａ２０７－５電子的診療情報連携体制整備加算
  - １電子的診療情報連携体制整備加算１160点
  - ２電子的診療情報連携体制整備加算２80点
  - 注医療ＤＸ推進に係る体制として別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、電子的診療情報連携体制整備加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、入院初日に限り所定点数に加算する。
