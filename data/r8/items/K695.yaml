raw_text: "Ｋ６９５肝切除術\n- １部分切除\n    - イ単回の切除によるもの38,040点\n    - ロ複数回の切除を要するもの43,340点\n- ２亜区域切除63,030点\n- ３外側区域切除46,130点\n- ４１区域切除（外側区域切除を除く。）60,700点\n\
  - ５２区域切除76,210点\n- ６３区域切除以上のもの97,050点\n- ７２区域切除以上であって、血行再建を伴うもの126,230点\n- 注区分番号Ｋ６９７－２に掲げる肝悪性腫瘍マイクロ波凝固法又は区分番号Ｋ６９７－３に掲げる肝悪性腫瘍ラジオ波焼灼療法を併せて実施した場合には、局所穿刺療法併用加算として、6,000点を所定点数に加算する。\n"
