raw_text: |
  Ｋ６１８中心静脈注射用植込型カテーテル設置
  - １四肢に設置した場合10,500点
  - ２頭頸部その他に設置した場合10,800点
  - 注１６歳未満の乳幼児の場合は、乳幼児加算として、300点を加算する。
  - ２使用したカテーテル、カテーテルアクセス等の材料の費用は、これらの点数に含まれるものとする。
