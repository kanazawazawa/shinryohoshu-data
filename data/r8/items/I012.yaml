chapter:
  chapter: 第2章 特掲診療料
  part: 第8部 精神科専門療法
  section: 第2節 薬剤料
raw_text: "Ｉ０１２に掲げる精神科訪問看護・指導料の注14にそれぞれ規定する外来感染対策向上加算を\n算定した月は、別に算定できない。\n    - イ在宅患者訪問診療料（Ⅰ）\n    - ロ在宅患者訪問診療料（Ⅱ）\n    -\
  \ ハ在宅患者訪問看護・指導料\n    - ニ同一建物居住者訪問看護・指導料\n    - ホ在宅患者訪問点滴注射管理指導料\n    - ヘ在宅患者訪問リハビリテーション指導管理料\n    - ト在宅患者訪問薬剤管理指導料\n   \
  \ - チ在宅患者訪問栄養食事指導料\n    - リ在宅患者緊急時等カンファレンス料６感染症対策に関する医療機関間の連携体制につき区分番号Ａ０００に掲げる初診料の注12及び区分番号Ａ００１に掲げる再診料の注16に規定する別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、前号に規定する外来感染対策向上加算を算定した場合は、連携強化加算として、月１回に限り３点を更に所定点数に加算する。\n\
  - ７感染防止対策に資する情報を提供する体制につき区分番号Ａ０００に掲げる初診料の注13及び区分番号Ａ００１に掲げる再診料の注17に規定する別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、第５号に規定する外来感染対策向上加算を算定した場合は、サーベイランス強化加算として、月１回に限り１点を更に所定点数に加算する。\n\
  - ８抗菌薬の使用状況につき区分番号Ａ０００に掲げる初診料の注14及び区分番号Ａ００１に掲げる再診料の注18に規定する別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、第５号に規定する外来感染対策向上加算を算定した場合は、抗菌薬適正使用体制加算として、月１回に限り５点を更に所定点数に加算する。\n"
