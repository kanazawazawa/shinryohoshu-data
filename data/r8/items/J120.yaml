raw_text: 'Ｊ１２０鼻腔

  栄養（１日につき）60点

  - 注１区分番号Ｃ１０５に掲げる在宅成分栄養経管栄養法指導管理料、区分番号Ｃ１０５－２に掲げる在宅小児経管栄養法指導管理料、区分番号Ｃ１０５－３に掲げる在宅半固形栄養経管栄養法指導管理料又は区分番号Ｃ１０９に掲げる在宅寝たきり患者処置指導管理料を算定している患者に対して行った鼻腔栄養の費用は算定しない。

  - ２間歇的経管栄養法によって行った場合には、間歇的経管栄養法加算として、１日につき60点を所定点数に加算する。

  '
