raw_text: |
  Ｇ１００薬剤
  - １薬価が１回分使用量につき15円以下である場合１点
  - ２薬価が１回分使用量につき15円を超える場合薬価から15円を控除した額を10円で除して得た点数につき１点未満の端数を切り上げて得た点数に１点を加算して得た点数注１特別入院基本料等を算定している病棟を有する病院に入院している患者であって入院期間が１年を超えるものに対する合算薬剤料が、220点にその月における当該患者の入院日数を乗じて得た点数を超える場合（悪性新生物その他の特定の疾患に罹患している患者に対して投薬又は注射を行った場合を除く。）には、当該合算薬剤料は、所定点数にかかわらず、220点にその月における当該患者の入院日数を乗じて得た点数により算定する。
  - ２健康保険法第85条第１項及び高齢者医療確保法第74条第１項に規定する入院時食事療養費に係る食事療養又は健康保険法第85条の２第１項及び高齢者医療確保法第75条第１項に規定する入院時生活療養費に係る生活療養の食事の提供たる療養を受けている患者又は入院中の患者以外の患者に対して投与されたビタミン剤については、当該患者の疾患又は症状の原因がビタミンの欠乏又は代謝異常であることが明らかであり、かつ、必要なビタミンを食事により摂取することが困難である場合その他これに準ずる場合であって、医師が当該ビタミン剤の注射が有効であると判断した場合を除き、これを算定しない。
  - ３使用薬剤の薬価は、別に厚生労働大臣が定める。
