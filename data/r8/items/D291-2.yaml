raw_text: 'Ｄ２９１－２小児食物アレルギー負荷検査1,000点

  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、16歳未満の患者に対して食物アレルギー負荷検査を行った場合に、年３回に限り算定する。

  - ２小児食物アレルギー負荷検査に係る投薬、注射及び処置の費用は、所定点数に含まれるものとする。

  '
