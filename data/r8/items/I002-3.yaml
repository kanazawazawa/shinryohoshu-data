  section: 第2節 薬剤料
raw_text: |
  Ｉ００２－３救急患者精神科継続支援料
  - １入院中の患者900点
  - ２入院中の患者以外の患者300点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、精神疾患を有する患者であって、自殺企図等により入院したものに対し、生活上の課題又は精神疾患の治療継続上の課題を確認し、助言又は指導を行った場合に算定する。
  - ２入院中の患者については、入院した日から起算して６月以内の期間に週１回に限り算定する。
  - ３入院中の患者以外の患者については、退院後、電話等で継続的な指導等を行った場合に、退院後24週を限度として、週１回に限り算定する。
