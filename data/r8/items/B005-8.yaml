chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００５－８肝炎インターフェロン治療計画料700点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、長期継続的にインターフェロン治療が必要な肝炎の患者に対して、当該患者の同意を得た上で、治療計画を作成し、副作用等を含めて患者に説明し、文書により提供するとともに、地域において治療を担う他の保険医療機関に当該患者に係る治療計画及び診療情報を文書により提供した場合に、１人につき１回に限り算定する。
  - ２注１の規定に基づく他の保険医療機関への文書の提供に係る区分番号Ｂ００９に掲げる診療情報提供料（Ⅰ）の費用は、所定点数に含まれるものとする。
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、入院中の患者以外の患者に対して、肝炎インターフェロン治療計画料を算定すべき医学管理を情報通信機器を用いて行った場合は、所定点数に代えて、609点を算定する。
