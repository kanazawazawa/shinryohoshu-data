code: A106
name: 障害者施設等入院基本料（１日につき）１７対１入院基本料
version: r8
points: 1749
unit: 日
chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第1節 入院基本料
raw_text: "Ａ１０６障害者施設等入院基本料（１日につき）１７対１入院基本料1,749点\n- ２10対１入院基本料1,475点\n- ３13対１入院基本料1,242点\n- ４15対１入院基本料1,083点\n- 注１障害者施設等一般病棟（児童福祉法（昭和22年法律第164号）第42条第２号に規定する医療型障害児入所施設（主として肢体不自由のある児童又は重症心身障害児（同法第７条第２項に規定する重症心身障害児をいう。）を入所させるものに限る。）及びこれらに準ずる施設に係る一般病棟並びに別に厚生労働大臣が定める重度の障害者（重度の意識障害者を含む。）、筋ジストロフィー患者又は難病患者等を主として入院させる病棟に関する施設基準に適合しているものとして、保険医療機関が地方厚生局長等に届け出た一般病棟をいう。）であって、看護配置、看護師比率その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た一般病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に係る区分に従い、それぞれ所定点数を算定する。\n\
  - ２注１に規定する別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出ていた病棟であって、当該基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た病棟については、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に適合しなくなった後の直近３月に限り、月平均夜勤時間超過減算として、それぞれの所定点数から100分の15に相当する点数を減算する。\n\
  なお、別に厚生労働大臣が定める場合には、算定できない。\n- ３当該病棟の入院患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n    - イ14日以内の期間312点\n    - ロ15日以上30日以内の期間167点\n\
  - ４当該患者が他の保険医療機関から転院してきた者であって、当該他の保険医療機関において区分番号Ａ２４６に掲げる入退院支援加算３を算定したものである場合には、重症児（者）受入連携加算として、入院初日に限り2,000点を所定点数に加算する。\n\
  - ５当該病棟に入院している特定患者（当該病棟に90日を超えて入院する患者（別に厚生労働大臣が定める状態等にあるものを除く。）をいう。）に該当する者（第３節の特定入院料を算定する患者を除く。）については、注１から注３まで及び注13の規定にかかわらず、特定入院基本料として1,057点を算定する。\n\
  ただし、月平均夜勤時間超過減算として所定点数の100分の15に相当する点数を減算する患者については、943点を算定する。\nこの場合において、特定入院基本料を算定する患者に対して行った第３部検査、第５部投薬、第６部注射及び第13部病理診断並びに第４部画像診断及び第９部処置のうち別に厚生労働大臣が定める画像診断及び処置の費用（フィルムの費用を含み、除外薬剤・注射薬の費用を除く。）は、所定点数に含まれるものとする。\n\
  - ６当該病棟に入院する重度の意識障害（脳卒中の後遺症であるものに限る。）の患者であって、基本診療料の施設基準等第５の３（１）のロに規定する医療区分２の患者又は第６の３（２）のロの④に規定する医療区分１の患者に相当するものについては、注１及び注３の規定にかかわらず、当該患者が入院している病棟の区分に従い、次に掲げる点数をそれぞれ算定する。\n\
  \    - イ７対１入院基本料又は10対１入院基本料の施設基準を届け出た病棟に入院している場合\n  - （１）医療区分２の患者に相当するもの1,617点\n  - （２）医療区分１の患者に相当するもの1,477点\n    - ロ13対１入院基本料の施設基準を届け出た病棟に入院している場合\n\
  \  - （１）医療区分２の患者に相当するもの1,449点\n  - （２）医療区分１の患者に相当するもの1,311点\n    - ハ15対１入院基本料の施設基準を届け出た病棟に入院している場合\n  - （１）医療区分２の患者に相当するもの1,335点\n\
  \  - （２）医療区分１の患者に相当するもの1,197点\n- ７当該病棟においては、第２節の各区分に掲げる入院基本料等加算のうち、次に掲げる加算について、同節に規定する算定要件を満たす場合に算定できる。\n    - イ臨床研修病院入院診療加算\n\
  \    - ロ在宅患者緊急入院診療加算\n    - ハ診療録管理体制加算\n    - ニ医師事務作業補助体制加算\n    - ホ電子的診療情報連携体制整備加算\n    - ヘ乳幼児加算・幼児加算\n    - ト特定感染症入院医療管理加算\n\
  \    - チ難病等特別入院診療加算（難病患者等入院診療加算に限る。）\n    - リ特殊疾患入院施設管理加算\n    - ヌ超重症児（者）入院診療加算・準超重症児（者）入院診療加算\n    - ル看護配置加算\n    - ヲ看護補助加算（特定入院基本料を算定するものを除く。）\n\
  \    - ワ地域加算\n    - カ離島加算\n    - ヨ療養環境加算\n    - タＨＩＶ感染者療養環境特別加算\n    - レ特定感染症患者療養環境特別加算\n    - ソ特定薬剤治療環境特別加算\n    - ツ重症者等療養環境特別加算\n\
  \    - ネ強度行動障害入院医療管理加算\n    - ナ栄養サポートチーム加算\n    - ラ口腔管理連携加算\n    - ム医療安全対策加算\n- ウ感染対策向上加算\n- ヰ患者サポート体制充実加算\n- ノ報告書管理体制加算\n\
  - オ身体的拘束最小化推進体制加算\n- ク褥瘡ハイリスク患者ケア加算\n- ヤ地域支援・医薬品供給対応体制加算（特定入院基本料を算定するものを除く。）\n- マバイオ後続品使用体制加算（特定入院基本料を算定するものを除く。）\n- ケデータ提出加算\n\
  - フ入退院支援加算（１のハ又は２のロに限る。）\n- コ医療的ケア児（者）入院前支援加算\n- エ認知症ケア加算\n- テ排尿自立支援加算\n- ア協力対象施設入所者入院加算８注６、注13又は注14に規定する点数を算定する患者に対して行った第３部検査、第５部投薬、第６部注射及び第13部病理診断並びに第４部画像診断及び第９部処置のうち別に厚生労働大臣が定める画像診断及び処置の費用（フィルムの費用を含み、除外薬剤・注射薬の費用を除く。）は、当該入院基本料に含まれるものとする。\n\
  ただし、患者の急性増悪により、同一の保険医療機関の他の一般病棟へ転棟又は別の保険医療機関の一般病棟へ転院する場合には、その日から起算して３日前までの当該費用については、この限りでない。\n- ９別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者（７対１入院基本料又は10対１入院基本料を現に算定している患者に限る。）については、看護補助加算として、当該患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n\
  この場合において、注10に規定する看護補助・患者ケア体制充実加算は別に算定できない。\n    - イ14日以内の期間146点\n    - ロ15日以上30日以内の期間121点\n    - ハイ及びロ以外50点\n- 10別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者（７対１入院基本料又は10対１入院基本料を現に算定している患者に限る。）については、当該基準に係る区分に従い、かつ、当該患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n\
  ただし、当該患者について、身体的拘束を実施した日は、看護補助・患者ケア体制充実加算３の例により所定点数に加算する。\n    - イ14日以内の期間\n  - （１）看護補助・患者ケア体制充実加算１176点\n  - （２）看護補助・患者ケア体制充実加算２161点\n\
  \  - （３）看護補助・患者ケア体制充実加算３151点\n    - ロ15日以上30日以内の期間\n  - （１）看護補助・患者ケア体制充実加算１151点\n  - （２）看護補助・患者ケア体制充実加算２136点\n  - （３）看護補助・患者ケア体制充実加算３126点\n\
  \    - ハイ及びロ以外\n  - （１）看護補助・患者ケア体制充実加算１60点\n  - （２）看護補助・患者ケア体制充実加算２55点\n  - （３）看護補助・患者ケア体制充実加算３51点\n- 11夜間における看護業務の体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者（７対１入院基本料又は10対１入院基本料を現に算定している患者に限る。）について、夜間看護体制加算として、入院初日に限り161点を所定点数に加算する。\n\
  - 12別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の入院基本料（注２の規定により算定される入院基本料及び注５に規定する特定入院基本料を含む。）は、夜間看護体制特定日減算として、次のいずれにも該当する場合に限り、所定点数の100分の５に相当する点数を減算する。\n\
  \    - イ年６日以内であること。\n    - ロ当該日が属する月が連続する２月以内であること。\n- 13当該病棟に入院する脳卒中、脳卒中の後遺症又は廃用症候群の患者（脳卒中又は廃用症候群の発症前から重度の肢体不自由児（者）であった患者、重度の意識障害者、筋ジストロフィー患者及び難病患者等を除く。）であって、基本診療料の施設基準等第５の３（１）のロに規定する医療区分２の患者又は第６の３（２）のロの④に規定する医療区分１の患者に相当するものについては、注１及び注３の規定にかかわらず、当該患者が入院している病棟の区分に従い、次に掲げる点数をそれぞれ算定する。\n\
  \    - イ７対１入院基本料又は10対１入院基本料の施設基準を届け出た病棟に入院している場合\n  - （１）医療区分２の患者に相当するもの1,464点\n  - （２）医療区分１の患者に相当するもの1,339点\n    - ロ13対１入院基本料の施設基準を届け出た病棟に入院している場合\n\
  \  - （１）医療区分２の患者に相当するもの1,312点\n  - （2）医療区分１の患者に相当するもの1,187点\n    - ハ15対１入院基本料の施設基準を届け出た病棟に入院している場合\n  - （１）医療区分２の患者に相当するもの1,208点\n\
  \  - （2）医療区分１の患者に相当するもの1,083点\n- 14当該病棟に入院している患者のうち、区分番号Ｊ０３８に掲げる人工腎臓、区分番号Ｊ０３８－２に掲げる持続緩徐式血液濾過、区分番号Ｊ０３９に掲げる血漿交換療法又は区分番号Ｊ０４２に掲げる腹膜灌流を行っている慢性腎臓病の患者（注６及び注13に規定する点数を算定する患者を除く。）であって、基本診療料の施設基準等第５の３（１）のロに規定する医療区分２の患者に相当するものについては、注１及び注３の規定にかかわらず、当該患者が入院している病棟の区分に従い、次に掲げる点数をそれぞれ算定する。\n\
  \    - イ７対１入院基本料又は10対１入院基本料の施設基準を届け出た病棟に入院している場合1,681点\n    - ロ13対１入院基本料の施設基準を届け出た病棟に入院している場合1,507点\n    - ハ15対１入院基本料の施設基準を届け出た病棟に入院している場合1,388点\n"
