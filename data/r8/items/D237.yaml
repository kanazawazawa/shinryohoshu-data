raw_text: "Ｄ２３７終夜睡眠ポリグラフィー\n- １携帯用装置を使用した場合720点\n- ２多点感圧センサーを有する睡眠評価装置を使用した場合250点\n- ３１及び２以外の場合\n    - イ安全精度管理下で行うもの4,760点\n\
  \    - ロ保険医療機関内で又は訪問して実施するもの3,570点\n    - ハその他のもの2,000点\n- 注１３のイについては、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。\n\
  - ２検査に要した交通費は、患家の負担とする。\n"
