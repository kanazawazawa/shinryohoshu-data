raw_text: |
  Ｋ００２デブリードマン
  - １100平方センチメートル未満1,620点
  - ２100平方センチメートル以上3,000平方センチメートル未満4,820点
  - ３3,000平方センチメートル以上11,230点
  - 注１熱傷により全身の20パーセント以上に植皮を行う場合又はＡ群溶連菌感染症に伴う壊死性筋膜炎の場合においては、５回に限り算定する。
  - ２注１の場合を除き、当初の１回に限り算定する。
  - ３骨、腱又は筋肉の露出を伴う損傷については、当初の１回に限り、深部デブリードマン加算として、1,000点を所定点数に加算する。
  - ４水圧式デブリードマンを実施した場合は、一連の治療につき１回に限り、水圧式デブリードマン加算として、2,500点を所定点数に加算する。
  - ５超音波式デブリードマンを実施した場合は、一連の治療につき１回に限り、超音波式デブリードマン加算として、2,500点を所定点数に加算する。
