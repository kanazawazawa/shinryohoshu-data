  part: 第2部 入院料等
  section: 第3節 特定入院料
raw_text: 'Ａ３１１－４児童・思春期精神科入院医療管理料（１日につき）3,144点

  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟又は治療室に入院している20歳未満の精神疾患を有する患者について、所定点数を算定する。

  ただし、当該病棟又は治療室に入院した患者が当該入院料に係る算定要件に該当しない場合は、区分番号Ａ１０３に掲げる精神病棟入院基本料の注２に規定する特別入院基本料の例により算定する。

  - ２診療に係る費用（注３に規定する加算、第２節に規定する臨床研修病院入院診療加算、医師事務作業補助体制加算（50対１補助体制加算、75対１補助体制加算又は100対１補助体制加算に限る。）、地域加算、離島加算、特定感染症患者療養環境特別加算、強度行動障害入院医療管理加算、摂食障害入院医療管理加算、口腔管理連携加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、精神科救急搬送患者地域連携受入加算、データ提出加算、精神科入退院支援加算、薬剤総合評価調整加算及び排尿自立支援加算並びに第２章第５部投薬、第６部注射、第９部処置の区分番号Ｊ０３８に掲げる人工腎臓、区分番号Ｊ０４２に掲げる腹膜灌流及び区分番号Ｊ４００に掲げる特定保険医療材料（区分番号Ｊ０３８に掲げる人工腎臓又は区分番号Ｊ０４２に掲げる腹膜灌流に係るものに限る。）、第10部手術、第11部麻酔、第13部第２節病理診断・判断料及び第14部その他の費用を除く。）は、児童・思春期精神科入院医療管理料に含まれるものとする。

  - ３当該病棟又は治療室に入院している20歳未満の精神疾患を有する患者に対する支援体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関の病棟に入院している患者について、精神科養育支援体制加算として、入院初日に限り300点を所定点数に加算する。

  '
