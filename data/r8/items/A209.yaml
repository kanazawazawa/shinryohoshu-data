raw_text: 'Ａ２０９特定感染症入院医療管理加算（１日につき）１治療室の場合200点

  - ２それ以外の場合100点

  - 注感染症法第６条第４項に規定する三類感染症の患者、同条第５項に規定する四類感染症の患者、同条第６項に規定する五類感染症の患者、同条第８項に規定する指定感染症の患者及びその他他者に感染させた場合に重症になるおそれがある感染症の患者並びにこれらの疑似症患者のうち感染対策が特に必要なものに対して、適切な感染防止対策を実施した場合に、１入院に限り７日（当該感染症を他の患者に感染させるおそれが高いことが明らかであり、感染対策の必要性が特に認められる患者に対する場合を除く。）を限度として、算定する。

  ただし、疑似症患者については、初日に限り所定点数に加算する。

  '
