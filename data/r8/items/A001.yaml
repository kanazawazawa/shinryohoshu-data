code: A001
name: 再診料
version: r8
points: 76
unit: 回
chapter:
  chapter: 第1章 基本診療料
  part: 第1部 初・再診料
  section: 第2節 再診料
raw_text: "Ａ００１再診料76点\n- 注１保険医療機関（許可病床のうち一般病床に係るものの数が200以上のものを除く。）において再診を行った場合（別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において情報通信機器を用いた再診を行った場合を含む。）に算定する。\n\
  - ２医療用医薬品の取引価格の妥結率に関して別に厚生労働大臣が定める施設基準を満たす保険医療機関（許可病床数が200床以上である病院に限る。）において再診を行った場合には、注１の規定にかかわらず、特定妥結率再診料として、56点を算定する。\n\
  - ３同一保険医療機関において、同一日に他の傷病について、別の診療科を再診として受診した場合は、注１の規定にかかわらず、２つ目の診療科に限り、39点（注２に規定する場合にあっては、29点）を算定する。\nこの場合において、注４から注８まで及び注10から注20までに規定する加算は算定しない。\n\
  - ４６歳未満の乳幼児に対して再診を行った場合は、乳幼児加算として、38点を所定点数に加算する。\nただし、注５又は注６に規定する加算を算定する場合は算定しない。\n- ５保険医療機関が表示する診療時間以外の時間、休日又は深夜において再診を行った場合は、時間外加算、休日加算又は深夜加算として、それぞれ65点、190点又は420点（６歳未満の乳幼児の場合にあっては、それぞれ135点、260点又は590点）を所定点数に加算する。\n\
  ただし、区分番号Ａ０００に掲げる初診料の注７のただし書に規定する保険医療機関にあっては、同注のただし書に規定する時間において再診を行った場合は、180点（６歳未満の乳幼児の場合にあっては、250点）を所定点数に加算する。\n- ６小児科を標榜する保険医療機関（区分番号Ａ０００に掲げる初診料の注７のただし書に規定するものを除く。）にあっては、夜間であって別に厚生労働大臣が定める時間、休日又は深夜（当該保険医療機関が表示する診療時間内の時間に限る。）において６歳未満の乳幼児に対して再診を行った場合は、注５の規定にかかわらず、それぞれ135点、260点又は590点を所定点数に加算する。\n\
  - ７区分番号Ａ０００に掲げる初診料の注９に規定する別に厚生労働大臣が定める施設基準を満たす保険医療機関（診療所に限る。）が、午後６時（土曜日にあっては正午）から午前８時までの間（深夜及び休日を除く。）、休日又は深夜であって、当該保険医療機関が表示する診療時間内の時間において再診を行った場合は、夜間・早朝等加算として、50点を所定点数に加算する。\n\
  ただし、注５のただし書又は注６に規定する場合にあっては、この限りでない。\n- ８入院中の患者以外の患者に対して、慢性疼痛疾患管理並びに別に厚生労働大臣が定める検査並びに第７部リハビリテーション、第８部精神科専門療法、第９部処置、第10部手術、第11部麻酔及び第12部放射線治療を行わないものとして別に厚生労働大臣が定める計画的な医学管理を行った場合は、外来管理加算として、52点を所定点数に加算する。\n\
  - ９患者又はその看護に当たっている者から電話等によって治療上の意見を求められて指示をした場合においても、再診料を算定することができる。\nただし、この場合において、注８、注12、注13及び注15から注20までに規定する加算は算定しない。\n\
  - 10別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関（診療所に限る。）において再診を行った場合には、当該基準に係る区分に従い、次に掲げる点数をそれぞれ所定点数に加算する。\n    - イ時間外対応体制加算１７点\n\
  \    - ロ時間外対応体制加算２５点\n    - ハ時間外対応体制加算３４点\n    - ニ時間外対応体制加算４２点\n- 11個別の費用の計算の基礎となった項目ごとに記載した明細書の発行等につき別に厚生労働大臣が定める施設基準を満たす保険医療機関（診療所に限る。）を受診した患者については、明細書発行体制等加算として、１点を所定点数に加算する。\n\
  この場合において、区分番号Ａ０００に掲げる初診料の注16及び区分番号Ａ００１に掲げる再診料の注19に規定する電子的診療情報連携体制整備加算は別に算定できない。\n- 12別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関（診療所に限る。）において、入院中の患者以外の患者に対して、当該患者の同意を得て、療養上必要な指導及び診療を行った場合には、地域包括診療加算として、当該基準に係る区分に従い、次に掲げる点数を所定点数に加算する。\n\
  \    - イ地域包括診療加算１\n  - （１）認知症を有する患者等の場合38点\n  - （２）その他の慢性疾患等を有する患者の場合28点\n    - ロ地域包括診療加算２\n  - （１）認知症を有する患者等の場合31点\n  -\
  \ （２）その他の慢性疾患等を有する患者の場合21点\n- 13注12の場合において、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、当該保険医療機関における診療報酬の請求状況及び診療の内容に関するデータを継続して厚生労働省に提出している場合は、外来データ提出加算として、月１回に限り10点を更に所定点数に加算する。\n\
  - 14注12の場合において、他の保険医療機関に入院した患者、介護保険法第８条第28項に規定する介護老人保健施設（以下「介護老人保健施設」という。）に入所した患者又は他の保険医療機関の外来において継続的に診療を受けている患者について、当該他の保険医療機関又は介護老人保健施設に対して、薬剤の服用状況や薬剤服用歴に関する情報提供を行い、適切な連携を実施するとともに、当該他の保険医療機関又は介護老人保健施設において処方した薬剤の種類数が減少した場合であって、退院後若しくは退所後１月以内又は当該情報提供から３月以内に当該他の保険医療機関又は介護老人保健施設から処方内容について情報提供を受けた場合には、薬剤適正使用連携加算として、３月に１回に限り、30点を更に所定点数に加算する。\n\
  - 15組織的な感染防止対策につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関（診療所に限る。）において再診を行った場合は、外来感染対策向上加算として、月１回に限り６点を所定点数に加算する。\n\
  ただし、発熱その他感染症を疑わせるような症状を呈する患者に対して適切な感染防止対策を講じた上で再診を行った場合については、発熱患者等対応加算として、月１回に限り20点を更に所定点数に加算する。\n- 16注15本文に該当する場合であって、感染症対策に関する医療機関間の連携体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において再診を行った場合は、連携強化加算として、月１回に限り３点を更に所定点数に加算する。\n\
  - 17注15本文に該当する場合であって、感染防止対策に資する情報を提供する体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において再診を行った場合は、サーベイランス強化加算として、月１回に限り１点を更に所定点数に加算する。\n\
  - 18注15本文に該当する場合であって、抗菌薬の使用状況につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において再診を行った場合は、抗菌薬適正使用体制加算として、月１回に限り５点を更に所定点数に加算する。\n\
  - 19医療ＤＸ推進に係る体制として別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関を受診した患者に対して再診を行った場合は、電子的診療情報連携体制整備加算として、月１回に限り２点を所定点数に加算する。\n\
  この場合において、注11に規定する明細書発行体制等加算は別に算定できない。\n- 20別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、看護師等といる患者に対して情報通信機器を用いた診療を行った場合は、看護師等遠隔診療補助加算として、50点を所定点数に加算する。\n"
