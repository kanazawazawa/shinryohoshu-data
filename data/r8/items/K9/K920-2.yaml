chapter:
  chapter: 第2章 特掲診療料
  part: 第10部 手術
  section: 第2節 輸血料
raw_text: |
  Ｋ９２０－２輸血管理料
  - １輸血管理料Ⅰ242点
  - ２輸血管理料Ⅱ121点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、輸血を行った場合に、月１回に限り、当該基準に係る区分に従い、それぞれ所定点数を算定する。
  - ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、輸血製剤が適正に使用されている場合には、輸血適正使用加算として、所定点数に、１においては120点、２においては60点を加算する。
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において貯血式自己血輸血を実施した場合は、貯血式自己血輸血管理体制加算として、50点を所定点数に加算する。
