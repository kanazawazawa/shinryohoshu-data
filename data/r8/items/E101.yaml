raw_text: 'Ｅ１０１シングルホトンエミッションコンピューター断層撮影（同一のラジオアイソトープを用いた一連の検査につき）1,800点

  - 注１甲状腺シンチグラム検査に当たって、甲状腺ラジオアイソトープ摂取率を測定した場合は、甲状腺ラジオアイソトープ摂取率測定加算として、100点を所定点数に加算する。

  - ２新生児、３歳未満の乳幼児（新生児を除く。）又は３歳以上６歳未満の幼児に対して断層撮影を行った場合は、新生児加算、乳幼児加算又は幼児加算として、所定点数にそれぞれ所定点数の100分の80、100分の50又は100分の30に相当する点数を加算する。

  - ３負荷試験を行った場合は、負荷の種類又は測定回数にかかわらず、断層撮影負荷試験加算として、所定点数の100分の50に相当する点数を加算する。

  - ４ラジオアイソトープの注入手技料は、所定点数に含まれるものとする。

  '
