raw_text: 'Ｊ２０１酸素加算

  - 注１区分番号Ｊ０２４からＪ０２８まで及びＪ０４５に掲げる処置に当たって酸素を使用した場合は、その価格を10円で除して得た点数（窒素を使用した場合は、その価格を10円で除して得た点数を合算した点数）を加算する。

  - ２酸素及び窒素の価格は、別に厚生労働大臣が定める。

  '
