raw_text: |
  Ａ２２６－４小児緩和ケア診療加算（１日につき）700点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、緩和ケアを要する15歳未満の小児に対して、必要な診療を行った場合に、当該患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、小児緩和ケア診療加算を算定できるものを現に算定している患者に限る。
  以下この区分番号において同じ。）について、所定点数に加算する。
  この場合において、区分番号Ａ２２６－２に掲げる緩和ケア診療加算は別に算定できない。
  - ２別に厚生労働大臣が定める施設基準を満たす保険医療機関において、緩和ケアを要する15歳未満の小児に対して、緩和ケアに係る必要な栄養食事管理を行った場合には、小児個別栄養食事管理加算として、70点を更に所定点数に加算する。
