  chapter: 第2章 特掲診療料
  part: 第8部 精神科専門療法
  section: 第2節 薬剤料
raw_text: |
  Ｉ０１４医療保護入院等診療料
  - １医療保護入院等診療料１300点
  - ２医療保護入院等診療料２400点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、精神保健福祉法第29条第１項、第29条の２第１項、第33条第１項又は第33条の６第１項の規定による入院に係る患者に対して、精神保健指定医が治療計画を策定し、当該治療計画に基づき、治療管理を行った場合は、患者１人につき１回に限り算定する。
  - ２２については、１を算定した患者に対して、多職種で退院支援を行った場合に、入院日から起算して６月までの間は３月に１回に限り、６月以降は６月に１回に限り算定する。
notes:
- id: 注1
  text: 別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、精神保健福祉法第29条第１項、第29条の２第１項、第33条第１項又は第33条の６第１項の規定による入院に係る患者に対して、精神保健指定医が治療計画を策定し、当該治療計画に基づき、治療管理を行った場合は、患者１人につき１回に限り算定する。
- id: 注2
  text: |
    2については、１を算定した患者に対して、多職種で退院支援を行った場合に、入院日から起算して６月までの間は３月に１回に限り、６月以降は６月に１回に限り算定する。
