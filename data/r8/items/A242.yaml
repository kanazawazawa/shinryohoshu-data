raw_text: 'Ａ２４２呼吸ケアチーム加算（週１回）150点

  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める患者に対して、当該保険医療機関の保険医、看護師、臨床工学技士、理学療法士等が共同して、人工呼吸器の離脱のために必要な診療を行った場合に、当該患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、呼吸ケアチーム加算を算定できるものを現に算定している患者に限る。）について、週１回に限り所定点数に加算する。

  ただし、区分番号Ｂ０１１－４に掲げる医療機器安全管理料の１は別に算定できない。

  '
notes:
- id: 注1
  text: '別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める患者に対して、当該保険医療機関の保険医、看護師、臨床工学技士、理学療法士等が共同して、人工呼吸器の離脱のために必要な診療を行った場合に、当該患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、呼吸ケアチーム加算を算定できるものを現に算定している患者に限る。）について、週１回に限り所定点数に加算する。

    ただし、区分番号Ｂ０１１－４に掲げる医療機器安全管理料の１は別に算定できない。

    '
