raw_text: |
  Ａ２３４－５報告書管理体制加算（退院時１回）７点
  - 注組織的な医療安全対策の実施状況の確認につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者であって、当該入院中に第４部画像診断又は第13部病理診断に掲げる診療料を算定したもの（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、報告書管理体制加算を算定できるものを現に算定している患者に限る。）について、退院時１回に限り、所定点数に加算する。
