code: A103
name: 精神病棟入院基本料（１日につき）１急性期病院精神病棟入院基本料
version: r8
points: null
unit: 日
chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第1節 入院基本料
raw_text: "Ａ１０３精神病棟入院基本料（１日につき）１急性期病院精神病棟入院基本料\n    - イ急性期病院Ａ精神病棟入院料\n  - （１）10対１入院基本料1,519点\n  - （２）13対１入院基本料1,162点\n  -\
  \ （３）15対１入院基本料966点\n    - ロ急性期病院Ｂ精神病棟入院料\n  - （１）10対１入院基本料1,502点\n  - （２）13対１入院基本料1,145点\n  - （３）15対１入院基本料949点\n- ２精神病棟入院料\n\
  \    - イ10対１入院基本料1,471点\n    - ロ13対１入院基本料1,114点\n    - ハ15対１入院基本料918点\n    - ニ18対１入院基本料\n  - （１）１年未満の場合816点\n  - （２）１年以上の場合703点\n\
  \    - ホ20対１入院基本料\n  - （１）１年未満の場合754点\n  - （２）１年以上の場合649点\n- 注１病院（特定機能病院を除く。）の精神病棟（医療法第７条第２項第１号に規定する精神病床に係る病棟として地方厚生局長等に届出のあったものをいう。\n\
  以下この表において同じ。）であって、看護配置、看護師比率、平均在院日数その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に係る区分に従い、それぞれ所定点数を算定する。\n\
  - ２注１に規定する病棟以外の精神病棟については、当分の間、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た場合に限り、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、特別入院基本料として、618点を算定できる。\n\
  ただし、注１に規定する別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出ていた病棟であって、当該基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た病棟については、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に適合しなくなった後の直近３月に限り、月平均夜勤時間超過減算として、それぞれの所定点数から100分の15に相当する点数を減算する。\n\
  なお、別に厚生労働大臣が定める場合には、算定できない。\n- ３当該病棟の入院患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n    - イ14日以内の期間465点（特別入院基本料等については、300点）\n\
  \    - ロ15日以上30日以内の期間250点（特別入院基本料等については、155点）\n    - ハ31日以上90日以内の期間125点（特別入院基本料等については、100点）\n    - ニ91日以上180日以内の期間10点\n\
  \    - ホ181日以上１年以内の期間３点\n- ４別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者が別に厚生労働大臣が定めるものである場合には、入院した日から起算して１月以内の期間に限り、重度認知症加算として、１日につき300点を所定点数に加算する。\n\
  - ５当該病棟に入院する患者が、入院に当たって区分番号Ａ２３８－７に掲げる精神科救急搬送患者地域連携受入加算を算定したものである場合には、入院した日から起算して14日を限度として、救急支援精神病棟初期加算として、１日につき100点を所定点数に加算する。\n\
  - ６当該病棟においては、第２節の各区分に掲げる入院基本料等加算のうち、次に掲げる加算について、同節に規定する算定要件を満たす場合に算定できる。\n    - イ急性期総合体制加算（急性期病院精神病棟入院基本料に限る。）\n    - ロ地域医療支援病院入院診療加算\n\
  \    - ハ臨床研修病院入院診療加算\n    - ニ紹介受診重点医療機関入院診療加算\n    - ホ救急医療管理加算\n    - ヘ妊産婦緊急搬送入院加算\n    - ト在宅患者緊急入院診療加算\n    - チ診療録管理体制加算\n\
  \    - リ医師事務作業補助体制加算（50対１補助体制加算、75対１補助体制加算又は100対１補助体制加算に限る。）\n    - ヌ電子的診療情報連携体制整備加算\n    - ル乳幼児加算・幼児加算\n    - ヲ特定感染症入院医療管理加算\n\
  \    - ワ特定薬剤治療環境特別加算\n    - カ難病等特別入院診療加算\n    - ヨ特殊疾患入院施設管理加算\n    - タ超重症児（者）入院診療加算・準超重症児（者）入院診療加算\n    - レ看護配置加算\n    -\
  \ ソ看護補助加算\n    - ツ地域加算\n    - ネ離島加算\n    - ナ療養環境加算\n    - ラＨＩＶ感染者療養環境特別加算\n    - ム特定感染症患者療養環境特別加算\n- ウ精神科措置入院診療加算\n- ヰ精神科応急入院施設管理加算\n\
  - ノ精神科隔離室管理加算\n- オ精神病棟入院時医学管理加算\n- ク精神科地域移行実施加算\n- ヤ精神科身体合併症管理加算（18対１入院基本料及び20対１入院基本料を算定するものを除く。）\n- マ精神科慢性身体合併症管理加算（18対１入院基本料及び20対１入院基本料を算定するものを除く。）\n\
  - ケ強度行動障害入院医療管理加算\n- フ依存症入院医療管理加算\n- コ摂食障害入院医療管理加算\n- エ栄養サポートチーム加算\n- テ口腔管理連携加算\n- ア医療安全対策加算\n- サ感染対策向上加算\n- キ患者サポート体制充実加算\n\
  - ユ報告書管理体制加算\n- メ褥瘡ハイリスク患者ケア加算\n- ミハイリスク妊娠管理加算\n- シハイリスク分娩等管理加算（ハイリスク分娩管理加算に限る。）\n- ヱ精神科救急搬送患者地域連携紹介加算（急性期病院精神病棟入院基本料に限る。）\n\
  - ヒ精神科救急搬送患者地域連携受入加算（精神病棟入院料に限る。）\n- モ地域支援・医薬品供給対応体制加算\n- セバイオ後続品使用体制加算\n- ス病棟薬剤業務実施加算（１又は２に限る。）ンデータ提出加算イイ精神科入退院支援加算イロ精神科急性期医師配置加算（急性期病院精神病棟入院基本料及び精神病棟入院料の10対１入院基本料、13対１入院基本料又は15対１入院基本料を算定するものに限る。）イハ薬剤総合評価調整加算イニ排尿自立支援加算イホ地域医療体制確保加算（急性期病院精神病棟入院基本料及び精神病棟入院料の10対１入院基本料又は13対１入院基本料（精神病棟看護・多職種協働加算を算定するものに限る。）を算定するものに限る。）イヘ協力対象施設入所者入院加算イト精神科地域密着多機能体制加算（精神病棟入院料の10対１入院基本料、13対１入院基本料又は15対１入院基本料を算定するものに限る。）７１のイの（２）若しくは（３）、１のロの（２）若しくは（３）又は２のロ若しくはハにおいて、別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者について、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n\
  \    - イ精神病棟看護・多職種協働加算（急性期病院Ａ精神病棟入院料13対１入院基本料の場合）357点\n    - ロ精神病棟看護・多職種協働加算（急性期病院Ａ精神病棟入院料15対１入院基本料の場合）196点\n    - ハ精神病棟看護・多職種協働加算（急性期病院Ｂ精神病棟入院料13対１入院基本料の場合）357点\n\
  \    - ニ精神病棟看護・多職種協働加算（急性期病院Ｂ精神病棟入院料15対１入院基本料の場合）196点\n    - ホ精神病棟看護・多職種協働加算（精神病棟入院料13対１入院基本料の場合）357点\n    - ヘ精神病棟看護・多職種協働加算（精神病棟入院料15対１入院基本料の場合）196点\n\
  - ８別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者について、精神保健福祉士配置加算として、１日につき30点を所定点数に加算する。\n- ９精神保健福祉士配置加算を算定した場合は、区分番号Ａ２３０－２に掲げる精神科地域移行実施加算、区分番号Ａ２４６－２に掲げる精神科入退院支援加算、区分番号Ｂ００５に掲げる退院時共同指導料２、区分番号Ｂ００５－１－２に掲げる介護支援等連携指導料、区分番号Ｉ０１１に掲げる精神科退院指導料及び区分番号Ｉ０１１－２に掲げる精神科退院前訪問指導料は、算定しない。\n\
  - 10注１に規定する別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出ていた病棟であって、当該基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た病棟については、注２の規定にかかわらず、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当分の間、夜勤時間特別入院基本料として、それぞれの所定点数の100分の70に相当する点数を算定できる。\n\
  ただし、当該点数が注２本文に規定する特別入院基本料の点数を下回る場合は、本文の規定にかかわらず、628点を算定できる。\n- 11別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の入院基本料（特別入院基本料等を含む。）は、夜間看護体制特定日減算として、次のいずれにも該当する場合に限り、所定点数の100分の５に相当する点数を減算する。\n\
  \    - イ年６日以内であること。\n    - ロ当該日が属する月が連続する２月以内であること。\n"
