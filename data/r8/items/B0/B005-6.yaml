  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００５－６がん治療連携計画策定料
  - １がん治療連携計画策定料１750点
  - ２がん治療連携計画策定料２300点
  - 注１がん治療連携計画策定料１については、入院中のがん患者の退院後の治療を総合的に管理するため、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病院である保険医療機関（以下この表において「計画策定病院」という。）が、あらかじめがんの種類やステージを考慮した地域連携診療計画を作成し、がん治療を担う別の保険医療機関と共有し、かつ、当該患者の同意を得た上で、入院中又は当該保険医療機関を退院した日から起算して30日以内に、当該計画に基づき当該患者の治療計画を作成し、患者に説明し、文書により提供するとともに、退院時又は退院した日から起算して30日以内に当該別の保険医療機関に当該患者に係る診療情報を文書により提供した場合（がんと診断されてから最初の入院に係るものに限る。）に、退院時又は退院した日から起算して30日以内に１回に限り所定点数を算定する。
  - ２がん治療連携計画策定料２については、当該保険医療機関において注１に規定するがん治療連携計画策定料１を算定した患者であって、他の保険医療機関において区分番号Ｂ００５－６－２に掲げるがん治療連携指導料を算定しているものについて、状態の変化等に伴う当該他の保険医療機関からの紹介により、当該患者を診療し、当該患者の治療計画を変更した場合に、患者１人につき月１回に限り所定点数を算定する。
  - ３注１及び注２の規定に基づく当該別の保険医療機関への文書の提供に係る区分番号Ｂ００９に掲げる診療情報提供料（Ⅰ）の費用は、所定点数に含まれるものとする。
  - ４区分番号Ｂ００３に掲げる開放型病院共同指導料（Ⅱ）又は区分番号Ｂ００５に掲げる退院時共同指導料２は、別に算定できない。
  - ５がん治療連携計画策定料２については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、がん治療連携計画策定料２を算定すべき医学管理を情報通信機器を用いて行った場合は、所定点数に代えて、261点を算定する。
