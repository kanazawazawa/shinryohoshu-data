raw_text: |
  Ｂ００３開放型病院共同指導料（Ⅱ）220点
  - 注診察に基づき紹介された患者が開放型病院に入院中である場合において、当該開放型病院において、当該患者を診察した保険医療機関の医師と共同して療養上必要な指導を行った場合に、患者１人１日につき１回算定する。
