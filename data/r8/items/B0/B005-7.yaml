name: 認知症専門診断管理料
version: r8
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００５－７認知症専門診断管理料
  - １認知症専門診断管理料１
      - イ基幹型又は地域型の場合700点
      - ロ連携型の場合500点
  - ２認知症専門診断管理料２
      - イ基幹型又は地域型の場合300点
      - ロ連携型の場合280点
  - 注１認知症専門診断管理料１については、別に厚生労働大臣が定める施設基準を満たす保険医療機関が、他の保険医療機関から紹介された認知症の疑いのある患者であって、入院中の患者以外のもの又は当該他の保険医療機関の療養病棟に入院している患者に対して、当該患者又はその家族等の同意を得て、認知症の鑑別診断を行った上で療養方針を決定するとともに、認知症と診断された患者については認知症療養計画を作成し、これらを患者に説明し、文書により提供するとともに、地域において療養を担う他の保険医療機関に当該患者に係る診療情報を文書により提供した場合に、１人につき１回に限り所定点数を算定する。
  - ２認知症専門診断管理料２については、別に厚生労働大臣が定める施設基準を満たす保険医療機関が、地域において診療を担う他の保険医療機関から紹介された患者であって認知症の症状が増悪したもの（入院中の患者以外の患者又は当該他の保険医療機関の療養病棟に入院している患者に限る。）に対して、当該患者又はその家族等の同意を得て、診療を行った上で今後の療養計画等を患者に説明し、文書により提供するとともに、当該他の保険医療機関に当該患者に係る診療情報を文書により提供した場合に、３月に１回に限り所定点数を算定する。
  - ３注１及び注２の規定に基づく他の保険医療機関への文書の提供に係る区分番号Ｂ００９に掲げる診療情報提供料（Ⅰ）及び区分番号Ｂ０１１に掲げる連携強化診療情報提供料の費用は、所定点数に含まれるものとする。
  - ４区分番号Ｂ０００に掲げる特定疾患療養管理料は、別に算定できない。
