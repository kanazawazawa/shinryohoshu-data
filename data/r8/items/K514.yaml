raw_text: 'Ｋ５１４肺悪性腫瘍手術

  - １部分切除60,350点

  - ２区域切除69,250点

  - ３肺葉切除又は１肺葉を超えるもの72,640点

  - ４肺全摘72,640点

  - ５隣接臓器合併切除を伴う肺切除78,400点

  - ６気管支形成を伴う肺切除80,460点

  - ７気管分岐部切除を伴う肺切除124,860点

  - ８気管分岐部再建を伴う肺切除127,130点

  - ９胸膜肺全摘92,000点

  - 10壁側・臓側胸膜全切除（横隔膜、心膜合併切除を伴うもの）105,000点

  - 注９及び10については、悪性びまん性胸膜中皮腫に対して実施した場合に限り算定する。

  '
