raw_text: 'Ｋ１７８－４経皮的脳血栓回収術

  - １頸動脈ステント留置を併施するもの47,150点

  - ２その他のもの33,150点

  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、当該保険医療機関との連携体制の確保により区分番号Ａ２０５－２に掲げる超急性期脳卒中加算の届出を行っている他の保険医療機関の救急患者について、経皮的脳血栓回収術の適応判定について助言を行った上で、当該他の保険医療機関から搬送された当該患者に対して、経皮的脳血栓回収術を実施した場合は、脳血栓回収療法連携加算として、5,000点を所定点数に加算する。

  ただし、脳血栓回収療法連携加算を算定する場合は、区分番号Ａ２０５－２に掲げる超急性期脳卒中加算は算定できない。

  '
