raw_text: 'Ｃ１５９液化酸素装置加算

  - １設置型液化酸素装置3,970点

  - ２携帯型液化酸素装置880点

  - 注在宅酸素療法を行っている入院中の患者以外の患者（チアノーゼ型先天性心疾患の患者を除く。）に対して、液化酸素装置を使用した場合に、第１款の所定点数に加算する。

