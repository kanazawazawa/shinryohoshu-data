chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: "Ｂ０１５精神科退院時共同指導料\n- １精神科退院時共同指導料１（外来を担う保険医療機関又は在宅療養担当医療機関の場合）\n    - イ精神科退院時共同指導料（Ⅰ）1,500点\n    - ロ精神科退院時共同指導料（Ⅱ）900点\n\
  - ２精神科退院時共同指導料２（入院医療を提供する保険医療機関の場合）700点\n- 注１１のイについては、精神保健福祉法第29条若しくは第29条の２に規定する入院措置に係る患者、心神喪失等の状態で重大な他害行為を行った者の医療及び観察等に関する法律（平成15年法律第110号）第42条第１項第１号若しくは第61条第１項第１号に規定する同法による入院若しくは同法第42条第１項第２号に規定する同法による通院をしたことがあるもの又は当該入院の期間が１年以上のものに対して、当該患者の外来を担う保険医療機関又は在宅療養担当医療機関であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、当該患者が入院している他の保険医療機関と共同して、当該患者の同意を得て、退院後の療養上必要な説明及び指導を行った上で、支援計画を作成し、文書により情報提供した場合に、入院中に１回に限り算定する。\n\
  - ２１のロについては、療養生活環境の整備のため重点的な支援を要する患者に対して、当該患者の外来を担う保険医療機関又は在宅療養担当医療機関であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、当該患者が入院している他の保険医療機関と共同して、当該患者の同意を得て、退院後の療養上必要な説明及び指導を行った上で、支援計画を作成し、文書により情報提供した場合に、入院中に１回に限り算定する。\n\
  - ３１について、区分番号Ａ０００に掲げる初診料、区分番号Ａ００１に掲げる再診料、区分番号Ａ００２に掲げる外来診療料、区分番号Ｂ００２に掲げる開放型病院共同指導料（Ⅰ）、区分番号Ｂ００４に掲げる退院時共同指導料１、区分番号Ｃ０００に掲げる往診料、区分番号Ｃ００１に掲げる在宅患者訪問診療料（Ⅰ）又は区分番号Ｃ００１－２に掲げる在宅患者訪問診療料（Ⅱ）は別に算定できない。\n\
  - ４２については、精神病棟に入院している患者であって、他の保険医療機関において１を算定するものに対して、当該患者が入院している保険医療機関であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、当該患者の外来を担う保険医療機関又は在宅療養担当医療機関と共同して、当該患者の同意を得て、退院後の療養上必要な説明及び指導を行った上で、支援計画を作成し、文書により情報提供した場合に、入院中に１回に限り算定する。\n\
  ただし、区分番号Ｂ００３に掲げる開放型病院共同指導料（Ⅱ）、区分番号Ｂ００５に掲げる退院時共同指導料２又は区分番号Ｉ０１１に掲げる精神科退院指導料は、別に算定できない。\n"
