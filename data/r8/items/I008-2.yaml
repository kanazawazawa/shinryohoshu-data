  part: 第8部 精神科専門療法
  section: 第2節 薬剤料
raw_text: 'Ｉ００８－２精神科ショート・ケア（１日につき）１小規模なもの275点

  - ２大規模なもの330点

  - 注１１については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に算定する。

  - ２２については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、疾患等に応じた診療計画を作成して行われる場合に算定する。

  - ３精神科ショート・ケア、精神科デイ・ケア、精神科ナイト・ケア又は精神科デイ・ナイト・ケアのいずれかを最初に算定した日から起算して１年を超える期間に行われる場合には、週５日を限度として算定する。

  ただし、週３日を超えて算定する場合にあっては、患者の意向を踏まえ、必要性が特に認められる場合に限る。

  - ４精神科ショート・ケア、精神科デイ・ケア、精神科ナイト・ケア又は精神科デイ・ナイト・ケアのいずれかを最初に算定した日から起算して１年以内の期間に行われる場合にあっては、早期加算として、20点を所定点数に加算する。

  - ５当該保険医療機関において、入院中の患者であって、退院を予定しているもの（区分番号Ｉ０１１に掲げる精神科退院指導料を算定したものに限る。）に対して、精神科ショート・ケアを行った場合には、入院中１回に限り、所定点数の100分の50に相当する点数を算定する。

  - ６精神科ショート・ケアを算定した場合は、区分番号Ｉ００９に掲げる精神科デイ・ケア、区分番号Ｉ０１０に掲げる精神科ナイト・ケア、区分番号Ｉ０１０－２に掲げる精神科デイ・ナイト・ケア及び区分番号Ｉ０１５に掲げる重度認知症患者デイ・ケア料は算定しない。

  - ７１については、40歳未満の患者に対して、当該患者と類似の精神症状を有する複数の患者と共通の計画を作成し、当該計画について文書により提供し、当該患者の同意を得た上で、当該計画に係る複数の患者と同時に精神科ショート・ケアを実施した場合に、治療開始日から起算して５月を限度として、週１回に限り、疾患別等専門プログラム加算として、200点を所定点数に加算する。

  ただし、精神科の医師が特に必要性を認めた場合は、治療開始日から起算して２年を限度として、更に週１回かつ計20回に限り算定できる。

  '
