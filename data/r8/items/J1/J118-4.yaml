raw_text: |
  Ｊ１１８－４歩行運動処置（ロボットスーツによるもの）（１日につき）1,100点
  - 注１別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。
  - ２難病の患者に対する医療等に関する法律第５条第１項に規定する指定難病の患者であって、同法第７条第４項に規定する医療受給者証を交付されているもの（同条第１項各号に規定する特定医療費の支給認定に係る基準を満たすものとして診断を受けたものを含む。）に対して実施された場合には、難病患者処置加算として、900点を所定点数に加算する。
  - ３導入期５週間に限り、１日につき2,000点を９回に限り加算する。
