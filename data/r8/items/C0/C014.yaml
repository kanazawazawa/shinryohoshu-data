chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ０１４外来在宅共同指導料
  - １外来在宅共同指導料１400点
  - ２外来在宅共同指導料２600点
  - 注１１については、保険医療機関の外来において継続的に診療を受けている患者について、当該患者の在宅療養を担う保険医療機関の保険医が、当該患者の同意を得て、患家等を訪問して、在宅での療養上必要な説明及び指導を、外来において当該患者に対して継続的に診療を行っている保険医療機関の保険医と共同して行った上で、文書により情報提供した場合に、患者１人につき１回に限り、当該患者の在宅療養を担う保険医療機関において算定する。
  - ２２については、注１に規定する場合において、外来において当該患者に対して継続的に診療を行っている保険医療機関において、患者１人につき１回に限り算定する。
  この場合において、区分番号Ａ０００に掲げる初診料、区分番号Ａ００１に掲げる再診料、区分番号Ａ００２に掲げる外来診療料、区分番号Ｃ０００に掲げる往診料、区分番号Ｃ００１に掲げる在宅患者訪問診療料（Ⅰ）又は区分番号Ｃ００１－２に掲げる在宅患者訪問診療料（Ⅱ）は別に算定できない。
