code: C005
name: 在宅患者訪問看護・指導料（１日につき）１保健師、助産師又は看護師（３の場合を除く。）による場合
version: r8
points: null
unit: 日
chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ００５在宅患者訪問看護・指導料（１日につき）１保健師、助産師又は看護師（３の場合を除く。）による場合
      - イ週３日目まで580点
      - ロ週４日目以降680点
  - ２准看護師による場合
      - イ週３日目まで530点
      - ロ週４日目以降630点
  - ３悪性腫瘍の患者に対する緩和ケア、褥瘡ケア又は人工肛門ケア及び人工膀胱ケアに係る専門の研修を受けた看護師による場合1,285点
  - 注１１及び２については、保険医療機関が、在宅で療養を行っている患者（当該患者と同一の建物又は同一の敷地内の建物に居住する他の患者に対して当該保険医療機関が同一日に訪問看護・指導を行う場合の当該患者（以下この区分番号及び区分番号Ｃ００５－１－２において「同一建物等居住者」という。）を除く。
  注８及び注９において同じ。）であって通院が困難なものに対して、診療に基づく訪問看護計画により、保健師、助産師、看護師又は准看護師（以下この部において「看護師等」という。）を訪問させて看護又は療養上必要な指導を行った場合に、当該患者１人について日単位で算定する。
  ただし、別に厚生労働大臣が定める疾病等の患者以外の患者については、区分番号Ｃ００５－１－２に掲げる同一建物居住者訪問看護・指導料（３を除く。）又は区分番号Ｉ０１２に掲げる精神科訪問看護・指導料を算定する日と合わせて週３日（保険医療機関が、診療に基づき患者の急性増悪等により一時的に頻回の訪問看護・指導を行う必要を認めて、訪問看護・指導を行う場合にあっては、１月に１回（別に厚生労働大臣が定めるものについては、月２回）に限り、週７日（当該診療の日から起算して14日以内の期間に行われる場合に限る。））を限度とする。
  - ２３については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、在宅で療養を行っている悪性腫瘍の鎮痛療法若しくは化学療法を行っている患者、真皮を越える褥瘡の状態にある患者（区分番号Ｃ０１３に掲げる在宅患者訪問褥瘡管理指導料を算定する場合にあっては真皮までの状態の患者）又は人工肛門若しくは人工膀胱を造設している者で管理が困難な患者（いずれも同一建物等居住者を除く。）であって通院が困難なものに対して、診療に基づく訪問看護計画により、緩和ケア、褥瘡ケア又は人工肛門ケア及び人工膀胱ケアに係る専門の研修を受けた看護師を訪問させて、他の保険医療機関の看護師若しくは准看護師又は訪問看護ステーションの看護師若しくは准看護師と共同して同一日に看護又は療養上必要な指導を行った場合に、当該患者１人について、それぞれ月１回に限り算定する。
  - ３１及び２については、注１ただし書に規定する別に厚生労働大臣が定める疾病等の患者又は同注ただし書の規定に基づき週７日を限度として所定点数を算定する患者に対して、当該患者に対する診療を担う保険医療機関の保険医が必要と認めて、１日に２回又は３回以上訪問看護・指導を実施した場合は、難病等複数回訪問加算として、それぞれ450点又は800点を所定点数に加算する。
  - ４１及び２については、患者又はその看護に当たっている者の求めを受けた診療所又は在宅療養支援病院の保険医の指示により、保険医療機関の看護師等が緊急に訪問看護・指導を実施した場合には、緊急訪問看護加算として、次に掲げる区分に従い、１日につき、いずれかを所定点数に加算する。
      - イ月14日目まで265点
      - ロ月15日目以降200点
  - ５１及び２については、別に厚生労働大臣が定める長時間の訪問を要する者に対し、保険医療機関の看護師等が、長時間にわたる訪問看護・指導を実施した場合には、長時間訪問看護・指導加算として、週１日（別に厚生労働大臣が定める者の場合にあっては週３日）に限り、520点を所定点数に加算する。
  - ６１及び２については、６歳未満の乳幼児に対し、保険医療機関の看護師等が訪問看護・指導を実施した場合には、乳幼児加算として、１日につき140点（別に厚生労働大臣が定める者に該当する場合にあっては、180点）を所定点数に加算する。
  - ７１及び２については、同時に複数の看護師等又は看護補助者による訪問看護・指導が必要な者として別に厚生労働大臣が定める者に対して、保険医療機関の看護師等が、当該保険医療機関の他の看護師等又は看護補助者（以下この部において「その他職員」という。）と同時に訪問看護・指導を行うことについて、当該患者又はその家族等の同意を得て、訪問看護・指導を実施した場合には、複数名訪問看護・指導加算として、次に掲げる区分に従い、１日につき、いずれかを所定点数に加算する。
  ただし、イ又はロの場合にあっては週１日を、ハの場合にあっては週３日を限度として算定する。
      - イ所定点数を算定する訪問看護・指導を行う看護師等が他の保健師、助産師又は看護師と同時に訪問看護・指導を行う場合450点
      - ロ所定点数を算定する訪問看護・指導を行う看護師等が他の准看護師と同時に訪問看護・指導を行う場合380点
      - ハ所定点数を算定する訪問看護・指導を行う看護師等がその他職員と同時に訪問看護・指導を行う場合（別に厚生労働大臣が定める場合を除く。）300点
      - ニ所定点数を算定する訪問看護・指導を行う看護師等がその他職員と同時に訪問看護・指導を行う場合（別に厚生労働大臣が定める場合に限る。）
    - （１）１日に１回の場合300点
    - （２）１日に２回の場合600点
    - （３）１日に３回以上の場合1,000点
  - ８１及び２については、訪問診療を実施している保険医療機関の保健師、助産師又は看護師が、在宅で療養を行っている患者であって通院が困難なものに対して、当該患者の同意を得て、訪問診療を実施している保険医療機関を含め、歯科訪問診療を実施している保険医療機関又は訪問薬剤管理指導を実施している保険薬局と文書等により情報共有を行うとともに、共有された情報を踏まえて療養上必要な指導を行った場合に、在宅患者連携指導加算として、月１回に限り300点を所定点数に加算する。
  - ９１及び２については、保険医療機関の保健師、助産師又は看護師が、在宅で療養を行っている患者であって通院が困難なものの状態の急変等に伴い、当該患者の在宅療養を担う他の保険医療機関の保険医の求めにより、当該他の保険医療機関の保険医等、歯科訪問診療を実施している保険医療機関の保険医である歯科医師等、訪問薬剤管理指導を実施している保険薬局の保険薬剤師、介護支援専門員又は相談支援専門員と共同で、カンファレンスに参加し、それらの者と共同で療養上必要な指導を行った場合には、在宅患者緊急時等カンファレンス加算として、月２回に限り200点を所定点数に加算する。
  - 10１及び２については、在宅で死亡した患者又は特別養護老人ホームその他これに準ずる施設（以下この注において「特別養護老人ホーム等」という。）で死亡した患者に対して、保険医療機関の保険医の指示により、その死亡日及び死亡日前14日以内に、２回以上訪問看護・指導を実施し、かつ、訪問看護におけるターミナルケアに係る支援体制について患者及び家族等に対して説明した上でターミナルケアを行った場合は、在宅ターミナルケア加算として、次に掲げる区分に従い、いずれかを所定点数に加算する。
      - イ在宅で死亡した患者（ターミナルケアを行った後、24時間以内に在宅以外で死亡した患者を含む。）又は特別養護老人ホーム等で死亡した患者（ターミナルケアを行った後、24時間以内に当該特別養護老人ホーム等以外で死亡した患者を含み、指定施設サービス等に要する費用の額の算定に関する基準（平成12年厚生省告示第21号）別表の１に規定する看取り介護加算その他これに相当する加算（以下この注において「看取り介護加算等」という。）を算定しているものを除く。）2,500点
      - ロ特別養護老人ホーム等で死亡した患者（ターミナルケアを行った後、24時間以内に当該特別養護老人ホーム等以外で死亡した患者を含む。）であって、看取り介護加算等を算定しているもの1,000点
  - 11１及び２については、訪問看護・指導に関して特別な管理を必要とする患者（別に厚生労働大臣が定める状態等にある者に限る。
  以下この注において同じ。）に対して、当該患者に係る訪問看護・指導に関する計画的な管理を行った場合は、患者１人につき１回に限り、在宅移行管理加算として、250点を所定点数に加算する。
  ただし、特別な管理を必要とする患者のうち重症度等の高いものとして別に厚生労働大臣が定める状態等にあるものについては、患者１人につき１回に限り、500点を所定点数に加算する。
  - 12１及び２については、夜間（午後６時から午後10時までの時間をいう。
  以下この区分番号及び区分番号Ｃ００５－１－２において同じ。）又は早朝（午前６時から午前８時までの時間をいう。
  以下この区分番号及び区分番号Ｃ００５－１－２において同じ。）に訪問看護・指導を行った場合は、夜間・早朝訪問看護加算として210点を所定点数に加算し、深夜（午後10時から午前６時までの時間をいう。
  以下この区分番号及び区分番号Ｃ００５－１－２において同じ。）に訪問看護・指導を行った場合は、深夜訪問看護加算として420点を所定点数に加算する。
  - 13１及び２については、別に厚生労働大臣が定める者について、保険医療機関の看護師又は准看護師が、登録喀痰吸引等事業者（社会福祉士及び介護福祉士法（昭和62年法律第30号）第48条の３第１項の登録を受けた登録喀痰吸引等事業者をいう。
  以下同じ。）又は登録特定行為事業者（同法附則第27条第１項の登録を受けた登録特定行為事業者をいう。
  以下同じ。）と連携し、社会福祉士及び介護福祉士法施行規則（昭和62年厚生省令第49号）第１条各号に掲げる医師の指示の下に行われる行為（以下「喀痰吸引等」という。）が円滑に行われるよう、喀痰吸引等に関してこれらの事業者の介護の業務に従事する者に対して必要な支援を行った場合には、看護・介護職員連携強化加算として、月１回に限り250点を所定点数に加算する。
  - 14次のいずれかに該当する訪問看護・指導を行う場合、特別地域訪問看護加算として、所定点数の100分の50に相当する点数を加算する。
      - イ保険医療機関の看護師等が、最も合理的な経路及び方法による当該保険医療機関の所在地から患家までの移動にかかる時間が１時間以上である患者に対して訪問看護・指導を行い、次のいずれかに該当する場合
    - （１）別に厚生労働大臣が定める地域に所在する保険医療機関の看護師等が訪問看護・指導を行う場合
    - （２）別に厚生労働大臣が定める地域外に所在する保険医療機関の看護師等が、別に厚生労働大臣が定める地域に居住する患者に対して訪問看護・指導を行う場合
      - ロ別に厚生労働大臣が定める地域に所在する保険医療機関の看護師等が、別に厚生労働大臣が定める地域に居住する患者に対して訪問看護・指導を行う場合であって、次のいずれにも該当する場合
    - （１）最も合理的な経路及び方法による当該保険医療機関の所在地から患家までの移動にかかる時間が30分以上である患者に訪問看護・指導を行う場合
    - （２）最も合理的な経路及び方法による当該保険医療機関の所在地から患家までの往復にかかる時間及び訪問看護・指導の実施に要した時間の合計が２時間30分以上である場合15別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関の看護師等が訪問看護・指導を実施した場合には、訪問看護・指導体制充実加算として、月１回に限り150点を所定点数に加算する。
  - 16１については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関の緩和ケア、褥瘡ケア若しくは人工肛門ケア及び人工膀胱ケアに係る専門の研修を受けた看護師又は保健師助産師看護師法（昭和23年法律第203号）第37条の２第２項第５号に規定する指定研修機関において行われる研修（以下「特定行為研修」という。）を修了した看護師が、訪問看護・指導の実施に関する計画的な管理を行った場合には、専門管理加算として、月１回に限り、次に掲げる区分に従い、いずれかを所定点数に加算する。
      - イ緩和ケア、褥瘡ケア又は人工肛門ケア及び人工膀胱ケアに係る専門の研修を受けた看護師が計画的な管理を行った場合（悪性腫瘍の鎮痛療法若しくは化学療法を行っている患者、真皮を越える褥瘡の状態にある患者（区分番号
