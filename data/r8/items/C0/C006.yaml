chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ００６在宅患者訪問リハビリテーション指導管理料（１単位）１同一建物居住者以外の場合300点
  - ２同一建物居住者の場合255点
  - 注１１については、在宅で療養を行っている患者（当該患者と同一の建物に居住する他の患者に対して当該保険医療機関が同一日に訪問リハビリテーション指導管理を行う場合の当該患者（以下この区分番号において「同一建物居住者」という。）を除く。）であって通院が困難なものに対して、２については、在宅で療養を行っている患者（同一建物居住者に限る。）であって通院が困難なものに対して、診療に基づき計画的な医学管理を継続して行い、かつ、当該診療を行った保険医療機関の理学療法士、作業療法士又は言語聴覚士を訪問させて基本的動作能力若しくは応用的動作能力又は社会的適応能力の回復を図るための訓練等について必要な指導を行わせた場合に、患者１人につき、１と２を合わせて週６単位（退院の日から起算して３月以内の患者にあっては、週12単位）に限り算定する。
  - ２保険医療機関が、診療に基づき、患者の急性増悪等により一時的に頻回の訪問リハビリテーション指導管理を行う必要性を認め、計画的な医学管理の下に、在宅で療養を行っている患者であって通院が困難なものに対して訪問リハビリテーション指導管理を行った場合は、注１の規定にかかわらず、１と２を合わせて、６月に１回に限り、当該診療の日から14日以内に行った訪問リハビリテーション指導管理については、14日を限度として１日４単位に限り、算定する。
  - ３在宅患者訪問リハビリテーション指導管理に要した交通費は、患家の負担とする。
