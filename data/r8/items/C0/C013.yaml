chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ０１３に掲げる在宅患者訪問褥瘡管理指導料を算定する場合にあっては真
  皮までの状態の患者）又は人工肛門若しくは人工膀胱を造設している者で管理が困難な患者に対して行った場合に限る。）250点
      - ロ特定行為研修を修了した看護師が計画的な管理を行った場合（保健師助産師看護師法第37条の２第２項第１号に規定する特定行為（訪問看護において専門の管理を必要とするものに限る。
  以下この部において同じ。）に係る管理の対象となる患者に対して行った場合に限る。）250点
  - 17別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関の看護師等（准看護師を除く。）が、健康保険法第３条第13項の規定による電子資格確認により、患者の診療情報を取得等した上で訪問看護・指導の実施に関する計画的な管理を行った場合には、訪問看護医療ＤＸ情報活用加算として、月１回に限り５点を所定点数に加算する。
  ただし、区分番号Ａ０００に掲げる初診料の注16、区分番号Ａ００１に掲げる再診料の注19若しくは区分番号Ａ００２に掲げる外来診療料の注10にそれぞれ規定する電子的診療情報連携体制整備加算、区分番号Ｃ００１に掲げる在宅患者訪問診療料（Ⅰ）の注13（区分番号Ｃ００１－２の注６の規定により準用する場合を含む。）若しくは区分番号Ｃ００３に掲げる在宅がん医療総合診療料の注８にそれぞれ規定する在宅医療ＤＸ情報活用加算又は区分番号Ｉ０１２に掲げる精神科訪問看護・指導料の注18に規定する訪問看護医療ＤＸ情報活用加算を算定した月は、訪問看護医療ＤＸ情報活用加算は算定できない。
  - 18別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、区分番号Ｃ００１の注８（区分番号Ｃ００１－２の注６の規定により準用する場合を含む。）に規定する死亡診断加算及び区分番号Ｃ００５の注10（区分番号Ｃ００５－１－２の注８の規定により準用する場合を含む。）に規定する在宅ターミナルケア加算を算定する患者（別に厚生労働大臣が定める地域に居住する患者に限る。）に対して、医師の指示の下、情報通信機器を用いた在宅での看取りに係る研修を受けた看護師が、情報通信機器を用いて医師の死亡診断の補助を行った場合は、遠隔死亡診断補助加算として、150点を所定点数に加算する。
  - 19別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た訪問看護・指導を実施している保険医療機関の看護師等（准看護師を除く。）が、在宅で療養を行っている患者であって通院が困難なものの同意を得て、当該保険医療機関と連携する保険医療機関の保険医、歯科訪問診療を実施している保険医療機関の保険医である歯科医師等、訪問薬剤管理指導を実施している保険薬局の保険薬剤師、管理栄養士、介護支援専門員又は相談支援専門員等であって当該患者に関わる者が電子情報処理組織を使用する方法その他の情報通信の技術を利用する方法を用いて記録した当該患者に係る診療情報等を活用した上で、訪問看護・指導の実施に関する計画的な管理を行った場合は、訪問看護医療情報連携加算として、月１回に限り、100点を所定点数に加算する。
  ただし、注８に規定する在宅患者連携指導加算を算定している場合及び区分番号Ｃ００２に掲げる在宅時医学総合管理料の注15（区分番号Ｃ００２－２の注５の規定により準用する場合を含む。）又は区分番号Ｃ００３に掲げる在宅がん医療総合診療料の注９にそれぞれ規定する在宅医療情報連携加算を算定した月は、訪問看護医療情報連携加算は算定できない。
  - 20在宅患者訪問看護・指導料を算定した場合には、区分番号Ｃ００５－１－２に掲げる同一建物居住者訪問看護・指導料又は区分番号Ｉ０１２に掲げる精神科訪問看護・指導料は、算定しない。
  - 21訪問看護・指導に要した交通費は、患家の負担とする。
