  part: 第9部 処置
  section: 第1節 処置料
raw_text: 'Ｊ０４２に掲げる腹膜灌

  流及び区分番号Ｊ４００に掲げる特定保険医療材料（区分番号Ｊ０３８に掲げる人工腎臓又は区分番号Ｊ０４２に掲げる腹膜灌流に係るものに限る。）、第10部手術、第11部麻酔、第12部放射線治療並びに第14部その他並びに除外薬剤・注射薬に係る費用を除く。）は、精神科救急・合併症入院料に含まれるものとする。

  - ３当該病棟に入院している統合失調症の患者に対して、計画的な医学管理の下に非定型抗精神病薬による治療を行い、かつ、療養上必要な指導を行った場合には、当該患者が使用した１日当たりの抗精神病薬が２種類以下の場合に限り、非定型抗精神病薬加算として、１日につき15点を所定点数に加算する。

  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者については、入院した日から起算して30日を限度として、看護職員夜間配置加算として、１日（別に厚生労働大臣が定める日を除く。）につき70点を所定点数に加算する。

  '
