raw_text: 'Ａ２２６－３有床診療所緩和ケア診療加算（１日につき）250点

  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関において、緩和ケアを要する患者に対して、必要な診療を行った場合に、当該患者について、所定点数に加算する。

  '
