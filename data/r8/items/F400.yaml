code: F400
name: 処方箋料
version: r8
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第5部 投薬
  section: 第5節 処方箋料
raw_text: |
  Ｆ４００処方箋料
  - １３種類以上の抗不安薬、３種類以上の睡眠薬、３種類以上の抗うつ薬、３種類以上の抗精神病薬又は４種類以上の抗不安薬及び睡眠薬の投薬（臨時の投薬等のもの及び３種類の抗うつ薬又は３種類の抗精神病薬を患者の病状等によりやむを得ず投与するものを除く。）を行った場合20点
  - ２１以外の場合であって、７種類以上の内服薬の投薬（臨時の投薬であって、投薬期間が２週間以内のもの及び区分番号Ａ００１に掲げる再診料の注12に掲げる地域包括診療加算を算定するものを除く。）を行った場合又は不安若しくは不眠の症状を有する患者に対して１年以上継続して別に厚生労働大臣が定める薬剤の投薬（当該症状を有する患者に対する診療を行うにつき十分な経験を有する医師が行う場合又は精神科の医師の助言を得ている場合その他これに準ずる場合を除く。）を行った場合32点
  - ３１及び２以外の場合60点
  - 注１保険薬局において調剤を受けるために処方箋を交付した場合に、交付１回につき算定する。
  - ２区分番号Ａ０００に掲げる初診料の注２又は注３、区分番号Ａ００２に掲げる外来診療料の注２又は注３を算定する保険医療機関において、別に厚生労働大臣が定める薬剤を除き、１処方につき投与期間が30日以上の投薬を行った場合（保険医療機関及び保険医療養担当規則（昭和32年厚生省令第15号）第20条第３号ロ及び高齢者の医療の確保に関する法律の規定による療養の給付等の取扱い及び担当に関する基準（昭和58年厚生省告示第14号）第20条第４号ロに規定するリフィル処方箋を交付する場合であって、当該リフィル処方箋の１回の使用による投与期間が29日以内の投薬を行った場合を除く。）には、所定点数の100分の40に相当する点数により算定する。
  - ３３歳未満の乳幼児に対して処方箋を交付した場合は、乳幼児加算として、処方箋の交付１回につき３点を所定点数に加算する。
  - ４診療所又は許可病床数が200床未満の病院である保険医療機関において、入院中の患者以外の患者（別に厚生労働大臣が定める疾患を主病とするものに限る。）に対して薬剤の処方期間が28日以上の処方（リフィル処方箋の複数回の使用による合計の処方期間が28日以上の処方を含む。）を行った場合は、特定疾患処方管理加算として、月１回に限り、１処方につき56点を所定点数に加算する。
  - ５別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関（許可病床数が200床以上の病院に限る。）において、治療の開始に当たり投薬の必要性、危険性等について文書により説明を行った上で抗悪性腫瘍剤に係る処方箋を交付した場合には、抗悪性腫瘍剤処方管理加算として、月１回に限り、処方箋の交付１回につき70点を所定点数に加算する。
  - ６別に厚生労働大臣が定める施設基準を満たす保険医療機関において、薬剤の一般的名称を記載する処方箋を交付した場合は、当該処方箋の内容に応じ、次に掲げる点数を処方箋の交付１回につきそれぞれ所定点数に加算する。
      - イ一般名処方加算１８点
      - ロ一般名処方加算２６点
  - ７抗不安薬等が処方されていた患者であって、当該処方の内容を総合的に評価及び調整し、当該患者に処方する抗不安薬等の種類数又は投薬量が減少したものについて、薬剤師に対し、薬剤の種類数又は投薬量が減少したことによる症状の変化等の確認を指示した場合に、向精神薬調整連携加算として、月１回に限り、１処方につき12点を所定点数に加算する。
  ただし、同一月において、区分番号Ａ２５０に掲げる薬剤総合評価調整加算及び区分番号Ｂ００８－２に掲げる薬剤総合評価調整管理料は別に算定できない。
  - ８１、２及び３について、直近３月に処方箋を交付した回数が一定以上である保険医療機関が、別表第三調剤報酬点数表区分番号００調剤基本料に掲げる特別調剤基本料Ａを算定する薬局であって、当該保険医療機関から集中的に処方箋を受け付けているものと不動産取引等その他の特別な関係を有する場合は、１、２又は３の所定点数に代えて、それぞれ18点、29点又は42点を算定する。
