chapter:
  chapter: 第2章 特掲診療料
  part: 第6部 注射
  section: 第1節 注射料
  subsection: 第1款 注射実施料
raw_text: 'Ｇ００３－２薬液膀胱

  内注入（１日につき）60点Ｇ００３－３肝動脈塞栓を伴う抗悪性腫瘍剤肝動脈内注入（１日につき）198点Ｇ００４点滴注射（１日につき）１６歳未満の乳幼児に対するもの（１日分の注射量が100mL以上の場合）105点

  - ２１に掲げる者以外の者に対するもの（１日分の注射量が500mL以上の場合）102点

  - ３その他の場合（入院中の患者以外の患者に限る。）53点

  - 注１点滴に係る管理に要する費用を含む。

  - ２６歳未満の乳幼児に対して行った場合は、乳幼児加算として、48点を所定点数に加算する。

  - ３血漿成分製剤の注射を行う場合であって、１回目の注射に当たって、患者に対して注射の必要性、危険性等について文書による説明を行ったときは、血漿成分製剤加算として、当該注射を行った日に限り、50点を所定点数に加算する。

  - ４区分番号Ｃ１０１に掲げる在宅自己注射指導管理料、区分番号Ｃ１０４に掲げる在宅中心静脈栄養法指導管理料、区分番号Ｃ１０８に掲げる在宅麻薬等注射指導管理料、区分番号Ｃ１０８－２に掲げる在宅腫瘍化学療法注射指導管理料、区分番号Ｃ１０８－３に掲げる在宅強心剤持続投与指導管理料又は区分番号Ｃ１０８－４に掲げる在宅悪性腫瘍患者共同指導管理料を算定している患者について、区分番号Ｃ００１に掲げる在宅患者訪問診療料（Ⅰ）又は区分番号Ｃ００１－２に掲げる在宅患者訪問診療料（Ⅱ）を算定する日に併せて行った点滴注射の費用は算定しない。

  - ５別に厚生労働大臣が定める施設基準に適合している保険医療機関において、血液製剤を無菌的に分割して投与した場合は、無菌的分割製剤作成加算として、当該行為を実施した日に限り、400点を所定点数に加算する。

  '
