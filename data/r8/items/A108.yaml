points: null
unit: 日
chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第1節 入院基本料
raw_text: |
  Ａ１０８有床診療所入院基本料（１日につき）１有床診療所入院基本料１
      - イ14日以内の期間1,027点
      - ロ15日以上30日以内の期間819点
      - ハ31日以上の期間710点
  - ２有床診療所入院基本料２
      - イ14日以内の期間930点
      - ロ15日以上30日以内の期間722点
      - ハ31日以上の期間661点
  - ３有床診療所入院基本料３
      - イ14日以内の期間711点
      - ロ15日以上30日以内の期間673点
      - ハ31日以上の期間639点
  - ４有床診療所入院基本料４
      - イ14日以内の期間933点
      - ロ15日以上30日以内の期間747点
      - ハ31日以上の期間647点
  - ５有床診療所入院基本料５
      - イ14日以内の期間845点
      - ロ15日以上30日以内の期間659点
      - ハ31日以上の期間604点
  - ６有床診療所入院基本料６
      - イ14日以内の期間648点
      - ロ15日以上30日以内の期間614点
      - ハ31日以上の期間585点
  - 注１有床診療所（療養病床に係るものを除く。）であって、看護配置その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関に入院している患者について、当該基準に係る区分に従い、それぞれ所定点数を算定する。
  - ２当該患者が他の保険医療機関から転院してきた者であって、当該他の保険医療機関において区分番号Ａ２４６に掲げる入退院支援加算３を算定したものである場合には、重症児（者）受入連携加算として、入院初日に限り2,000点を所定点数に加算する。
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関に入院している患者のうち、急性期医療を担う他の保険医療機関の一般病棟から転院した患者については、転院した日から起算して21日を限度として、有床診療所急性期患者支援病床初期加算として、１日につき150点を所定点数に加算し、介護老人保健施設、介護医療院、特別養護老人ホーム、軽費老人ホーム、有料老人ホーム等又は自宅から入院した患者については、治療方針に関する当該患者又はその家族等の意思決定に対する支援を行った場合に、入院した日から起算して21日を限度として、有床診療所在宅患者支援病床初期加算として、１日につき300点を所定点数に加算する。
  - ４夜間の緊急体制確保につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関に入院している患者については、夜間緊急体制確保加算として、１日につき15点を所定点数に加算する。
  - ５医師配置等につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関に入院している患者については、当該基準に係る区分に従い、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
      - イ医師配置加算１120点
      - ロ医師配置加算２90点
  - ６看護配置等につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関に入院している患者については、当該基準に係る区分に従い、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
      - イ看護配置加算１60点
      - ロ看護配置加算２35点
      - ハ夜間看護配置加算１105点
      - ニ夜間看護配置加算２55点
      - ホ看護補助配置加算１25点
      - ヘ看護補助配置加算２15点
  - ７別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関において、入院している患者を、当該入院の日から30日以内に看取った場合には、看取り加算として、1,000点（在宅療養支援診療所（区分番号Ｂ００４に掲げる退院時共同指導料１に規定する在宅療養支援診療所をいう。）にあっては、2,000点）を所定点数に加算する。
  - ８当該診療所においては、第２節の各区分に掲げる入院基本料等加算のうち、次に掲げる加算について、同節に規定する算定要件を満たす場合に算定できる。
      - イ救急医療管理加算
      - ロ超急性期脳卒中加算
      - ハ妊産婦緊急搬送入院加算
      - ニ在宅患者緊急入院診療加算
      - ホ診療録管理体制加算
      - ヘ医師事務作業補助体制加算（50対１補助体制加算、75対１補助体制加算又は100対１補助体制加算に限る。）
      - ト電子的診療情報連携体制整備加算
      - チ乳幼児加算・幼児加算
      - リ特定感染症入院医療管理加算
      - ヌ難病等特別入院診療加算（難病患者等入院診療加算に限る。）
      - ル特殊疾患入院施設管理加算
      - ヲ超重症児（者）入院診療加算・準超重症児（者）入院診療加算
      - ワ地域加算
      - カ離島加算
      - ヨＨＩＶ感染者療養環境特別加算
      - タ特定感染症患者療養環境特別加算
      - レ特定薬剤治療環境特別加算
      - ソ小児療養環境特別加算
      - ツ産科管理加算（２に限る。）
      - ネ無菌治療室管理加算
      - ナ放射線治療病室管理加算
      - ラ重症皮膚潰瘍管理加算
      - ム有床診療所緩和ケア診療加算
  - ウ口腔管理連携加算
  - ヰ医療安全対策加算
  - ノ感染対策向上加算
  - オ患者サポート体制充実加算
  - ク報告書管理体制加算
  - ヤハイリスク妊娠管理加算
  - マハイリスク分娩等管理加算（地域連携分娩管理加算に限る。）
  - ケ地域支援・医薬品供給対応体制加算
  - フバイオ後続品使用体制加算
  - コ入退院支援加算（１のイ又は２のイに限る。）
  - エ医療的ケア児（者）入院前支援加算
  - テ薬剤総合評価調整加算
  - ア排尿自立支援加算
  - サ協力対象施設入所者入院加算９別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関については、注１から注８までの規定にかかわらず、当該保険医療機関に入院している患者について、区分番号Ａ１０９に掲げる有床診療所療養病床入院基本料の例により算定できる。
  - 10栄養管理体制その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関に入院している患者について、栄養管理実施加算として、１日につき12点を所定点数に加算する。
  この場合において、区分番号Ｂ００１の10に掲げる入院栄養食事指導料は、算定できない。
  - 11１から３までを算定する診療所である保険医療機関であって、別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出たものに入院している患者については、有床診療所在宅復帰機能強化加算として、入院日から起算して15日以降に１日につき20点を所定点数に加算する。
  - 12１から３までを算定する診療所である保険医療機関であって、別に厚生労働大臣が定める施設基準を満たすものに入院している患者のうち、介護保険法施行令（平成10年政令第412号）第２条各号に規定する疾病を有する40歳以上65歳未満のもの又は65歳以上のもの又は重度の肢体不自由児（者）については、当該基準に係る区分に従い、入院日から起算して15日以降30日までの期間に限り、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
      - イ介護障害連携加算１192点
      - ロ介護障害連携加算２38点Ａ１０９有床診療所療養病床入院基本料（１日につき）１入院基本料Ａ1,131点（生活療養を受ける場合にあっては、1,116点）２入院基本料Ｂ1,018点（生活療養を受ける場合にあっては、1,002点）３入院基本料Ｃ899点（生活療養を受ける場合にあっては、884点）４入院基本料Ｄ723点（生活療養を受ける場合にあっては、708点）５入院基本料Ｅ633点（生活療養を受ける場合にあっては、618点）注１有床診療所（療養病床に係るものに限る。）であって、看護配置その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関に入院している患者について、当該患者の疾患、状態、ＡＤＬ等について別に厚生労働大臣が定める区分に従い、当該患者ごとにそれぞれ所定点数を算定する。
  ただし、注３のただし書に該当する場合には、入院基本料Ｅを算定する。
  - ２注１に規定する有床診療所以外の療養病床を有する有床診療所については、当分の間、地方厚生局長等に届け出た場合に限り、当該有床診療所に入院している患者について、特別入院基本料として、528点（生活療養を受ける場合にあっては、513点）を算定できる。
  - ３有床診療所療養病床入院基本料を算定している患者に対して行った第３部検査、第５部投薬、第６部注射及び第13部病理診断並びに第４部画像診断及び第９部処置のうち別に厚生労働大臣が定める画像診断及び処置の費用（フィルムの費用を含み、除外薬剤・注射薬の費用を除く。）は、当該入院基本料に含まれるものとする。
  ただし、患者の急性増悪により、同一の保険医療機関の療養病床以外へ転室又は別の保険医療機関の一般病棟若しくは有床診療所の療養病床以外の病室へ転院する場合には、その日から起算して３日前までの当該費用については、この限りでない。
  - ４入院患者が別に厚生労働大臣が定める状態にあり、必要な褥瘡対策を行った場合は、患者の褥瘡の状態に応じて、１日につき次に掲げる点数を所定点数に加算する。
      - イ褥瘡対策加算１15点
      - ロ褥瘡対策加算２５点
  - ５当該患者が他の保険医療機関から転院してきた者であって、当該他の保険医療機関において区分番号Ａ２４６に掲げる入退院支援加算３を算定したものである場合には、重症児（者）受入連携加算として、入院初日に限り2,000点を所定点数に加算する。
  - ６別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関に入院している患者のうち、急性期医療を担う他の保険医療機関の一般病棟から転院した患者については、転院した日から起算して21日を限度として、有床診療所急性期患者支援療養病床初期加算として、１日につき300点を所定点数に加算し、介護老人保健施設、介護医療院、特別養護老人ホーム、軽費老人ホーム、有料老人ホーム等又は自宅から入院した患者については、治療方針に関する当該患者又はその家族等の意思決定に対する支援を行った場合に、入院した日から起算して21日を限度として、有床診療所在宅患者支援療養病床初期加算として、１日につき350点を所定点数に加算する。
  - ７別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関において、入院している患者を、当該入院の日から30日以内に看取った場合には、看取り加算として、1,000点（在宅療養支援診療所（区分番号Ｂ００４に掲げる退院時共同指導料１に規定する在宅療養支援診療所をいう。）にあっては、2,000点）を所定点数に加算する。
  - ８当該診療所においては、第２節の各区分に掲げる入院基本料等加算のうち、次に掲げる加算について、同節に規定する算定要件を満たす場合に算定できる。
      - イ在宅患者緊急入院診療加算
      - ロ診療録管理体制加算
      - ハ医師事務作業補助体制加算（50対１補助体制加算、75対１補助体制加算又は100対１補助体制加算に限る。）
      - ニ電子的診療情報連携体制整備加算
      - ホ乳幼児加算・幼児加算
      - ヘ超重症児（者）入院診療加算・準超重症児（者）入院診療加算
      - ト地域加算
      - チ離島加算
      - リＨＩＶ感染者療養環境特別加算
      - ヌ診療所療養病床療養環境加算
      - ル診療所療養病床療養環境改善加算
      - ヲ重症皮膚潰瘍管理加算
      - ワ有床診療所緩和ケア診療加算
      - カ口腔管理連携加算
      - ヨ医療安全対策加算
      - タ感染対策向上加算
      - レ患者サポート体制充実加算
      - ソ報告書管理体制加算
      - ツ身体的拘束最小化推進体制加算
      - ネ入退院支援加算（１のハ又は２のロに限る。）
      - ナ医療的ケア児（者）入院前支援加算
      - ラ薬剤総合評価調整加算
      - ム排尿自立支援加算
  - ウ協力対象施設入所者入院加算９別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関については、注１から注８までの規定にかかわらず、当該保険医療機関に入院している患者について、区分番号Ａ１０８に掲げる有床診療所入院基本料の例により算定できる。
  - 10栄養管理体制その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た診療所である保険医療機関に入院している患者について、栄養管理実施加算として、１日につき12点を所定点数に加算する。
  この場合において、区分番号Ｂ００１の10に掲げる入院栄養食事指導料は、算定できない。
  - 11有床診療所療養病床入院基本料を算定する診療所である保険医療機関であって、別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出たものに入院している患者については、有床診療所療養病床在宅復帰機能強化加算として、１日につき10点を所定点数に加算する。
  - 12有床診療所療養病床入院基本料を算定する診療所である保険医療機関に入院している患者のうち、当該保険医療機関において、区分番号Ｊ０３８に掲げる人工腎臓、Ｊ０３８－２に掲げる持続緩徐式血液濾過、Ｊ０３９に掲げる血漿交換療法又はＪ０４２に掲げる腹膜灌流を行っている患者については、慢性維持透析管理加算として、１日につき100点を所定点数に加算する。
