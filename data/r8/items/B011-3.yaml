  section: 第1節 医学管理料等
raw_text: 'Ｂ０１１－３薬剤情報提供料４点

  - 注１入院中の患者以外の患者に対して、処方した薬剤の名称、用法、用量、効能、効果、副作用及び相互作用に関する主な情報を文書により提供した場合に、月１回に限り（処方の内容に変更があった場合は、その都度）算定する。

  - ２注１の場合において、処方した薬剤の名称を当該患者の求めに応じて患者の薬剤服用歴等を経時的に記録する手帳（以下単に「手帳」という。）に記載した場合には、手帳記載加算として、３点を所定点数に加算する。

  - ３保険薬局において調剤を受けるために処方箋を交付した患者については、算定しない。

  '
