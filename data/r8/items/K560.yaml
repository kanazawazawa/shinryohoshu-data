raw_text: "Ｋ５６０大動脈瘤\n切除術（吻合又は移植を含む。）１上行大動脈\n    - イ大動脈弁置換術又は形成術を伴うもの114,510点\n    - ロ人工弁置換術を伴う大動脈基部置換術128,820点\n    - ハ自己弁温存型大動脈基部置換術166,720点\n\
  \    - ニその他のもの100,200点\n- ２弓部大動脈114,510点\n- ３上行大動脈及び弓部大動脈の同時手術\n    - イ大動脈弁置換術又は形成術を伴うもの187,370点\n    - ロ人工弁置換術を伴う大動脈基部置換術210,790点\n\
  \    - ハ自己弁温存型大動脈基部置換術243,580点\n    - ニその他のもの171,760点\n- ４下行大動脈89,250点\n- ５胸腹部大動脈249,750点\n- ６腹部大動脈（分枝血管の再建を伴うもの）59,080点\n\
  - ７腹部大動脈（その他のもの）52,000点\n- 注１過去に心臓弁手術を行ったものに対して弁手術を行った場合には、心臓弁再置換術加算として、所定点数に区分番号Ｋ５５５弁置換術の所定点数の100分の50に相当する点数を加算する。\n- ２有茎大網充填術を併せて行った場合には、大網充填術加算として、17,130点を所定点数に加算する。\n"
