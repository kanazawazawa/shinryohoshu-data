name: 在宅患者訪問薬剤管理指導料
version: r8
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ００８在宅患者訪問薬剤管理指導料
  - １単一建物診療患者が１人の場合650点
  - ２単一建物診療患者が２人以上９人以下の場合320点
  - ３１及び２以外の場合290点
  - 注１在宅で療養を行っている患者であって通院が困難なものに対して、診療に基づき計画的な医学管理を継続して行い、かつ、薬剤師が訪問して薬学的管理指導を行った場合に、単一建物診療患者（当該患者が居住する建物に居住する者のうち、当該保険医療機関の薬剤師が訪問し薬学的管理指導を行っているものをいう。）の人数に従い、患者１人につき月４回（末期の悪性腫瘍の患者及び中心静脈栄養法の対象患者については、週２回かつ月８回）に限り算定する。
  この場合において、１から３までを合わせて薬剤師１人につき週40回に限り算定できる。
  - ２麻薬の投薬が行われている患者に対して、麻薬の使用に関し、その服用及び保管の状況、副作用の有無等について患者に確認し、必要な薬学的管理指導を行った場合は、１回につき100点を所定点数に加算する。
  - ３在宅患者訪問薬剤管理指導に要した交通費は、患家の負担とする。
  - ４６歳未満の乳幼児に対して、薬剤師が訪問して薬学的管理指導を行った場合には、乳幼児加算として、100点を所定点数に加算する。
