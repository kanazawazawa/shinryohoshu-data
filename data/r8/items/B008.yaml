  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: 'Ｂ００８薬剤管理指導料

  - １特に安全管理が必要な医薬品が投薬又は注射されている患者の場合380点

  - ２１の患者以外の患者の場合325点

  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者のうち、１については別に厚生労働大臣が定める患者に対して、２についてはそれ以外の患者に対して、それぞれ投薬又は注射及び薬学的管理指導を行った場合は、当該患者に係る区分に従い、患者１人につき週１回かつ月４回に限り算定する。

  - ２麻薬の投薬又は注射が行われている患者に対して、麻薬の使用に関し、必要な薬学的管理指導を行った場合は、麻薬管理指導加算として、１回につき50点を所定点数に加算する。

  '
