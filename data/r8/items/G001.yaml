raw_text: 'Ｇ００１静脈内注射（１回につき）37点

  - 注１入院中の患者以外の患者に対して行った場合に算定する。

  - ２６歳未満の乳幼児に対して行った場合は、乳幼児加算として、52点を所定点数に加算する。

  - ３区分番号Ｃ１０１に掲げる在宅自己注射指導管理料、区分番号Ｃ１０４に掲げる在宅中心静脈栄養法指導管理料、区分番号Ｃ１０８に掲げる在宅麻薬等注射指導管理料、区分番号Ｃ１０８－２に掲げる在宅腫瘍化学療法注射指導管理料、区分番号Ｃ１０８－３に掲げる在宅強心剤持続投与指導管理料又は区分番号Ｃ１０８－４に掲げる在宅悪性腫瘍患者共同指導管理料を算定している患者について、区分番号Ｃ００１に掲げる在宅患者訪問診療料（Ⅰ）又は区分番号Ｃ００１－２に掲げる在宅患者訪問診療料（Ⅱ）を算定する日に併せて行った静脈内注射の費用は算定しない。

  '
