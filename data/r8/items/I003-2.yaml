  part: 第8部 精神科専門療法
  section: 第2節 薬剤料
raw_text: 'Ｉ００３－２認知療法・認知行動療法（１日につき）１医師による場合480点

  - ２医師及び看護師が共同して行う場合350点

  - ３公認心理師による心理支援を伴う場合330点

  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、入院中の患者以外の患者について、認知療法・認知行動療法に習熟した医師が、一連の治療に関する計画を作成し、患者に説明を行った上で、医師若しくは看護師が認知療法・認知行動療法を行った場合又は公認心理師が認知行動療法的アプローチに基づく心理支援を行った場合に、一連の治療について16回に限り算定する。

  - ２精神科を標榜する保険医療機関以外の保険医療機関においても算定できるものとする。

  - ３診療に要した時間が30分を超えたときに限り算定する。

  - ４認知療法・認知行動療法と同一日に行う他の精神科専門療法は、所定点数に含まれるものとする。

  '
