chapter:
  chapter: 第2章 特掲診療料
  part: 第9部 処置
  section: 第1節 処置料
raw_text: |
  Ｊ０４５人工呼吸
  - １30分までの場合302点
  - ２30分を超えて５時間までの場合302点に30分又はその端数を増すごとに50点を加算して得た点数３５時間を超えた場合（１日につき）
      - イ14日目まで1,140点
      - ロ15日目以降815点
  - 注１使用した精製水の費用及び人工呼吸と同時に行う呼吸心拍監視、経皮的動脈血酸素飽和度測定若しくは非観血的連続血圧測定又は喀痰吸引若しくは酸素吸入の費用は、所定点数に含まれるものとする。
  - ２区分番号Ｃ１０７に掲げる在宅人工呼吸指導管理料を算定している患者に対して行った人工呼吸の費用は算定しない。
  - ３気管挿管が行われている患者に対して、意識状態に係る評価を行った場合は、覚醒試験加算として、当該治療の開始日から起算して14日を限度として、１日につき100点を所定点数に加算する。
  - ４注３の場合において、当該患者に対して人工呼吸器からの離脱のために必要な評価を行った場合は、離脱試験加算として、１日につき60点を更に所定点数に加算する。
  - ５３のイについては、別に厚生労働大臣が定める患者に対して、連続した12時間以上の腹臥位療法を行った場合に、腹臥位療法加算として、１回につき900点を所定点数に加算する。
