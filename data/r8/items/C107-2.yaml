  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第2節 在宅療養指導管理料
  subsection: 第1款 在宅療養指導管理料
raw_text: 'Ｃ１０７－２在宅持続陽圧呼吸療法指導管理料

  - １在宅持続陽圧呼吸療法指導管理料１2,250点

  - ２在宅持続陽圧呼吸療法指導管理料２240点

  - 注１在宅持続陽圧呼吸療法を行っている入院中の患者以外の患者に対して、在宅持続陽圧呼吸療法に関する指導管理を行った場合に算定する。

  - ２２について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関は、持続陽圧呼吸療法充実管理体制加算として15点を所定点数に加算する。

  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、２を算定し、ＣＰＡＰを用いている患者について、前回受診月の翌月から今回受診月の前月までの期間、遠隔モニタリングを用いて療養上必要な管理を行った場合は、遠隔モニタリング加算として、150点に当該期間の月数（当該管理を行った月に限り、２月を限度とする。）を乗じて得た点数を、所定点数に加算する。

  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、在宅持続陽圧呼吸療法指導管理料２を算定すべき指導管理を情報通信機器を用いて行った場合は、２の所定点数に代えて、218点を算定する。

  '
