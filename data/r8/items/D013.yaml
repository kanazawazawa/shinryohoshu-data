  part: 第3部 検査
  section: 第1節 検体検査料
  subsection: 第1款 検体検査実施料
raw_text: "Ｄ０１３肝炎ウイルス関連検査\n- １ＨＢｓ抗原定性・半定量29点\n- ２ＨＢｓ抗体定性、ＨＢｓ抗体半定量32点\n- ３ＨＢｓ抗原、ＨＢｓ抗体88点\n- ４ＨＢｅ抗原、ＨＢｅ抗体98点\n- ５ＨＣＶ抗体定性・定量、ＨＣＶコア蛋白、ＨＣＶ抗体・ＨＣＶコア蛋白同時検出定性102点\n\
  - ６ＨＢｃ抗体半定量・定量130点\n- ７ＨＣＶコア抗体143点\n- ８ＨＡ－ＩｇＭ抗体、ＨＡ抗体、ＨＢｃ－ＩｇＭ抗体146点\n- ９ＨＣＶ構造蛋白及び非構造蛋白抗体定性、ＨＣＶ構造蛋白及び非構造蛋白抗体半定量160点\n- 10ＨＥ－ＩｇＡ抗体定性210点\n\
  - 11ＨＣＶ血清群別判定215点\n- 12ＨＢＶコア関連抗原（ＨＢｃｒＡｇ）246点\n- 13デルタ肝炎ウイルス抗体330点\n- 14ＨＣＶ特異抗体価、ＨＢＶジェノタイプ判定340点\n- 注患者から１回に採取した血液を用いて本区分の３から14までに掲げる検査を３項目以上行った場合は、所定点数にかかわらず、検査の項目数に応じて次に掲げる点数により算定する。\n\
  \    - イ３項目290点\n    - ロ４項目360点\n    - ハ５項目以上425点\n"
