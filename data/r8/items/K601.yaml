raw_text: 'Ｋ６０１人工心肺（１日につき）１初日30,150点

  - ２２日目以降3,000点

  - 注１初日に、補助循環、選択的冠灌流又は逆行性冠灌流を併せて行った場合には、4,800点を所定点数に加算する（主たるもののみを算定する。）。

  - ２初日に選択的脳灌流を併せて行った場合は、7,000点を所定点数に加算する。

  - ３カニュレーション料は、所定点数に含まれるものとする。

  '
