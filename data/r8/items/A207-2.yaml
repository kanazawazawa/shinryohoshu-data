raw_text: "Ａ２０７－２医師事務作業補助体制加算（入院初日）１医師事務作業補助体制加算１\n    - イ15対１補助体制加算1,070点\n    - ロ20対１補助体制加算855点\n    - ハ25対１補助体制加算725点\n\
  \    - ニ30対１補助体制加算630点\n    - ホ40対１補助体制加算530点\n    - ヘ50対１補助体制加算450点\n    - ト75対１補助体制加算370点\n    - チ100対１補助体制加算320点\n- ２医師事務作業補助体制加算２\n\
  \    - イ15対１補助体制加算995点\n    - ロ20対１補助体制加算790点\n    - ハ25対１補助体制加算665点\n    - ニ30対１補助体制加算580点\n    - ホ40対１補助体制加算495点\n   \
  \ - ヘ50対１補助体制加算415点\n    - ト75対１補助体制加算335点\n    - チ100対１補助体制加算280点\n- 注勤務医の負担の軽減及び処遇の改善を図るための医師事務作業の補助の体制その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、医師事務作業補助体制加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、入院初日に限り所定点数に加算する。\n"
