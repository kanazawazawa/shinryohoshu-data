raw_text: 'Ｄ０１５血漿蛋白免疫学的検査

  - １Ｃ反応性蛋白（ＣＲＰ）定性、Ｃ反応性蛋白（ＣＲＰ）16点

  - ２赤血球コプロポルフィリン定性、グルコース－６－ホスファターゼ（Ｇ－６－Ｐase）30点

  - ３グルコース－６－リン酸デヒドロゲナーゼ（Ｇ－６－ＰＤ）定性、赤血球プロトポルフィリン定性34点

  - ４血清補体価（ＣＨ50）、免疫グロブリン38点

  - ５クリオグロブリン定性、クリオグロブリン定量42点

  - ６血清アミロイドＡ蛋白（ＳＡＡ）47点

  - ７トランスフェリン（Ｔｆ）60点

  - ８Ｃ３、Ｃ４70点

  - ９セルロプラスミン90点

  - 10β２－マイクログロブリン98点

  - 11非特異的ＩｇＥ半定量、非特異的ＩｇＥ定量100点

  - 12トランスサイレチン（プレアルブミン）101点

  - 13特異的ＩｇＥ半定量・定量110点

  - 注特異的ＩｇＥ半定量・定量検査は、特異抗原の種類ごとに所定点数を算定する。

  ただし、患者から１回に採取した血液を用いて検査を行った場合は、1,430点を限度として算定する。

  - 14α１－マイクログロブリン、ハプトグロビン（型補正を含む。）、レチノール結合蛋白（ＲＢＰ）129点

  - 15Ｃ３プロアクチベータ160点

  - 16免疫電気泳動法（抗ヒト全血清）、インターロイキン－６（ＩＬ－６）170点

  - 17ＴＡＲＣ179点

  - 18ヘモペキシン180点

  - 19ＡＰＲスコア定性191点

  - 20アトピー鑑別試験定性194点

  - 21ＢｅｎｃｅＪｏｎｅｓ蛋白同定（尿）201点

  - 22癌胎児性フィブロネクチン定性（頸管膣分泌液）204点

  - 23免疫電気泳動法（特異抗血清）218点

  - 24Ｃ１インアクチベータ253点

  - 25ＳＣＣＡ２300点

  - 26免疫グロブリンＬ鎖κ／λ比330点

  - 27インターフェロン－λ３（ＩＦＮ－λ３）、ｓＦｌｔ－１／ＰｌＧＦ比340点

  - 28免疫グロブリン遊離Ｌ鎖κ／λ比388点

  - 29結核菌特異的インターフェロン－γ産生能593点

  - 30免疫固定法（抗悪性腫瘍剤に対する特異的抗体を用いた場合）776点

  - 31コンシズマブ12,850点

  '
