raw_text: 'Ｅ１００シンチグラム（画像を伴うもの）１部分（静態）（一連につき）1,300点

  - ２部分（動態）（一連につき）1,800点

  - ３全身（一連につき）2,200点

  - 注１同一のラジオアイソトープを使用して数部位又は数回にわたってシンチグラム検査を行った場合においても、一連として扱い、主たる点数をもって算定する。

  - ２甲状腺シンチグラム検査に当たって、甲状腺ラジオアイソトープ摂取率を測定した場合は、甲状腺ラジオアイソトープ摂取率測定加算として、100点を所定点数に加算する。

  - ３新生児、３歳未満の乳幼児（新生児を除く。）又は３歳以上６歳未満の幼児に対してシンチグラムを行った場合は、新生児加算、乳幼児加算又は幼児加算として、当該シンチグラムの所定点数にそれぞれ所定点数の100分の80、100分の50又は100分の30に相当する点数を加算する。

  - ４ラジオアイソトープの注入手技料は、所定点数に含まれるものとする。

  '
