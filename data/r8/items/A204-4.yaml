raw_text: 'Ａ２０４－４包括期充実体制加算（１日につき）80点

  - 注在宅医療並びに介護老人保健施設、介護医療院及び特別養護老人ホームの後方支援を担う体制その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第３節の特定入院料のうち、包括期充実体制加算を算定できるものを現に算定している患者に限る。）について、入院した日から起算して14日を限度として所定点数に加算する。

  '
