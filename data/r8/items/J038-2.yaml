  part: 第9部 処置
  section: 第1節 処置料
raw_text: |
  Ｊ０３８－２持続緩徐式血液濾
  過（１日につき）1,990点
  - 注１入院中の患者以外の患者に対して、午後５時以降に開始した場合若しくは午後９時以降に終了した場合又は休日に行った場合は、時間外・休日加算として、300点を所定点数に加算する。
  - ２著しく持続緩徐式血液濾過が困難な障害者等に対して行った場合は、障害者等加算として、１日につき120点を加算する。
  - ３持続緩徐式血液濾過を夜間に開始し、午前０時以降に終了した場合は、１日として算定する。
  - ４区分番号Ｊ０３８に掲げる人工腎臓の実施回数と併せて１月に14回に限り算定する。
  ただし、区分番号Ｊ０３８に掲げる人工腎臓の注８に規定する別に厚生労働大臣が定める患者にあってはこの限りでない。
