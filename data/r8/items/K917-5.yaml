raw_text: "Ｋ９１７－５精子凍結保存管理料\n- １精子凍結保存管理料（導入時）\n    - イ精巣内精子採取術で採取された精子を凍結する場合1,500点\n    - ロイ以外の場合1,000点\n- ２精子凍結保存維持管理料700点\n\
  - 注１については、精子の凍結保存を開始した場合に算定し、２については、精子の凍結保存の開始から１年を経過している場合であって、凍結精子の保存に係る維持管理を行った場合に、１年に１回に限り算定する。\n"
