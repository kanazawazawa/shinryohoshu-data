name: 痔核嵌
version: r8
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第9部 処置
  section: 第1節 処置料
raw_text: "Ｊ０３７痔核嵌\n頓整復法（脱肛を含む。）290点Ｊ０３８人工腎臓（１日につき）１慢性維持透析を行った場合１\n    - イ４時間未満の場合1,856点\n    - ロ４時間以上５時間未満の場合2,016点\n   \
  \ - ハ５時間以上の場合2,151点\n- ２慢性維持透析を行った場合２\n    - イ４時間未満の場合1,816点\n    - ロ４時間以上５時間未満の場合1,976点\n    - ハ５時間以上の場合2,106点\n- ３慢性維持透析を行った場合３\n\
  \    - イ４時間未満の場合1,776点\n    - ロ４時間以上５時間未満の場合1,931点\n    - ハ５時間以上の場合2,061点\n- ４その他の場合1,560点\n- 注１入院中の患者以外の患者に対して、午後５時以降に開始した場合若しくは午後９時以降に終了した場合又は休日に行った場合は、時間外・休日加算として、380点を所定点数に加算する。\n\
  - ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行った場合には、導入期加算として、導入期１月に限り１日につき、当該基準に係る区分に従い、次に掲げる点数を所定点数に加算する。\n  \
  \  - イ導入期加算１200点\n    - ロ導入期加算２410点\n    - ハ導入期加算３810点\n- ３著しく人工腎臓が困難な障害者等に対して行った場合は、障害者等加算として、１日につき140点を加算する。\n- ４カニュレーション料を含むものとする。\n\
  - ５区分番号Ｃ１０２に掲げる在宅自己腹膜灌流指導管理料又は区分番号Ｃ１０２－２に掲げる在宅血液透析指導管理料を算定している患者に対して行った場合には、週１回（在宅自己腹膜灌流指導管理料を算定している患者にあっては、区分番号Ｊ０４２に掲げる腹膜灌流（１に限る。）の実施回数と併せて週１回）に限り算定する。\n\
  - ６１から３までの場合にあっては、透析液、血液凝固阻止剤、生理食塩水及び別に厚生労働大臣が定める薬剤の費用は所定点数に含まれるものとする。\n- ７人工腎臓を夜間に開始し、午前０時以降に終了した場合は、１日として算定する。\n- ８区分番号Ｊ０３８－２に掲げる持続緩徐式血液濾過の実施回数と併せて１月に14回に限り算定する。\n\
  ただし、別に厚生労働大臣が定める患者にあってはこの限りでない。\n- ９別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行った場合には、透析液水質確保加算として、所定点数に10点を加算する。\n\
  - 10別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、人工腎臓を実施している患者に係る下肢末梢動脈疾患の重症度等を評価し、療養上必要な指導管理を行った場合には、下肢末梢動脈疾患指導管理加算として、月１回に限り所定点数に100点を加算する。\n\
  - 11通常の人工腎臓では管理が困難な兆候を有する患者に対して、６時間以上の人工腎臓を行った場合には、長時間加算として、１回につき150点を加算する。\n- 12１及び２については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行った場合には、当該基準に係る区分に従い、それぞれ所定点数を算定する。\n\
  - 13１から３までについては、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において慢性維持透析濾過（複雑なものに限る。）を行った場合には、慢性維持透析濾過加算として、所定点数に50点を加算する。\n\
  - 14人工腎臓を実施している患者に対して、医師、看護師、理学療法士又は作業療法士が、療養上必要な訓練等について指導を行った場合には、透析時運動指導等加算として、当該指導を開始した日から起算して90日を限度として、75点を所定点数に加算する。\n\
  - 15別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行った場合には、腎代替療法診療体制充実加算として、20点を所定点数に加算する。\n"
