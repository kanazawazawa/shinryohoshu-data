name: 手術前医学管理料
version: r8
points: 1192
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: "Ｂ００１－４手術前医学管理料1,192点\n- 注１手術前に行われる検査の結果に基づき計画的な医学管理を行う保険医療機関において、手術の実施に際して区分番号Ｌ００２に掲げる硬膜外麻酔、区分番号Ｌ００４に掲げる脊椎麻酔又は区分番号Ｌ００８に掲げる声門上器具又は気管挿管による気道確保を伴う閉鎖循環式全身麻酔を行った場合に、当該手術に係る手術料を算定した日に算定する。\n\
  - ２同一の患者につき１月以内に手術前医学管理料を算定すべき医学管理を２回以上行った場合は、第１回目の手術前医学管理に係る手術料を算定した日に１回に限り、手術前医学管理料を算定する。\n- ３手術前医学管理料を算定した同一月に区分番号Ｄ２０８に掲げる心電図検査を算定した場合には、算定の期日にかかわらず、所定点数の100分の90に相当する点数を算定する。\n\
  - ４同一の部位につき当該管理料に含まれる区分番号Ｅ００１に掲げる写真診断及び区分番号Ｅ００２に掲げる撮影と同時に２枚以上のフィルムを使用して同一の方法により撮影を行った場合における第２枚目から第５枚目までの写真診断及び撮影の費用は、それぞれの所定点数の100分の50に相当する点数で別に算定できる。\n\
  この場合において、第６枚目以後の写真診断及び撮影の費用については算定できない。\n- ５第３部検査及び第４部画像診断のうち次に掲げるもの（手術を行う前１週間以内に行ったものに限る。）は、所定点数に含まれるものとする。\nただし、当該期間において同一の検査又は画像診断を２回以上行った場合の第２回目以降のものについては、別に算定することができる。\n\
  \    - イ尿中一般物質定性半定量検査\n    - ロ血液形態・機能検査末梢血液像（自動機械法）、末梢血液像（鏡検法）及び末梢血液一般検査\n    - ハ出血・凝固検査出血時間、プロトロンビン時間（ＰＴ）及び活性化部分トロンボプラスチン時間（ＡＰＴＴ）\n\
  \    - ニ血液化学検査総ビリルビン、直接ビリルビン又は抱合型ビリルビン、総蛋白、アルブミン（ＢＣＰ改良法）、尿素窒素、クレアチニン、尿酸、アルカリホスファターゼ（ＡＬＰ）、コリンエステラーゼ（ＣｈＥ）、γ－グルタミルトランスフェラーゼ（γ－ＧＴ）、中性脂肪、ナトリウム及びクロール、カリウム、カルシウム、マグネシウム、クレアチン、グルコース、乳酸デヒドロゲナーゼ（ＬＤ）、アミラーゼ、ロイシンアミノペプチダーゼ（ＬＡＰ）、クレアチンキナーゼ（ＣＫ）、アルドラーゼ、遊離コレステロール、鉄（Ｆｅ）、血中ケトン体・糖・クロール検査（試験紙法・アンプル法・固定化酵素電極によるもの）、不飽和鉄結合能（ＵＩＢＣ）（比色法）、総鉄結合能（ＴＩＢＣ）（比色法）、リン脂質、ＨＤＬ－コレステロール、ＬＤＬ－コレステロール、無機リン及びリン酸、総コレステロール、アスパラギン酸アミノトランスフェラーゼ（ＡＳＴ）、アラニンアミノトランスフェラーゼ（ＡＬＴ）並びにイオン化カルシウム\n\
  \    - ホ感染症免疫学的検査梅毒血清反応（ＳＴＳ）定性、抗ストレプトリジンＯ（ＡＳＯ）定性、抗ストレプトリジンＯ（ＡＳＯ）半定量、抗ストレプトリジンＯ（ＡＳＯ）定量、抗ストレプトキナーゼ（ＡＳＫ）定性、抗ストレプトキナーゼ（ＡＳＫ）半定量、梅毒トレポネーマ抗体定性、ＨＩＶ－１抗体、肺炎球菌抗原定性（尿・髄液）、ヘモフィルス・インフルエンザｂ型（Ｈｉｂ）抗原定性（尿・髄液）、単純ヘルペスウイルス抗原定性、ＲＳウイルス抗原定性及び淋菌抗原定性\n\
  \    - ヘ肝炎ウイルス関連検査ＨＢｓ抗原定性・半定量、ＨＣＶ抗体定性・定量及びＨＣＶ抗体・ＨＣＶコア蛋白同時検出定性\n    - ト血漿蛋白免疫学的検査Ｃ反応性蛋白（ＣＲＰ）定性及びＣ反応性蛋白（ＣＲＰ）\n    - チ心電図検査区分番号Ｄ２０８の１に掲げるもの\n\
  \    - リ写真診断区分番号Ｅ００１の１のイに掲げるもの\n    - ヌ撮影区分番号Ｅ００２の１に掲げるもの６区分番号Ｄ０２６に掲げる血液学的検査判断料、生化学的検査（Ⅰ）判断料又は免疫学的検査判断料を算定している患者については算定しない。\n\
  - ７第１章第２部第３節に掲げる特定入院料又は区分番号Ｄ０２７に掲げる基本的検体検査判断料を算定している患者については算定しない。\n"
