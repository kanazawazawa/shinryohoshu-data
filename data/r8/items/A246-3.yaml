raw_text: 'Ａ２４６－３医療的ケア児（者）入院前支援加算1,000点

  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、当該保険医療機関の医師又は当該医師の指示を受けた看護職員が、入院前に別に厚生労働大臣が定める患者（第１節の入院基本料（特別入院基本料等を含む。）及び第３節の特定入院料のうち、医療的ケア児（者）入院前支援加算を算定できるものを現に算定している患者に限り、当該保険医療機関の入院期間が通算30日以上のものを除く。）の患家等を訪問し、患者の状態、療養生活環境及び必要な処置等を確認した上で療養支援計画を策定し、入院前又は入院した日に当該計画書を患者又はその家族等に説明し、文書により提供した場合に、保険医療機関ごとに患者１人につき１回に限り、入院初日に限り所定点数に加算する。

  - ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、医療的ケア児（者）入院前支援加算を算定すべき入院前支援を情報通信機器を用いて行った場合は、当該加算の点数に代えて、500点を所定点数に加算する。

  - ３区分番号Ａ２４６の注８に掲げる入院時支援加算は別に算定できない。

  '
