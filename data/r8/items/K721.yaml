raw_text: 'Ｋ７２１内視鏡的大腸ポリープ・粘膜切除術

  - １長径２センチメートル未満5,000点

  - ２長径２センチメートル以上7,000点

  - 注１家族性大腸腺腫症の患者に対して実施した場合は、消化管ポリポーシス加算として、年１回に限り5,000点を所定点数に加算する。

  - ２バルーン内視鏡を用いて実施した場合は、バルーン内視鏡加算として、450点を所定点数に加算する。

  - ３病変検出支援プログラムを用いて実施した場合は、病変検出支援プログラム加算として、60点を所定点数に加算する。

  '
