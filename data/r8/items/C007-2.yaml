chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: 'Ｃ００７－２介護職員等喀痰吸引等指示料240点

  - 注当該患者に対する診療を担う保険医療機関の保険医が、診療に基づき介護保険法第41条第１項に規定する指定居宅サービス事業者（同法第８条第２項に規定する訪問介護、同条第３項に規定する訪問入浴介護、同条第７項に規定する通所介護又は同条第11項に規定する特定施設入居者生活介護に係る指定を受けている者に限る。）、同法第42条の２第１項に規定する指定地域密着型サービス事業者（同法第８条第22項に規定する地域密着型介護老人福祉施設を除く。）その他別に厚生労働大臣が定める者による喀痰吸引等の必要を認め、患者の同意を得て当該患者の選定する事業者に対して介護職員等喀痰吸引等指示書を交付した場合に、患者１人につき３月に１回に限り算定する。

  '
