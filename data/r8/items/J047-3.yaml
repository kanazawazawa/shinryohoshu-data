raw_text: 'Ｊ０４７－３心不全に対する遠赤外線温熱療法（１日につき）115点

  - 注１別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。

  - ２入院中の患者であって、別に厚生労働大臣が定めるものに対して行われた場合に、治療開始日から起算して30日を限度として、週５回に限り所定点数を算定する。

  '
