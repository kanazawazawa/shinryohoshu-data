raw_text: 'Ｋ９３９－７レーザー機器加算

  - １レーザー機器加算１50点

  - ２レーザー機器加算２100点

  - ３レーザー機器加算３200点

  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、レーザー照射により手術を行った場合に算定する。

  - ２１については、区分番号Ｋ４０６（１に限る。）、Ｋ４１３（１に限る。）、Ｋ４２１（１に限る。）、Ｋ４２３（１に限る。）及びＫ４４８に掲げる手術に当たって、レーザー手術装置を使用した場合に算定する。

  - ３２については、区分番号Ｋ４１３（２に限る。）に掲げる手術に当たって、レーザー手術装置を使用した場合に算定する。

  - ４３については、区分番号Ｋ４０６（２に限る。）、Ｋ４０９、Ｋ４１１、Ｋ４２１（２に限る。）、Ｋ４２３（２に限る。）、Ｋ４５１及びＫ４５２に掲げる手術に当たって、レーザー手術装置を使用した場合に算定する。

  '
