raw_text: |
  Ｅ４００フィルム材料価格を10円で除して得た点数
  - 注１６歳未満の乳幼児に対して胸部単純撮影又は腹部単純撮影を行った場合は、材料価格に1.1を乗じて得た額を10円で除して得た点数とする。
  - ２使用したフィルムの材料価格は、別に厚生労働大臣が定める。
