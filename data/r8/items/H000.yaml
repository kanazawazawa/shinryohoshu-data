chapter:
  chapter: 第2章 特掲診療料
  part: 第7部 リハビリテーション
  section: 第1節 リハビリテーション料
raw_text: "Ｈ０００心大血管疾患リハビリテーション料\n- １心大血管疾患リハビリテーション料（Ⅰ）（１単位）\n    - イ理学療法士による場合205点\n    - ロ作業療法士による場合205点\n    - ハ医師による場合205点\n\
  \    - ニ看護師による場合205点\n    - ホ集団療法による場合205点\n- ２心大血管疾患リハビリテーション料（Ⅱ）（１単位）\n    - イ理学療法士による場合125点\n    - ロ作業療法士による場合125点\n\
  \    - ハ医師による場合125点\n    - ニ看護師による場合125点\n    - ホ集団療法による場合125点\n- 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める患者に対して個別療法又は集団療法であるリハビリテーションを行った場合に、当該基準に係る区分に従って、治療開始日から150日を限度として所定点数を算定する。\n\
  ただし、別に厚生労働大臣が定める患者について、治療を継続することにより状態の改善が期待できると医学的に判断される場合その他の別に厚生労働大臣が定める場合には、150日を超えて所定点数を算定することができる。\n- ２注１本文に規定する別に厚生労働大臣が定める患者であって入院中のものに対してリハビリテーションを行った場合は、入院した日から起算して14日を限度として、早期リハビリテーション加算として、１単位につき60点（入院した日から起算して４日目以降は１単位につき25点）を所定点数に加算する。\n\
  ただし、他の保険医療機関から転院してきた患者については、転院前の保険医療機関に入院した日を起算日とする。\n- ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、注１本文に規定する別に厚生労働大臣が定める患者であって入院中のものに対してリハビリテーションを行った場合は、発症、手術若しくは急性増悪から７日目又は治療開始日のいずれか早いものから起算して14日を限度として、初期加算として、１単位につき45点を更に所定点数に加算する。\n\
  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、注１本文に規定する別に厚生労働大臣が定める患者（入院中のものに限る。）であって、リハビリテーションを実施する日に別に厚生労働大臣が定める患者であるものに対してリハビリテーションを行った場合は、発症、手術若しくは急性増悪から７日目又は治療開始日のいずれか早いものから起算して14日を限度として、急性期リハビリテーション加算として、１単位につき50点を更に所定点数に加算する。\n\
  - ５注１本文に規定する別に厚生労働大臣が定める患者であって入院中のものに対して、休日にリハビリテーションを行った場合は、発症、手術若しくは急性増悪から７日目又は治療開始日のいずれか早いものから起算して30日目までを限度として、休日リハビリテーション加算として、１単位につき25点を所定点数に加算する。\n\
  - ６注１本文の規定にかかわらず、注１本文に規定する別に厚生労働大臣が定める患者に対して、必要があって治療開始日から150日を超えてリハビリテーションを行った場合は、１月13単位に限り算定できるものとする。\n- ７別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、当該保険医療機関における診療報酬の請求状況、診療の内容に関するデータを継続して厚生労働省に提出している場合であって、注１本文に規定する別に厚生労働大臣が定める患者であって入院中の患者以外のものに対してリハビリテーションを行った場合は、リハビリテーションデータ提出加算として、月１回に限り50点を所定点数に加算する。\n\
  - ８１及び２について、イからニまでにかかわらず、特定の患者に離床を伴わずに20分以上個別療法であるリハビリテーションを行った場合は、所定点数の100分の90に相当する点数により算定する。\nこの場合、通則第４号にかかわらず、患者１人につき１日２単位まで算定する。\n"
