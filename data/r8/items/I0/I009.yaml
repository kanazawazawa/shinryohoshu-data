code: I009
name: 精神科デイ・ケア（１日につき）１小規模なもの
version: r8
points: 590
unit: 日
chapter:
  chapter: 第2章 特掲診療料
  part: 第8部 精神科専門療法
  section: 第2節 薬剤料
raw_text: |
  Ｉ００９精神科デイ・ケア（１日につき）１小規模なもの590点
  - ２大規模なもの700点
  - 注１１については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に算定する。
  - ２２については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、疾患等に応じた診療計画を作成して行われる場合に算定する。
  - ３精神科ショート・ケア、精神科デイ・ケア、精神科ナイト・ケア又は精神科デイ・ナイト・ケアのいずれかを最初に算定した日から起算して１年を超える期間に行われる場合には、週５日を限度として算定する。
  ただし、週３日を超えて算定する場合にあっては、患者の意向を踏まえ、必要性が特に認められる場合に限る。
  - ４精神科ショート・ケア、精神科デイ・ケア、精神科ナイト・ケア又は精神科デイ・ナイト・ケアのいずれかを最初に算定した日から起算して３年を超える期間に行われる場合であって、週３日を超えて算定する場合には、長期の入院歴を有する患者を除き、当該日における点数は、所定点数の100分の90に相当する点数により算定する。
  - ５精神科ショート・ケア、精神科デイ・ケア、精神科ナイト・ケア又は精神科デイ・ナイト・ケアのいずれかを最初に算定した日から起算して１年以内の期間に行われる場合にあっては、早期加算として、50点を所定点数に加算する。
  - ６当該保険医療機関において、入院中の患者であって、退院を予定しているもの（区分番号Ｉ０１１に掲げる精神科退院指導料を算定したものに限る。）に対して、精神科デイ・ケアを行った場合には、入院中１回に限り、所定点数の100分の50に相当する点数を算定する。
  - ７精神科デイ・ケアを算定した場合は、区分番号Ｉ００８－２に掲げる精神科ショート・ケア、区分番号Ｉ０１０に掲げる精神科ナイト・ケア、区分番号Ｉ０１０－２に掲げる精神科デイ・ナイト・ケア及び区分番号Ｉ０１５に掲げる重度認知症患者デイ・ケア料は算定しない。
