unit: 日
chapter:
  chapter: 第2章 特掲診療料
  part: 第8部 精神科専門療法
  section: 第2節 薬剤料
raw_text: |
  Ｉ００２－２精神科継続外来支援・指導料（１日につき）55点
  - 注１入院中の患者以外の患者について、精神科を担当する医師が、患者又はその家族等に対して、病状、服薬状況及び副作用の有無等の確認を主とした支援を行った場合に、患者１人につき１日に１回に限り算定する。
  - ２当該患者に対して、１回の処方において、３種類以上の抗不安薬、３種類以上の睡眠薬、３種類以上の抗うつ薬又は３種類以上の抗精神病薬を投与した場合（臨時の投薬等のもの及び３種類の抗うつ薬又は３種類の抗精神病薬を患者の病状等によりやむを得ず投与するものを除く。）には、算定しない。
  - ３医師による支援と併せて、精神科を担当する医師の指示の下、保健師、看護師、作業療法士又は精神保健福祉士が、患者又はその家族等に対して、療養生活環境を整備するための支援を行った場合は、40点を所定点数に加算する。
  - ４抗精神病薬を服用している患者について、客観的な指標による当該薬剤の副作用の評価を行った場合は、特定薬剤副作用評価加算として、月１回に限り25点を所定点数に加算する。
  ただし、区分番号Ｉ００２に掲げる通院・在宅精神療法の注５に規定する加算を算定する月は、算定しない。
  - ５当該患者に対して、１回の処方において、３種類以上の抗うつ薬又は３種類以上の抗精神病薬を投与した場合（注２に規定する場合を除く。）であって、別に厚生労働大臣が定める要件を満たさない場合、所定点数の100分の50に相当する点数により算定する。
  - ６他の精神科専門療法と同一日に行う精神科継続外来支援・指導に係る費用は、他の精神科専門療法の所定点数に含まれるものとする。
