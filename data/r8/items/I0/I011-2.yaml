raw_text: |
  Ｉ０１１－２精神科退院前訪問指導料380点
  - 注１入院中の患者の円滑な退院のため、患家等を訪問し、当該患者又はその家族等に対して、退院後の療養上の指導を行った場合に、当該入院中３回（入院期間が６月を超えると見込まれる患者にあっては、当該入院中６回）に限り算定する。
  - ２保健師、看護師、作業療法士又は精神保健福祉士が共同して訪問指導を行った場合は、320点を所定点数に加算する。
  - ３注１に掲げる指導に要した交通費は、患家の負担とする。
