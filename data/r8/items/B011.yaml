raw_text: 'Ｂ０１１連携強化診療情報提供料150点

  - 注１別に厚生労働大臣が定める施設基準を満たす保険医療機関において、別に厚生労働大臣が定める基準を満たす他の保険医療機関から紹介され、又は別に厚生労働大臣が定める基準を満たす他の保険医療機関へ紹介した患者について、当該他の保険医療機関からの求めに応じて、又は当該他の保険医療機関と共同して当該患者の治療管理を継続的に行う旨の合意に基づき、患者の同意を得て、診療状況を示す文書を提供した場合（区分番号Ａ０００に掲げる初診料を算定する日を除く。

  ただし、当該保険医療機関に次回受診する日の予約を行った場合はこの限りでない。）に、提供する保険医療機関ごとに患者１人につき３月に１回に限り算定する。

  - ２注１に該当しない場合であって、別に厚生労働大臣が定める施設基準を満たす保険医療機関において、他の保険医療機関から紹介され、又は他の保険医療機関へ紹介した難病の患者に対する医療等に関する法律（平成26年法律第50号）第５条第１項に規定する指定難病の患者（当該疾病が疑われる患者を含む。

  以下この区分番号において単に「指定難病の患者」という。）又はてんかんの患者（当該疾病が疑われる患者を含む。

  以下この区分番号において同じ。）について、当該他の保険医療機関からの求めに応じて、又は当該他の保険医療機関と共同して当該患者の治療管理を継続的に行う旨の合意に基づき、患者の同意を得て、診療状況を示す文書を提供した場合（区分番号Ａ０００に掲げる初診料を算定する日を除く。

  ただし、当該保険医療機関に次回受診する日の予約を行った場合はこの限りではない。）に、提供する保険医療機関ごとに患者１人につき３月に１回に限り算定する。

  - ３注１及び注２に該当しない場合であって、他の保険医療機関（別に厚生労働大臣が定める施設基準を満たす保険医療機関に限る。

  以下この注において同じ。）から紹介され、又は他の保険医療機関へ紹介した指定難病の患者又はてんかんの患者について、当該他の保険医療機関からの求めに応じて、又は当該他の保険医療機関と共同して当該患者の治療管理を継続的に行う旨の合意に基づき、患者の同意を得て、診療状況を示す文書を提供した場合（区分番号Ａ０００に掲げる初診料を算定する日を除く。

  ただし、当該保険医療機関に次回受診する日の予約を行った場合はこの限りではない。）に、提供する保険医療機関ごとに患者１人につき３月に１回に限り算定する。

  - ４注１から注３までのいずれにも該当しない場合であって、別に厚生労働大臣が定める施設基準を満たす保険医療機関において、他の保険医療機関から紹介され、又は他の保険医療機関へ紹介した妊娠中の患者について、当該他の保険医療機関からの求めに応じて、又は当該他の保険医療機関と共同して当該患者の治療管理を継続的に行う旨の合意に基づき、患者の同意を得て、診療状況を示す文書を提供した場合（区分番号Ａ０００に掲げる初診料を算定する日を除く。

  ただし、当該保険医療機関に次回受診する日の予約を行った場合はこの限りでない。）に、提供する保険医療機関ごとに患者１人につき３月に１回に限り算定する。

  - ５注１から注４までのいずれにも該当しない場合であって、他の保険医療機関（別に厚生労働大臣が定める施設基準を満たす保険医療機関に限る。

  以下この注において同じ。）から紹介され、又は他の保険医療機関へ紹介した妊娠中の患者について、当該他の保険医療機関からの求めに応じて、又は当該他の保険医療機関と共同して当該患者の治療管理を継続的に行う旨の合意に基づき、患者の同意を得て、診療状況を示す文書を提供した場合（区分番号Ａ０００に掲げる初診料を算定する日を除く。

  ただし、当該保険医療機関に次回受診する日の予約を行った場合はこの限りでない。）に、提供する保険医療機関ごとに患者１人につき３月に１回に限り算定する。

  - ６区分番号Ｂ００９に掲げる診療情報提供料（Ⅰ）（同一の保険医療機関に対して紹介を行った場合に限る。）を算定した月は、別に算定できない。

  '
