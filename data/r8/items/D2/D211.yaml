raw_text: |
  Ｄ２１１トレッドミルによる負荷心肺機能検査、サイクルエルゴメーターによる心肺機能検査1,600点
  - 注１負荷の回数又は種類にかかわらず所定点数により算定する。
  - ２区分番号Ｄ２００に掲げるスパイログラフィー等検査又は区分番号Ｄ２０８に掲げる心電図検査であって、同一の患者につき当該検査と同一日に行われたものの費用は、所定点数に含まれるものとする。
  - ３運動療法における運動処方の作成、心・肺疾患の病態や重症度の判定、治療方針の決定又は治療効果の判定を目的として連続呼気ガス分析を行った場合には、連続呼気ガス分析加算として、520点を所定点数に加算する。
