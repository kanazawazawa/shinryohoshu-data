  part: 第3部 検査
  section: 第3節 生体検査料
raw_text: |
  Ｄ２３９筋電図検査
  - １筋電図（１肢につき（針電極にあっては１筋につき））384点
  - ２誘発筋電図（神経伝導速度測定を含む。）（１神経につき）200点
  - ３中枢神経磁気刺激による誘発筋電図（一連につき）800点
  - ４単線維筋電図（一連につき）1,500点
  - 注１２については、２神経以上に対して行う場合には、複数神経加算として、１神経を増すごとに150点を所定点数に加算する。
  ただし、加算点数は1,050点を超えないものとする。
  - ２３については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関以外の保険医療機関において行われる場合には、所定点数の100分の80に相当する点数により算定する。
  - ３４については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。
