raw_text: |
  Ｃ１１０－４在宅仙骨神経刺激療法指導管理料810点
  - 注便失禁又は過活動膀胱に対するコントロールのため植込型仙骨神経刺激装置を植え込んだ後に、患者の同意を得て、在宅において、自己による便失禁管理又は過活動膀胱管理を行っている入院中の患者以外の患者に対して、在宅便失禁管理又は在宅過活動膀胱管理に関する指導管理を行った場合に算定する。
