raw_text: "Ａ１０４特定機能病院入院基本料（１日につき）１特定機能病院Ａ入院基本料\n    - イ一般病棟の場合\n  - （１）７対１入院基本料2,146点\n  - （２）10対１入院基本料1,771点\n    - ロ結核病棟の場合\n\
  \  - （１）７対１入院基本料2,125点\n  - （２）10対１入院基本料1,757点\n  - （３）13対１入院基本料1,526点\n  - （４）15対１入院基本料1,350点\n    - ハ精神病棟の場合\n  - （１）７対１入院基本料1,851点\n\
  \  - （２）10対１入院基本料1,692点\n  - （３）13対１入院基本料1,336点\n  - （４）15対１入院基本料1,245点\n- ２特定機能病院Ｂ入院基本料\n    - イ一般病棟の場合\n  - （１）７対１入院基本料2,136点\n\
  \  - （２）10対１入院基本料1,760点\n    - ロ結核病棟の場合\n  - （１）７対１入院基本料2,115点\n  - （２）10対１入院基本料1,746点\n  - （３）13対１入院基本料1,514点\n  - （４）15対１入院基本料1,337点\n\
  \    - ハ精神病棟の場合\n  - （１）７対１入院基本料1,841点\n  - （２）10対１入院基本料1,681点\n  - （３）13対１入院基本料1,324点\n  - （４）15対１入院基本料1,232点\n- ３特定機能病院Ｃ入院基本料\n\
  \    - イ一般病棟の場合\n  - （１）７対１入院基本料2,016点\n  - （２）10対１入院基本料1,642点\n    - ロ結核病棟の場合\n  - （１）７対１入院基本料1,995点\n  - （２）10対１入院基本料1,628点\n\
  \  - （３）13対１入院基本料1,398点\n  - （４）15対１入院基本料1,223点\n    - ハ精神病棟の場合\n  - （１）７対１入院基本料1,721点\n  - （２）10対１入院基本料1,563点\n  - （３）13対１入院基本料1,208点\n\
  \  - （４）15対１入院基本料1,118点\n- 注１特定機能病院の一般病棟、結核病棟又は精神病棟であって、看護配置、看護師比率、平均在院日数その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に係る区分に従い、それぞれ所定点数を算定する。\n\
  - ２注１の規定にかかわらず、別に厚生労働大臣が定める患者については、区分番号Ａ１０２に掲げる結核病棟入院基本料の注３に規定する特別入院基本料の例により算定する。\n- ３当該病棟の入院患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n\
  \    - イ一般病棟の場合\n  - （１）14日以内の期間712点\n  - （２）15日以上30日以内の期間207点\n    - ロ結核病棟の場合\n  - （１）30日以内の期間330点\n  - （２）31日以上90日以内の期間200点\n\
  \    - ハ精神病棟の場合\n  - （１）14日以内の期間505点\n  - （２）15日以上30日以内の期間250点\n  - （３）31日以上90日以内の期間125点\n  - （４）91日以上180日以内の期間30点\n  -\
  \ （５）181日以上１年以内の期間15点\n- ４当該病棟（精神病棟に限る。）に入院している患者が別に厚生労働大臣が定めるものである場合には、入院した日から起算して１月以内の期間に限り、重度認知症加算として、１日につき300点を所定点数に加算する。\n\
  - ５当該病棟に入院している患者の重症度、医療・看護必要度（以下この表において「看護必要度」という。）につき別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た病棟に入院している患者については、当該基準に係る区分に従い、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n\
  \    - イ看護必要度加算１55点\n    - ロ看護必要度加算２45点\n    - ハ看護必要度加算３25点\n- ６退院が特定の時間帯に集中しているものとして別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める患者の退院日の入院基本料（一般病棟に限る。）は、所定点数の100分の92に相当する点数により算定する。\n\
  - ７入院日及び退院日が特定の日に集中しているものとして別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の入院基本料（一般病棟に限る。）は、所定点数の100分の92に相当する点数により算定する。\n- ８当該病棟においては、第２節の各区分に掲げる入院基本料等加算のうち、次に掲げる加算について、同節に規定する算定要件を満たす場合に算定できる。\n\
  \    - イ臨床研修病院入院診療加算\n    - ロ救急医療管理加算\n    - ハ超急性期脳卒中加算（一般病棟に限る。）\n    - ニ妊産婦緊急搬送入院加算\n    - ホ在宅患者緊急入院診療加算\n    - ヘ診療録管理体制加算\n\
  \    - ト医師事務作業補助体制加算\n    - チ急性期看護補助体制加算（一般病棟に限る。）\n    - リ看護職員夜間配置加算（一般病棟に限る。）\n    - ヌ電子的診療情報連携体制整備加算\n    - ル乳幼児加算・幼児加算\n\
  \    - ヲ特定感染症入院医療管理加算\n    - ワ難病等特別入院診療加算（二類感染症患者入院診療加算は一般病棟又は精神病棟に限る。）\n    - カ超重症児（者）入院診療加算・準超重症児（者）入院診療加算\n    - ヨ看護補助加算（一般病棟を除く。）\n\
  \    - タ地域加算\n    - レ離島加算\n    - ソ療養環境加算\n    - ツＨＩＶ感染者療養環境特別加算\n    - ネ特定感染症患者療養環境特別加算\n    - ナ特定薬剤治療環境特別加算\n    - ラ重症者等療養環境特別加算（一般病棟に限る。）\n\
  \    - ム小児療養環境特別加算（一般病棟に限る。）\n- ウ産科管理加算（一般病棟に限る。）\n- ヰ無菌治療室管理加算（一般病棟に限る。）\n- ノ放射線治療病室管理加算（一般病棟に限る。）\n- オ緩和ケア診療加算（一般病棟に限る。）\n\
  - ク小児緩和ケア診療加算（一般病棟に限る。）\n- ヤ精神科措置入院診療加算（精神病棟に限る。）\n- マ精神科応急入院施設管理加算（精神病棟に限る。）\n- ケ精神科隔離室管理加算（精神病棟に限る。）\n- フ精神病棟入院時医学管理加算（精神病棟に限る。）\n\
  - コ精神科地域移行実施加算（精神病棟に限る。）\n- エ精神科身体合併症管理加算（精神病棟に限る。）\n- テ精神科リエゾンチーム加算（一般病棟に限る。）\n- ア精神科慢性身体合併症管理加算（精神病棟に限る。）\n- サ強度行動障害入院医療管理加算（一般病棟又は精神病棟に限る。）\n\
  - キ依存症入院医療管理加算（一般病棟又は精神病棟に限る。）\n- ユ摂食障害入院医療管理加算（一般病棟又は精神病棟に限る。）\n- メがん拠点病院加算（一般病棟に限る。）\n- ミリハビリテーション・栄養・口腔連携体制加算（一般病棟に限る。）\n\
  - シ栄養サポートチーム加算\n- ヱ口腔管理連携加算\n- ヒ医療安全対策加算\n- モ感染対策向上加算\n- セ患者サポート体制充実加算\n- ス報告書管理体制加算ン褥瘡ハイリスク患者ケア加算イイハイリスク妊娠管理加算イロハイリスク分娩等管理加算（ハイリスク分娩管理加算に限る。）（一般病棟又は精神病棟に限る。）イハ呼吸ケアチーム加算（一般病棟に限る。）イニ術後疼痛管理チーム加算（一般病棟又は結核病棟に限る。）イホ地域支援・医薬品供給対応体制加算イヘバイオ後続品使用体制加算イト病棟薬剤業務実施加算（１又は２に限る。）イチデータ提出加算イリ入退院支援加算（一般病棟は１のイ、２のイ又は３に限り、結核病棟は１のハ又は２のロに限る。）イヌ精神科入退院支援加算（精神病棟に限る。）イル医療的ケア児（者）入院前支援加算（一般病棟又は結核病棟に限る。）イヲ認知症ケア加算（一般病棟又は結核病棟に限る。）イワせん妄ハイリスク患者ケア加算（一般病棟に限る。）イカ精神疾患診療体制加算（精神病棟を除く。）イヨ精神科急性期医師配置加算（精神病棟に限る。）イタ薬剤総合評価調整加算イレ排尿自立支援加算イソ地域医療体制確保加算（７対１入院基本料、10対１入院基本料又は13対１入院基本料（精神病棟看護・多職種協働加算を算定する場合に限る。）を算定するものに限る。）イツ協力対象施設入所者入院加算イネ医療提供機能連携確保加算（一般病棟に限る。）９当該病棟（一般病棟に限る。）のうち、保険医療機関が地方厚生局長等に届け出たものに入院している患者であって、当該病棟に90日を超えて入院するものについては、注１から注８までの規定にかかわらず、区分番号Ａ１０１に掲げる療養病棟入院料１の例により算定する。\n\
  - 10別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者に対して、管理栄養士が必要な栄養管理を行った場合には、入院栄養管理体制加算として、入院初日及び退院時にそれぞれ１回に限り、270点を所定点数に加算する。\n\
  この場合において、区分番号Ａ２３３に掲げるリハビリテーション・栄養・口腔連携体制加算、区分番号Ａ２３３－２に掲げる栄養サポートチーム加算及び区分番号Ｂ００１の10に掲げる入院栄養食事指導料は別に算定できない。\n- 11１のハの（３）若しくは（４）、２のハの（３）若しくは（４）又は３のハの（３）若しくは（４）において、別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者について、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n\
  \    - イ精神病棟看護・多職種協働加算（特定機能病院Ａ13対１入院基本料の場合）356点\n    - ロ精神病棟看護・多職種協働加算（特定機能病院Ａ15対１入院基本料の場合）91点\n    - ハ精神病棟看護・多職種協働加算（特定機能病院Ｂ13対１入院基本料の場合）357点\n\
  \    - ニ精神病棟看護・多職種協働加算（特定機能病院Ｂ15対１入院基本料の場合）92点\n    - ホ精神病棟看護・多職種協働加算（特定機能病院Ｃ13対１入院基本料の場合）355点\n    - ヘ精神病棟看護・多職種協働加算（特定機能病院Ｃ15対１入院基本料の場合）90点Ａ１０５専門病院入院基本料（１日につき）１７対１入院基本料1,904点\n\
  - ２10対１入院基本料1,552点\n- ３13対１入院基本料1,300点\n- 注１専門病院（主として悪性腫瘍、循環器疾患等の患者を入院させる保険医療機関であって高度かつ専門的な医療を行っているものとして地方厚生局長等に届け出たものをいう。）の一般病棟であって、看護配置、看護師比率、平均在院日数その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に係る区分に従い、それぞれ所定点数を算定する。\n\
  ただし、通則第７号に規定する保険医療機関の病棟については、この限りでない。\n- ２当該病棟の入院患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n    - イ14日以内の期間512点\n    - ロ15日以上30日以内の期間207点\n\
  - ３当該病棟に入院している患者の看護必要度につき別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た病棟に入院している患者については、当該基準に係る区分に従い、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n\
  \    - イ看護必要度加算１55点\n    - ロ看護必要度加算２45点\n    - ハ看護必要度加算３25点\n- ４別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た病棟において、当該患者の看護必要度について測定を行った場合には、一般病棟看護必要度評価加算として、１日につき５点を所定点数に加算する。\n\
  - ５退院が特定の時間帯に集中しているものとして別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める患者の退院日の入院基本料は、所定点数の100分の92に相当する点数により算定する。\n- ６入院日及び退院日が特定の日に集中しているものとして別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の入院基本料は、所定点数の100分の92に相当する点数により算定する。\n\
  - ７当該病棟においては、第２節の各区分に掲げる入院基本料等加算のうち、次に掲げる加算について、同節に規定する算定要件を満たす場合に算定できる。\n    - イ臨床研修病院入院診療加算\n    - ロ救急医療管理加算\n    - ハ超急性期脳卒中加算\n\
  \    - ニ妊産婦緊急搬送入院加算\n    - ホ在宅患者緊急入院診療加算\n    - ヘ診療録管理体制加算\n    - ト医師事務作業補助体制加算\n    - チ急性期看護補助体制加算\n    - リ看護職員夜間配置加算\n\
  \    - ヌ電子的診療情報連携体制整備加算\n    - ル乳幼児加算・幼児加算\n    - ヲ特定感染症入院医療管理加算\n    - ワ難病等特別入院診療加算（難病患者等入院診療加算に限る。）\n    - カ超重症児（者）入院診療加算・準超重症児（者）入院診療加算\n\
  \    - ヨ看護補助加算\n    - タ地域加算\n    - レ離島加算\n    - ソ療養環境加算\n    - ツＨＩＶ感染者療養環境特別加算\n    - ネ特定感染症患者療養環境特別加算\n    - ナ特定薬剤治療環境特別加算\n\
  \    - ラ重症者等療養環境特別加算\n    - ム小児療養環境特別加算\n- ウ産科管理加算（１に限る。）\n- ヰ無菌治療室管理加算\n- ノ放射線治療病室管理加算\n- オ緩和ケア診療加算\n- ク小児緩和ケア診療加算\n- ヤ精神科リエゾンチーム加算\n\
  - マ強度行動障害入院医療管理加算\n- ケ依存症入院医療管理加算\n- フ摂食障害入院医療管理加算\n- コがん拠点病院加算\n- エリハビリテーション・栄養・口腔連携体制加算（７対１入院基本料又は10対１入院基本料を算定するものに限る。）\n\
  - テ栄養サポートチーム加算\n- ア口腔管理連携加算\n- サ医療安全対策加算\n- キ感染対策向上加算\n- ユ患者サポート体制充実加算\n- メ報告書管理体制加算\n- ミ褥瘡ハイリスク患者ケア加算\n- シハイリスク妊娠管理加算\n\
