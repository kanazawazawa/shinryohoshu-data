raw_text: |
  Ｃ１５２－２持続血糖測定器加算
  - １間歇注入シリンジポンプと連動する持続血糖測定器を用いる場合
      - イ２個以下の場合1,320点
      - ロ３個又は４個の場合2,640点
      - ハ５個以上の場合3,300点
  - ２間歇注入シリンジポンプと連動しない持続血糖測定器を用いる場合
      - イ２個以下の場合1,320点
      - ロ３個又は４個の場合2,640点
      - ハ５個以上の場合3,300点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める注射薬の自己注射を行っている入院中の患者以外の患者に対して、持続血糖測定器を使用した場合に、第１款の所定点数に加算する。
  - ２当該患者に対して、プログラム付きシリンジポンプ又はプログラム付きシリンジポンプ以外のシリンジポンプを用いて、トランスミッターを使用した場合は、第１款の所定点数にそれぞれ3,230点又は2,230点を加算する。
  ただし、この場合において、区分番号Ｃ１５２に掲げる間歇注入シリンジポンプ加算は算定できない。
