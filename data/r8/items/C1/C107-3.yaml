raw_text: |
  Ｃ１０７－３在宅ハイフローセラピー指導管理料
  - １在宅ハイフローセラピー指導管理料１2,400点
  - ２在宅ハイフローセラピー指導管理料２2,400点
  - 注１１については、在宅ハイフローセラピーを行っている慢性閉塞性肺疾患（ＣＯＰＤ）の患者のうち、入院中の患者以外の患者に対して、在宅ハイフローセラピーに関する指導管理を行った場合に算定する。
  - ２２については、在宅ハイフローセラピーを行っている重度の低酸素血症の患者のうち、入院中の患者以外の患者に対して、高濃度の酸素吸入を伴う在宅ハイフローセラピーに関する指導管理を行った場合に算定する。
