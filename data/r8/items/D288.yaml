raw_text: 'Ｄ２８８糖負荷試験

  - １常用負荷試験（血糖及び尿糖検査を含む。）200点

  - ２耐糖能精密検査（常用負荷試験及び血中インスリン測定又は常用負荷試験及び血中Ｃ－ペプチド測定を行った場合）、グルカゴン負荷試験900点

  - 注注射、採血及び検体測定の費用は、採血回数及び測定回数にかかわらず所定点数に含まれるものとする。

  '
