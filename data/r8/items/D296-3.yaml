raw_text: 'Ｄ２９６－３内視鏡用テレスコープを用いた咽頭画像等解析（インフルエンザの診断の補助に用いるもの）305点

  - 注入院中の患者以外の患者について、緊急のために、保険医療機関が表示する診療時間以外の時間、休日又は深夜において行った場合は、時間外加算として、200点を所定点数に加算する。

  ただし、この場合において、同一日に第１節第１款の通則第１号又は第３号の加算は別に算定できない。

  '
