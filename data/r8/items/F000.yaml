raw_text: "Ｆ０００調剤料\n- １入院中の患者以外の患者に対して投薬を行った場合\n    - イ内服薬、浸煎薬及び屯服薬（１回の処方に係る調剤につき）11点\n    - ロ外用薬（１回の処方に係る調剤につき）８点\n- ２入院中の患者に対して投薬を行った場合（１日につき）７点\n\
  - 注麻薬、向精神薬、覚醒剤原料又は毒薬を調剤した場合は、麻薬等加算として、１に係る場合には１処方につき１点を、２に係る場合には１日につき１点を、それぞれ所定点数に加算する。\n"
