  chapter: 第2章 特掲診療料
  part: 第3部 検査
  section: 第1節 検体検査料
  subsection: 第1款 検体検査実施料
raw_text: "Ｄ００６出血・凝固検査\n- １出血時間15点\n- ２プロトロンビン時間（ＰＴ）18点\n- ３血餅収縮能、毛細血管抵抗試験19点\n- ４フィブリノゲン半定量、フィブリノゲン定量、クリオフィブリノゲン23点\n- 注後天性低フィブリノゲン血症の患者に対して、フィブリノゲン製剤の適応の可否を判断する目的で、手術室等の場所でフィブリノゲン半定量又はフィブリノゲン定量を実施した場合は、迅速フィブリノゲン測定加算として、150点を所定点数に加算する。\n\
  - ５トロンビン時間25点\n- ６蛇毒試験、トロンボエラストグラフ、ヘパリン抵抗試験28点\n- ７活性化部分トロンボプラスチン時間（ＡＰＴＴ）29点\n- ８血小板粘着能64点\n- ９アンチトロンビン活性、アンチトロンビン抗原70点\n\
  - 10フィブリン・フィブリノゲン分解産物（ＦＤＰ）定性、フィブリン・フィブリノゲン分解産物（ＦＤＰ）半定量、プラスミン、プラスミン活性、α１－アンチトリプシン80点\n- 11フィブリンモノマー複合体定性93点\n- 12フィブリン・フィブリノゲン分解産物（ＦＤＰ）定量95点\n\
  - 13プラスミノゲン活性、プラスミノゲン抗原、凝固因子インヒビター定性（クロスミキシング試験）100点\n- 14Ｄダイマー定性121点\n- 15ｖｏｎＷｉｌｌｅｂｒａｎｄ因子（ＶＷＦ）活性126点\n- 16Ｄダイマー127点\n-\
  \ 17プラスミンインヒビター（アンチプラスミン）、Ｄダイマー半定量128点\n- 18α２－マクログロブリン138点\n- 19ＰＩＶＫＡ－Ⅱ143点\n- 20凝固因子インヒビター144点\n- 21ｖｏｎＷｉｌｌｅｂｒａｎｄ因子（ＶＷＦ）抗原147点\n\
  - 22プラスミン・プラスミンインヒビター複合体（ＰＩＣ）150点\n- 23プロテインＳ抗原152点\n- 24プロテインＳ活性163点\n- 25トロンビン・アンチトロンビン複合体（ＴＡＴ）166点\n- 26β－トロンボグロブリン（β－ＴＧ）171点\n\
  - 27血小板第４因子（ＰＦ４）173点\n- 28プロトロンビンフラグメントＦ１＋２192点\n- 29トロンボモジュリン204点\n- 30フィブリンモノマー複合体215点\n- 31プロテインＣ抗原220点\n- 32凝固因子（第Ⅱ因子、第Ⅴ因子、第Ⅶ因子、第Ⅷ因子、第Ⅸ因子、第Ⅹ因子、第ⅩⅠ因子、第ⅩⅡ因子、第ⅩⅢ因子）223点\n\
  - 33プロテインＣ活性227点\n- 34ｔＰＡ・ＰＡＩ－１複合体240点\n- 35ＡＤＡＭＴＳ13活性400点\n- 36血小板凝集能\n    - イ鑑別診断の補助に用いるもの450点\n    - ロその他のもの50点\n- 37ＡＤＡＭＴＳ13インヒビター1,000点\n\
  - 注患者から１回に採取した血液を用いて本区分の14から34までに掲げる検査を３項目以上行った場合は、所定点数にかかわらず、検査の項目数に応じて次に掲げる点数により算定する。\n    - イ３項目又は４項目530点\n    - ロ５項目以上722点\n"
