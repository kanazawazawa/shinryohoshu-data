raw_text: 'Ｇ０００皮内、皮下及び筋肉内注射（１回につき）25点

  - 注１入院中の患者以外の患者に対して行った場合に算定する。

  - ２区分番号Ｃ１０１に掲げる在宅自己注射指導管理料、区分番号Ｃ１０８に掲げる在宅麻薬等注射指導管理料、区分番号Ｃ１０８－２に掲げる在宅腫瘍化学療法注射指導管理料又は区分番号Ｃ１０８－４に掲げる在宅悪性腫瘍患者共同指導管理料を算定している患者について、区分番号Ｃ００１に掲げる在宅患者訪問診療料（Ⅰ）又は区分番号Ｃ００１－２に掲げる在宅患者訪問診療料（Ⅱ）を算定する日に併せて行った皮内、皮下及び筋肉内注射の費用は算定しない。

  '
