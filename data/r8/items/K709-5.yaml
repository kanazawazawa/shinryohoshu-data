raw_text: |
  Ｋ７０９－５同種死体膵腎移植術140,420点
  - 注１臓器の移植に関する法律第６条第２項に規定する脳死した者の身体から採取された膵腎を除く死体膵腎を移植した場合は、移植臓器提供加算として、55,000点を所定点数に加算する。
  - ２膵腎移植者に係る組織適合性試験の費用は、所定点数に含まれる。
  - ３抗ＨＬＡ抗体検査を行う場合には、抗ＨＬＡ抗体検査加算として、4,000点を所定点数に加算する。
