  part: 第10部 手術
  section: 第3節 手術医療機器等加算
raw_text: |
  Ｋ９３９画像等手術支援加算
  - １ナビゲーションによるもの2,000点
  - 注区分番号Ｋ０５５－２、Ｋ０５５－３、Ｋ０８０の１から３まで、Ｋ０８１の１及び２、Ｋ０８２の１から３まで、Ｋ０８２－３の１から３まで、Ｋ１３１－２、Ｋ１３４－２、Ｋ１３６、Ｋ１４０からＫ１４１－２まで、Ｋ１４２（21から24までを除く。）、Ｋ１４２－２の１及び２のイ、Ｋ１４２－３、Ｋ１５１－２、Ｋ１５４－２、Ｋ１５８、Ｋ１６１、Ｋ１６７、Ｋ１６９からＫ１７２まで、Ｋ１７４の１、Ｋ１９１からＫ１９３まで、Ｋ２３５、Ｋ２３６、Ｋ３１３、Ｋ３１４、Ｋ３４０－３からＫ３４０－７まで、Ｋ３４２、Ｋ３４３、Ｋ３４３－２の２、Ｋ３５０からＫ３６５まで、Ｋ５１１の２、Ｋ５１３の２からＫ５１３の４まで、Ｋ５１４の２、Ｋ５１４－２の２、Ｋ６９５、Ｋ６９５－２、Ｋ６９７－４並びにＫ７７３－５の１に掲げる手術に当たって、ナビゲーションによる支援を行った場合に算定する。
  - ２実物大臓器立体モデルによるもの
      - イ複雑先天性心疾患の患者に行う場合18,000点
      - ロイ以外の場合2,000点
  - 注１イについては、区分番号Ｋ５５８、Ｋ５６７の３、Ｋ５７６の１、Ｋ５７６の２、Ｋ５７９－２の２、Ｋ５８０の２、Ｋ５８２の３、Ｋ５８３の１、Ｋ５８３の３、Ｋ５８４の２、Ｋ５８５及びＫ５８７に掲げる手術に当たって、実物大臓器立体モデルによる支援を行った場合に算定する。
  - ２ロについては、区分番号Ｋ０５５－２、Ｋ０５５－３、Ｋ１３６、Ｋ１４２の21から24まで、Ｋ１４２－２、Ｋ１５１－２、Ｋ１６２、Ｋ１８０、Ｋ２２７、Ｋ２２８、Ｋ２３６、Ｋ２３７、Ｋ３１３、Ｋ３１４の２、Ｋ４０６の２、Ｋ４２７、Ｋ４２７－２、Ｋ４２９、Ｋ４３３、Ｋ４３４、Ｋ４３６からＫ４４４－２まで及びＫ５１９に掲げる手術に当たって、実物大臓器立体モデルによる支援を行った場合に算定する。
  - ３患者適合型手術支援ガイドによるもの2,000点
  - 注区分番号Ｋ０８２、Ｋ０８２－３、Ｋ４３７からＫ４３９まで及びＫ４４４に掲げる手術に当たって、患者適合型手術支援ガイドによる支援を行った場合に算定する。
