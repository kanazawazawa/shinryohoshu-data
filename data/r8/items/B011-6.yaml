  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: 'Ｂ０１１－６栄養情報連携料70点

  - 注１区分番号Ｂ００１の10に掲げる入院栄養食事指導料を算定する患者に対して、退院後の栄養食事管理について指導を行った内容及び入院中の栄養管理に関する情報を示す文書を用いて説明し、これを他の保険医療機関、介護老人保健施設、介護医療院、特別養護老人ホーム又は障害者の日常生活及び社会生活を総合的に支援する法律第34条第１項に規定する指定障害者支援施設等若しくは児童福祉法第42条第１号に規定する福祉型障害児入所施設（以下この区分番号において「保険医療機関等」という。）の医師又は管理栄養士に情報提供し、共有した場合に、入院中１回に限り算定する。

  - ２注１に該当しない場合であって、当該保険医療機関を退院後に他の保険医療機関等に転院又は入所する患者であって栄養管理計画が策定されているものについて、患者又はその家族等の同意を得て、入院中の栄養管理に関する情報を示す文書を用いて当該他の保険医療機関等の管理栄養士に情報提供し、共有した場合に、入院中に１回に限り算定する。

  - ３区分番号Ｂ００５に掲げる退院時共同指導料２は、別に算定できない。

  '
