  chapter: 第2章 特掲診療料
  part: 第4部 画像診断
  section: 第3節 コンピューター断層撮影診断料
raw_text: |
  Ｅ２００コンピューター断層撮影（ＣＴ撮影）（一連につき）１ＣＴ撮影
      - イ128列以上のマルチスライス型の機器による場合
    - （１）共同利用施設において行われる場合1,120点
    - （２）その他の場合1,100点
      - ロ64列以上128列未満のマルチスライス型の機器による場合
    - （１）共同利用施設において行われる場合1,020点
    - （２）その他の場合1,000点
      - ハ16列以上64列未満のマルチスライス型の機器による場合900点
      - ニ４列以上16列未満のマルチスライス型の機器による場合750点
      - ホイからニまで以外の場合560点
  - ２脳槽ＣＴ撮影（造影を含む。）2,300点
  - 注１ＣＴ撮影のイからニまでについては、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。
  - ２ＣＴ撮影及び脳槽ＣＴ撮影（造影を含む。）に掲げる撮影のうち２以上のものを同時に行った場合にあっては、主たる撮影の所定点数のみにより算定する。
  - ３ＣＴ撮影について造影剤を使用した場合は、造影剤使用加算として、500点を所定点数に加算する。
  この場合において、造影剤注入手技料及び麻酔料（区分番号Ｌ００８に掲げる声門上器具又は気管挿管による気道確保を伴う閉鎖循環式全身麻酔を除く。）は、加算点数に含まれるものとする。
  - ４ＣＴ撮影について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、冠動脈のＣＴ撮影を行った場合は、冠動脈ＣＴ撮影加算として、600点を所定点数に加算する。
  - ５脳槽ＣＴ撮影（造影を含む。）に係る造影剤注入手技料及び麻酔料（区分番号
