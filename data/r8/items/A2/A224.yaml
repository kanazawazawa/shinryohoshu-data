raw_text: |
  Ａ２２４無菌治療室管理加算（１日につき）１無菌治療室管理加算１3,000点
  - ２無菌治療室管理加算２2,000点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病室において、治療上の必要があって無菌治療室管理が行われた入院患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、無菌治療室管理加算を算定できるものを現に算定している患者に限り、ＨＩＶ感染者療養環境特別加算、重症者等療養環境特別加算又は小児療養環境特別加算を算定するものを除く。）について、当該基準に係る区分に従い、90日を限度として所定点数に加算する。
