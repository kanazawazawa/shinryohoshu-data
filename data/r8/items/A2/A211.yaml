raw_text: |
  Ａ２１１特殊疾患入院施設管理加算（１日につき）350点
  - 注重度の障害者（重度の意識障害者を含む。）、筋ジストロフィー患者又は難病患者等を主として入院させる病院の病棟又は有床診療所に関する別に厚生労働大臣が定める施設基準に適合しているものとして、保険医療機関が地方厚生局長等に届け出た病棟又は有床診療所に入院している患者（第１節の入院基本料（特別入院基本料等を含む。）のうち、特殊疾患入院施設管理加算を算定できるものを現に算定している患者に限る。）について、所定点数に加算する。
  ただし、この場合において、難病等特別入院診療加算は算定しない。
