  - ３精神科地域密着多機能体制加算３50点
  - 注精神科を標榜する保険医療機関であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、精神科地域密着多機能体制加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、それぞれ所定点数に加算する。
