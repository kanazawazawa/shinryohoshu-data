raw_text: |
  Ａ２５２地域医療体制確保加算（入院初日）１地域医療体制確保加算１620点
  - ２地域医療体制確保加算２720点
  - 注救急医療を提供する体制、病院勤務医の負担の軽減及び処遇の改善に対する体制その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、地域医療体制確保加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、入院初日に限り所定点数に加算する。
