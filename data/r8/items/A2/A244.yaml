  section: 第2節 入院基本料等加算
raw_text: |
  Ａ２４４病棟薬剤業務実施加算
  - １病棟薬剤業務実施加算１（週１回）300点
  - ２病棟薬剤業務実施加算２（週１回）120点
  - ３病棟薬剤業務実施加算３（１日につき）100点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者について、薬剤師が病棟等において病院勤務医等の負担軽減及び薬物療法の有効性、安全性の向上に資する薬剤関連業務を実施している場合に、当該患者（第１節の入院基本料（特別入院基本料等を除く。）及び第３節の特定入院料のうち、病棟薬剤業務実施加算１から病棟薬剤業務実施加算３までのいずれかを算定できるものを現に算定している患者に限る。）について、病棟薬剤業務実施加算１及び病棟薬剤業務実施加算２にあっては週１回に限り、病棟薬剤業務実施加算３にあっては１日につき所定点数に加算する。
  この場合において、療養病棟入院基本料、精神病棟入院基本料又は特定機能病院入院基本料（精神病棟に限る。）を算定している患者については、入院した日から起算して８週間を限度とする。
  - ２病棟薬剤業務の質の向上を図るための薬剤師の研修体制その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者であって、病棟薬剤業務実施加算１又は病棟薬剤業務実施加算２を算定しているものについて、薬剤業務向上加算として、週１回に限り100点を所定点数に加算する。
