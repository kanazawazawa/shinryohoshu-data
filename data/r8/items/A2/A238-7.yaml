raw_text: |
  Ａ２３８－７精神科救急搬送患者地域連携受入加算（入院初日）2,000点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、他の保険医療機関において区分番号Ａ２３８－６に掲げる精神科救急搬送患者地域連携紹介加算を算定した患者を入院させた場合に、当該患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、精神科救急搬送患者地域連携受入加算を算定できるものを現に算定している患者に限る。）について、入院初日に限り所定点数に加算する。
