raw_text: |
  Ａ２０４－３紹介受診重点医療機関入院診療加算（入院初日）800点
  - 注外来機能報告対象病院等（医療法第30条の18の５第１項第２号の規定に基づき、同法第30条の18の２第１項第１号の厚生労働省令で定める外来医療を提供する基幹的な病院として都道府県が公表したものに限り、一般病床の数が200未満であるものを除く。）である保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）のうち、紹介受診重点医療機関入院診療加算を算定できるものを現に算定している患者に限る。）について、入院初日に限り所定点数に加算する。
  この場合において、区分番号Ａ２０４に掲げる地域医療支援病院入院診療加算は別に算定できない。
