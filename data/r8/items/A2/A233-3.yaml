  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: |
  Ａ２３３－３口腔管理連携加算600点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関（歯科診療を併せて行う保険医療機関を除く。）に入院している患者のうち、口腔状態に係る課題のために医科における治療上の課題を生じており、医師等が入院中の歯科受診が必要と判断したものについて、連携体制を構築している他の歯科医療機関に対し、患者の同意を得て、診療状況を示す文書を添えて患者の紹介を行い、入院中に歯科診療が行われた場合に、歯科診療が行われた日に入院中１回に限り算定する。
  この場合において、区分番号Ｂ００９に掲げる診療情報提供料（Ⅰ）は、所定点数に含まれるものとする。
