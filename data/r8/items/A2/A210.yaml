raw_text: |
  Ａ２１０難病等特別入院診療加算（１日につき）１難病患者等入院診療加算250点
  - ２二類感染症患者入院診療加算250点
  - 注１難病患者等入院診療加算は、別に厚生労働大臣が定める疾患を主病として保険医療機関に入院している患者であって、別に厚生労働大臣が定める状態にあるもの（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、難病等特別入院診療加算を算定できるものを現に算定している患者に限る。）について、所定点数に加算する。
  - ２二類感染症患者入院診療加算は、感染症法第６条第15項に規定する第二種感染症指定医療機関である保険医療機関に入院している同条第３項に規定する二類感染症の患者及び同条第７項に規定する新型インフルエンザ等感染症の患者並びにそれらの疑似症患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、難病等特別入院診療加算を算定できるものを現に算定している患者に限る。）について、所定点数に加算する。
