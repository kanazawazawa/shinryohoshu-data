raw_text: |
  Ａ２３０－５精神科慢性身体合併症管理加算700点
  - 注精神科を標榜する病院であって別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める疾患を有する精神障害者である患者に対して必要な治療を行った場合に、当該患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、精神科慢性身体合併症管理加算を算定できるものを現に算定している患者に限る。）について、１月に１回に限り、所定点数に加算する。
  この場合において、区分番号Ａ２３０－３に掲げる精神科身体合併症管理加算は別に算定できない。
