chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: |
  Ａ２２０－２特定感染症患者療養環境特別加算（１日につき）１個室加算300点
  - ２陰圧室加算200点
  - 注保険医療機関に入院している次に掲げる感染症の患者及びそれらの疑似症患者であって個室又は陰圧室に入院させる必要性が特に高い患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、特定感染症患者療養環境特別加算を算定できるものを現に算定している患者に限る。）について、必要を認めて個室又は陰圧室に入院させた場合に、個室加算又は陰圧室加算として、それぞれ所定点数に加算する。
  ただし、疑似症患者については、初日に限り所定点数に加算する。
      - イ感染症法第６条第３項に規定する二類感染症
      - ロ感染症法第６条第４項に規定する三類感染症
      - ハ感染症法第６条第５項に規定する四類感染症
      - ニ感染症法第６条第６項に規定する五類感染症
      - ホ感染症法第６条第７項に規定する新型インフルエンザ等感染症
      - ヘ感染症法第６条第８項に規定する指定感染症
      - トその他個室管理が必要な感染症Ａ２２０－３特定薬剤治療環境特別加算（１日につき）300点
  - 注保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、特定薬剤治療環境特別加算を算定できるものを現に算定している患者に限る。）について、遺伝子組換え生物等の使用等の規制による生物の多様性の確保に関する法律（平成15年法律第97号。
  以下「カルタヘナ法」という。）に基づく管理が必要な薬剤（再生医療等製品を含む。）を投与する目的で個室に入院させた場合に、特定薬剤治療環境特別加算として、所定点数に加算する。
