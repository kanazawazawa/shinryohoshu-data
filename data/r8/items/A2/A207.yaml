raw_text: |
  Ａ２０７診療録管理体制加算（入院初日）１診療録管理体制加算１100点
  - ２診療録管理体制加算２30点
  - 注診療録管理体制その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、診療録管理体制加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、入院初日に限り所定点数に加算する。
