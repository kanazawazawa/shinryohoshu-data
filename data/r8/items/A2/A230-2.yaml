raw_text: |
  Ａ２３０－２精神科地域移行実施加算（１日につき）20点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、精神病棟における入院期間が５年を超える患者に対して、退院調整を実施し、計画的に地域への移行を進めた場合に、当該保険医療機関の精神病棟に入院した患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、精神科地域移行実施加算を算定できるものを現に算定している患者に限る。）について、所定点数に加算する。
