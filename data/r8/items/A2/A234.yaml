raw_text: |
  Ａ２３４医療安全対策加算（入院初日）１医療安全対策加算１160点
  - ２医療安全対策加算２70点
  - 注１別に厚生労働大臣が定める組織的な医療安全対策に係る施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）、第３節の特定入院料又は第４節の短期滞在手術等基本料のうち、医療安全対策加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、入院初日に限りそれぞれ所定点数に加算する。
  - ２医療安全対策に関する医療機関間の連携体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関（ロについては、特定機能病院を除く。）に入院している患者については、当該基準に係る区分に従い、次に掲げる点数をそれぞれ更に所定点数に加算する。
      - イ医療安全対策地域連携加算１50点
      - ロ医療安全対策地域連携加算２20点Ａ２３４－２感染対策向上加算（入院初日）１感染対策向上加算１710点
  - ２感染対策向上加算２175点
  - ３感染対策向上加算３75点
  - 注１組織的な感染防止対策につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）、第３節の特定入院料又は第４節の短期滞在手術等基本料のうち、感染対策向上加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、入院初日に限り（３については、入院初日及び入院期間が90日を超えるごとに１回）それぞれ所定点数に加算する。
  - ２感染対策向上加算１を算定する場合について、感染症対策に関する医療機関間の連携体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者については、指導強化加算として、30点を更に所定点数に加算する。
  - ３感染対策向上加算１を算定する場合について、院内感染防止対策及び抗菌薬の適正使用につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者については、微生物学的検査体制加算として、30点を更に所定点数に加算する。
  - ４感染対策向上加算２又は感染対策向上加算３を算定する場合について、感染症対策に関する医療機関間の連携体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者については、連携強化加算として、30点を更に所定点数に加算する。
  - ５感染対策向上加算２又は感染対策向上加算３を算定する場合について、感染防止対策に資する情報を提供する体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者については、サーベイランス強化加算として、３点を更に所定点数に加算する。
  - ６感染対策向上加算を算定する場合について、抗菌薬の使用状況につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者については、抗菌薬適正使用体制加算として、５点を更に所定点数に加算する。
