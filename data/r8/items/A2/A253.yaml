  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: |
  Ａ２５３協力対象施設入所者入院加算（入院初日）１往診が行われた場合600点
  - ２１以外の場合200点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において介護老人保健施設、介護医療院及び特別養護老人ホーム（以下この区分番号において、「介護保険施設等」という。）であって当該保険医療機関を協力医療機関として定めているものに入所している患者の病状の急変等に伴い、当該介護保険施設等の従事者等の求めに応じて当該保険医療機関又は当該保険医療機関以外の協力医療機関が診療を行い、当該保険医療機関に入院させた場合に、協力対象施設入所者入院加算として、入院初日に限り所定点数に加算する。
