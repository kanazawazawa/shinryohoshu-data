raw_text: |
  Ａ２２６－２緩和ケア診療加算（１日につき）390点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、緩和ケアを要する患者に対して、必要な診療を行った場合に、当該患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、緩和ケア診療加算を算定できるものを現に算定している患者に限る。
  以下この区分番号において同じ。）について、所定点数に加算する。
  - ２医療提供体制の確保の状況に鑑み別に厚生労働大臣が定める地域に所在する保険医療機関であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出たものにおいては、注１に規定する届出の有無にかかわらず、当該加算の点数に代えて、緩和ケア診療加算（特定地域）として、200点を所定点数に加算することができる。
  - ３当該患者が15歳未満の小児である場合には、小児加算として、100点を更に所定点数に加算する。
  - ４別に厚生労働大臣が定める施設基準を満たす保険医療機関において、緩和ケアを要する患者に対して、緩和ケアに係る必要な栄養食事管理を行った場合には、個別栄養食事管理加算として、70点を更に所定点数に加算する。
