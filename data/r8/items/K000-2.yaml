raw_text: 'Ｋ０００－２小児創傷処理（６歳未満）１筋肉、臓器に達するもの（長径２.５センチメートル未満）1,400点

  - ２筋肉、臓器に達するもの（長径２.５センチメートル以上５センチメートル未満）1,540点

  - ３筋肉、臓器に達するもの（長径５センチメートル以上10センチメートル未満）2,860点

  - ４筋肉、臓器に達するもの（長径10センチメートル以上）4,410点

  - ５筋肉、臓器に達しないもの（長径２.５センチメートル未満）500点

  - ６筋肉、臓器に達しないもの（長径２.５センチメートル以上５センチメートル未満）560点

  - ７筋肉、臓器に達しないもの（長径５センチメートル以上10センチメートル未満）1,060点

  - ８筋肉、臓器に達しないもの（長径10センチメートル以上）1,950点

  - 注１切、刺、割創又は挫創の手術について切除、結紮又は縫合を行う場合に限り算定する。

  - ２真皮縫合を伴う縫合閉鎖を行った場合は、露出部の創傷に限り460点を所定点数に加算する。

  - ３汚染された挫創に対してデブリードマンを行った場合は、当初の１回に限り100点を加算する。

  '
