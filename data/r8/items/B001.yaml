  text: 'イについては、肝炎ウイルス疾患又は成人Ｔ細胞白血病に罹患している患者に対して、ロについては、後天性免疫不全症候群に罹患している患者に対して、それぞれ療養上必要な指導及び感染予防に関する指導を行った場合に、イについては患者１人につき１回に限り、ロについては患者１人につき月１回に限り算定する。

