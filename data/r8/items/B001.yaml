  text: イについては、ジギタリス製剤又は抗てんかん剤を投与している患者、免疫抑制剤を投与している臓器移植後の患者その他別に厚生労働大臣が定める患者に対して、薬物血中濃度を測定して計画的な治療管理を行った場合に算定する。
- id: 注2
  text: イについては、同一の患者につき特定薬剤治療管理料を算定すべき測定及び計画的な治療管理を月２回以上行った場合においては、特定薬剤治療管理料は１回に限り算定することとし、第１回の測定及び計画的な治療管理を行ったときに算定する。
- id: 注3
  text: イについては、ジギタリス製剤の急速飽和を行った場合又はてんかん重積状態の患者に対して、抗てんかん剤の注射等を行った場合は、所定点数にかかわらず、１回に限り740点を特定薬剤治療管理料１として算定する。
- id: 注4
  text: イについては、抗てんかん剤又は免疫抑制剤を投与している患者以外の患者に対して行った薬物血中濃度の測定及び計画的な治療管理のうち、４月目以降のものについては、所定点数の100分の50に相当する点数により算定する。
- id: 注5
  text: イについては、てんかんの患者であって、２種類以上の抗てんかん剤を投与されているものについて、同一暦月に血中の複数の抗てんかん剤の濃度を測定し、その測定結果に基づき、個々の投与量を精密に管理した場合は、当該管理を行った月において、２回に限り所定点数を算定できる。
- id: 注6
  text: イについては、臓器移植後の患者に対して、免疫抑制剤の投与を行った場合は、臓器移植を行った日の属する月を含め３月に限り、2,740点を所定点数に加算する。
- id: 注7
  text: イについては、入院中の患者であって、バンコマイシンを投与しているものに対して、血中のバンコマイシンの濃度を複数回測定し、その測定結果に基づき、投与量を精密に管理した場合は、１回に限り、530点を所定点数に加算する。
- id: 注8
  text: イについては、注６及び注７に規定する患者以外の患者に対して、特定薬剤治療管理に係る薬剤の投与を行った場合は、１回目の特定薬剤治療管理料を算定すべき月に限り、280点を所定点数に加算する。
- id: 注9
  text: イについては、ミコフェノール酸モフェチルを投与している臓器移植後の患者であって、２種類以上の免疫抑制剤を投与されているものについて、医師が必要と認め、同一暦月に血中の複数の免疫抑制剤の濃度を測定し、その測定結果に基づき、個々の投与量を精密に管理した場合は、６月に１回に限り250点を所定点数に加算する。
- id: 注10
  text: イについては、エベロリムスを投与している臓器移植後の患者であって、２種類以上の免疫抑制剤を投与されているものについて、医師が必要と認め、同一暦月に血中の複数の免疫抑制剤の濃度を測定し、その測定結果に基づき、個々の投与量を精密に管理した場合は、エベロリムスの初回投与を行った日の属する月を含め３月に限り月１回、４月目以降は４月に１回に限り250点を所定点数に加算する。
- id: 注11
  text: ロについては、サリドマイド及びその誘導体を投与している患者について、服薬に係る安全管理の遵守状況を確認し、その結果を所定の機関に報告する等により、投与の妥当性を確認した上で、必要な指導等を行った場合又はカルタヘナ法に基づく管理が必要な薬剤を投与している患者について、自宅等における管理に必要な指導等を行った場合に月１回に限り所定点数を算定する。
- id: 注3
  text: "悪性腫瘍特異物質治療管理料\n    - イ尿中ＢＴＡに係るもの220点\n    - ロその他のもの\n  - （１）１項目の場合360点\n  - （２）２項目以上の場合400点"
