code: B001
name: 特定疾患治療管理料
version: r8
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: "Ｂ００１特定疾患治療管理料\n- １ウイルス疾患指導料\n    - イウイルス疾患指導料１240点\n    - ロウイルス疾患指導料２330点\n- 注１イについては、肝炎ウイルス疾患又は成人Ｔ細胞白血病に罹患している患者に対して、ロについては、後天性免疫不全症候群に罹患している患者に対して、それぞれ療養上必要な指導及び感染予防に関する指導を行った場合に、イについては患者１人につき１回に限り、ロについては患者１人につき月１回に限り算定する。\n\
  ただし、区分番号Ｂ０００に掲げる特定疾患療養管理料を算定している患者については算定しない。\n- ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、ロの指導が行われる場合は、220点を所定点数に加算する。\n\
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、ウイルス疾患指導料を算定すべき医学管理を情報通信機器を用いて行った場合は、イ又はロの所定点数に代えて、それぞれ209点又は287点を算定する。\n\
  - ２特定薬剤治療管理料\n    - イ特定薬剤治療管理料１470点\n    - ロ特定薬剤治療管理料２100点\n- 注１イについては、ジギタリス製剤又は抗てんかん剤を投与している患者、免疫抑制剤を投与している臓器移植後の患者その他別に厚生労働大臣が定める患者に対して、薬物血中濃度を測定して計画的な治療管理を行った場合に算定する。\n\
  - ２イについては、同一の患者につき特定薬剤治療管理料を算定すべき測定及び計画的な治療管理を月２回以上行った場合においては、特定薬剤治療管理料は１回に限り算定することとし、第１回の測定及び計画的な治療管理を行ったときに算定する。\n- ３イについては、ジギタリス製剤の急速飽和を行った場合又はてんかん重積状態の患者に対して、抗てんかん剤の注射等を行った場合は、所定点数にかかわらず、１回に限り740点を特定薬剤治療管理料１として算定する。\n\
  - ４イについては、抗てんかん剤又は免疫抑制剤を投与している患者以外の患者に対して行った薬物血中濃度の測定及び計画的な治療管理のうち、４月目以降のものについては、所定点数の100分の50に相当する点数により算定する。\n- ５イについては、てんかんの患者であって、２種類以上の抗てんかん剤を投与されているものについて、同一暦月に血中の複数の抗てんかん剤の濃度を測定し、その測定結果に基づき、個々の投与量を精密に管理した場合は、当該管理を行った月において、２回に限り所定点数を算定できる。\n\
  - ６イについては、臓器移植後の患者に対して、免疫抑制剤の投与を行った場合は、臓器移植を行った日の属する月を含め３月に限り、2,740点を所定点数に加算する。\n- ７イについては、入院中の患者であって、バンコマイシンを投与しているものに対して、血中のバンコマイシンの濃度を複数回測定し、その測定結果に基づき、投与量を精密に管理した場合は、１回に限り、530点を所定点数に加算する。\n\
  - ８イについては、注６及び注７に規定する患者以外の患者に対して、特定薬剤治療管理に係る薬剤の投与を行った場合は、１回目の特定薬剤治療管理料を算定すべき月に限り、280点を所定点数に加算する。\n- ９イについては、ミコフェノール酸モフェチルを投与している臓器移植後の患者であって、２種類以上の免疫抑制剤を投与されているものについて、医師が必要と認め、同一暦月に血中の複数の免疫抑制剤の濃度を測定し、その測定結果に基づき、個々の投与量を精密に管理した場合は、６月に１回に限り250点を所定点数に加算する。\n\
  - 10イについては、エベロリムスを投与している臓器移植後の患者であって、２種類以上の免疫抑制剤を投与されているものについて、医師が必要と認め、同一暦月に血中の複数の免疫抑制剤の濃度を測定し、その測定結果に基づき、個々の投与量を精密に管理した場合は、エベロリムスの初回投与を行った日の属する月を含め３月に限り月１回、４月目以降は４月に１回に限り250点を所定点数に加算する。\n\
  - 11ロについては、サリドマイド及びその誘導体を投与している患者について、服薬に係る安全管理の遵守状況を確認し、その結果を所定の機関に報告する等により、投与の妥当性を確認した上で、必要な指導等を行った場合又はカルタヘナ法に基づく管理が必要な薬剤を投与している患者について、自宅等における管理に必要な指導等を行った場合に月１回に限り所定点数を算定する。\n\
  - ３悪性腫瘍特異物質治療管理料\n    - イ尿中ＢＴＡに係るもの220点\n    - ロその他のもの\n  - （１）１項目の場合360点\n  - （２）２項目以上の場合400点\n- 注１イについては、悪性腫瘍の患者に対して、尿中ＢＴＡに係る検査を行い、その結果に基づいて計画的な治療管理を行った場合に、月１回に限り第１回の検査及び治療管理を行ったときに算定する。\n\
  - ２ロについては、悪性腫瘍の患者に対して、区分番号Ｄ００９に掲げる腫瘍マーカーに係る検査（注１に規定する検査を除く。）のうち１又は２以上の項目を行い、その結果に基づいて計画的な治療管理を行った場合に、月１回に限り第１回の検査及び治療管理を行ったときに算定する。\n\
  - ３注２に規定する悪性腫瘍特異物質治療管理に係る腫瘍マーカーの検査を行った場合は、１回目の悪性腫瘍特異物質治療管理料を算定すべき月に限り、150点をロの所定点数に加算する。\nただし、当該月の前月に腫瘍マーカーの所定点数を算定している場合は、この限りでない。\n\
  - ４注１に規定する検査及び治療管理並びに注２に規定する検査及び治療管理を同一月に行った場合にあっては、ロの所定点数のみにより算定する。\n- ５腫瘍マーカーの検査に要する費用は所定点数に含まれるものとする。\n- ６注１及び注２に規定されていない腫瘍マーカーの検査及び計画的な治療管理であって特殊なものに要する費用は、注１又は注２に掲げられている腫瘍マーカーの検査及び治療管理のうち、最も近似するものの所定点数により算定する。\n\
  - ４小児特定疾患カウンセリング料\n    - イ医師による場合\n  - （１）初回800点\n  - （２）初回のカウンセリングを行った日後１年以内の期間に行った場合①月の１回目600点②月の２回目500点\n  - （3）初回のカウンセリングを行った日から起算して２年以内の期間に行った場合(（２）の場合を除く。)①月の１回目500点②月の２回目400点\n\
  \  - （4）初回のカウンセリングを行った日から起算して４年以内の期間に行った場合(（２）及び（3）の場合を除く。)400点\n    - ロ公認心理師による場合200点\n- 注１小児科又は心療内科を標榜する保険医療機関において、小児科若しくは心療内科を担当する医師又は医師の指示を受けた公認心理師が、別に厚生労働大臣が定める患者であって入院中以外のものに対して、療養上必要なカウンセリングを同一月内に１回以上行った場合に、初回のカウンセリングを行った日から起算して、２年以内の期間においては月２回に限り、２年を超える期間においては、４年を限度として、月１回に限り、算定する。\n\
  ただし、区分番号Ｂ０００に掲げる特定疾患療養管理料、区分番号Ｉ００２に掲げる通院・在宅精神療法又は区分番号Ｉ００４に掲げる心身医学療法を算定している患者については算定しない。\n- ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、小児特定疾患カウンセリング料イの（１）、（２）、（3）又は（４）を算定すべき医学管理を情報通信機器を用いて行った場合は、イの（１）、（２）の①若しくは②、（3）の①若しくは②又は（４）の所定点数に代えて、それぞれ696点、522点若しくは435点、435点若しくは348点又は348点を算定する。\n\
  - ５小児科療養指導料270点\n- 注１小児科を標榜する保険医療機関において、慢性疾患であって生活指導が特に必要なものを主病とする15歳未満の患者であって入院中以外のものに対して、必要な生活指導を継続して行った場合に、月１回に限り算定する。\n\
  ただし、区分番号Ｂ０００に掲げる特定疾患療養管理料、区分番号Ｂ００１の７に掲げる難病外来指導管理料又は区分番号Ｂ００１の18に掲げる小児悪性腫瘍患者指導管理料を算定している患者については算定しない。\n- ２区分番号Ａ０００に掲げる初診料を算定する初診の日に行った指導又は当該初診の日の同月内に行った指導の費用は、初診料に含まれるものとする。\n\
  - ３入院中の患者に対して行った指導又は退院した患者に対して退院の日から起算して１月以内に行った指導の費用は、第１章第２部第１節に掲げる入院基本料に含まれるものとする。\n- ４第２部第２節第１款在宅療養指導管理料の各区分に掲げる指導管理料又は区分番号Ｂ００１の８に掲げる皮膚科特定疾患指導管理料を算定すべき指導管理を受けている患者に対して行った指導の費用は、各区分に掲げるそれぞれの指導管理料に含まれるものとする。\n\
  - ５人工呼吸器管理の適応となる患者と病状、治療方針等について話し合い、当該患者に対し、その内容を文書により提供した場合は、人工呼吸器導入時相談支援加算として、当該内容を文書により提供した日の属する月から起算して１月を限度として、１回に限り、500点を所定点数に加算する。\n\
  - ６別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、小児科療養指導料を算定すべき医学管理を情報通信機器を用いて行った場合は、所定点数に代えて、235点を算定する。\n- ６てんかん指導料250点\n\
  - 注１小児科、神経科、神経内科、精神科、脳神経外科又は心療内科を標榜する保険医療機関において、その標榜する診療科を担当する医師が、てんかん（外傷性のものを含む。）の患者であって入院中以外のものに対して、治療計画に基づき療養上必要な指導を行った場合に、月１回に限り算定する。\n\
  - ２区分番号Ａ０００に掲げる初診料を算定する初診の日に行った指導又は当該初診の日から１月以内に行った指導の費用は、初診料に含まれるものとする。\n- ３退院した患者に対して退院の日から起算して１月以内に指導を行った場合における当該指導の費用は、第１章第２部第１節に掲げる入院基本料に含まれるものとする。\n\
  - ４区分番号Ｂ０００に掲げる特定疾患療養管理料、区分番号Ｂ００１の５に掲げる小児科療養指導料又は区分番号Ｂ００１の18に掲げる小児悪性腫瘍患者指導管理料を算定している患者については算定しない。\n- ５第２部第２節第１款在宅療養指導管理料の各区分に掲げる指導管理料を算定すべき指導管理を受けている患者に対して行った指導の費用は、各区分に掲げるそれぞれの指導管理料に含まれるものとする。\n\
  - ６別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、てんかん指導料を算定すべき医学管理を情報通信機器を用いて行った場合は、所定点数に代えて、218点を算定する。\n- ７難病外来指導管理料\n\
  \    - イ難病外来指導管理料１270点\n    - ロ難病外来指導管理料２270点\n- 注１イについては、入院中の患者以外の患者であって別に厚生労働大臣が定める疾患を主病とするものに対して、計画的な医学管理を継続して行い、かつ、治療計画に基づき療養上必要な指導を行った場合に、月１回に限り算定する。\n\
  - ２ロについては、小児科を標榜する保険医療機関以外の保険医療機関において、慢性疾患であって生活指導が特に必要なものを主病とする入院中の患者以外の患者（小児科を標榜する他の保険医療機関から紹介を受けた患者であって、当該紹介を受けて初診を行った日から起算して５年以内の患者に限る。）に対して、必要な生活指導を継続して行った場合に、月１回に限り算定する。\n\
  - ３区分番号Ａ０００に掲げる初診料を算定する初診の日に行った指導又は当該初診の日から１月以内に行った指導の費用は、初診料に含まれるものとする。\n- ４退院した患者に対して退院の日から起算して１月以内に指導を行った場合における当該指導の費用は、第１章第２部第１節に掲げる入院基本料に含まれるものとする。\n\
  - ５区分番号Ｂ０００に掲げる特定疾患療養管理料又は区分番号Ｂ００１の８に掲げる皮膚科特定疾患指導管理料を算定している患者については算定しない。\n- ６人工呼吸器管理の適応となる患者と病状、治療方針等について話し合い、当該患者に対し、その内容を文書により提供した場合は、人工呼吸器導入時相談支援加算として、当該内容を文書により提供した日の属する月から起算して１月を限度として、１回に限り、500点を所定点数に加算する。\n\
  - ７別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、難病外来指導管理料を算定すべき医学管理を情報通信機器を用いて行った場合は、所定点数に代えて、235点を算定する。\n- ８皮膚科特定疾患指導管理料\n\
  \    - イ皮膚科特定疾患指導管理料（Ⅰ）250点\n    - ロ皮膚科特定疾患指導管理料（Ⅱ）100点\n- 注１別に厚生労働大臣が定める施設基準を満たす保険医療機関において、皮膚科又は皮膚泌尿器科を担当する医師が、別に厚生労働大臣が定める疾患に罹患している患者に対して、計画的な医学管理を継続して行い、かつ、療養上必要な指導を行った場合に、当該疾患の区分に従い、それぞれ月１回に限り算定する。\n\
  - ２区分番号Ａ０００に掲げる初診料を算定する初診の日に行った指導又は当該初診の日から１月以内に行った指導の費用は、初診料に含まれるものとする。\n- ３入院中の患者に対して指導を行った場合又は退院した患者に対して退院の日から１月以内に指導を行った場合における当該指導の費用は、第１章第２部第１節に掲げる入院基本料に含まれるものとする。\n\
  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、皮膚科特定疾患指導管理料を算定すべき医学管理を情報通信機器を用いて行った場合は、イ又はロの所定点数に代えて、それぞれ218点又は87点を算定する。\n\
  - ９外来栄養食事指導料\n    - イ外来栄養食事指導料１\n  - （１）初回①対面で行った場合260点②情報通信機器を用いた場合235点\n  - （２）２回目以降①対面で行った場合200点②情報通信機器を用いた場合180点③\n\
  \  - （１）の①又は②の追加的な指導を行った場合50点\n    - ロ外来栄養食事指導料２\n  - （１）初回①対面で行った場合250点②情報通信機器を用いた場合225点\n  - （２）２回目以降①対面で行った場合190点②情報通信機器を用いた場合170点③（１）の①又は②の追加的な指導を行った場合45点\n\
  - 注１イの（１）の①及び（２）の①については、入院中の患者以外の患者であって、別に厚生労働大臣が定めるものに対して、保険医療機関の医師の指示に基づき当該保険医療機関の管理栄養士が具体的な献立等によって指導を行った場合に、初回の指導を行った月にあっては月２回に限り、その他の月にあっては月１回に限り算定する。\n\
  - ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、外来化学療法を実施している悪性腫瘍の患者に対して、医師の指示に基づき当該保険医療機関の管理栄養士が具体的な献立等によって月２回以上の指導を行った場合に限り、月の２回目の指導時にイの（２）の①の点数を算定する。\n\
  ただし、区分番号Ｂ００１－２－12に掲げる外来腫瘍化学療法診療料を算定した日と同日であること。\n- ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、外来化学療法を実施している悪性腫瘍の患者に対して、医師の指示に基づき当該保険医療機関の専門的な知識を有する管理栄養士が具体的な献立等によって指導を行った場合に限り、月１回に限り260点を算定する。\n\
