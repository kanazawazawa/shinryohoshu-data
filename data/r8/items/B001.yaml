  text: '小児科又は心療内科を標榜する保険医療機関において、小児科若しくは心療内科を担当する医師又は医師の指示を受けた公認心理師が、別に厚生労働大臣が定める患者であって入院中以外のものに対して、療養上必要なカウンセリングを同一月内に１回以上行った場合に、初回のカウンセリングを行った日から起算して、２年以内の期間においては月２回に限り、２年を超える期間においては、４年を限度として、月１回に限り、算定する。

