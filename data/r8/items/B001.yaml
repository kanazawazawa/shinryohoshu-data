  text: ロについては、悪性腫瘍の患者に対して、区分番号Ｄ００９に掲げる腫瘍マーカーに係る検査（注１に規定する検査を除く。）のうち１又は２以上の項目を行い、その結果に基づいて計画的な治療管理を行った場合に、月１回に限り第１回の検査及び治療管理を行ったときに算定する。
