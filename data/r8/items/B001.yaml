  - ３ハについては、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、入院中の患者以外の患者であって、イを算定したものに対して、継続して骨粗鬆症の計画的な評価及び治療等を行った場合に、初回算定日の属する月から起算して１年を限度として、月１回に限り算定する。\n\
  - 35アレルギー性鼻炎免疫療法治療管理料\n    - イ１月目280点\n    - ロ２月目以降25点\n- 注別に厚生労働大臣が定める施設基準を満たす保険医療機関において、入院中の患者以外のアレルギー性鼻炎の患者に対して、アレルゲン免疫療法による治療の必要を認め、治療内容等に係る説明を文書を用いて行い、当該患者の同意を得た上で、アレルゲン免疫療法による計画的な治療管理を行った場合に、月１回に限り算定する。\n\
  - 36下肢創傷処置管理料500点\n- 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、入院中の患者以外の患者であって、下肢の潰瘍を有するものに対して、下肢創傷処置に関する専門の知識を有する医師が、計画的な医学管理を継続して行い、かつ、療養上必要な指導を行った場合に、区分番号Ｊ０００－２に掲げる下肢創傷処置を算定した日の属する月において、月１回に限り算定する。\n\
  ただし、区分番号Ｂ００１の20に掲げる糖尿病合併症管理料は、別に算定できない。\n- 37慢性腎臓病透析予防指導管理料\n    - イ初回の指導管理を行った日から起算して１年以内の期間に行った場合300点\n    - ロ初回の指導管理を行った日から起算して１年を超えた期間に行った場合250点\n\
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、慢性腎臓病の患者（糖尿病患者又は現に透析療法を行っている患者を除き、別に厚生労働大臣が定める者に限る。）であって、医師が透析予防に関する指導の必要性があると認めた入院中の患者以外の患者に対して、当該保険医療機関の医師、看護師又は保健師及び管理栄養士等が共同して必要な指導を行った場合に、月１回に限り算定する。\n\
  - ２区分番号Ｂ００１の９に掲げる外来栄養食事指導料及び区分番号Ｂ００１の11に掲げる集団栄養食事指導料は、所定点数に含まれるものとする。\n- ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、慢性腎臓病透析予防指導管理料を算定すべき医学管理を情報通信機器を用いて行った場合は、イ又はロの所定点数に代えて、261点又は218点を算定する。\n"
notes:
