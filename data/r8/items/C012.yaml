chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: 'Ｃ０１２在宅患者共同診療料

  - １往診の場合1,500点

  - ２訪問診療の場合（同一建物居住者以外）1,000点

  - ３訪問診療の場合（同一建物居住者）240点

  - 注１１については、在宅療養後方支援病院（在宅において療養を行っている患者を緊急時に受け入れる病院であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出たものをいう。

  以下この表において同じ。）（許可病床数が400床未満の病院に限る。）が、在宅で療養を行っている別に厚生労働大臣が定める疾病等を有する患者以外の患者であって通院が困難なもの（当該在宅療養後方支援病院を緊急時の搬送先として希望するものに限る。

  以下この区分番号において同じ。）に対して、当該患者に対する在宅医療を担う他の保険医療機関からの求めに応じて共同で往診を行った場合に、１から３までのいずれかを最初に算定した日から起算して１年以内に、患者１人につき１から３までを合わせて２回に限り算定する。

  - ２２については、在宅療養後方支援病院（許可病床数が400床未満の病院に限る。）が、在宅で療養を行っている別に厚生労働大臣が定める疾病等を有する患者以外の患者（当該患者と同一の建物に居住する他の患者に対して当該保険医療機関が同一日に訪問診療を行う場合の当該患者（以下この区分番号において「同一建物居住者」という。）を除く。）であって通院が困難なものに対して、当該患者に対する在宅医療を担う他の保険医療機関からの求めに応じて計画的な医学管理の下に定期的に訪問して共同で診療を行った場合に、１から３までのいずれかを最初に算定した日から起算して１年以内に、患者１人につき１から３までを合わせて２回に限り算定する。

  - ３３については、在宅療養後方支援病院（許可病床数が400床未満の病院に限る。）が、在宅で療養を行っている別に厚生労働大臣が定める疾病等を有する患者以外の患者（同一建物居住者に限る。）であって通院が困難なものに対して、当該患者に対する在宅医療を担う他の保険医療機関からの求めに応じて計画的な医学管理の下に定期的に訪問して共同で診療を行った場合に、１から３までのいずれかを最初に算定した日から起算して１年以内に、患者１人につき１から３までを合わせて２回に限り算定する。

  - ４注１から注３までの規定にかかわらず、在宅療養後方支援病院が、別に厚生労働大臣が定める疾病等を有する患者に対して行った場合については、１から３までのいずれかを最初に算定した日から起算して１年以内に、患者１人につき１から３までを合わせて12回に限り算定する。

  - ５往診又は訪問診療に要した交通費は、患家の負担とする。

  '
