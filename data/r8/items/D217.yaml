raw_text: 'Ｄ２１７骨塩定量検査

  - １ＤＥＸＡ法による腰椎撮影360点

  - 注同一日にＤＥＸＡ法により大腿骨撮影を行った場合には、大腿骨同時撮影加算として、90点を所定点数に加算する。

  - ２ＲＥＭＳ法（腰椎）140点

  - 注同一日にＲＥＭＳ法により大腿骨の骨塩定量検査を行った場合には、大腿骨同時検査加算として、55点を所定点数に加算する。

  - ３ＭＤ法、ＳＥＸＡ法等140点

  - ４超音波法80点

  - 注検査の種類にかかわらず、患者１人につき１年に１回に限り算定する。

  ただし、骨粗鬆症の治療を開始した日から起算して１年以内の場合には、患者１人につき４月に１回に限り算定する。

  （監視装置による諸検査）

  '
