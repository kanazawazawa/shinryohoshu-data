code: A301
name: 特定集中治療室管理料（１日につき）１特定集中治療室管理料１
version: r8
points: null
unit: 日
chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第3節 特定入院料
raw_text: |
  Ａ３０１特定集中治療室管理料（１日につき）１特定集中治療室管理料１
      - イ７日以内の期間14,980点
      - ロ８日以上の期間13,371点
  - ２特定集中治療室管理料２
      - イ７日以内の期間10,390点
      - ロ８日以上の期間8,773点
  - ３特定集中治療室管理料３
      - イ７日以内の期間9,390点
      - ロ８日以上の期間7,770点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、必要があって特定集中治療室管理が行われた場合に、当該基準に係る区分に従い、14日（広範囲熱傷特定集中治療管理が必要な状態の患者（注８に規定する加算を算定する患者に限る。）にあっては60日、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者であって、急性血液浄化（腹膜透析を除く。）又は体外式心肺補助（ＥＣＭＯ）を必要とするものにあっては25日、臓器移植を行ったものにあっては30日）を限度として、それぞれ所定点数を算定する。
  - ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、15歳未満の重篤な患者に対して特定集中治療室管理が行われた場合には、小児加算として、当該患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
      - イ７日以内の期間2,000点
      - ロ８日以上14日以内の期間1,500点
  - ３第１章基本診療料並びに第２章第３部検査、第６部注射、第９部処置及び第13部病理診断のうち次に掲げるものは、特定集中治療室管理料に含まれるものとする。
      - イ入院基本料
      - ロ入院基本料等加算（臨床研修病院入院診療加算、超急性期脳卒中加算、妊産婦緊急搬送入院加算、医師事務作業補助体制加算、特定感染症入院医療管理加算、難病等特別入院診療加算（二類感染症患者入院診療加算に限る。）、地域加算、離島加算、精神科リエゾンチーム加算、がん拠点病院加算、口腔管理連携加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、重症患者初期支援充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、術後疼痛管理チーム加算、病棟薬剤業務実施加算３、データ提出加算、入退院支援加算（１のイ及び３に限る。）、認知症ケア加算、せん妄ハイリスク患者ケア加算、精神疾患診療体制加算、排尿自立支援加算及び地域医療体制確保加算を除く。）
      - ハ第２章第３部の各区分の検査（区分番号Ｄ００６－19に掲げるがんゲノムプロファイリング検査（造血器腫瘍又は類縁疾患を対象とする場合に限る。）及び同部第１節第２款の検体検査判断料を除く。）
      - ニ点滴注射
      - ホ中心静脈注射
      - ヘ酸素吸入（使用した酸素及び窒素の費用を除く。）
      - ト留置カテーテル設置
      - チ第13部第１節の病理標本作製料４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病室に入院している患者に対して、入室後早期から離床等に必要な治療を行った場合に、早期離床・リハビリテーション加算として、入室した日から起算して14日を限度として500点を所定点数に加算する。
  この場合において、同一日に区分番号Ｈ０００に掲げる心大血管疾患リハビリテーション料、Ｈ００１に掲げる脳血管疾患等リハビリテーション料、Ｈ００１－２に掲げる廃用症候群リハビリテーション料、Ｈ００２に掲げる運動器リハビリテーション料、Ｈ００３に掲げる呼吸器リハビリテーション料、Ｈ００７に掲げる障害児（者）リハビリテーション料及びＨ００７－２に掲げるがん患者リハビリテーション料は、算定できない。
  - ５別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病室に入院している患者に対して、入室後早期から必要な栄養管理を行った場合に、早期栄養介入管理加算として、入室した日から起算して７日を限度として250点（入室後早期から経腸栄養を開始した場合は、当該開始日以降は400点）を所定点数に加算する。
  ただし、区分番号Ｂ００１の10に掲げる入院栄養食事指導料は別に算定できない。
  - ６重症患者の対応に係る体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病室に入院している患者について、重症患者対応体制強化加算として、当該患者の入院期間に応じ、次に掲げる点数をそれぞれ所定点数に加算する。
      - イ３日以内の期間750点
      - ロ４日以上７日以内の期間500点
      - ハ８日以上14日以内の期間300点
  - ７特定集中治療室管理料２又は特定集中治療室管理料３を算定する保険医療機関であって別に厚生労働大臣が定める施設基準を満たすものにおいて、特定集中治療室管理に係る専門的な医療機関として別に厚生労働大臣が定める保険医療機関と情報通信機器を用いて連携して特定集中治療室管理が行われた場合に、特定集中治療室遠隔支援加算として、980点を所定点数に加算する。
  - ８別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、広範囲熱傷特定集中治療管理が必要な状態の患者に対して特定集中治療室管理が行われた場合には、広範囲熱傷管理加算として、入院日から起算して８日以降60日までの期間に限り、200点を所定点数に加算する。
