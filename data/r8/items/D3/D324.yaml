raw_text: |
  Ｄ３２４血管内視鏡検査2,040点
  - 注１血管内視鏡検査は、患者１人につき月１回に限り算定する。
  - ２呼吸心拍監視、血液ガス分析、心拍出量測定、脈圧測定、造影剤注入手技及びエックス線診断の費用（フィルムの費用は除く。）は、所定点数に含まれるものとする。
