  part: 第9部 処置
  section: 第1節 処置料
raw_text: |
  Ｊ０１８－３干渉低周波去痰器による喀痰
  排出（１日につき）48点
  - 注１間歇的陽圧吸入法又は人工呼吸と同時に行った干渉低周波去痰器による喀痰排出の費用は、それぞれ間歇的陽圧吸入法又は人工呼吸の所定点数に含まれるものとする。
  - ２６歳未満の乳幼児の場合は、乳幼児加算として、83点を加算する。
  - ３区分番号Ｃ１０３に掲げる在宅酸素療法指導管理料、区分番号Ｃ１０７に掲げる在宅人工呼吸指導管理料、区分番号Ｃ１０７－３に掲げる在宅ハイフローセラピー指導管理料、区分番号Ｃ１０９に掲げる在宅寝たきり患者処置指導管理料、区分番号Ｃ１１２に掲げる在宅気管切開患者指導管理料又は区分番号Ｃ１１２－２に掲げる在宅喉頭摘出患者指導管理料を算定している患者に対して行った干渉低周波去痰器による喀痰排出の費用は算定しない。
