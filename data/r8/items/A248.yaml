chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: 'Ａ２４８精神疾患診療体制加算

  - １精神疾患診療体制加算１（入院初日）1,000点

  - ２精神疾患診療体制加算２（入院初日から３日以内に１回）330点

  - 注１精神疾患診療体制加算１は、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、他の保険医療機関の求めに応じ、当該他の保険医療機関の精神病棟に入院する身体合併症の入院治療を要する精神疾患患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、精神疾患診療体制加算を算定できるものを現に算定している患者に限る。）の転院を受け入れた場合に、入院初日に限り所定点数に加算する。

  - ２精神疾患診療体制加算２は、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、救急用の自動車等により緊急に搬送された身体疾患又は外傷及び抑うつ、せん妄等の精神症状を有する患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、精神疾患診療体制加算を算定できるものを現に算定している患者に限る。）に対し、精神保健福祉法第18条第１項に規定する精神保健指定医（以下この表において「精神保健指定医」という。）等の精神科の医師が診察を行った場合に、入院初日から３日以内に１回に限り、所定点数に加算する。

  '
