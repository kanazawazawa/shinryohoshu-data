code: A000
name: 初診料
version: r8
points: 291
unit: 回
chapter:
  chapter: 第1章 基本診療料
  part: 第1部 初・再診料
  section: 第1節 初診料
raw_text: "Ａ０００初診料291点\n- 注１保険医療機関において初診を行った場合に算定する。\nただし、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、情報通信機器を用いた初診を行った場合には、253点を算定する。\n\
  - ２病院である保険医療機関（特定機能病院（医療法（昭和23年法律第205号）第４条の２第１項に規定する特定機能病院をいう。\n以下この表において同じ。）、地域医療支援病院（同法第４条第１項に規定する地域医療支援病院をいう。\n以下この表において同じ。）（同法第７条第２項第５号に規定する一般病床（以下「一般病床」という。）の数が200未満であるものを除く。）及び外来機能報告対象病院等（同法第30条の18の２第１項に規定する外来機能報告対象病院等をいう。\n\
  以下この表において同じ。）（同法第30条の18の５第１項第２号の規定に基づき、同法第30条の18の２第１項第１号の厚生労働省令で定める外来医療を提供する基幹的な病院として都道府県が公表したものに限り、一般病床の数が200未満であるものを除く。）に限る。）であって、初診の患者に占める他の病院又は診療所等からの文書による紹介があるものの割合等が低いものにおいて、別に厚生労働大臣が定める患者に対して初診を行った場合には、注１本文の規定にかかわらず、216点（注１のただし書に規定する場合にあっては、188点）を算定する。\n\
  - ３病院である保険医療機関（許可病床（医療法の規定に基づき許可を受け、若しくは届出をし、又は承認を受けた病床をいう。\n以下この表において同じ。）の数が400床以上である病院（特定機能病院、地域医療支援病院、外来機能報告対象病院等（同法第30条の18の５第１項第２号の規定に基づき、同法第30条の18の２第１項第１号の厚生労働省令で定める外来医療を提供する基幹的な病院として都道府県が公表したものに限る。）及び一般病床の数が200未満であるものを除く。）に限る。）であって、初診の患者に占める他の病院又は診療所等からの文書による紹介があるものの割合等が低いものにおいて、別に厚生労働大臣が定める患者に対して初診を行った場合には、注１本文の規定にかかわらず、216点（注１のただし書に規定する場合にあっては、188点）を算定する。\n\
  - ４医療用医薬品の取引価格の妥結率（当該保険医療機関において購入された使用薬剤の薬価（薬価基準）（平成20年厚生労働省告示第60号。\n以下「薬価基準」という。）に収載されている医療用医薬品の薬価総額（各医療用医薬品の規格単位数量に薬価を乗じた価格を合算したものをいう。\n\
  以下同じ。）に占める卸売販売業者（医薬品、医療機器等の品質、有効性及び安全性の確保等に関する法律（昭和35年法律第145号）第34条第５項に規定する卸売販売業者をいう。）と当該保険医療機関との間での取引価格が定められた薬価基準に収載されている医療用医薬品の薬価総額の割合をいう。\n\
  以下同じ。）に関して別に厚生労働大臣が定める施設基準を満たす保険医療機関（許可病床数が200床以上である病院に限る。）において初診を行った場合には、注１本文の規定にかかわらず、特定妥結率初診料として、216点（注１のただし書に規定する場合にあっては、188点）を算定する。\n\
  - ５１傷病の診療継続中に他の傷病が発生して初診を行った場合は、それらの傷病に係る初診料は、併せて１回とし、第１回の初診のときに算定する。\nただし、同一保険医療機関において、同一日に他の傷病について、新たに別の診療科を初診として受診した場合は、２つ目の診療科に限り146点（注１のただし書に規定する場合にあっては、127点）を、この場合において注２から注４までに規定する場合は、108点（注１のただし書に規定する場合にあっては、94点）を算定できる。\n\
  ただし書の場合においては、注６から注16までに規定する加算は算定しない。\n- ６６歳未満の乳幼児に対して初診を行った場合は、乳幼児加算として、75点を所定点数に加算する。\nただし、注７又は注８に規定する加算を算定する場合は算定しない。\n\
  - ７保険医療機関が表示する診療時間以外の時間（深夜（午後10時から午前６時までの間をいう。\n以下この表において同じ。）及び休日を除く。\n以下この表において同じ。）、休日（深夜を除く。\n以下この表において同じ。）又は深夜において初診を行った場合は、時間外加算、休日加算又は深夜加算として、それぞれ85点、250点又は480点（６歳未満の乳幼児の場合にあっては、それぞれ200点、365点又は695点）を所定点数に加算する。\n\
  ただし、専ら夜間における救急医療の確保のために設けられている保険医療機関にあっては、夜間であって別に厚生労働大臣が定める時間において初診を行った場合は、230点（６歳未満の乳幼児の場合にあっては、345点）を所定点数に加算する。\n- ８小児科を標榜する保険医療機関（注７のただし書に規定するものを除く。）にあっては、夜間であって別に厚生労働大臣が定める時間、休日又は深夜（当該保険医療機関が表示する診療時間内の時間に限る。）において６歳未満の乳幼児に対して初診を行った場合は、注７の規定にかかわらず、それぞれ200点、365点又は695点を所定点数に加算する。\n\
  - ９別に厚生労働大臣が定める施設基準を満たす保険医療機関（診療所に限る。）が、午後６時（土曜日にあっては正午）から午前８時までの間（深夜及び休日を除く。）、休日又は深夜であって、当該保険医療機関が表示する診療時間内の時間において初診を行った場合は、夜間・早朝等加算として、50点を所定点数に加算する。\n\
  ただし、注７のただし書又は注８に規定する加算を算定する場合にあっては、この限りでない。\n- 10別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関（許可病床数が200床未満の病院又は診療所に限る。）において初診を行った場合は、機能強化加算として、80点を所定点数に加算する。\n\
  - 11組織的な感染防止対策につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関（診療所に限る。）において初診を行った場合は、外来感染対策向上加算として、月１回に限り６点を所定点数に加算する。\n\
  ただし、発熱その他感染症を疑わせるような症状を呈する患者に対して適切な感染防止対策を講じた上で初診を行った場合は、発熱患者等対応加算として、月１回に限り20点を更に所定点数に加算する。\n- 12注11本文に該当する場合であって、感染症対策に関する医療機関間の連携体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において初診を行った場合は、連携強化加算として、月１回に限り３点を更に所定点数に加算する。\n\
  - 13注11本文に該当する場合であって、感染防止対策に資する情報を提供する体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において初診を行った場合は、サーベイランス強化加算として、月１回に限り１点を更に所定点数に加算する。\n\
  - 14注11本文に該当する場合であって、抗菌薬の使用状況につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において初診を行った場合は、抗菌薬適正使用体制加算として、月１回に限り５点を更に所定点数に加算する。\n\
  - 15保険医療機関（診療所又は許可病床数が200床未満である病院に限る。）において、特定機能病院、地域医療支援病院（一般病床の数が200床未満の病院を除く。）、紹介受診重点医療機関（一般病床の数が200床未満であるものを除く。）又は許可病床の数が400床以上の病院（一般病床の数が200床未満の病院を除く。）の紹介を受けて初診を行った場合は、特定機能病院等紹介患者受入加算として、60点を所定点数に加算する。\n\
  - 16医療ＤＸ推進に係る体制として別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関を受診した患者に対して初診を行った場合は、電子的診療情報連携体制整備加算として、月１回に限り、当該基準に係る区分に従い、次に掲げる点数をそれぞれ所定点数に加算する。\n\
  この場合において、区分番号Ａ００１に掲げる再診料の注11に規定する明細書発行体制等加算は別に算定できない。\n    - イ電子的診療情報連携体制整備加算１15点\n    - ロ電子的診療情報連携体制整備加算２９点\n    - ハ電子的診療情報連携体制整備加算３４点\n"
