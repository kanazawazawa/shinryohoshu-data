  - １単純乳房切除術（乳腺全摘術）17,040点
  - ２乳房部分切除術（腋窩部郭清を伴わないもの）28,210点
  - ３乳房切除術（腋窩部郭清を伴わないもの）22,520点
  - ４乳房部分切除術（腋窩部郭清を伴うもの（内視鏡下によるものを含む。））42,350点
  - ５乳房切除術（腋窩鎖骨下部郭清を伴うもの）・胸筋切除を併施しないもの42,350点
