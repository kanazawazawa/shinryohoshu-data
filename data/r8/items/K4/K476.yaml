  - ７拡大乳房切除術（胸骨旁、鎖骨上、下窩など郭清を併施するもの）52,820点
  - ８乳輪温存乳房切除術（腋窩部郭清を伴わないもの（内視鏡下によるものを含む。））27,810点
  - ９乳輪温存乳房切除術（腋窩部郭清を伴うもの）48,340点
  - 注１放射性同位元素及び色素を用いたセンチネルリンパ節生検を行った場合又はインドシアニングリーンを用いたリンパ節生検を行った場合には、乳癌センチネルリンパ節生検加算１として、5,000点を所定点数に加算する。
  ただし、当該検査に用いた色素の費用は、算定しない。
