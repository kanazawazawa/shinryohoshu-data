  part: 第12部 放射線治療
  section: 第1節 放射線治療管理・実施料
raw_text: 'Ｍ０００放射線治療管理料（分布図の作成１回につき）１１門照射、対向２門照射又は外部照射を行った場合2,700点

  - ２非対向２門照射、３門照射又は腔内照射を行った場合3,100点

  - ３４門以上の照射、運動照射、原体照射又は組織内照射を行った場合4,000点

  - ４強度変調放射線治療（ＩＭＲＴ）による体外照射を行った場合5,000点

  - 注１線量分布図を作成し、区分番号Ｍ００１に掲げる体外照射、区分番号Ｍ００４の１に掲げる外部照射、区分番号Ｍ００４の２に掲げる腔内照射又は区分番号Ｍ００４の３に掲げる組織内照射による治療を行った場合に、分布図の作成１回につき１回、一連につき２回に限り算定する。

  - ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、患者に対して、放射線治療を専ら担当する常勤の医師が策定した照射計画に基づく医学的管理（区分番号Ｍ００１の２に掲げる高エネルギー放射線治療及び区分番号Ｍ００１の３に掲げる強度変調放射線治療（ＩＭＲＴ）に係るものに限る。）を行った場合は、放射線治療専任加算として、330点を所定点数に加算する。

  - ３注２に規定する別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、放射線治療を必要とする悪性腫瘍の患者であって、入院中の患者以外のもの等に対して、放射線治療（区分番号Ｍ００１の２に掲げる高エネルギー放射線治療及び区分番号Ｍ００１の３に掲げる強度変調放射線治療（ＩＭＲＴ）に係るものに限る。）を実施した場合に、外来放射線治療加算として、患者１人１日につき１回に限り100点を所定点数に加算する。

  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、緊急時の放射線治療の治療計画を、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た別の保険医療機関と共同して策定した場合に、遠隔放射線治療計画加算として、一連の治療につき１回に限り2,000点を所定点数に加算する。

  '
