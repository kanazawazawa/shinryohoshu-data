raw_text: "Ｋ８０３膀胱悪性腫瘍手術\n- １切除34,150点\n- ２全摘（腸管等を利用して尿路変更を行わないもの）66,890点\n- ３全摘（尿管Ｓ状結腸吻合を利用して尿路変更を行うもの）80,160点\n- ４全摘（回腸又は結腸導管を利用して尿路変更を行うもの）120,740点\n\
