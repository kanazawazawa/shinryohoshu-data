  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: 'Ｂ０１１－４医療機器安全管理料

  - １臨床工学技士が配置されている保険医療機関において、生命維持管理装置を用いて治療を行う場合（１月につき）100点

  - ２放射線治療機器の保守管理、精度管理等の体制が整えられている保険医療機関において、放射線治療計画を策定する場合（一連につき）1,100点

  - 注１１については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、生命維持管理装置を用いて治療を行った場合に、患者１人につき月１回に限り算定する。

  - ２２については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、放射線治療が必要な患者に対して、放射線治療計画に基づいて治療を行った場合に算定する。

  '
