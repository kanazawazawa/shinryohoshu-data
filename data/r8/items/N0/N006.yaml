raw_text: |
  Ｎ００６病理診断料
  - １組織診断料520点
  - ２細胞診断料200点
  - 注１１については、病理診断を専ら担当する医師が勤務する病院又は病理診断を専ら担当する常勤の医師が勤務する診療所である保険医療機関において、区分番号Ｎ０００に掲げる病理組織標本作製、区分番号Ｎ００１に掲げる電子顕微鏡病理組織標本作製、区分番号Ｎ００２に掲げる免疫染色（免疫抗体法）病理組織標本作製若しくは区分番号Ｎ００３に掲げる術中迅速病理組織標本作製により作製された組織標本（区分番号Ｎ０００に掲げる病理組織標本作製又は区分番号Ｎ００２に掲げる免疫染色（免疫抗体法）病理組織標本作製により作製された組織標本のデジタル病理画像を含む。）に基づく診断を行った場合又は当該保険医療機関以外の保険医療機関で作製された組織標本（当該保険医療機関以外の保険医療機関で区分番号Ｎ０００に掲げる病理組織標本作製又は区分番号Ｎ００２に掲げる免疫染色（免疫抗体法）病理組織標本作製により作製された組織標本のデジタル病理画像を含む。）に基づく診断を行った場合に、これらの診断の別又は回数にかかわらず、月１回に限り算定する。
  - ２２については、病理診断を専ら担当する医師が勤務する病院又は病理診断を専ら担当する常勤の医師が勤務する診療所である保険医療機関において、区分番号
