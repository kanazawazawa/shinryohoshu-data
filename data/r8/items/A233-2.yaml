chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: 'Ａ２３３－２栄養サポートチーム加算（週１回）200点

  - 注１栄養管理体制その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、栄養管理を要する患者として別に厚生労働大臣が定める患者に対して、当該保険医療機関の保険医、看護師、薬剤師、管理栄養士等が共同して必要な診療を行った場合に、当該患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、栄養サポートチーム加算を算定できるものを現に算定している患者に限る。）について、週１回（療養病棟入院基本料、結核病棟入院基本料、精神病棟入院基本料又は特定機能病院入院基本料（結核病棟又は精神病棟に限る。）を算定している患者については、入院した日から起算して１月以内の期間にあっては週１回、入院した日から起算して１月を超え６月以内の期間にあっては月１回）（障害者施設等入院基本料を算定している患者については、月１回）に限り所定点数に加算する。

  この場合において、区分番号Ｂ００１の10に掲げる入院栄養食事指導料、区分番号Ｂ００１の11に掲げる集団栄養食事指導料及び区分番号Ｂ００１－２－３に掲げる乳幼児育児栄養指導料は別に算定できない。

  - ２医療提供体制の確保の状況に鑑み別に厚生労働大臣が定める地域に所在する保険医療機関であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出たものについては、注１に規定する届出の有無にかかわらず、当該加算の点数に代えて、栄養サポートチーム加算（特定地域）として、100点を所定点数に加算することができる。

  - ３注１の場合において、歯科医師が、注１の必要な診療を保険医等と共同して行った場合は、歯科医師連携加算として、50点を更に所定点数に加算する。

  '
