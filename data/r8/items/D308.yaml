raw_text: |
  Ｄ３０８胃・十二指腸ファイバースコピー1,140点
  - 注１胆管・膵管造影法を行った場合は、胆管・膵管造影法加算として、600点を所定点数に加算する。
  ただし、諸監視、造影剤注入手技及びエックス線診断の費用（フィルムの費用は除く。）は所定点数に含まれるものとする。
  - ２粘膜点墨法を行った場合は、粘膜点墨法加算として、60点を所定点数に加算する。
  - ３胆管・膵管鏡を用いて行った場合は、胆管・膵管鏡加算として、3,360点を所定点数に加算する。
  - ４拡大内視鏡を用いて、狭帯域光による観察を行った場合には、狭帯域光強調加算として、200点を所定点数に加算する。
