chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第3節 特定入院料
raw_text: "Ａ３１１精神科救急急性期医療入院料（１日につき）１30日以内の期間2,516点\n- ２31日以上60日以内の期間2,216点\n- ３61日以上90日以内の期間2,014点\n- 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た精神病棟を有する保険医療機関において、当該届出に係る精神病棟に入院している患者（別に厚生労働大臣が定める基準に適合するものに限る。）について算定する。\n\
  ただし、当該病棟に入院した患者が当該入院料に係る算定要件に該当しない場合は、区分番号Ａ１０３に掲げる精神病棟入院基本料の精神病棟入院料の15対１入院基本料の例により算定する。\n- ２診療に係る費用（注３から注５までに規定する加算、第２節に規定する臨床研修病院入院診療加算、医師事務作業補助体制加算、地域加算、離島加算、特定感染症患者療養環境特別加算、精神科措置入院診療加算、精神科応急入院施設管理加算、精神科身体合併症管理加算、口腔管理連携加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、精神科救急搬送患者地域連携紹介加算、データ提出加算、精神科入退院支援加算、精神科急性期医師配置加算（精神科救急急性期医療入院料を算定するものに限る。）、薬剤総合評価調整加算、排尿自立支援加算及び地域医療体制確保加算、第２章第１部医学管理等の区分番号Ｂ０１５に掲げる精神科退院時共同指導料２、第８部精神科専門療法、第９部処置の区分番号Ｊ０３８に掲げる人工腎臓、区分番号Ｊ０４２に掲げる腹膜灌流及び区分番号Ｊ４００に掲げる特定保険医療材料（区分番号Ｊ０３８に掲げる人工腎臓又は区分番号Ｊ０４２に掲げる腹膜灌流に係るものに限る。）、第10部手術、第11部麻酔、第12部放射線治療及び第14部その他並びに除外薬剤・注射薬に係る費用を除く。）は、精神科救急急性期医療入院料に含まれるものとする。\n\
  - ３当該病棟に入院している統合失調症の患者に対して、計画的な医学管理の下に非定型抗精神病薬による治療を行い、かつ、療養上必要な指導を行った場合には、当該患者が使用した１日当たりの抗精神病薬が２種類以下の場合に限り、非定型抗精神病薬加算として、１日につき15点を所定点数に加算する。\n\
  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者については、入院した日から起算して30日を限度として、看護職員夜間配置加算として、１日（別に厚生労働大臣が定める日を除く。）につき70点を所定点数に加算する。\n\
  - ５別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者については、当該基準に係る区分に従い、入院した日から起算して90日を限度として、精神科救急医療体制加算として、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n\
  \    - イ精神科救急医療体制加算１600点\n    - ロ精神科救急医療体制加算２500点Ａ３１１－２精神科急性期治療病棟入院料（１日につき）１精神科急性期治療病棟入院料１\n    - イ30日以内の期間2,104点\n    -\
  \ ロ31日以上60日以内の期間1,803点\n    - ハ61日以上90日以内の期間1,602点\n- ２精神科急性期治療病棟入院料２\n    - イ30日以内の期間1,981点\n    - ロ31日以上60日以内の期間1,696点\n\
  \    - ハ61日以上90日以内の期間1,544点\n- 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た精神病棟を有する保険医療機関において、当該届出に係る精神病棟に入院している患者（別に厚生労働大臣が定める基準に適合するものに限る。）について、当該基準に係る区分に従い、それぞれ所定点数を算定する。\n\
  ただし、当該病棟に入院した患者が当該入院料に係る算定要件に該当しない場合は、区分番号Ａ１０３に掲げる精神病棟入院基本料の精神病棟入院料の15対１入院基本料の例により算定する。\n- ２診療に係る費用（注３に規定する加算、第２節に規定する臨床研修病院入院診療加算、妊産婦緊急搬送入院加算、医師事務作業補助体制加算、地域加算、離島加算、特定感染症患者療養環境特別加算、精神科措置入院診療加算、精神科応急入院施設管理加算、精神科身体合併症管理加算、精神科慢性身体合併症管理加算、依存症入院医療管理加算、口腔管理連携加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、精神科救急搬送患者地域連携紹介加算、データ提出加算、精神科入退院支援加算、精神科急性期医師配置加算（精神科急性期治療病棟入院料１又は精神科急性期治療病棟入院料２（精神病棟看護・多職種協働加算を算定するものに限る。）を算定するものに限る。）、薬剤総合評価調整加算、排尿自立支援加算及び精神科地域密着多機能体制加算、第２章第１部医学管理等の区分番号Ｂ０１５に掲げる精神科退院時共同指導料２、第８部精神科専門療法、第９部処置の区分番号Ｊ０３８に掲げる人工腎臓、区分番号Ｊ０４２に掲げる腹膜灌流及び区分番号Ｊ４００に掲げる特定保険医療材料（区分番号Ｊ０３８に掲げる人工腎臓又は区分番号Ｊ０４２に掲げる腹膜灌流に係るものに限る。）、第10部手術、第11部麻酔、第12部放射線治療及び第14部その他並びに除外薬剤・注射薬に係る費用を除く。）は、精神科急性期治療病棟入院料に含まれるものとする。\n\
  - ３当該病棟に入院している統合失調症の患者に対して、計画的な医学管理の下に非定型抗精神病薬による治療を行い、かつ、療養上必要な指導を行った場合には、当該患者が使用した１日当たりの抗精神病薬が２種類以下の場合に限り、非定型抗精神病薬加算として、１日につき15点を所定点数に加算する。\n\
  - ４精神科急性期治療病棟入院料２において、別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者について、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n    -\
  \ イ精神病棟看護・多職種協働加算（精神科急性期治療病棟入院料２の場合）30日以内の期間123点\n    - ロ精神病棟看護・多職種協働加算（精神科急性期治療病棟入院料２の場合）31日以上60日以内の期間107点\n    - ハ精神病棟看護・多職種協働加算（精神科急性期治療病棟入院料２の場合）61日以上90日以内の期間58点Ａ３１１－３精神科救急・合併症入院料（１日につき）１30日以内の期間3,805点\n\
  - ２31日以上60日以内の期間3,504点\n- ３61日以上90日以内の期間3,304点\n- 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た精神病棟を有する保険医療機関において、当該届出に係る精神病棟に入院している患者（別に厚生労働大臣が定める基準に適合するものに限る。）について算定する。\n\
