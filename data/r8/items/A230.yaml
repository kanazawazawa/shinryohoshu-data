raw_text: 'Ａ２３０精神病棟入院時医学管理加算（１日につき）５点

  - 注医師の配置その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た精神病棟に入院している患者（第１節の入院基本料（特別入院基本料等を含む。）のうち、精神病棟入院時医学管理加算を算定できるものを現に算定している患者に限る。）について、所定点数に加算する。

  '
