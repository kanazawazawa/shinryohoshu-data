  Ａ３０８－３地域包括ケア病棟入院料（１日につき）１地域包括ケア病棟入院料１
      - イ40日以内の期間2,955点（生活療養を受ける場合にあっては、2,934点）
      - ロ41日以上の期間2,807点（生活療養を受ける場合にあっては、2,786点）２地域包括ケア入院医療管理料１
      - イ40日以内の期間2,955点（生活療養を受ける場合にあっては、2,934点）
      - ロ41日以上の期間2,807点（生活療養を受ける場合にあっては、2,786点）３地域包括ケア病棟入院料２
      - イ40日以内の期間2,766点（生活療養を受ける場合にあっては、2,745点）
      - ロ41日以上の期間2,627点（生活療養を受ける場合にあっては、2,606点）４地域包括ケア入院医療管理料２
      - イ40日以内の期間2,766点（生活療養を受ける場合にあっては、2,745点）
      - ロ41日以上の期間2,627点（生活療養を受ける場合にあっては、2,606点）５地域包括ケア病棟入院料３
      - イ40日以内の期間2,397点（生活療養を受ける場合にあっては、2,376点）
      - ロ41日以上の期間2,276点（生活療養を受ける場合にあっては、2,255点）６地域包括ケア入院医療管理料３
      - イ40日以内の期間2,397点（生活療養を受ける場合にあっては、2,376点）
      - ロ41日以上の期間2,276点（生活療養を受ける場合にあっては、2,255点）７地域包括ケア病棟入院料４
      - イ40日以内の期間2,187点（生活療養を受ける場合にあっては、2,165点）
      - ロ41日以上の期間2,077点（生活療養を受ける場合にあっては、2,055点）８地域包括ケア入院医療管理料４
      - イ40日以内の期間2,187点（生活療養を受ける場合にあっては、2,165点）
      - ロ41日以上の期間2,077点（生活療養を受ける場合にあっては、2,055点）注１１、３、５及び７については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟を有する保険医療機関において、当該届出に係る病棟に入院している患者について、２、４、６及び８については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病室を有する保険医療機関において、当該届出に係る病室に入院している患者について、当該病棟又は病室に入院した日から起算して60日を限度としてそれぞれ所定点数（当該病棟又は病室に係る病床が療養病床である場合にあっては、別に厚生労働大臣が定める場合を除き、所定点数の100分の95に相当する点数）を算定する。
  ただし、当該病棟又は病室に入院した患者が地域包括ケア病棟入院料又は地域包括ケア入院医療管理料に係る算定要件に該当しない場合は、当該病棟又は病室を有する病棟が一般病棟であるときには区分番号Ａ１００に掲げる一般病棟入院基本料の注２に規定する特別入院基本料の例により、当該病棟又は病室を有する病棟が療養病棟であるときには区分番号Ａ１０１に掲げる療養病棟入院料１の入院料27又は療養病棟入院料２の入院料27の例により、それぞれ算定する。
  - ２医療提供体制の確保の状況に鑑み別に厚生労働大臣が定める地域に所在する保険医療機関であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟又は病室を有するものについては、注１に規定する届出の有無にかかわらず、地域包括ケア病棟入院料１のイ（特定地域）、地域包括ケア病棟入院料１のロ（特定地域）、地域包括ケア入院医療管理料１のイ（特定地域）、地域包括ケア入院医療管理料１のロ（特定地域）、地域包括ケア病棟入院料２のイ（特定地域）、地域包括ケア病棟入院料２のロ（特定地域）、地域包括ケア入院医療管理料２のイ（特定地域）、地域包括ケア入院医療管理料２のロ（特定地域）、地域包括ケア病棟入院料３のイ（特定地域）、地域包括ケア病棟入院料３のロ（特定地域）、地域包括ケア入院医療管理料３のイ（特定地域）、地域包括ケア入院医療管理料３のロ（特定地域）、地域包括ケア病棟入院料４のイ（特定地域）、地域包括ケア病棟入院料４のロ（特定地域）、地域包括ケア入院医療管理料４のイ（特定地域）又は地域包括ケア入院医療管理料４のロ（特定地域）について、所定点数に代えて、当該病棟又は病室に入院した日から起算して60日を限度として、１日につき、それぞれ2,577点、2,448点、2,577点、2,448点、2,388点、2,269点、2,388点、2,269点、2,093点、1,988点、2,093点、1,988点、1,882点、1,788点、1,882点又は1,788点（生活療養を受ける場合にあっては、それぞれ2,556点、2,427点、2,556点、2,427点、2,368点、2,249点、2,368点、2,249点、2,073点、1,968点、2,073点、1,968点、1,862点、1,768点、1,862点又は1,768点）を算定することができる。
  ただし、当該病棟又は病室に入院した患者が地域包括ケア病棟入院料（特定地域）又は地域包括ケア入院医療管理料（特定地域）に係る算定要件に該当しない場合は、当該病棟又は病室を有する病棟が一般病棟であるときには区分番号Ａ１００に掲げる一般病棟入院基本料の注２に規定する特別入院基本料の例により、当該病棟又は病室を有する病棟が療養病棟であるときには区分番号Ａ１０１に掲げる療養病棟入院料１の入院料27又は療養病棟入院料２の入院料27の例により、それぞれ算定する。
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟又は病室に入院している患者については、看護職員配置加算として、１日につき150点を所定点数に加算する。
  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟又は病室に入院している患者については、看護補助者配置加算として、１日につき160点を所定点数に加算する。
  この場合において、注５に規定する看護補助・患者ケア体制充実加算は別に算定できない。
  - ５別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟又は病室に入院している患者については、当該基準に係る区分に従い、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
  ただし、当該患者について、身体的拘束を実施した日は、看護補助・患者ケア体制充実加算３の例により所定点数に加算する。
      - イ看護補助・患者ケア体制充実加算１190点
      - ロ看護補助・患者ケア体制充実加算２175点
      - ハ看護補助・患者ケア体制充実加算３165点
  - ６当該病棟又は病室に入院している患者のうち、急性期医療を担う他の保険医療機関の一般病棟から転院した患者又は当該保険医療機関（急性期医療を担う保険医療機関に限る。）の一般病棟から転棟した患者については、急性期患者支援病床初期加算として、介護老人保健施設、介護医療院、特別養護老人ホーム、軽費老人ホーム、有料老人ホーム等又は自宅から入院した患者については、治療方針に関する患者又はその家族の意思決定に対する支援を行った場合に、在宅患者支援病床初期加算として、転棟若しくは転院又は入院した日から起算して14日を限度として、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
      - イ急性期患者支援病床初期加算
    - （1）許可病床数が400床以上の保険医療機関の場合①他の保険医療機関（当該保険医療機関と特別の関係にあるものを除く。）の一般病棟から転棟した患者の場合150点②①の患者以外の患者の場合50点
    - （2）許可病床数が400床未満の保険医療機関の場合①他の保険医療機関（当該保険医療機関と特別の関係にあるものを除く。）の一般病棟から転棟した患者の場合250点②①の患者以外の患者の場合125点
      - ロ在宅患者支援病床初期加算
    - （1）介護老人保健施設から入院した患者の場合①緊急入院した患者の場合590点②①の患者以外の患者の場合410点
    - （2）介護医療院、特別養護老人ホーム、軽費老人ホーム、有料老人ホーム等又は自宅から入院した患者の場合①緊急入院した患者の場合490点②①の患者以外の患者の場合310点
  - ７診療に係る費用（注３から注６まで及び注８に規定する加算、第２節に規定する臨床研修病院入院診療加算、包括期充実体制加算、在宅患者緊急入院診療加算、医師事務作業補助体制加算、地域加算、離島加算、特定感染症患者療養環境特別加算、特定薬剤治療環境特別加算、口腔管理連携加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、身体的拘束最小化推進体制加算、データ提出加算、入退院支援加算（１のロに限る。）、医療的ケア児（者）入院前支援加算、認知症ケア加算、薬剤総合評価調整加算、排尿自立支援加算、協力対象施設入所者入院加算及び医療提供機能連携確保加算、区分番号Ｂ００１の10に掲げる入院栄養食事指導料（注14に掲げる加算を算定する患者に限る。）、区分番号Ｂ０１１の６に掲げる栄養情報連携料（注14に掲げる加算を算定する患者に限る。）、区分番号Ｂ００１の34に掲げる二次性骨折予防継続管理料（ロに限る。）、区分番号Ｂ００５に掲げる退院時共同指導料２、区分番号Ｂ００５－１－２に掲げる介護支援等連携指導料、第２章第２部在宅医療、区分番号Ｈ００４に掲げる摂食機能療法、区分番号Ｊ０３８に掲げる人工腎臓、区分番号Ｊ０４２に掲げる腹膜灌流及び区分番号Ｊ４００に掲げる特定保険医療材料（区分番号Ｊ０３８に掲げる人工腎臓又は区分番号Ｊ０４２に掲げる腹膜灌流に係るものに限る。）、第10部手術、第11部麻酔、第14部その他並びに除外薬剤・注射薬の費用を除く。）は、地域包括ケア病棟入院料１、地域包括ケア入院医療管理料１、地域包括ケア病棟入院料２、地域包括ケア入院医療管理料２、地域包括ケア病棟入院料３、地域包括ケア入院医療管理料３、地域包括ケア病棟入院料４及び地域包括ケア入院医療管理料４に含まれるものとする。
  - ８別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟又は病室に入院している患者については、看護職員夜間配置加算として、１日（別に厚生労働大臣が定める日を除く。）につき70点を所定点数に加算する。
  - ９別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の特定入院料は、夜間看護体制特定日減算として、次のいずれにも該当する場合に限り、所定点数の100分の５に相当する点数を減算する。
      - イ年６日以内であること。
      - ロ当該日が属する月が連続する２月以内であること。
  - 10注１に規定する地域包括ケア病棟入院料２又は地域包括ケア病棟入院料４の施設基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た場合に限り、当該病棟に入院している患者については、それぞれの所定点数の100分の85に相当する点数を算定する。
  - 11注１に規定する地域包括ケア病棟入院料３、地域包括ケア入院医療管理料３、地域包括ケア病棟入院料４又は地域包括ケア入院医療管理料４の施設基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た場合に限り、当該病棟又は病室に入院している患者については、それぞれの所定点数の100分の90に相当する点数を算定する。
  - 12注１に規定する地域包括ケア病棟入院料２、地域包括ケア入院医療管理料２、地域包括ケア病棟入院料４又は地域包括ケア入院医療管理料４の施設基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た場合に限り、当該病棟又は病室に入院している患者については、それぞれの所定点数の100分の90に相当する点数を算定する。
  - 13別に厚生労働大臣が定める保険医療機関において、地域包括ケア病棟入院料１、地域包括ケア入院医療管理料１、地域包括ケア病棟入院料２又は地域包括ケア入院医療管理料２を算定する病棟又は病室に入院している患者については、それぞれの所定点数の100分の90に相当する点数を算定する。
  - 14リハビリテーション、栄養管理及び口腔管理を連携・推進する体制につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者については、リハビリテーション・栄養・口腔連携加算として、リハビリテーション、栄養管理及び口腔管理に係る計画を作成した日から起算して14日を限度として30点を所定点数に加算する。
