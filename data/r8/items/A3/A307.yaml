raw_text: |
  Ａ３０７小児入院医療管理料（１日につき）１小児入院医療管理料１5,216点
  - ２小児入院医療管理料２4,486点
  - ３小児入院医療管理料３4,022点
  - ４小児入院医療管理料４3,361点
  - ５小児入院医療管理料５2,357点
  - 注１別に厚生労働大臣の定める小児を入院させる病棟又は施設に関する基準に適合しているものとして地方厚生局長等に届け出た小児科を標榜する保険医療機関の病棟（療養病棟を除く。）に入院している15歳未満の小児（児童福祉法第６条の２第３項に規定する小児慢性特定疾病医療支援の対象である場合は、20歳未満の者）について、当該基準に係る区分に従い、所定点数を算定する。
  ただし、小児入院医療管理料５を算定する病棟において、当該入院医療管理料に係る算定要件に該当しない患者が当該病棟（精神病棟に限る。）に入院した場合は、区分番号
