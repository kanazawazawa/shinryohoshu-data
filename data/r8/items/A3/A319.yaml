  part: 第2部 入院料等
  section: 第3節 特定入院料
raw_text: |
  Ａ３１９特定機能病院リハビリテーション病棟入院料2,399点
  （生活療養を受ける場合にあっては、2,379点）注１主として回復期リハビリテーションを行う病棟に関する別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関（特定機能病院に限る。）が地方厚生局長等に届け出た病棟に入院している患者であって、別に厚生労働大臣が定める回復期リハビリテーションを要する状態にあるものについて、当該病棟に入院した日から起算して、それぞれの状態に応じて別に厚生労働大臣が定める日数を限度として所定点数を算定する。
  ただし、当該病棟に入院した患者が当該入院料に係る算定要件に該当しない場合は、区分番号Ａ１００に掲げる一般病棟入院基本料の注２に規定する特別入院基本料の例により算定する。
  - ２診療に係る費用（当該患者に対して行った第２章第１部医学管理等の区分番号Ｂ００１の10に掲げる入院栄養食事指導料、区分番号Ｂ００７に掲げる退院前訪問指導料及び区分番号Ｂ０１１－６に掲げる栄養情報連携料、第２部在宅医療、第７部リハビリテーションの費用（別に厚生労働大臣が定める費用を除く。）、第２節に規定する臨床研修病院入院診療加算、医師事務作業補助体制加算、地域加算、離島加算、特定感染症患者療養環境特別加算、特定薬剤治療環境特別加算、口腔管理連携加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、データ提出加算、入退院支援加算（１のロに限る。）、認知症ケア加算、薬剤総合評価調整加算及び排尿自立支援加算、区分番号Ｊ０３８に掲げる人工腎臓、区分番号Ｊ０４２に掲げる腹膜灌流及び区分番号Ｊ４００に掲げる特定保険医療材料（区分番号Ｊ０３８に掲げる人工腎臓又は区分番号Ｊ０４２に掲げる腹膜灌流に係るものに限る。）、第14部その他並びに除外薬剤・注射薬の費用を除く。）は、特定機能病院リハビリテーション病棟入院料に含まれるものとする。
