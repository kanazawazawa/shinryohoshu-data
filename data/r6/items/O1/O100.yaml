chapter:
  chapter: 第2章 特掲診療料
  part: 第14部 その他
  section: 第2節 ベースアップ評価料
raw_text: |
  Ｏ１００外来・在宅ベースアップ評価料（Ⅰ）（１日につき）１初診時６点
  - ２再診時等２点
  - ３訪問診療時
      - イ同一建物居住者等以外の場合28点
      - ロイ以外の場合７点
  - 注１１については、主として医療に従事する職員（医師及び歯科医師を除く。
  以下この節において同じ。）の賃金の改善を図る体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、入院中の患者以外の患者に対して初診を行った場合に、所定点数を算定する。
  - ２２については、主として医療に従事する職員の賃金の改善を図る体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、入院中の患者以外の患者に対して再診又は短期滞在手術等基本料１を算定すべき手術又は検査を行った場合に、所定点数を算定する。
  - ３３のイについては、主として医療に従事する職員の賃金の改善を図る体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、在宅で療養を行っている患者であって通院が困難なものに対して、次のいずれかに該当する訪問診療を行った場合に算定する。
      - イ当該患者の同意を得て、計画的な医学管理の下に定期的に訪問して診療を行った場合（区分番号Ａ０００に掲げる初診料を算定する初診の日に訪問して診療を行った場合及び有料老人ホームその他これに準ずる施設（以下この区分番号において「有料老人ホーム等」という。）に併設される保険医療機関が、当該有料老人ホーム等に入居している患者に対して行った場合を除く。）であって、当該患者が同一建物居住者（当該患者と同一の建物に居住する他の患者に対して当該保険医療機関が同一日に訪問診療を行う場合の当該患者をいう。
  以下この区分番号において同じ。）以外である場合
      - ロ区分番号Ｃ００２に掲げる在宅時医学総合管理料、区分番号Ｃ００２－２に掲げる施設入居時等医学総合管理料又は区分番号Ｃ００３に掲げる在宅がん医療総合診療料の算定要件を満たす他の保険医療機関の求めに応じ、当該他の保険医療機関から紹介された患者に対して、当該患者の同意を得て、計画的な医学管理の下に訪問して診療を行った場合（有料老人ホーム等に併設される保険医療機関が、当該有料老人ホーム等に入居している患者に対して行った場合を除く。）であって、当該患者が同一建物居住者以外である場合
      - ハ別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関（在宅療養支援診療所又は在宅療養支援病院に限る。）において、在宅での療養を行っている末期の悪性腫瘍の患者であって通院が困難なものに対して、当該患者の同意を得て、計画的な医学管理の下に総合的な医療を提供した場合（訪問診療を行った場合に限る。）４３のロについては、主として医療に従事する職員の賃金の改善を図る体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、在宅で療養を行っている患者であって通院が困難なものに対して、次のいずれかに該当する訪問診療を行った場合に算定する。
      - イ当該患者の同意を得て、計画的な医学管理の下に定期的に訪問して診療を行った場合（区分番号Ａ０００に掲げる初診料を算定する初診の日に訪問して診療を行った場合及び有料老人ホーム等に併設される保険医療機関が、当該有料老人ホーム等に入居している患者に対して行った場合を除く。）であって、当該患者が同一建物居住者である場合
      - ロ区分番号Ｃ００２に掲げる在宅時医学総合管理料、区分番号Ｃ００２―２に掲げる施設入居時等医学総合管理料又は区分番号Ｃ００３に掲げる在宅がん医療総合診療料の算定要件を満たす他の保険医療機関の求めに応じ、当該他の保険医療機関から紹介された患者に対して、当該患者の同意を得て、計画的な医学管理の下に訪問して診療を行った場合（有料老人ホーム等に併設される保険医療機関が、当該有料老人ホーム等に入居している患者に対して行った場合を除く。）であって、当該患者が同一建物居住者である場合
      - ハ有料老人ホーム等に併設される保険医療機関が、当該有料老人ホーム等に入居している患者に対して訪問診療を行った場合Ｏ１０１外来・在宅ベースアップ評価料（Ⅱ）（１日につき）１外来・在宅ベースアップ評価料（Ⅱ）１
      - イ初診又は訪問診療を行った場合８点
      - ロ再診時等１点
  - ２外来・在宅ベースアップ評価料（Ⅱ）２
      - イ初診又は訪問診療を行った場合16点
      - ロ再診時等２点
  - ３外来・在宅ベースアップ評価料（Ⅱ）３
