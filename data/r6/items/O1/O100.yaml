  - ７外来・在宅ベースアップ評価料（Ⅱ）７
      - イ初診又は訪問診療を行った場合56点
      - ロ再診時等７点
  - ８外来・在宅ベースアップ評価料（Ⅱ）８
      - イ初診又は訪問診療を行った場合64点
      - ロ再診時等８点
  - 注１主として医療に従事する職員の賃金の改善を図る体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、入院中の患者以外の患者に対して診療を行った場合に、当該基準に係る区分に従い、それぞれ所定点数を算定する。
  - ２１のイ、２のイ、３のイ、４のイ、５のイ、６のイ、７のイ又は８のイについては、外来・在宅ベースアップ評価料（Ⅰ）の１又は３を算定する患者に対して診療を行った場合に算定する。
  - ３１のロ、２のロ、３のロ、４のロ、５のロ、６のロ、７のロ又は８のロについては、外来・在宅ベースアップ評価料（Ⅰ）の２を算定する患者に対して診療を行った場合に算定する。
