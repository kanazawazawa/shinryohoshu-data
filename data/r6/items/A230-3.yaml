raw_text: 'Ａ２３０－３精神科身体合併症管理加算（１日につき）１７日以内450点

  - ２８日以上15日以内300点

  - 注精神科を標榜する病院であって別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める身体合併症を有する精神障害者である患者に対して必要な治療を行った場合に、当該患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、精神科身体合併症管理加算を算定できるものを現に算定している患者に限る。）について、当該疾患の治療開始日から起算して15日を限度として、当該患者の治療期間に応じ、所定点数に加算する。

  '
