raw_text: 'Ｅ１０１－５乳房用ポジトロン断層撮影4,000点

  - 注１18ＦＤＧの合成及び注入に要する費用は、所定点数に含まれる。

  - ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。

  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関以外の保険医療機関において行われる場合は、所定点数の100分の80に相当する点数により算定する。

  '
