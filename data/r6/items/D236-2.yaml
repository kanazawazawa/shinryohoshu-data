raw_text: "Ｄ２３６－２光トポグラフィー\n- １脳外科手術の術前検査に使用するもの670点\n- ２抑うつ症状の鑑別診断の補助に使用するもの\n    - イ地域の精神科救急医療体制を確保するために必要な協力等を行っている精神保健指定医による場合400点\n\
  \    - ロイ以外の場合200点\n- 注１２について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。\n- ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関以外の保険医療機関において行われる場合には、所定点数の100分の80に相当する点数により算定する。\n"
