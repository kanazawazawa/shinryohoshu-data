raw_text: 'Ｊ０４３－３ストーマ処置（１日につき）１ストーマを１個もつ患者に対して行った場合70点

  - ２ストーマを２個以上もつ患者に対して行った場合120点

  - 注１入院中の患者以外の患者に対して算定する。

  - ２区分番号Ｃ１０９に掲げる在宅寝たきり患者処置指導管理料を算定している患者に対して行ったストーマ処置の費用は算定しない。

  - ３６歳未満の乳幼児の場合は、乳幼児加算として、55点を加算する。

  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、ストーマ合併症を有する患者に対してストーマ処置を行った場合は、ストーマ合併症加算として、65点を加算する。

  '
