chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第1節 入院基本料
raw_text: "Ａ１００一般病棟入院基本料（１日につき）１急性期一般入院基本料\n    - イ急性期一般入院料１1,688点\n    - ロ急性期一般入院料２1,644点\n    - ハ急性期一般入院料３1,569点\n    -\
  \ ニ急性期一般入院料４1,462点\n    - ホ急性期一般入院料５1,451点\n    - ヘ急性期一般入院料６1,404点\n- ２地域一般入院基本料\n    - イ地域一般入院料１1,176点\n    - ロ地域一般入院料２1,170点\n\
  \    - ハ地域一般入院料３1,003点\n- 注１療養病棟入院基本料、結核病棟入院基本料又は精神病棟入院基本料を算定する病棟以外の病院の病棟（以下この表において「一般病棟」という。）であって、看護配置、看護師比率、平均在院日数その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に係る区分に従い、それぞれ所定点数を算定する。\n\
  ただし、通則第６号に規定する保険医療機関の病棟については、この限りでない。\n- ２注１に規定する病棟以外の一般病棟については、当分の間、地方厚生局長等に届け出た場合に限り、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、特別入院基本料として、612点を算定できる。\n\
  ただし、注１に規定する別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出ていた病棟であって、当該基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た病棟については、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に適合しなくなった後の直近３月に限り、月平均夜勤時間超過減算として、それぞれの所定点数から100分の15に相当する点数を減算する。\n\
  なお、別に厚生労働大臣が定める場合には、算定できない。\n- ３当該病棟の入院患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n    - イ14日以内の期間450点（特別入院基本料等については、300点）\n\
  \    - ロ15日以上30日以内の期間192点（特別入院基本料等については、155点）４地域一般入院基本料を算定する病棟において、当該患者が他の保険医療機関から転院してきた者であって、当該他の保険医療機関において区分番号Ａ２４６に掲げる入退院支援加算３を算定したものである場合には、重症児（者）受入連携加算として、入院初日に限り2,000点を所定点数に加算する。\n\
  - ５地域一般入院基本料を算定する病棟に入院している患者のうち、急性期医療を担う他の保険医療機関の一般病棟から転院した患者又は介護老人保健施設、介護保険法第８条第29項に規定する介護医療院（以下「介護医療院」という。）、老人福祉法（昭和38年法律第133号）第20条の５に規定する特別養護老人ホーム（以下この表において「特別養護老人ホーム」という。）、同法第20条の６に規定する軽費老人ホーム（以下この表において「軽費老人ホーム」という。）、同法第29条第１項に規定する有料老人ホーム（以下この表において「有料老人ホーム」という。）等若しくは自宅から入院した患者については、転院又は入院した日から起算して14日を限度として、救急・在宅等支援病床初期加算として、１日につき150点を所定点数に加算する。\n\
  - ６別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の入院基本料（特別入院基本料等を含む。）は、夜間看護体制特定日減算として、次のいずれにも該当する場合に限り、所定点数の100分の５に相当する点数を減算する。\n\
  \    - イ年６日以内であること。\n    - ロ当該日が属する月が連続する２月以内であること。\n- ７注１に規定する別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出ていた病棟であって、当該基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た病棟については、注２の規定にかかわらず、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当分の間、夜勤時間特別入院基本料として、それぞれの所定点数の100分の70に相当する点数を算定できる。\n\
  - ８退院が特定の時間帯に集中しているものとして別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める患者の退院日の入院基本料（特別入院基本料等を含む。）は、所定点数の100分の92に相当する点数により算定する。\n- ９入院日及び退院日が特定の日に集中しているものとして別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の入院基本料（特別入院基本料等を含む。）は、所定点数の100分の92に相当する点数により算定する。\n\
  - 10当該病棟においては、第２節の各区分に掲げる入院基本料等加算のうち、次に掲げる加算について、同節に規定する算定要件を満たす場合に算定できる。\n    - イ総合入院体制加算\n    - ロ急性期充実体制加算（急性期一般入院料１を算定するものに限る。）\n\
  \    - ハ地域医療支援病院入院診療加算\n    - ニ臨床研修病院入院診療加算\n    - ホ紹介受診重点医療機関入院診療加算\n    - ヘ救急医療管理加算\n    - ト超急性期脳卒中加算\n    - チ妊産婦緊急搬送入院加算\n\
  \    - リ在宅患者緊急入院診療加算\n    - ヌ診療録管理体制加算\n    - ル医師事務作業補助体制加算\n    - ヲ急性期看護補助体制加算\n    - ワ看護職員夜間配置加算\n    - カ乳幼児加算・幼児加算\n\
  \    - ヨ特定感染症入院医療管理加算\n    - タ難病等特別入院診療加算\n    - レ超重症児（者）入院診療加算・準超重症児（者）入院診療加算\n    - ソ看護配置加算\n    - ツ看護補助加算\n    - ネ地域加算\n\
  \    - ナ離島加算\n    - ラ療養環境加算\n    - ムＨＩＶ感染者療養環境特別加算\n- ウ特定感染症患者療養環境特別加算\n- ヰ重症者等療養環境特別加算\n- ノ小児療養環境特別加算\n- オ無菌治療室管理加算\n-\
  \ ク放射線治療病室管理加算\n- ヤ緩和ケア診療加算\n- マ小児緩和ケア診療加算\n- ケ精神科リエゾンチーム加算\n- フ強度行動障害入院医療管理加算\n- コ依存症入院医療管理加算\n- エ摂食障害入院医療管理加算\n- テがん拠点病院加算\n\
  - アリハビリテーション・栄養・口腔連携体制加算（急性期一般入院基本料に限る。）\n- サ栄養サポートチーム加算\n- キ医療安全対策加算\n- ユ感染対策向上加算\n- メ患者サポート体制充実加算\n- ミ報告書管理体制加算\n- シ褥瘡ハイリスク患者ケア加算\n\
  - ヱハイリスク妊娠管理加算\n- ヒハイリスク分娩等管理加算（ハイリスク分娩管理加算に限る。）\n- モ呼吸ケアチーム加算\n- セ術後疼痛管理チーム加算（急性期一般入院基本料に限る。）\n- ス後発医薬品使用体制加算ンバイオ後続品使用体制加算イイ病棟薬剤業務実施加算１イロデータ提出加算イハ入退院支援加算（１のイ、２のイ又は３に限る。）イニ医療的ケア児（者）入院前支援加算イホ認知症ケア加算イヘせん妄ハイリスク患者ケア加算（急性期一般入院基本料に限る。）イト精神疾患診療体制加算イチ薬剤総合評価調整加算イリ排尿自立支援加算イヌ地域医療体制確保加算（急性期一般入院基本料に限る。）イル協力対象施設入所者入院加算11当該病棟のうち、保険医療機関が地方厚生局長等に届け出たものに入院している患者であって、当該病棟に90日を超えて入院するものについては、注１から注10までの規定にかかわらず、区分番号Ａ１０１に掲げる療養病棟入院料１の例により算定する。\n"
