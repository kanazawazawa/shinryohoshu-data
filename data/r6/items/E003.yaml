chapter:
  chapter: 第2章 特掲診療料
  part: 第4部 画像診断
  section: 第1節 エックス線診断料
raw_text: "Ｅ００３造影剤注入手技\n- １点滴注射区分番号Ｇ００４に掲げる点滴注射の所定点数２動脈注射区分番号Ｇ００２に掲げる動脈注射の所定点数３動脈造影カテーテル法\n    - イ主要血管の分枝血管を選択的に造影撮影した場合3,600点\n\
  - 注１血流予備能測定検査を実施した場合は、血流予備能測定検査加算として、400点を所定点数に加算する。\n- ２頸動脈閉塞試験（マタス試験）を実施した場合は、頸動脈閉塞試験加算として、1,000点を所定点数に加算する。\n    - ロイ以外の場合1,180点\n\
  - 注血流予備能測定検査を実施した場合は、血流予備能測定検査加算として、400点を所定点数に加算する。\n- ４静脈造影カテーテル法3,600点\n- ５内視鏡下の造影剤注入\n    - イ気管支ファイバースコピー挿入区分番号Ｄ３０２に掲げる気管支ファイバースコピーの所定点数\n\
  \    - ロ尿管カテーテル法（両側）区分番号Ｄ３１８に掲げる尿管カテーテル法の所定点数６腔内注入及び穿刺注入\n    - イ注腸300点\n    - ロその他のもの120点\n- ７嚥下造影240点Ｅ００４基本的エックス線診断料（１日につき）１入院の日から起算して４週間以内の期間55点\n\
  - ２入院の日から起算して４週間を超えた期間40点\n- 注１特定機能病院である保険医療機関において、入院中の患者に対して行ったエックス線診断について算定する。\n- ２次に掲げるエックス線診断の費用は所定点数に含まれるものとする。\n \
  \   - イ区分番号Ｅ００１に掲げる写真診断の１に掲げるもの（間接撮影の場合を含む。）\n    - ロ区分番号Ｅ００２に掲げる撮影の１に掲げるもの（間接撮影の場合を含む。）３療養病棟、結核病棟又は精神病棟に入院している患者及び第１章第２部第２節に規定するＨＩＶ感染者療養環境特別加算、特定感染症患者療養環境特別加算若しくは重症者等療養環境特別加算又は同部第３節に規定する特定入院料を算定している患者については適用しない。\n"
