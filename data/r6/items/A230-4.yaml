  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: 'Ａ２３０－４精神科リエゾンチーム加算（週１回）300点

  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、抑うつ若しくはせん妄を有する患者、精神疾患を有する患者又は自殺企図により入院した患者に対して、当該保険医療機関の精神科の医師、看護師、精神保健福祉士等が共同して、当該患者の精神症状の評価等の必要な診療を行った場合に、当該患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、精神科リエゾンチーム加算を算定できるものを現に算定している患者に限る。）について、所定点数に加算する。

  ただし、区分番号Ａ２４７に掲げる認知症ケア加算１は別に算定できない。

  '
