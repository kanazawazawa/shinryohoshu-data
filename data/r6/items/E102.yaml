  Ｅ１０２核医学診断
  - １区分番号Ｅ１０１－２に掲げるポジトロン断層撮影、Ｅ１０１－３に掲げるポジトロン断層・コンピューター断層複合撮影（一連の検査につき）、Ｅ１０１－４に掲げるポジトロン断層・磁気共鳴コンピューター断層複合撮影（一連の検査につき）及びＥ１０１－５に掲げる乳房用ポジトロン断層撮影の場合450点
  - ２１以外の場合370点
  - 注行った核医学診断の種類又は回数にかかわらず、月１回に限り算定できるものとする。
