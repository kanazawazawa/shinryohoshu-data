chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: 'Ｂ０００特定疾患療養管理料

  - １診療所の場合225点

  - ２許可病床数が100床未満の病院の場合147点

  - ３許可病床数が100床以上200床未満の病院の場合87点

  - 注１別に厚生労働大臣が定める疾患を主病とする患者に対して、治療計画に基づき療養上必要な管理を行った場合に、月２回に限り算定する。

  - ２区分番号Ａ０００に掲げる初診料を算定する初診の日に行った管理又は当該初診の日から１月以内に行った管理の費用は、初診料に含まれるものとする。

  - ３入院中の患者に対して行った管理又は退院した患者に対して退院の日から起算して１月以内に行った管理の費用は、第１章第２部第１節に掲げる入院基本料に含まれるものとする。

  - ４第２部第２節第１款在宅療養指導管理料の各区分に掲げる指導管理料又は区分番号Ｂ００１の８に掲げる皮膚科特定疾患指導管理料を算定すべき指導管理を受けている患者に対して行った管理の費用は、各区分に掲げるそれぞれの指導管理料に含まれるものとする。

  - ５別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、特定疾患療養管理料を算定すべき医学管理を情報通信機器を用いて行った場合は、１、２又は３の所定点数に代えて、それぞれ196点、128点又は76点を算定する。

  '
