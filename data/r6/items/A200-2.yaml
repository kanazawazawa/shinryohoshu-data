  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: "Ａ２００－２急性期充実体制加算（１日につき）１急性期充実体制加算１\n    - イ７日以内の期間440点\n    - ロ８日以上11日以内の期間200点\n    - ハ12日以上14日以内の期間120点\n- ２急性期充実体制加算２\n\
  \    - イ７日以内の期間360点\n    - ロ８日以上11日以内の期間150点\n    - ハ12日以上14日以内の期間90点\n- 注１高度かつ専門的な医療及び急性期医療を提供する体制その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、急性期充実体制加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、かつ、当該患者の入院期間に応じ、それぞれ所定点数に加算する。\n\
  この場合において、区分番号Ａ２００に掲げる総合入院体制加算は別に算定できない。\n- ２小児患者、妊産婦である患者及び精神疾患を有する患者の受入れに係る充実した体制の確保につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者については、小児・周産期・精神科充実体制加算として、算定する急性期充実体制加算の区分に応じ、次に掲げる点数を更に所定点数に加算する。\n\
  \    - イ急性期充実体制加算１の場合90点\n    - ロ急性期充実体制加算２の場合60点\n- ３注２に該当しない場合であって、精神疾患を有する患者の受入れに係る充実した体制の確保につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者については、精神科充実体制加算として、30点を更に所定点数に加算する。\n"
