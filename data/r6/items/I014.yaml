raw_text: 'Ｉ０１４医療保護入院等診療料300点

  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、精神保健福祉法第29条第１項、第29条の２第１項、第33条第１項又は第33条の６第１項の規定による入院に係る患者に対して、精神保健指定医が治療計画を策定し、当該治療計画に基づき、治療管理を行った場合は、患者１人につき１回に限り算定する。

  '
notes:
- id: 注1
  text: '別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、精神保健福祉法第29条第１項、第29条の２第１項、第33条第１項又は第33条の６第１項の規定による入院に係る患者に対して、精神保健指定医が治療計画を策定し、当該治療計画に基づき、治療管理を行った場合は、患者１人につき１回に限り算定する。

    '
