  Ｄ２３０観血的肺動脈圧測定
  - １１時間以内又は１時間につき180点
  - ２２時間を超えた場合（１日につき）570点
  - 注１バルーン付肺動脈カテーテルを挿入した場合は、バルーン付肺動脈カテーテル挿入加算として、開始日に限り1,300点を所定点数に加算する。
  この場合において、挿入に伴う画像診断及び検査の費用は算定しない。
  - ２カテーテルの交換の有無にかかわらず一連として算定する。
