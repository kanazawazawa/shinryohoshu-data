raw_text: |
  Ｄ２１４脈波図、心機図、ポリグラフ検査１１検査60点
  - ２２検査80点
  - ３３又は４検査130点
  - ４５又は６検査180点
  - ５７検査以上220点
  - ６血管伸展性検査100点
  - 注１数種目を行った場合でも同時に記録を行った最高検査数により算定する。
  - ２脈波図、心機図又はポリグラフ検査の一部として記録した心電図は、検査数に数えない。
  - ３検査の実施ごとに１から６までに掲げる所定点数を算定する。
