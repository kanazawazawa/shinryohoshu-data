chapter:
  chapter: 第2章 特掲診療料
  part: 第3部 検査
  section: 第3節 生体検査料
raw_text: |
  Ｄ２０６心臓カテーテル法による諸検査（一連の検査について）１右心カテーテル3,600点
  - ２左心カテーテル4,000点
  - 注１新生児又は３歳未満の乳幼児（新生児を除く。）に対して当該検査を行った場合は、新生児加算又は乳幼児加算として、１については10,800点又は3,600点を、２については12,000点又は4,000点を、それぞれ所定点数に加算する。
  - ２当該検査に当たって、卵円孔又は欠損孔を通しての左心カテーテル検査、経中隔左心カテーテル検査（ブロッケンブロー）、伝導機能検査、ヒス束心電図、診断ペーシング、期外（早期）刺激法による測定・誘発試験、冠攣縮誘発薬物負荷試験又は冠動脈造影を行った場合は、卵円孔・欠損孔加算、ブロッケンブロー加算、伝導機能検査加算、ヒス束心電図加算、診断ペーシング加算、期外刺激法加算、冠攣縮誘発薬物負荷試験加算又は冠動脈造影加算として、それぞれ800点、2,000点、400点、400点、400点、800点、800点又は1,400点を加算する。
  - ３血管内超音波検査又は血管内光断層撮影を実施した場合は、血管内超音波検査加算又は血管内光断層撮影加算として、400点を所定点数に加算する。
  - ４冠動脈血流予備能測定検査を実施した場合は、冠動脈血流予備能測定検査加算として、600点を所定点数に加算する。
  - ５循環動態解析装置を用いて冠動脈血流予備能測定検査を実施した場合は、冠動脈血流予備能測定検査加算（循環動態解析装置）として、7,200点を所定点数に加算する。
  - ６別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、血管内視鏡検査を実施した場合は、血管内視鏡検査加算として、400点を所定点数に加算する。
  - ７同一月中に血管内超音波検査、血管内光断層撮影、冠動脈血流予備能測定検査及び血管内視鏡検査のうち、２以上の検査を行った場合には、主たる検査の点数を算定する。
  - ８カテーテルの種類、挿入回数によらず一連として算定し、諸監視、血液ガス分析、心拍出量測定、脈圧測定、肺血流量測定、透視、造影剤注入手技、造影剤使用撮影及びエックス線診断の費用は、全て所定点数に含まれるものとする。
  - ９エックス線撮影に用いられたフィルムの費用は、区分番号Ｅ４００に掲げるフィルムの所定点数により算定する。
  - 10心腔内超音波検査を実施した場合は、心腔内超音波検査加算として、400点を所定点数に加算する。
