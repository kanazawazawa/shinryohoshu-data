  chapter: 第2章 特掲診療料
  part: 第3部 検査
  section: 第3節 生体検査料
raw_text: |
  Ｄ２８２－３コンタクトレンズ検査料
  - １コンタクトレンズ検査料１200点
  - ２コンタクトレンズ検査料２180点
  - ３コンタクトレンズ検査料３56点
  - ４コンタクトレンズ検査料４50点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、コンタクトレンズの装用を目的に受診した患者に対して眼科学的検査を行った場合は、コンタクトレンズ検査料１、２又は３を算定し、当該保険医療機関以外の保険医療機関であって、別に厚生労働大臣が定める施設基準に適合しているものにおいて、コンタクトレンズの装用を目的に受診した患者に対して眼科学的検査を行った場合は、コンタクトレンズ検査料４を算定する。
  - ２注１により当該検査料を算定する場合は、区分番号Ａ０００に掲げる初診料の注９及び区分番号Ａ００１に掲げる再診料の注７に規定する夜間・早朝等加算は算定できない。
  - ３当該保険医療機関又は当該保険医療機関と特別の関係にある保険医療機関において過去にコンタクトレンズの装用を目的に受診したことのある患者について、当該検査料を算定した場合は、区分番号Ａ０００に掲げる初診料は算定せず、区分番号Ａ００１に掲げる再診料又は区分番号Ａ００２に掲げる外来診療料を算定する。
  （皮膚科学的検査）
