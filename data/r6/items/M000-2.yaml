chapter:
  chapter: 第2章 特掲診療料
  part: 第12部 放射線治療
  section: 第1節 放射線治療管理・実施料
raw_text: 'Ｍ０００－２放射性同位元素内用療法管理料

  - １甲状腺癌に対するもの1,390点

  - ２甲状腺機能亢進症に対するもの1,390点

  - ３固形癌骨転移による疼痛に対するもの1,700点

  - ４Ｂ細胞性非ホジキンリンパ腫に対するもの3,000点

  - ５骨転移のある去勢抵抗性前立腺癌に対するもの2,630点

  - ６神経内分泌腫瘍に対するもの2,660点

  - ７褐色細胞腫に対するもの1,820点

  - 注１１及び２については、甲状腺疾患（甲状腺癌及び甲状腺機能亢進症）を有する患者に対して、放射性同位元素内用療法を行い、かつ、計画的な治療管理を行った場合に、月１回に限り算定する。

  - ２３については、固形癌骨転移による疼痛を有する患者に対して、放射性同位元素内用療法を行い、かつ、計画的な治療管理を行った場合に、月１回に限り算定する。

  - ３４については、Ｂ細胞性非ホジキンリンパ腫の患者に対して、放射性同位元素内用療法を行い、かつ、計画的な治療管理を行った場合に、月１回に限り算定する。

  - ４５については、骨転移のある去勢抵抗性前立腺癌の患者に対して、放射性同位元素内用療法を行い、かつ、計画的な治療管理を行った場合に、放射性同位元素を投与した日に限り算定する。

  - ５６については、ソマトスタチン受容体陽性の神経内分泌腫瘍の患者に対して、放射性同位元素内用療法を行い、かつ、計画的な治療管理を行った場合に、放射性同位元素を投与した日に限り算定する。

  - ６７については、ＭＩＢＧ集積陽性の治癒切除不能な褐色細胞腫（パラガングリオーマを含む。）の患者に対して、放射性同位元素内用療法を行い、かつ、計画的な治療管理を行った場合に、放射性同位元素を投与した日に限り算定する。

  '
