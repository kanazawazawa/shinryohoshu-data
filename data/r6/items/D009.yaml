  text: '診療及び腫瘍マーカー以外の検査の結果から悪性腫瘍の患者であることが強く疑われる者に対して、腫瘍マーカーの検査を行った場合に、１回に限り算定する。

    ただし、区分番号Ｂ００１の３に掲げる悪性腫瘍特異物質治療管理料を算定している患者については算定しない。'
