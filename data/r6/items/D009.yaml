  chapter: 第2章 特掲診療料
  part: 第3部 検査
  section: 第1節 検体検査料
  subsection: 第1款 検体検査実施料
raw_text: "Ｄ００９腫瘍マーカー\n- １尿中ＢＴＡ80点\n- ２α－フェトプロテイン（ＡＦＰ）98点\n- ３癌胎児性抗原（ＣＥＡ）99点\n- ４扁平上皮癌関連抗原（ＳＣＣ抗原）101点\n- ５組織ポリペプタイド抗原（ＴＰＡ）110点\n\
  - ６ＮＣＣ－ＳＴ－439、ＣＡ15－３112点\n- ７ＤＵＰＡＮ－２115点\n- ８エラスターゼ１120点\n- ９前立腺特異抗原（ＰＳＡ）、ＣＡ19－９121点\n- 10ＰＩＶＫＡ－Ⅱ半定量、ＰＩＶＫＡ－Ⅱ定量131点\n- 11ＣＡ125136点\n\
  - 12核マトリックスプロテイン22（ＮＭＰ22）定量（尿）、核マトリックスプロテイン22（ＮＭＰ22）定性（尿）139点\n- 13シアリルＬｅx－ｉ抗原（ＳＬＸ）140点\n- 14神経特異エノラーゼ（ＮＳＥ）142点\n- 15ＳＰan－１144点\n\
  - 16ＣＡ72－４、シアリルＴn抗原（ＳＴＮ）146点\n- 17塩基性フェトプロテイン（ＢＦＰ）、遊離型ＰＳＡ比（ＰＳＡＦ／Ｔ比）150点\n- 18サイトケラチン19フラグメント（シフラ）154点\n- 19シアリルＬｅx抗原（ＣＳＬＥＸ）156点\n\
  - 20ＢＣＡ225158点\n- 21サイトケラチン８・18（尿）160点\n- 22抗ｐ53抗体163点\n- 23Ⅰ型コラーゲン－Ｃ－テロペプチド（ⅠＣＴＰ）170点\n- 24ガストリン放出ペプチド前駆体（ＰｒｏＧＲＰ）175点\n\
  - 25ＣＡ54／61184点\n- 26α－フェトプロテインレクチン分画（ＡＦＰ－Ｌ３％）185点\n- 27ＣＡ602、組織因子経路インヒビター２（ＴＦＰＩ２）190点\n- 28γ－セミノプロテイン（γ－Ｓｍ）192点\n- 29ヒト精巣上体蛋白４（ＨＥ４）200点\n\
  - 30可溶性メソテリン関連ペプチド220点\n- 31Ｓ２，３ＰＳＡ％248点\n- 32プロステートヘルスインデックス（phi）281点\n- 33癌胎児性抗原（ＣＥＡ）定性（乳頭分泌液）、癌胎児性抗原（ＣＥＡ）半定量（乳頭分泌液）305点\n\
  - 34ＨＥＲ２蛋白320点\n- 35アポリポ蛋白Ａ２（ＡＰＯＡ２）アイソフォーム335点\n- 36可溶性インターロイキン－２レセプター（ｓＩＬ－２Ｒ）438点\n- 注１診療及び腫瘍マーカー以外の検査の結果から悪性腫瘍の患者であることが強く疑われる者に対して、腫瘍マーカーの検査を行った場合に、１回に限り算定する。\n\
  ただし、区分番号Ｂ００１の３に掲げる悪性腫瘍特異物質治療管理料を算定している患者については算定しない。\n- ２患者から１回に採取した血液等を用いて本区分の２から36までに掲げる検査を２項目以上行った場合は、所定点数にかかわらず、検査の項目数に応じて次に掲げる点数により算定する。\n\
  \    - イ２項目230点\n    - ロ３項目290点\n    - ハ４項目以上385点\n"
notes:
