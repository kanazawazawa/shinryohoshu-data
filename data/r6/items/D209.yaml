raw_text: 'Ｄ２０９負荷心電図検査

  - １四肢単極誘導及び胸部誘導を含む最低12誘導380点

  - ２その他（６誘導以上）190点

  - 注１当該保険医療機関以外の医療機関で描写した負荷心電図について診断を行った場合は、１回につき70点とする。

  - ２区分番号Ｄ２０８に掲げる心電図検査であって、同一の患者につき、負荷心電図検査と同一日に行われたものの費用は、所定点数に含まれるものとする。

  '
