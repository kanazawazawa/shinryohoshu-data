raw_text: "Ｋ９１７－２受精卵・胚培養管理料\n- １１個の場合4,500点\n- ２２個から５個までの場合6,000点\n- ３６個から９個までの場合8,400点\n- ４10個以上の場合10,500点\n- 注胚盤胞の作成を目的として管理を行った胚の数に応じ、次に掲げる点数をそれぞれ１回につき所定点数に加算する。\n\
