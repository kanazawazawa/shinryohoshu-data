raw_text: |
  Ｉ０００－２経頭蓋磁気刺激療法2,000点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、薬物治療で十分な効果が認められない成人のうつ病患者に対して、経頭蓋治療用磁気刺激装置による治療を行った場合に限り算定する。
