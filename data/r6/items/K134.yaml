raw_text: 'Ｋ１３４椎間板摘出術

  - １前方摘出術40,180点

  - ２後方摘出術23,520点

  - ３側方摘出術28,210点

  - ４経皮的髄核摘出術15,310点

  - 注２について、２以上の椎間板の摘出を行う場合には、１椎間を増すごとに、複数椎間板加算として、所定点数に所定点数の100分の50に相当する点数を加算する。

  ただし、加算は４椎間を超えないものとする。

  '
