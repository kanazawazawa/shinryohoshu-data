raw_text: 'Ｄ００５血液形態・機能検査

  - １赤血球沈降速度（ＥＳＲ）９点

  - 注当該保険医療機関内で検査を行った場合に算定する。

  - ２網赤血球数12点

  - ３血液浸透圧、好酸球（鼻汁・喀痰）、末梢血液像（自動機械法）15点

  - ４好酸球数17点

  - ５末梢血液一般検査21点

  - ６末梢血液像（鏡検法）25点

  - 注特殊染色を併せて行った場合は、特殊染色加算として、特殊染色ごとにそれぞれ37点を所定点数に加算する。

  - ７血中微生物検査、ＤＮＡ含有赤血球計数検査40点

  - ８赤血球抵抗試験45点

  - ９ヘモグロビンＡ１ｃ（ＨｂＡ１ｃ）49点

  - 10自己溶血試験、血液粘稠度50点

  - 11ヘモグロビンＦ（ＨｂＦ）60点

  - 12デオキシチミジンキナーゼ（ＴＫ）活性233点

  - 13ターミナルデオキシヌクレオチジルトランスフェラーゼ（ＴｄＴ）250点

  - 14骨髄像788点

  - 注特殊染色を併せて行った場合は、特殊染色加算として、特殊染色ごとにそれぞれ60点を所定点数に加算する。

  - 15造血器腫瘍細胞抗原検査（一連につき）1,940点

  '
