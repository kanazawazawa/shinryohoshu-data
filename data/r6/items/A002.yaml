code: A002
name: 外来診療料
version: r6
points: 76
unit: 回
chapter:
  chapter: 第1章 基本診療料
  part: 第1部 初・再診料
  section: 第2節 再診料
raw_text: "Ａ００２外来診療料76点\n- 注１許可病床のうち一般病床に係るものの数が200以上である保険医療機関において再診を行った場合に算定する。\nただし、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、情報通信機器を用いた再診を行った場合には、75点を算定する。\n\
  - ２病院である保険医療機関（特定機能病院、地域医療支援病院及び外来機能報告対象病院等（医療法第30条の18の４第１項第２号の規定に基づき、同法第30条の18の２第１項第１号の厚生労働省令で定める外来医療を提供する基幹的な病院として都道府県が公表したものに限る。）に限る。）であって、初診の患者に占める他の病院又は診療所等からの文書による紹介があるものの割合等が低いものにおいて、別に厚生労働大臣が定める患者に対して再診を行った場合には、注１の規定にかかわらず、56点を算定する。\n\
  - ３病院である保険医療機関（許可病床数が400床以上である病院（特定機能病院、地域医療支援病院及び外来機能報告対象病院等（医療法第30条の18の４第１項第２号の規定に基づき、同法第30条の18の２第１項第１号の厚生労働省令で定める外来医療を提供する基幹的な病院として都道府県が公表したものに限る。）を除く。）に限る。）であって、初診の患者に占める他の病院又は診療所等からの文書による紹介があるものの割合等が低いものにおいて、別に厚生労働大臣が定める患者に対して再診を行った場合には、注１の規定にかかわらず、56点を算定する。\n\
  - ４医療用医薬品の取引価格の妥結率に関して別に厚生労働大臣が定める施設基準を満たす保険医療機関において再診を行った場合には、注１の規定にかかわらず、特定妥結率外来診療料として、56点を算定する。\n- ５同一保険医療機関において、同一日に他の傷病について、別の診療科を再診として受診した場合は、注１の規定にかかわらず、２つ目の診療科に限り38点（注２から注４までに規定する場合にあっては、28点）を算定する。\n\
  この場合において、注６のただし書及び注７から注11までに規定する加算は算定しない。\n- ６第２章第３部検査及び第９部処置のうち次に掲げるものは、外来診療料に含まれるものとする。\nただし、第２章第３部第１節第１款検体検査実施料の通則第３号に規定する加算は、外来診療料に係る加算として別に算定することができる。\n\
  \    - イ尿検査区分番号Ｄ０００からＤ００２－２までに掲げるもの\n    - ロ糞便検査区分番号Ｄ００３（カルプロテクチン（糞便）を除く。）に掲げるもの\n    - ハ血液形態・機能検査区分番号Ｄ００５（ヘモグロビンＡ１C（ＨｂＡ１ｃ）、デオキシチミジンキナーゼ（ＴＫ）活性、ターミナルデオキシヌクレオチジルトランスフェラーゼ（ＴｄＴ）、骨髄像及び造血器腫瘍細胞抗原検査（一連につき）を除く。）に掲げるもの\n\
  \    - ニ創傷処置100平方センチメートル未満のもの及び100平方センチメートル以上500平方センチメートル未満のもの\n    - ホ削除\n    - ヘ皮膚科軟膏処置100平方センチメートル以上500平方センチメートル未満のもの\n\
  \    - ト膀胱洗浄\n    - チ腟洗浄\n    - リ眼処置\n    - ヌ睫毛抜去\n    - ル耳処置\n    - ヲ耳管処置\n    - ワ鼻処置\n    - カ口腔、咽頭処置\n    - ヨ間接喉頭鏡下喉頭処置\n\
  \    - タネブライザ\n    - レ超音波ネブライザ\n    - ソ介達牽引\n    - ツ消炎鎮痛等処置７６歳未満の乳幼児に対して再診を行った場合は、乳幼児加算として、38点を所定点数に加算する。\nただし、注８又は注９に規定する加算を算定する場合は算定しない。\n\
  - ８保険医療機関が表示する診療時間以外の時間、休日又は深夜において再診を行った場合は、時間外加算、休日加算又は深夜加算として、それぞれ65点、190点又は420点（６歳未満の乳幼児の場合にあっては、それぞれ135点、260点又は590点）を所定点数に加算する。\n\
  ただし、区分番号Ａ０００に掲げる初診料の注７のただし書に規定する保険医療機関にあっては、同注のただし書に規定する時間において再診を行った場合は、180点（６歳未満の乳幼児の場合においては、250点）を所定点数に加算する。\n- ９小児科を標榜する保険医療機関（区分番号Ａ０００に掲げる初診料の注７のただし書に規定するものを除く。）にあっては、夜間であって別に厚生労働大臣が定める時間、休日又は深夜（当該保険医療機関が表示する診療時間内の時間に限る。）において６歳未満の乳幼児に対して再診を行った場合は、注８の規定にかかわらず、それぞれ135点、260点又は590点を所定点数に加算する。\n\
  - 10別に厚生労働大臣が定める施設基準を満たす保険医療機関を受診した患者に対して十分な情報を取得した上で再診を行った場合は、医療情報取得加算３として、３月に１回に限り２点を所定点数に加算する。\nただし、健康保険法第３条第13項に規定する電子資格確認により当該患者に係る診療情報を取得等した場合又は他の保険医療機関から当該患者に係る診療情報の提供を受けた場合にあっては、医療情報取得加算４として、３月に１回に限り１点を所定点数に加算する。\n\
  - 11別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、看護師等といる患者に対して情報通信機器を用いた診療を行った場合は、看護師等遠隔診療補助加算として、50点を所定点数に加算する。\n"
