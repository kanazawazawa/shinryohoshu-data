raw_text: 'Ｂ０１０－２診療情報連携共有料120点

  - 注１歯科診療を担う別の保険医療機関からの求めに応じ、患者の同意を得て、検査結果、投薬内容等を文書により提供した場合に、提供する保険医療機関ごとに患者１人につき３月に１回に限り算定する。

  - ２区分番号Ｂ００９に掲げる診療情報提供料（Ⅰ）（同一の保険医療機関に対して紹介を行った場合に限る。）を算定した同一月においては、別に算定できない。

  '
