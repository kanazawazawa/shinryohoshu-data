raw_text: "Ｊ０５４皮膚科光線療法（１日につき）１赤外線又は紫外線療法45点\n- 注入院中の患者以外の患者についてのみ算定する。\n- ２長波紫外線又は中波紫外線療法（概ね290ナノメートル以上315ナノメートル以下のもの）150点\n\
  - ３中波紫外線療法（308ナノメートル以上313ナノメートル以下に限定したもの）340点Ｊ０５４－２皮膚レーザー照射療法（一連につき）１色素レーザー照射療法2,712点\n- 注照射面積が10平方センチメートルを超えた場合は、10平方センチメートル又はその端数を増すごとに、照射面積拡大加算として、所定点数に500点を加算する。\n\
  ただし、8,500点の加算を限度とする。\n- ２Ｑスイッチ付レーザー照射療法\n    - イ４平方センチメートル未満2,000点\n    - ロ４平方センチメートル以上16平方センチメートル未満2,370点\n    - ハ16平方センチメートル以上64平方センチメートル未満2,900点\n\
  \    - ニ64平方センチメートル以上3,950点\n- 注３歳未満の乳幼児に対して皮膚レーザー照射療法を行った場合は、乳幼児加算として、2,200点を所定点数に加算する。\n"
