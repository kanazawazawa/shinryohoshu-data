raw_text: |
  Ｄ３１４に掲げる腹腔
  鏡検査、Ｄ３１５に掲げる腹腔ファイバースコピー、Ｄ３１６に掲げるクルドスコピー、Ｄ３１７に掲げる膀胱尿道ファイバースコピー、Ｄ３１７－２に掲げる膀胱尿道鏡検査、Ｄ３１８に掲げる尿管カテーテル法（ファイバースコープによるもの）（両側）、Ｄ３１９に掲げる腎盂尿管ファイバースコピー（片側）、Ｄ３２０に掲げるヒステロスコピー、Ｄ３２１に掲げるコルポスコピー、Ｄ３２２に掲げる子宮ファイバースコピー、Ｄ３２３に掲げる乳管鏡検査、Ｄ３２４に掲げる血管内視鏡検査、Ｄ３２５に掲げる肺臓カテーテル法、肝臓カテーテル法、膵臓カテーテル法、Ｄ４０１に掲げる脳室穿刺、Ｄ４０２に掲げる後頭下穿刺、Ｄ４０３に掲げる腰椎穿刺、胸椎穿刺、頸椎穿刺（脳脊髄圧測定を含む。）、Ｄ４０４に掲げる骨髄穿刺、Ｄ４０４－２に掲げる骨髄生検、Ｄ４０５に掲げる関節穿刺（片側）、Ｄ４０６に掲げる上顎洞穿刺（片側）、Ｄ４０６－２に掲げる扁桃周囲炎又は扁桃周囲膿瘍における試験穿刺（片側）、Ｄ４０７に掲げる腎嚢胞又は水腎症穿刺、Ｄ４０８に掲げるダグラス窩穿刺、Ｄ４０９に掲げるリンパ節等穿刺又は針生検、Ｄ４０９－２に掲げるセンチネルリンパ節生検（片側）、Ｄ４１０に掲げる乳腺穿刺又は針生検（片側）、Ｄ４１１に掲げる甲状腺穿刺又は針生検、Ｄ４１２に掲げる経皮的針生検法（透視、心電図検査及び超音波検査を含む。）、Ｄ４１２－２に掲げる経皮的腎生検法、Ｄ４１２－３に掲げる経頸静脈的肝生検、Ｄ４１３に掲げる前立腺針生検法、Ｄ４１４に掲げる内視鏡下生検法（１臓器につき）、Ｄ４１４－２に掲げる超音波内視鏡下穿刺吸引生検法（ＥＵＳ－ＦＮＡ）、Ｄ４１５に掲げる経気管肺生検法、Ｄ４１５－２に掲げる超音波気管支鏡下穿刺吸引生検法（ＥＢＵＳ－ＴＢＮＡ）、Ｄ４１５－３に掲げる経気管肺生検法（ナビゲーションによるもの）、Ｄ４１５－４に掲げる経気管肺生検法（仮想気管支鏡を用いた場合）、Ｄ４１５－５に掲げる経気管支凍結生検法、
