chapter:
  chapter: 第2章 特掲診療料
  part: 第3部 検査
  section: 第1節 検体検査料
  subsection: 第1款 検体検査実施料
raw_text: "Ｄ０２４削除\n（基本的検体検査実施料）Ｄ０２５基本的検体検査実施料（１日につき）１入院の日から起算して４週間以内の期間140点\n- ２入院の日から起算して４週間を超えた期間110点\n- 注１特定機能病院である保険医療機関において、入院中の患者に対して行った検体検査について算定する。\n\
  - ２次に掲げる検体検査の費用は所定点数に含まれるものとする。\n    - イ尿中一般物質定性半定量検査\n    - ロ尿中特殊物質定性定量検査\n    - ハ尿沈渣（鏡検法）\n    - ニ糞便検査（カルプロテクチン（糞便）を除く。）\n\
  \    - ホ穿刺液・採取液検査\n    - ヘ血液形態・機能検査\n    - ト出血・凝固検査\n    - チ造血器腫瘍遺伝子検査\n    - リ血液化学検査\n    - ヌ免疫血液学的検査ＡＢＯ血液型及びＲh（Ｄ）血液型\n\
  \    - ル感染症免疫学的検査梅毒血清反応（ＳＴＳ）定性、抗ストレプトリジンＯ（ＡＳＯ）定性、抗ストレプトリジンＯ（ＡＳＯ）半定量、抗ストレプトリジンＯ（ＡＳＯ）定量、トキソプラズマ抗体定性、トキソプラズマ抗体半定量、梅毒トレポネーマ抗体定性、梅毒血清反応（ＳＴＳ）半定量、梅毒血清反応（ＳＴＳ）定量、梅毒トレポネーマ抗体半定量、梅毒トレポネーマ抗体定量及びＨＩＶ－１抗体\n\
  \    - ヲ肝炎ウイルス関連検査ＨＢｓ抗原定性・半定量、ＨＢｓ抗体定性、ＨＢｓ抗体半定量、ＨＢｓ抗原、ＨＢｓ抗体、ＨＣＶ抗体定性・定量、ＨＣＶ構造蛋白及び非構造蛋白抗体定性及びＨＣＶ構造蛋白及び非構造蛋白抗体半定量\n    - ワ自己抗体検査寒冷凝集反応及びリウマトイド因子（ＲＦ）定量\n\
  \    - カ血漿蛋白免疫学的検査Ｃ反応性蛋白（ＣＲＰ）定性、Ｃ反応性蛋白（ＣＲＰ）、血清補体価（ＣＨ50）及び免疫グロブリン\n    - ヨ微生物学的検査３療養病棟、結核病棟又は精神病棟に入院している患者及び第１章第２部第２節に規定するＨＩＶ感染者療養環境特別加算、特定感染症患者療養環境特別加算若しくは重症者等療養環境特別加算又は同部第３節に規定する特定入院料を算定している患者については適用しない。\n"
