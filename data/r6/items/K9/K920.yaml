code: K920
name: 輸血
version: r6
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第10部 手術
  section: 第2節 輸血料
raw_text: |
  Ｋ９２０輸血
  - １自家採血輸血（200mＬごとに）
      - イ１回目750点
      - ロ２回目以降650点
  - ２保存血液輸血（200mＬごとに）
      - イ１回目450点
      - ロ２回目以降350点
  - ３自己血貯血
      - イ６歳以上の患者の場合（200mＬごとに）
    - （１）液状保存の場合250点
    - （２）凍結保存の場合500点
      - ロ６歳未満の患者の場合（体重１kgにつき４mＬごとに）
    - （１）液状保存の場合250点
    - （２）凍結保存の場合500点
  - ４自己血輸血
      - イ６歳以上の患者の場合（200mＬごとに）
    - （１）液状保存の場合750点
    - （２）凍結保存の場合1,500点
      - ロ６歳未満の患者の場合（体重１kgにつき４mＬごとに）
    - （１）液状保存の場合750点
    - （２）凍結保存の場合1,500点
  - ５希釈式自己血輸血
      - イ６歳以上の患者の場合（200mＬごとに）1,000点
      - ロ６歳未満の患者の場合（体重１kgにつき４mＬごとに）1,000点
  - ６交換輸血（１回につき）5,250点
  - 注１輸血に伴って、患者に対して輸血の必要性、危険性等について文書による説明を行った場合に算定する。
  - ２自家採血、保存血又は自己血の輸血量には、抗凝固液の量は含まれないものとする。
  - ３骨髄内輸血又は血管露出術を行った場合は、所定点数に区分番号Ｄ４０４に掲げる骨髄穿刺又は区分番号Ｋ６０６に掲げる血管露出術の所定点数をそれぞれ加算する。
  - ４輸血に当たって薬剤を使用した場合は、薬剤の費用として、第４節に掲げる所定点数を加算する。
  - ５輸血に伴って行った患者の血液型検査（ＡＢＯ式及びＲh式）の費用として54点を所定点数に加算する。
  - ６不規則抗体検査の費用として検査回数にかかわらず１月につき197点を所定点数に加算する。
  ただし、頻回に輸血を行う場合にあっては、１週間に１回に限り、197点を所定点数に加算する。
  - ７ＨＬＡ型適合血小板輸血に伴って行ったＨＬＡ型クラスⅠ（Ａ、Ｂ、Ｃ）又はクラスⅡ（ＤＲ、ＤＱ、ＤＰ）の費用として、検査回数にかかわらず一連につきそれぞれの所定点数に1,000点又は1,400点を加算する。
  - ８輸血に伴って、血液交叉試験、間接クームス検査又はコンピュータクロスマッチを行った場合は、血液交叉試験加算、間接クームス検査加算又はコンピュータクロスマッチ加算として、１回につき30点、47点又は30点をそれぞれ加算する。
  ただし、コンピュータクロスマッチを行った場合は、血液交叉試験加算及び間接クームス検査加算は算定できない。
  - ９６歳未満の乳幼児の場合は、乳幼児加算として、26点を所定点数に加算する。
  - 10輸血に伴って行った供血者の諸検査、輸血用回路及び輸血用針は、所定点数に含まれるものとする。
  - 11輸血に伴って、血液を保存する費用は、所定点数に含まれるものとする。
  - 12血小板輸血に伴って、血小板洗浄術を行った場合には、血小板洗浄術加算として、580点を所定点数に加算する。
