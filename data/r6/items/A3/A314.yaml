chapter:
  chapter: 第2章 第１部医学管理等の区分番号Ｂ０１５に掲げる精神科退院時共同指導料
raw_text: |
  Ａ３１４認知症治療病棟入院料（１日につき）１認知症治療病棟入院料１
      - イ30日以内の期間1,829点
      - ロ31日以上60日以内の期間1,521点
      - ハ61日以上の期間1,221点
  - ２認知症治療病棟入院料２
      - イ30日以内の期間1,334点
      - ロ31日以上60日以内の期間1,129点
      - ハ61日以上の期間1,003点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病院である保険医療機関において、当該届出に係る病棟に入院している患者について、当該基準に係る区分に従い、それぞれ算定する。
  - ２当該病棟が、別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟である場合には、認知症夜間対応加算として、当該患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
      - イ30日以内の期間84点
      - ロ31日以上の期間40点
  - ３診療に係る費用（注２に規定する加算、第２節に規定する臨床研修病院入院診療加算、医師事務作業補助体制加算（50対１補助体制加算、75対１補助体制加算又は100対１補助体制加算に限る。）、地域加算、離島加算、特定感染症患者療養環境特別加算、精神科措置入院診療加算、精神科身体合併症管理加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、精神科救急搬送患者地域連携受入加算、データ提出加算、精神科入退院支援加算、薬剤総合評価調整加算及び排尿自立支援加算、第２章第１部医学管理等の区分番号Ｂ０１５に掲げる精神科退院時共同指導料２、第７部リハビリテーションの区分番号Ｈ００３－２に掲げるリハビリテーション総合計画評価料（１に限る。）、区分番号Ｈ００４に掲げる摂食機能療法及び区分番号Ｈ００７－３に掲げる認知症患者リハビリテーション料、第８部精神科専門療法、第９部処置の区分番号Ｊ０３８に掲げる人工腎臓（入院した日から起算して60日以内の期間に限る。）及び区分番号Ｊ４００に掲げる特定保険医療材料（入院した日から起算して60日以内の期間における区分番号Ｊ０３８に掲げる人工腎臓に係るものに限る。）、第14部その他並びに除外薬剤・注射薬に係る費用を除く。）は、認知症治療病棟入院料に含まれるものとする。
