code: A309
name: 特殊疾患病棟入院料（１日につき）
version: r6
points: 12090
unit: 日
chapter:
  chapter: 第1章 基本診療料
  part: 第13部 第２節病理診断・判断料及び第14部その他の費用並びに第２節に規定する
raw_text: |
  Ａ３０９特殊疾患病棟入院料（１日につき）１特殊疾患病棟入院料１2,090点
  - ２特殊疾患病棟入院料２1,694点
  - 注１別に厚生労働大臣が定める重度の障害者（重度の意識障害者を含む。）、筋ジストロフィー患者又は難病患者等を主として入院させる病棟に関する施設基準に適合しているものとして、保険医療機関が地方厚生局長等に届け出た病棟に入院している患者について、当該基準に係る区分に従い、それぞれ所定点数を算定する。
  - ２当該病棟に入院している患者が人工呼吸器を使用している場合は、１日につき600点を所定点数に加算する。
  - ３当該患者が、他の保険医療機関から転院してきた者であって、当該他の保険医療機関において区分番号Ａ２４６に掲げる入退院支援加算３を算定したものである場合には、重症児（者）受入連携加算として、入院初日に限り2,000点を所定点数に加算する。
  - ４当該病棟に入院する重度の意識障害（脳卒中の後遺症であるものに限る。）の患者であって、基本診療料の施設基準等第５の３（１）のロに規定する医療区分２の患者又は第６の３（２）のロの④に規定する医療区分１の患者に相当するものについては、注１の規定にかかわらず、当該患者が入院している病棟の区分に従い、次に掲げる点数をそれぞれ算定する。
      - イ特殊疾患病棟入院料１の施設基準を届け出た病棟に入院している場合
    - （１）医療区分２の患者に相当するもの1,928点
    - （２）医療区分１の患者に相当するもの1,763点
      - ロ特殊疾患病棟入院料２の施設基準を届け出た病棟に入院している場合
    - （１）医療区分２の患者に相当するもの1,675点
    - （２）医療区分１の患者に相当するもの1,508点
  - ５診療に係る費用（注２及び注３に規定する加算、第２節に規定する臨床研修病院入院診療加算、医師事務作業補助体制加算（50対１補助体制加算、75対１補助体制加算又は100対１補助体制加算に限る。）、超重症児（者）入院診療加算・準超重症児（者）入院診療加算、地域加算、離島加算、特定感染症患者療養環境特別加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、データ提出加算、入退院支援加算（１のロ及び２のロに限る。）、医療的ケア児（者）入院前支援加算、認知症ケア加算、排尿自立支援加算及び協力対象施設入所者入院加算、第14部その他並びに除外薬剤・注射薬の費用を除く。）は、特殊疾患病棟入院料に含まれるものとする。
  - ６当該病棟に入院する脳卒中又は脳卒中の後遺症の患者（重度の意識障害者、筋ジストロフィー患者及び難病患者等を除く。）であって、基本診療料の施設基準等第５の３（１）のロに規定する医療区分２の患者又は第６の３（２）のロの④に規定する医療区分１の患者に相当するものについては、注１の規定にかかわらず、当該患者が入院している病棟の区分に従い、次に掲げる点数をそれぞれ算定する。
      - イ特殊疾患病棟入院料１の施設基準を届け出た病棟に入院している場合
    - （１）医療区分２の患者に相当するもの1,735点
    - （２）医療区分１の患者に相当するもの1,586点
      - ロ特殊疾患病棟入院料２の施設基準を届け出た病棟に入院している場合
    - （１）医療区分２の患者に相当するもの1,507点
    - （2）医療区分１の患者に相当するもの1,357点
  - ７当該病棟に入院する患者のうち、区分番号Ｊ０３８に掲げる人工腎臓、区分番号Ｊ０３８－２に掲げる持続緩徐式血液濾過、区分番号Ｊ０３９に掲げる血漿交換療法又は区分番号Ｊ０４２に掲げる腹膜灌流を行っている慢性腎臓病の患者（注４及び注６に規定する点数を算定する患者を除く。）であって、基本診療料の施設基準等第５の３（１）のロに規定する医療区分２の患者に相当するものについては、注１の規定にかかわらず、当該患者が入院している病棟の区分に従い、次に掲げる点数をそれぞれ算定する。
      - イ特殊疾患病棟入院料１の施設基準を届け出た病棟に入院している場合2,010点
      - ロ特殊疾患病棟入院料２の施設基準を届け出た病棟に入院している場合1,615点Ａ３１０緩和ケア病棟入院料（１日につき）１緩和ケア病棟入院料１
      - イ30日以内の期間5,135点
      - ロ31日以上60日以内の期間4,582点
      - ハ61日以上の期間3,373点
  - ２緩和ケア病棟入院料２
      - イ30日以内の期間4,897点
      - ロ31日以上60日以内の期間4,427点
      - ハ61日以上の期間3,321点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た緩和ケアを行う病棟を有する保険医療機関において、当該届出に係る病棟に入院している緩和ケアを要する患者について、当該基準に係る区分に従い、それぞれ算定する。
  ただし、悪性腫瘍の患者及び後天性免疫不全症候群の患者以外の患者が当該病棟に入院した場合は、区分番号Ａ１００に掲げる一般病棟入院基本料の注２に規定する特別入院基本料の例により算定する。
  - ２当該保険医療機関と連携して緩和ケアを提供する別の保険医療機関（在宅療養支援診療所又は在宅療養支援病院に限る。）により在宅での緩和ケアが行われ、当該別の保険医療機関からあらかじめ文書で情報提供を受けた患者について、病状の急変等に伴い、当該別の保険医療機関からの求めに応じて入院させた場合に、緩和ケア病棟緊急入院初期加算として、入院した日から起算して15日を限度として、１日につき200点を更に所定点数に加算する。
  - ３診療に係る費用（注２及び注４に規定する加算、第２節に規定する臨床研修病院入院診療加算、妊産婦緊急搬送入院加算、医師事務作業補助体制加算、地域加算、離島加算、特定感染症患者療養環境特別加算、がん拠点病院加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、データ提出加算、入退院支援加算（１のイに限る。）及び排尿自立支援加算、第２章第２部第２節在宅療養管理指導料、第３節薬剤料、第４節特定保険医療材料料、第12部放射線治療及び第14部その他、退院時に当該指導管理を行ったことにより算定できる区分番号Ｃ１０８に掲げる在宅麻薬等注射指導管理料、区分番号Ｃ１０８－２に掲げる在宅腫瘍化学療法注射指導管理料、区分番号Ｃ１０８－３に掲げる在宅強心剤持続投与指導管理料、区分番号Ｃ１０８－４に掲げる在宅悪性腫瘍患者共同指導管理料及び区分番号Ｃ１０９に掲げる在宅寝たきり患者処置指導管理料並びに除外薬剤・注射薬の費用を除く。）は、緩和ケア病棟入院料に含まれるものとする。
  - ４当該病棟に入院している疼痛を有する患者に対して、疼痛の評価その他の療養上必要な指導を行った場合は、緩和ケア疼痛評価加算として、１日につき100点を所定点数に加算する。
