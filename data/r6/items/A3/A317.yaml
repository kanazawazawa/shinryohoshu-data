code: A317
name: 特定一般病棟入院料（１日につき）１特定一般病棟入院料
version: r6
points: 11168
unit: 日
chapter:
  chapter: 第2章 第１部医学管理等の区分番号Ｂ０１５に掲げる精神科退院時共同指導料
raw_text: |
  Ａ３１７特定一般病棟入院料（１日につき）１特定一般病棟入院料１1,168点
  - ２特定一般病棟入院料２1,002点
  - 注１医療提供体制の確保の状況に鑑み別に厚生労働大臣が定める地域に所在する保険医療機関（一般病棟が１病棟のものに限る。）が、一定地域で必要とされる医療を当該保険医療機関で確保するための体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者について、当該基準に係る区分に従い、それぞれ所定点数を算定する。
  - ２当該病棟の入院患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
      - イ14日以内の期間450点
      - ロ15日以上30日以内の期間192点
  - ３当該患者が他の保険医療機関から転院してきた者であって、当該他の保険医療機関において区分番号Ａ２４６に掲げる入退院支援加算３を算定したものである場合には、重症児（者）受入連携加算として、入院初日に限り2,000点を所定点数に加算する。
  - ４当該病棟に入院している患者のうち、急性期医療を担う他の保険医療機関の一般病棟から転院した患者又は介護老人保健施設、介護医療院、特別養護老人ホーム、軽費老人ホーム、有料老人ホーム等若しくは自宅から入院した患者については、転院又は入院した日から起算して14日を限度として、救急・在宅等支援病床初期加算として、１日につき150点を所定点数に加算する。
  - ５別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た病棟において、当該患者の看護必要度について測定を行った場合には、一般病棟看護必要度評価加算として、１日につき５点を所定点数に加算する。
  - ６当該病棟においては、第２節の各区分に掲げる入院基本料等加算のうち、総合入院体制加算、急性期充実体制加算、臨床研修病院入院診療加算、救急医療管理加算、超急性期脳卒中加算、妊産婦緊急搬送入院加算、在宅患者緊急入院診療加算、診療録管理体制加算、医師事務作業補助体制加算、乳幼児加算・幼児加算、特定感染症入院医療管理加算、難病等特別入院診療加算、超重症児（者）入院診療加算・準超重症児（者）入院診療加算、看護配置加算、看護補助加算、地域加算、離島加算、療養環境加算、ＨＩＶ感染者療養環境特別加算、特定感染症患者療養環境特別加算、重症者等療養環境特別加算、小児療養環境特別加算、無菌治療室管理加算、放射線治療病室管理加算、緩和ケア診療加算、小児緩和ケア診療加算、精神科リエゾンチーム加算、強度行動障害入院医療管理加算、依存症入院医療管理加算、摂食障害入院医療管理加算、がん拠点病院加算、栄養サポートチーム加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、ハイリスク妊娠管理加算、ハイリスク分娩等管理加算（ハイリスク分娩管理加算に限る。）、呼吸ケアチーム加算、術後疼痛管理チーム加算、後発医薬品使用体制加算、バイオ後続品使用体制加算、データ提出加算、入退院支援加算（１のイ、２のイ及び３に限る。）、医療的ケア児（者）入院前支援加算、認知症ケア加算、せん妄ハイリスク患者ケア加算、精神疾患診療体制加算、薬剤総合評価調整加算、排尿自立支援加算及び協力対象施設入所者入院加算について、同節に規定する算定要件を満たす場合に算定できる。
  - ７当該病棟の病室のうち、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出たものに入院する患者に対し、必要があって地域包括ケア入院医療管理が行われた場合には、注１から注６までの規定にかかわらず、当該病室に入院した日から起算して60日を限度として、40日以内の期間においては、それぞれ2,459点、2,270点、2,007点又は1,796点を、41日以上の期間においては、それぞれ2,330点、2,151点、1,902点又は1,702点を算定する。
  ただし、当該病室に入院した患者が算定要件に該当しない場合は、区分番号Ａ１００に掲げる一般病棟入院基本料の注２に規定する特別入院基本料の例により算定する。
  - ８注７本文の規定により所定点数を算定する場合においては、診療に係る費用（区分番号Ａ３０８－３に掲げる地域包括ケア病棟入院料の注３から注６まで及び注８に規定する加算、第２節に規定する臨床研修病院入院診療加算、在宅患者緊急入院診療加算、医師事務作業補助体制加算、地域加算、離島加算、特定感染症患者療養環境特別加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、データ提出加算、入退院支援加算（１のイに限る。）、医療的ケア児（者）入院前支援加算、認知症ケア加算、薬剤総合評価調整加算、排尿自立支援加算及び協力対象施設入所者入院加算、第２章第２部在宅医療、第７部リハビリテーションの区分番号Ｈ００４に掲げる摂食機能療法、第９部処置の区分番号Ｊ０３８に掲げる人工腎臓、区分番号Ｊ０４２に掲げる腹膜灌流及び区分番号Ｊ４００に掲げる特定保険医療材料（区分番号Ｊ０３８に掲げる人工腎臓又は区分番号Ｊ０４２に掲げる腹膜灌流に係るものに限る。）及び第14部その他並びに除外薬剤・注射薬の費用を除く。）は、当該所定点数に含まれるものとする。
  - ９注１から注６までの規定にかかわらず、保険医療機関が地方厚生局長等に届け出た病棟に入院している患者（注７の規定により地方厚生局長等に届け出た病室に入院する者を除く。）であって、当該病棟に90日を超えて入院する患者については、区分番号Ａ１０１に掲げる療養病棟入院料１の例により算定する。
