code: A312
name: 精神療養病棟入院料（１日につき）
version: r6
points: 1108
unit: 日
chapter:
  chapter: 第2章 第１部医学管理等の区分番号Ｂ０１５に掲げる精神科退院時共同指導料
raw_text: |
  Ａ３１２精神療養病棟入院料（１日につき）1,108点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た精神病棟を有する保険医療機関において、当該届出に係る精神病棟に入院している患者について、所定点数を算定する。
  - ２診療に係る費用（注３から注５までに規定する加算、第２節に規定する臨床研修病院入院診療加算、医師事務作業補助体制加算（50対１補助体制加算、75対１補助体制加算又は100対１補助体制加算に限る。）、地域加算、離島加算、特定感染症患者療養環境特別加算、精神科措置入院診療加算、精神科地域移行実施加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、精神科救急搬送患者地域連携受入加算、データ提出加算、精神科入退院支援加算、薬剤総合評価調整加算及び排尿自立支援加算、第２章第１部医学管理等の区分番号Ｂ０１５に掲げる精神科退院時共同指導料２、第７部リハビリテーションの区分番号Ｈ０００に掲げる心大血管疾患リハビリテーション料、区分番号Ｈ００１に掲げる脳血管疾患等リハビリテーション料、区分番号Ｈ００１－２に掲げる廃用症候群リハビリテーション料、区分番号Ｈ００２に掲げる運動器リハビリテーション料、区分番号Ｈ００３に掲げる呼吸器リハビリテーション料及び区分番号Ｈ００３－２に掲げるリハビリテーション総合計画評価料、第８部精神科専門療法、第14部その他並びに除外薬剤・注射薬に係る費用を除く。）は、精神療養病棟入院料に含まれるものとする。
  - ３当該病棟に入院している統合失調症の患者に対して、計画的な医学管理の下に非定型抗精神病薬による治療を行い、かつ、療養上必要な指導を行った場合には、当該患者が使用した１日当たりの抗精神病薬が２種類以下の場合に限り、非定型抗精神病薬加算として、１日につき15点を所定点数に加算する。
  - ４別に厚生労働大臣が定める状態の患者については、重症者加算として、当該患者に係る区分に従い、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
  ただし、重症者加算１については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者についてのみ加算する。
      - イ重症者加算１60点
      - ロ重症者加算２30点
  - ５別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者について、精神保健福祉士配置加算として、１日につき30点を所定点数に加算する。
  - ６精神保健福祉士配置加算を算定した場合は、注５に規定する加算、区分番号Ａ２３０－２に掲げる精神科地域移行実施加算、区分番号Ａ２４６－２に掲げる精神科入退院支援加算、区分番号Ｉ０１１に掲げる精神科退院指導料及び区分番号Ｉ０１１－２に掲げる精神科退院前訪問指導料は、算定しない。
