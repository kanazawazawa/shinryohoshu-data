raw_text: "Ａ２４９精神科急性期医師配置加算（１日につき）１精神科急性期医師配置加算１600点\n- ２精神科急性期医師配置加算２\n    - イ精神病棟入院基本料等の場合500点\n    - ロ精神科急性期治療病棟入院料の場合450点\n\
  - ３精神科急性期医師配置加算３400点\n- 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、精神科急性期医師配置加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、それぞれ所定点数に加算する。\n"
notes:
