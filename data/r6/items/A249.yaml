  text: '別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、精神科急性期医師配置加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、それぞれ所定点数に加算する。

