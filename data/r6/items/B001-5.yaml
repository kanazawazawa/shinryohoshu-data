code: B001-5
name: 手術後医学管理料（１日につき）１病院の場合
version: r6
points: 1188
unit: 日
chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００１－５手術後医学管理料（１日につき）１病院の場合1,188点
  - ２診療所の場合1,056点
  - 注１病院（療養病棟、結核病棟及び精神病棟を除く。）又は診療所（療養病床に係るものを除く。）に入院している患者について、入院の日から起算して10日以内に行われた区分番号Ｌ００８に掲げるマスク又は気管内挿管による閉鎖循環式全身麻酔を伴う手術後に必要な医学管理を行った場合に、当該手術に係る手術料を算定した日の翌日から起算して３日に限り算定する。
  - ２同一の手術について、同一月に区分番号Ｂ００１－４に掲げる手術前医学管理料を算定する場合は、本管理料を算定する３日間については、所定点数の100分の95に相当する点数を算定する。
  - ３第３部検査のうち次に掲げるもの（当該手術に係る手術料を算定した日の翌日から起算して３日以内に行ったものに限る。）は、所定点数に含まれるものとする。
      - イ尿中一般物質定性半定量検査
      - ロ尿中特殊物質定性定量検査尿蛋白及び尿グルコース
      - ハ血液形態・機能検査赤血球沈降速度（ＥＳＲ）、末梢血液像（自動機械法）、末梢血液像（鏡検法）及び末梢血液一般検査
      - ニ血液化学検査総ビリルビン、直接ビリルビン又は抱合型ビリルビン、総蛋白、アルブミン（ＢＣＰ改良法・ＢＣＧ法）、尿素窒素、クレアチニン、尿酸、アルカリホスファターゼ（ＡＬＰ）、コリンエステラーゼ（ＣｈＥ）、γ－グルタミルトランスフェラーゼ（γ－ＧＴ）、中性脂肪、ナトリウム及びクロール、カリウム、カルシウム、マグネシウム、クレアチン、グルコース、乳酸デヒドロゲナーゼ（ＬＤ）、アミラーゼ、ロイシンアミノペプチダーゼ（ＬＡＰ）、クレアチンキナーゼ（ＣＫ）、アルドラーゼ、遊離コレステロール、鉄（Ｆｅ）、血中ケトン体・糖・クロール検査（試験紙法・アンプル法・固定化酵素電極によるもの）、不飽和鉄結合能（ＵＩＢＣ）（比色法）、総鉄結合能（ＴＩＢＣ）（比色法）、リン脂質、ＨＤＬ－コレステロール、ＬＤＬ－コレステロール、無機リン及びリン酸、総コレステロール、アスパラギン酸アミノトランスフェラーゼ（ＡＳＴ）、アラニンアミノトランスフェラーゼ（ＡＬＴ）、イオン化カルシウム並びに血液ガス分析
      - ホ心電図検査
      - ヘ呼吸心拍監視
      - ト経皮的動脈血酸素飽和度測定
      - チ終末呼気炭酸ガス濃度測定
      - リ中心静脈圧測定
      - ヌ動脈血採取４区分番号Ｄ０２６に掲げる尿・糞便等検査判断料、血液学的検査判断料又は生化学的検査（Ⅰ）判断料を算定している患者については算定しない。
  - ５第１章第２部第３節に掲げる特定入院料又は区分番号Ｄ０２７に掲げる基本的検体検査判断料を算定している患者については算定しない。
  - ６区分番号Ａ３００の救命救急入院料又は区分番号Ａ３０１の特定集中治療室管理料に係る別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者については算定しない。
