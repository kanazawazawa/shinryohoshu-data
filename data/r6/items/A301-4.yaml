chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第3節 特定入院料
raw_text: "Ａ３０１－４小児特定集中治療室管理料（１日につき）１７日以内の期間16,362点\n- ２８日以上の期間14,256点\n- 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、15歳未満の小児（児童福祉法第６条の２第３項に規定する小児慢性特定疾病医療支援の対象である場合は、20歳未満の者）に対し、必要があって小児特定集中治療室管理が行われた場合に、14日（急性血液浄化（腹膜透析を除く。）を必要とする状態、心臓手術ハイリスク群、左心低形成症候群、急性呼吸窮迫症候群又は心筋炎・心筋症のいずれかに該当する小児にあっては21日、臓器移植を行った小児にあっては30日、体外式心肺補助（ＥＣＭＯ）を必要とする状態の小児にあっては35日、手術を必要とする先天性心疾患の新生児にあっては55日）を限度として算定する。\n\
  - ２第１章基本診療料並びに第２章第３部検査、第６部注射、第９部処置及び第13部病理診断のうち次に掲げるものは、小児特定集中治療室管理料に含まれるものとする。\n    - イ入院基本料\n    - ロ入院基本料等加算（臨床研修病院入院診療加算、超急性期脳卒中加算、医師事務作業補助体制加算、特定感染症入院医療管理加算、難病等特別入院診療加算（二類感染症患者入院診療加算に限る。）、地域加算、離島加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、重症患者初期支援充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、術後疼痛管理チーム加算、病棟薬剤業務実施加算２、データ提出加算、入退院支援加算（１のイ及び３に限る。）、精神疾患診療体制加算、排尿自立支援加算及び地域医療体制確保加算を除く。）\n\
  \    - ハ第２章第３部の各区分の検査（同部第１節第２款の検体検査判断料を除く。）\n    - ニ点滴注射\n    - ホ中心静脈注射\n    - ヘ酸素吸入（使用した酸素及び窒素の費用を除く。）\n    - ト留置カテーテル設置\n\
  \    - チ第13部第１節の病理標本作製料３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病室に入院している患者に対して、入室後早期から離床等に必要な治療を行った場合に、早期離床・リハビリテーション加算として、入室した日から起算して14日を限度として500点を所定点数に加算する。\n\
  この場合において、同一日に区分番号Ｈ０００に掲げる心大血管疾患リハビリテーション料、Ｈ００１に掲げる脳血管疾患等リハビリテーション料、Ｈ００１－２に掲げる廃用症候群リハビリテーション料、Ｈ００２に掲げる運動器リハビリテーション料、Ｈ００３に掲げる呼吸器リハビリテーション料、Ｈ００７に掲げる障害児（者）リハビリテーション料及びＨ００７－２に掲げるがん患者リハビリテーション料は、算定できない。\n\
  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病室に入院している患者に対して、入室後早期から必要な栄養管理を行った場合に、早期栄養介入管理加算として、入室した日から起算して７日を限度として250点（入室後早期から経腸栄養を開始した場合は、当該開始日以降は400点）を所定点数に加算する。\n\
  ただし、区分番号Ｂ００１の10に掲げる入院栄養食事指導料は別に算定できない。\n"
