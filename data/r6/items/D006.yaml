raw_text: "Ｄ００６出血・凝固検査\n- １出血時間15点\n- ２プロトロンビン時間（ＰＴ）18点\n- ３血餅収縮能、毛細血管抵抗試験19点\n- ４フィブリノゲン半定量、フィブリノゲン定量、クリオフィブリノゲン23点\n- ５トロンビン時間25点\n\
  - ６蛇毒試験、トロンボエラストグラフ、ヘパリン抵抗試験28点\n- ７活性化部分トロンボプラスチン時間（ＡＰＴＴ）29点\n- ８血小板粘着能64点\n- ９アンチトロンビン活性、アンチトロンビン抗原70点\n- 10フィブリン・フィブリノゲン分解産物（ＦＤＰ）定性、フィブリン・フィブリノゲン分解産物（ＦＤＰ）半定量、フィブリン・フィブリノゲン分解産物（ＦＤＰ）定量、プラスミン、プラスミン活性、α１－アンチトリプシン80点\n\
  - 11フィブリンモノマー複合体定性93点\n- 12プラスミノゲン活性、プラスミノゲン抗原、凝固因子インヒビター定性（クロスミキシング試験）100点\n- 13Ｄダイマー定性121点\n- 14ｖｏｎＷｉｌｌｅｂｒａｎｄ因子（ＶＷＦ）活性126点\n\
  - 15Ｄダイマー127点\n- 16プラスミンインヒビター（アンチプラスミン）、Ｄダイマー半定量128点\n- 17α２－マクログロブリン138点\n- 18ＰＩＶＫＡ－Ⅱ143点\n- 19凝固因子インヒビター144点\n- 20ｖｏｎＷｉｌｌｅｂｒａｎｄ因子（ＶＷＦ）抗原147点\n\
  - 21プラスミン・プラスミンインヒビター複合体（ＰＩＣ）150点\n- 22プロテインＳ抗原154点\n- 23プロテインＳ活性163点\n- 24β－トロンボグロブリン（β－ＴＧ）、トロンビン・アンチトロンビン複合体（ＴＡＴ）171点\n\
  - 25血小板第４因子（ＰＦ４）173点\n- 26プロトロンビンフラグメントＦ１＋２192点\n- 27トロンボモジュリン204点\n- 28フィブリンモノマー複合体215点\n- 29凝固因子（第Ⅱ因子、第Ⅴ因子、第Ⅶ因子、第Ⅷ因子、第Ⅸ因子、第Ⅹ因子、第ⅩⅠ因子、第ⅩⅡ因子、第ⅩⅢ因子）223点\n\
  - 30プロテインＣ抗原226点\n- 31プロテインＣ活性227点\n- 32ｔＰＡ・ＰＡＩ－１複合体240点\n- 33ＡＤＡＭＴＳ13活性400点\n- 34血小板凝集能\n    - イ鑑別診断の補助に用いるもの450点\n   \
  \ - ロその他のもの50点\n- 35ＡＤＡＭＴＳ13インヒビター1,000点\n- 注患者から１回に採取した血液を用いて本区分の13から32までに掲げる検査を３項目以上行った場合は、所定点数にかかわらず、検査の項目数に応じて次に掲げる点数により算定する。\n\
  \    - イ３項目又は４項目530点\n    - ロ５項目以上722点\n"
