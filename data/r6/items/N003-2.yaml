  section: 第1節 病理標本作製料
raw_text: 'Ｎ００３－２迅速細胞診

  - １手術中の場合（１手術につき）450点

  - ２検査中の場合（１検査につき）450点Ｎ００４細胞診（１部位につき）１婦人科材料等によるもの150点

  - ２穿刺吸引細胞診、体腔洗浄等によるもの190点

  - 注１１について、固定保存液に回収した検体から標本を作製して、診断を行った場合には、婦人科材料等液状化検体細胞診加算として、45点を所定点数に加算する。

  - ２２について、過去に穿刺し又は採取し、固定保存液に回収した検体から標本を作製して、診断を行った場合には、液状化検体細胞診加算として、85点を所定点数に加算する。

  '
