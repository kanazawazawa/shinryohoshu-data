  section: 第1節 精神科専門療法料
raw_text: |
  Ｉ００６－２依存症集団療法（１回につき）１薬物依存症の場合340点
  - ２ギャンブル依存症の場合300点
  - ３アルコール依存症の場合300点
  - 注１１については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、薬物依存症の患者であって、入院中の患者以外のものに対して、集団療法を実施した場合に、治療開始日から起算して６月を限度として、週１回に限り算定する。
  ただし、精神科の医師が特に必要性を認め、治療開始日から起算して６月を超えて実施した場合には、治療開始日から起算して２年を限度として、更に週１回かつ計24回に限り算定できる。
  - ２２については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、ギャンブル依存症の患者であって、入院中の患者以外のものに対して、集団療法を実施した場合に、治療開始日から起算して３月を限度として、２週間に１回に限り算定する。
  - ３３については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、アルコール依存症の患者であって、入院中の患者以外のものに対して、集団療法を実施した場合に、週１回かつ計10回に限り算定する。
  - ４依存症集団療法と同一日に行う他の精神科専門療法は、所定点数に含まれるものとする。
