raw_text: |
  Ｃ１５２－４持続皮下注入シリンジポンプ加算
  - １月５個以上10個未満の場合2,330点
  - ２月10個以上15個未満の場合3,160点
  - ３月15個以上20個未満の場合3,990点
  - ４月20個以上の場合4,820点
  - 注別に厚生労働大臣が定める注射薬の自己注射を行っている入院中の患者以外の患者に対して、持続皮下注入シリンジポンプを使用した場合に、２月に２回に限り第１款の所定点数に加算する。
notes:
