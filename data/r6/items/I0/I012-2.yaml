code: I012-2
name: 精神科訪問看護指示料
version: r6
points: 300
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第8部 精神科専門療法
  section: 第1節 精神科専門療法料
raw_text: |
  Ｉ０１２－２精神科訪問看護指示料300点
  - 注１当該患者に対する診療を担う保険医療機関の保険医（精神科の医師に限る。）が、診療に基づき指定訪問看護事業者（介護保険法第41条第１項に規定する指定居宅サービス事業者若しくは同法第53条第１項に規定する指定介護予防サービス事業者（いずれも訪問看護事業を行う者に限る。）又は健康保険法第88条第１項に規定する指定訪問看護事業者をいう。）からの指定訪問看護の必要を認め、患者又はその家族等の同意を得て当該患者等の選定する訪問看護ステーションに対して、精神科訪問看護指示書を交付した場合に、患者１人につき月１回に限り算定する。
  - ２当該患者が服薬中断等により急性増悪した場合であって、当該患者に対する診療を担う保険医療機関の保険医（精神科の医師に限る。）が、一時的に頻回の指定訪問看護を行う必要を認め、患者又はその家族等の同意を得て当該患者等の選定する訪問看護ステーションに対して、その旨を記載した精神科訪問看護指示書を交付した場合は、精神科特別訪問看護指示加算として、患者１人につき月１回に限り、100点を所定点数に加算する。
  - ３当該患者に対する診療を担う保険医療機関の保険医（精神科の医師に限る。）が、診療に基づき、保健師助産師看護師法第37条の２第２項第１号に規定する特定行為（訪問看護において専門の管理を必要とするものに限る。）に係る管理の必要を認め、当該患者の同意を得て当該患者の選定する訪問看護ステーション等の看護師（同項第５号に規定する指定研修機関において行われる研修を修了した者に限る。）に対して、同項第２号に規定する手順書を交付した場合は、手順書加算として、患者１人につき６月に１回に限り、150点を所定点数に加算する。
  - ４注１の場合において、必要な衛生材料及び保険医療材料を提供した場合に、衛生材料等提供加算として、患者１人につき月１回に限り、80点を所定点数に加算する。
  - ５精神科訪問看護指示料を算定した場合には、区分番号Ｃ００７に掲げる訪問看護指示料は算定しない。
