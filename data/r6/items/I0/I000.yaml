  part: 第8部 精神科専門療法
  section: 第1節 精神科専門療法料
raw_text: |
  Ｉ０００精神科電気痙攣療法
  - １マスク又は気管内挿管による閉鎖循環式全身麻酔を行った場合2,800点
  - ２１以外の場合150点
  - 注１１日に１回に限り算定する。
  - ２１については、第11部に規定する麻酔に要する費用（薬剤料及び特定保険医療材料料を除く。）は所定点数に含まれるものとする。
  - ３１については、麻酔に従事する医師（麻酔科につき医療法第６条の６第１項に規定する厚生労働大臣の許可を受けた者に限る。）が麻酔を行った場合は、900点を所定点数に加算する。
