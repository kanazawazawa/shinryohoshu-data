raw_text: |
  Ｂ００６－３退院時リハビリテーション指導料300点
  - 注患者の退院時に当該患者又はその家族等に対して、退院後の在宅での基本的動作能力若しくは応用的動作能力又は社会的適応能力の回復を図るための訓練等について必要な指導を行った場合に算定する。
  この場合において、同一日に、区分番号Ｂ００５に掲げる退院時共同指導料２（注１の規定により、入院中の保険医療機関の理学療法士、作業療法士又は言語聴覚士が指導等を行った場合に限る。）は、別に算定できない。
