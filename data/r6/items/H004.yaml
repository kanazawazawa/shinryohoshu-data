chapter:
  chapter: 第2章 特掲診療料
  part: 第7部 リハビリテーション
  section: 第1節 リハビリテーション料
raw_text: "Ｈ００４摂食機能療法（１日につき）１30分以上の場合185点\n- ２30分未満の場合130点\n- 注１１については、摂食機能障害を有する患者に対して、１月に４回に限り算定する。\nただし、治療開始日から起算して３月以内の患者については、１日につき算定できる。\n\
  - ２２については、脳卒中の患者であって、摂食機能障害を有するものに対して、脳卒中の発症から14日以内に限り、１日につき算定できる。\n- ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、摂食機能又は嚥下機能の回復に必要な指導管理を行った場合は、摂食嚥下機能回復体制加算として、当該基準に係る区分に従い、患者（ハについては、療養病棟入院料１又は療養病棟入院料２を現に算定しているものに限る。）１人につき週１回に限り次に掲げる点数を所定点数に加算する。\n\
  \    - イ摂食嚥下機能回復体制加算１210点\n    - ロ摂食嚥下機能回復体制加算２190点\n    - ハ摂食嚥下機能回復体制加算３120点Ｈ００５視能訓練（１日につき）１斜視視能訓練135点\n- ２弱視視能訓練135点Ｈ００６難病患者リハビリテーション料（１日につき）640点\n\
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、入院中の患者以外の患者であって別に厚生労働大臣が定める疾患を主病とするもの（別に厚生労働大臣が定める状態にあるものに限る。）に対して、社会生活機能の回復を目的としてリハビリテーションを行った場合に算定する。\n\
  - ２医療機関を退院した患者に対して集中的にリハビリテーションを行った場合は、退院日から起算して３月を限度として、短期集中リハビリテーション実施加算として、退院日から起算した日数に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n\
  \    - イ退院日から起算して１月以内の期間に行われた場合280点\n    - ロ退院日から起算して１月を超え３月以内の期間に行われた場合140点Ｈ００７障害児（者）リハビリテーション料（１単位）１６歳未満の患者の場合225点\n-\
  \ ２６歳以上18歳未満の患者の場合195点\n- ３18歳以上の患者の場合155点\n- 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める患者に対して、個別療法であるリハビリテーションを行った場合に、患者１人につき１日６単位まで算定する。\n"
