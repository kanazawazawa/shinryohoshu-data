  chapter: 第2章 特掲診療料
  part: 第9部 処置
  section: 第1節 処置料
raw_text: 'Ｊ０００創傷処置

  - １100平方センチメートル未満52点

  - ２100平方センチメートル以上500平方センチメートル未満60点

  - ３500平方センチメートル以上3,000平方センチメートル未満90点

  - ４3,000平方センチメートル以上6,000平方センチメートル未満160点

  - ５6,000平方センチメートル以上275点

  - 注１１については、入院中の患者以外の患者及び手術後の患者（入院中の患者に限る。）についてのみ算定する。

  ただし、手術後の患者（入院中の患者に限る。）については手術日から起算して14日を限度として算定する。

  - ２区分番号Ｃ１０９に掲げる在宅寝たきり患者処置指導管理料、区分番号Ｃ１１２に掲げる在宅気管切開患者指導管理料又は区分番号Ｃ１１２－２に掲げる在宅喉頭摘出患者指導管理料を算定している患者に対して行った創傷処置（熱傷に対するものを除く。）の費用は算定しない。

  - ３５については、６歳未満の乳幼児の場合は、乳幼児加算として、55点を加算する。

  '
