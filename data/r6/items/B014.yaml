  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: 'Ｂ０１４退院時薬剤情報管理指導料90点

  - 注１保険医療機関が、患者の入院時に当該患者が服薬中の医薬品等について確認するとともに、当該患者に対して入院中に使用した主な薬剤の名称（副作用が発現した場合については、当該副作用の概要、講じた措置等を含む。）に関して当該患者の手帳に記載した上で、退院に際して当該患者又はその家族等に対して、退院後の薬剤の服用等に関する必要な指導を行った場合に、退院の日に１回に限り算定する。

  この場合において、同一日に、区分番号Ｂ００５に掲げる退院時共同指導料２（注１の規定により、入院中の保険医療機関の薬剤師が指導等を行った場合に限る。）は、別に算定できない。

  - ２保険医療機関が、入院前の内服薬の変更をした患者又は服用を中止した患者について、保険薬局に対して、当該患者又はその家族等の同意を得て、その理由や変更又は中止後の当該患者の状況を文書により提供した場合に、退院時薬剤情報連携加算として、60点を所定点数に加算する。

  '
