raw_text: |
  Ｋ５８３大血管転位症手術
  - １心房内血流転換手術（マスタード・セニング手術）114,510点
  - ２大血管血流転換術（ジャテーン手術）144,690点
  - ３心室中隔欠損閉鎖術を伴うもの173,620点
  - ４ラステリ手術を伴うもの154,330点
  - 注４については、過去に当該手術を行ったものに対して同一部位の人工血管等の再置換術を実施した場合は、人工血管等再置換術加算として、所定点数に所定点数の100分の50に相当する点数を加算する。
