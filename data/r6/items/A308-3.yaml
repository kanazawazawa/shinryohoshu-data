chapter:
  chapter: 第1章 基本診療料
  part: 第13部 第２節病理診断・判断料及び第14部その他の費用並びに第２節に規定する
raw_text: "Ａ３０８－３地域包括ケア病棟入院料（１日につき）１地域包括ケア病棟入院料１\n    - イ40日以内の期間2,838点（生活療養を受ける場合にあっては、2,823点）\n    - ロ41日以上の期間2,690点（生活療養を受ける場合にあっては、2,675点）２地域包括ケア入院医療管理料１\n\
  \    - イ40日以内の期間2,838点（生活療養を受ける場合にあっては、2,823点）\n    - ロ41日以上の期間2,690点（生活療養を受ける場合にあっては、2,675点）３地域包括ケア病棟入院料２\n    - イ40日以内の期間2,649点（生活療養を受ける場合にあっては、2,634点）\n\
  \    - ロ41日以上の期間2,510点（生活療養を受ける場合にあっては、2,495点）４地域包括ケア入院医療管理料２\n    - イ40日以内の期間2,649点（生活療養を受ける場合にあっては、2,634点）\n    - ロ41日以上の期間2,510点（生活療養を受ける場合にあっては、2,495点）５地域包括ケア病棟入院料３\n\
  \    - イ40日以内の期間2,312点（生活療養を受ける場合にあっては、2,297点）\n    - ロ41日以上の期間2,191点（生活療養を受ける場合にあっては、2,176点）６地域包括ケア入院医療管理料３\n    - イ40日以内の期間2,312点（生活療養を受ける場合にあっては、2,297点）\n\
  \    - ロ41日以上の期間2,191点（生活療養を受ける場合にあっては、2,176点）７地域包括ケア病棟入院料４\n    - イ40日以内の期間2,102点（生活療養を受ける場合にあっては、2,086点）\n    - ロ41日以上の期間1,992点（生活療養を受ける場合にあっては、1,976点）８地域包括ケア入院医療管理料４\n\
  \    - イ40日以内の期間2,102点（生活療養を受ける場合にあっては、2,086点）\n    - ロ41日以上の期間1,992点（生活療養を受ける場合にあっては、1,976点）注１１、３、５及び７については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟を有する保険医療機関において、当該届出に係る病棟に入院している患者について、２、４、６及び８については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病室を有する保険医療機関において、当該届出に係る病室に入院している患者について、当該病棟又は病室に入院した日から起算して60日を限度としてそれぞれ所定点数（当該病棟又は病室に係る病床が療養病床である場合にあっては、別に厚生労働大臣が定める場合を除き、所定点数の100分の95に相当する点数）を算定する。\n\
  ただし、当該病棟又は病室に入院した患者が地域包括ケア病棟入院料又は地域包括ケア入院医療管理料に係る算定要件に該当しない場合は、当該病棟又は病室を有する病棟が一般病棟であるときには区分番号Ａ１００に掲げる一般病棟入院基本料の注２に規定する特別入院基本料の例により、当該病棟又は病室を有する病棟が療養病棟であるときには区分番号Ａ１０１に掲げる療養病棟入院料１の入院料27又は療養病棟入院料２の入院料27の例により、それぞれ算定する。\n\
  - ２医療提供体制の確保の状況に鑑み別に厚生労働大臣が定める地域に所在する保険医療機関であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟又は病室を有するものについては、注１に規定する届出の有無にかかわらず、地域包括ケア病棟入院料１のイ（特定地域）、地域包括ケア病棟入院料１のロ（特定地域）、地域包括ケア入院医療管理料１のイ（特定地域）、地域包括ケア入院医療管理料１のロ（特定地域）、地域包括ケア病棟入院料２のイ（特定地域）、地域包括ケア病棟入院料２のロ（特定地域）、地域包括ケア入院医療管理料２のイ（特定地域）、地域包括ケア入院医療管理料２のロ（特定地域）、地域包括ケア病棟入院料３のイ（特定地域）、地域包括ケア病棟入院料３のロ（特定地域）、地域包括ケア入院医療管理料３のイ（特定地域）、地域包括ケア入院医療管理料３のロ（特定地域）、地域包括ケア病棟入院料４のイ（特定地域）、地域包括ケア病棟入院料４のロ（特定地域）、地域包括ケア入院医療管理料４のイ（特定地域）又は地域包括ケア入院医療管理料４のロ（特定地域）について、所定点数に代えて、当該病棟又は病室に入院した日から起算して60日を限度として、１日につき、それぞれ2,460点、2,331点、2,460点、2,331点、2,271点、2,152点、2,271点、2,152点、2,008点、1,903点、2,008点、1,903点、1,797点、1,703点、1,797点又は1,703点（生活療養を受ける場合にあっては、それぞれ2,445点、2,316点、2,445点、2,316点、2,257点、2,138点、2,257点、2,138点、1,994点、1,889点、1,994点、1,889点、1,783点、1,689点、1,783点又は1,689点）を算定することができる。\n\
  ただし、当該病棟又は病室に入院した患者が地域包括ケア病棟入院料（特定地域）又は地域包括ケア入院医療管理料（特定地域）に係る算定要件に該当しない場合は、当該病棟又は病室を有する病棟が一般病棟であるときには区分番号Ａ１００に掲げる一般病棟入院基本料の注２に規定する特別入院基本料の例により、当該病棟又は病室を有する病棟が療養病棟であるときには区分番号Ａ１０１に掲げる療養病棟入院料１の入院料27又は療養病棟入院料２の入院料27の例により、それぞれ算定する。\n\
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟又は病室に入院している患者については、看護職員配置加算として、１日につき150点を所定点数に加算する。\n- ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟又は病室に入院している患者については、看護補助者配置加算として、１日につき160点を所定点数に加算する。\n\
  この場合において、注５に規定する看護補助体制充実加算は別に算定できない。\n- ５別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟又は病室に入院している患者については、当該基準に係る区分に従い、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n\
  ただし、当該患者について、身体的拘束を実施した日は、看護補助体制充実加算３の例により所定点数に加算する。\n    - イ看護補助体制充実加算１190点\n    - ロ看護補助体制充実加算２175点\n    - ハ看護補助体制充実加算３165点\n\
  - ６当該病棟又は病室に入院している患者のうち、急性期医療を担う他の保険医療機関の一般病棟から転院した患者又は当該保険医療機関（急性期医療を担う保険医療機関に限る。）の一般病棟から転棟した患者については、急性期患者支援病床初期加算として、介護老人保健施設、介護医療院、特別養護老人ホーム、軽費老人ホーム、有料老人ホーム等又は自宅から入院した患者については、治療方針に関する患者又はその家族の意思決定に対する支援を行った場合に、在宅患者支援病床初期加算として、転棟若しくは転院又は入院した日から起算して14日を限度として、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n\
  \    - イ急性期患者支援病床初期加算\n  - （1）許可病床数が400床以上の保険医療機関の場合①他の保険医療機関（当該保険医療機関と特別の関係にあるものを除く。）の一般病棟から転棟した患者の場合150点②①の患者以外の患者の場合50点\n\
  \  - （2）許可病床数が400床未満の保険医療機関の場合①他の保険医療機関（当該保険医療機関と特別の関係にあるものを除く。）の一般病棟から転棟した患者の場合250点②①の患者以外の患者の場合125点\n    - ロ在宅患者支援病床初期加算\n\
  \  - （1）介護老人保健施設から入院した患者の場合①救急搬送された患者又は他の保険医療機関で区分番号Ｃ００４－２に掲げる救急患者連携搬送料を算定し当該他の保険医療機関から搬送された患者であって、入院初日から当該病棟に入院した患者の場合580点②①の患者以外の患者の場合480点\n\
  \  - （2）介護医療院、特別養護老人ホーム、軽費老人ホーム、有料老人ホーム等又は自宅から入院した患者の場合①救急搬送された患者又は他の保険医療機関で区分番号Ｃ００４－２に掲げる救急患者連携搬送料を算定し当該他の保険医療機関から搬送された患者であって、入院初日から当該病棟に入院した患者の場合480点②①の患者以外の患者の場合380点\n\
  - ７診療に係る費用（注３から注６まで及び注８に規定する加算、第２節に規定する臨床研修病院入院診療加算、在宅患者緊急入院診療加算、医師事務作業補助体制加算、地域加算、離島加算、特定感染症患者療養環境特別加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、データ提出加算、入退院支援加算（１のイに限る。）、医療的ケア児（者）入院前支援加算、認知症ケア加算、薬剤総合評価調整加算、排尿自立支援加算及び協力対象施設入所者入院加算、区分番号Ｂ００１の34に掲げる二次性骨折予防継続管理料（ロに限る。）、第２章第２部在宅医療、区分番号Ｈ００４に掲げる摂食機能療法、区分番号Ｊ０３８に掲げる人工腎臓、区分番号Ｊ０４２に掲げる腹膜灌流及び区分番号Ｊ４００に掲げる特定保険医療材料（区分番号Ｊ０３８に掲げる人工腎臓又は区分番号Ｊ０４２に掲げる腹膜灌流に係るものに限る。）、第10部手術、第11部麻酔、第14部その他並びに除外薬剤・注射薬の費用を除く。）は、地域包括ケア病棟入院料１、地域包括ケア入院医療管理料１、地域包括ケア病棟入院料２、地域包括ケア入院医療管理料２、地域包括ケア病棟入院料３、地域包括ケア入院医療管理料３、地域包括ケア病棟入院料４及び地域包括ケア入院医療管理料４に含まれるものとする。\n\
  - ８別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟又は病室に入院している患者については、看護職員夜間配置加算として、１日（別に厚生労働大臣が定める日を除く。）につき70点を所定点数に加算する。\n-\
  \ ９別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の特定入院料は、夜間看護体制特定日減算として、次のいずれにも該当する場合に限り、所定点数の100分の５に相当する点数を減算する。\n    - イ年６日以内であること。\n\
  \    - ロ当該日が属する月が連続する２月以内であること。\n- 10注１に規定する地域包括ケア病棟入院料２又は地域包括ケア病棟入院料４の施設基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た場合に限り、当該病棟に入院している患者については、それぞれの所定点数の100分の85に相当する点数を算定する。\n\
  - 11注１に規定する地域包括ケア病棟入院料３、地域包括ケア入院医療管理料３、地域包括ケア病棟入院料４又は地域包括ケア入院医療管理料４の施設基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た場合に限り、当該病棟又は病室に入院している患者については、それぞれの所定点数の100分の90に相当する点数を算定する。\n\
  - 12注１に規定する地域包括ケア病棟入院料２、地域包括ケア入院医療管理料２、地域包括ケア病棟入院料４又は地域包括ケア入院医療管理料４の施設基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た場合に限り、当該病棟又は病室に入院している患者については、それぞれの所定点数の100分の90に相当する点数を算定する。\n\
  - 13別に厚生労働大臣が定める保険医療機関において、地域包括ケア病棟入院料１、地域包括ケア入院医療管理料１、地域包括ケア病棟入院料２又は地域包括ケア入院医療管理料２を算定する病棟又は病室に入院している患者については、それぞれの所定点数の100分の90に相当する点数を算定する。\n"
