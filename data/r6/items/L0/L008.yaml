code: L008
name: マスク又は気管内挿管による閉鎖循環式全身麻酔
version: r6
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第11部 麻酔
  section: 第1節 麻酔料
raw_text: |
  Ｌ００８マスク又は気管内挿管による閉鎖循環式全身麻酔
  - １人工心肺を用い低体温で行う心臓手術、区分番号Ｋ５５２－２に掲げる冠動脈、大動脈バイパス移植術（人工心肺を使用しないもの）であって低体温で行うものが行われる場合又は分離肺換気及び高頻度換気法が併施される麻酔の場合
      - イ別に厚生労働大臣が定める麻酔が困難な患者に行う場合24,900点
      - ロイ以外の場合18,200点
  - ２坐位における脳脊髄手術、人工心肺を用いる心臓手術（低体温で行うものを除く。）若しくは区分番号Ｋ５５２－２に掲げる冠動脈、大動脈バイパス移植術（人工心肺を使用しないもの）（低体温で行うものを除く。）が行われる場合又は低体温麻酔、分離肺換気による麻酔若しくは高頻度換気法による麻酔の場合（１に掲げる場合を除く。）
      - イ別に厚生労働大臣が定める麻酔が困難な患者に行う場合16,720点
      - ロイ以外の場合12,190点
  - ３１若しくは２以外の心臓手術が行われる場合又は伏臥位で麻酔が行われる場合（１又は２に掲げる場合を除く。）
      - イ別に厚生労働大臣が定める麻酔が困難な患者に行う場合12,610点
      - ロイ以外の場合9,170点
  - ４腹腔鏡を用いた手術若しくは検査が行われる場合又は側臥位で麻酔が行われる場合（１から３までに掲げる場合を除く。）
      - イ別に厚生労働大臣が定める麻酔が困難な患者に行う場合9,130点
      - ロイ以外の場合6,610点
  - ５その他の場合
      - イ別に厚生労働大臣が定める麻酔が困難な患者に行う場合8,300点
      - ロイ以外の場合6,000点
  - 注１一の当該全身麻酔において複数の項目に係る手術等が行われる場合には、最も高い点数の項目により算定する。
  - ２全身麻酔の実施時間が２時間を超えた場合は、麻酔管理時間加算として、30分又はその端数を増すごとに、次に掲げる点数を所定点数に加算する。
      - イ１に掲げる項目に係る手術等により実施時間が２時間を超えた場合1,800点
      - ロ２に掲げる項目に係る手術等により実施時間が２時間を超えた場合1,200点
      - ハ３に掲げる項目に係る手術等により実施時間が２時間を超えた場合900点
      - ニ４に掲げる項目に係る手術等により実施時間が２時間を超えた場合660点
      - ホ５に掲げる項目に係る手術等により実施時間が２時間を超えた場合600点
  - ３酸素を使用した場合は、その価格を10円で除して得た点数（酸素と併せて窒素を使用した場合は、それぞれの価格を10円で除して得た点数を合算した点数）を加算する。
  酸素及び窒素の価格は、別に厚生労働大臣が定める。
  - ４硬膜外麻酔を併せて行った場合は、硬膜外麻酔併施加算として、次に掲げる点数を所定点数に加算する。
      - イ頸・胸部750点
      - ロ腰部400点
      - ハ仙骨部170点
  - ５注４について、硬膜外麻酔の実施時間が２時間を超えた場合は、麻酔管理時間加算として、30分又はその端数を増すごとに、注４のイからハまでに掲げる点数にそれぞれ375点、200点、85点を更に所定点数に加算する。
  - ６マスク又は気管内挿管による閉鎖循環式全身麻酔と同一日に行った区分番号Ｄ２２０に掲げる呼吸心拍監視の費用は、所定点数に含まれるものとする。
  - ７心臓手術が行われる場合若しくは別に厚生労働大臣が定める麻酔が困難な患者のうち冠動脈疾患若しくは弁膜症のものに行われる場合又は弁膜症のものに対するカテーテルを用いた経皮的心臓手術が行われる場合において、術中に経食道心エコー法を行った場合には、術中経食道心エコー連続監視加算として、880点又は1,500点を所定点数に加算する。
  - ８同種臓器移植術（生体を除く。）の麻酔を行った場合は、臓器移植術加算として、15,250点を所定点数に加算する。
  - ９区分番号Ｌ１００に掲げる神経ブロックを併せて行った場合は、神経ブロック併施加算として、次に掲げる点数をそれぞれ所定点数に加算する。
  ただし、イを算定する場合は、注４及び注５に規定する加算は別に算定できない。
      - イ別に厚生労働大臣が定める患者に対して行う場合450点
      - ロイ以外の場合45点
  - 10別に厚生労働大臣が定める麻酔が困難な患者について、腹腔鏡下手術（区分番号Ｋ６７２－２に掲げる腹腔鏡下胆嚢摘出術及びＫ７１８－２に掲げる腹腔鏡下虫垂切除術を除く。）が行われる場合において、術中に非侵襲的血行動態モニタリングを実施した場合に、非侵襲的血行動態モニタリング加算として、500点を所定点数に加算する。
  - 11区分番号Ｋ５６１に掲げるステントグラフト内挿術（血管損傷以外の場合において、胸部大動脈に限る。）、Ｋ６０９に掲げる動脈血栓内膜摘出術（内頸動脈に限る。）、Ｋ６０９－２に掲げる経皮的頸動脈ステント留置術又は人工心肺を用いる心臓血管手術において、術中に非侵襲的に脳灌流のモニタリングを実施した場合に、術中脳灌流モニタリング加算として、1,000点を所定点数に加算する。
