  section: 第3節 生体検査料
raw_text: "Ｄ３１３大腸内視鏡検査\n- １ファイバースコピーによるもの\n    - イＳ状結腸900点\n    - ロ下行結腸及び横行結腸1,350点\n    - ハ上行結腸及び盲腸1,550点\n- ２カプセル型内視鏡によるもの1,550点\n\
  - 注１粘膜点墨法を行った場合は、粘膜点墨法加算として、60点を所定点数に加算する。\n- ２拡大内視鏡を用いて、狭帯域光による観察を行った場合には、狭帯域光強調加算として、200点を所定点数に加算する。\n- ３１のハについて、バルーン内視鏡を用いて行った場合は、バルーン内視鏡加算として、450点を所定点数に加算する。\n\
  - ４２について、15歳未満の患者に対して、内視鏡的挿入補助具を用いて行った場合は、内視鏡的留置術加算として、260点を所定点数に加算する。\n"
