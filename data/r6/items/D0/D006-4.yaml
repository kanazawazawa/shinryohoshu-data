raw_text: |
  Ｄ００６－４遺伝学的検査
  - １処理が容易なもの3,880点
  - ２処理が複雑なもの5,000点
  - ３処理が極めて複雑なもの8,000点
  - 注１別に厚生労働大臣が定める疾患の患者については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。
  - ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、患者から１回に採取した検体を用いて複数の遺伝子疾患に対する検査を実施した場合は、主たる検査の所定点数及び当該主たる検査の所定点数の100分の50に相当する点数を合算した点数により算定する。
