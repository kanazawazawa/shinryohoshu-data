      - ハタンデムマス分析1,107点
      - ニその他1,107点
  - 注１イ、ロ及びハについては、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に、患者１人につき月１回に限り算定する。
