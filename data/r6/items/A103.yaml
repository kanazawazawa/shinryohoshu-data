code: A103
name: 精神病棟入院基本料（１日につき）１10対１入院基本料
version: r6
points: 1306
unit: 日
chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第1節 入院基本料
raw_text: "Ａ１０３精神病棟入院基本料（１日につき）１10対１入院基本料1,306点\n- ２13対１入院基本料973点\n- ３15対１入院基本料844点\n- ４18対１入院基本料753点\n- ５20対１入院基本料697点\n\
  - 注１病院（特定機能病院を除く。）の精神病棟（医療法第７条第２項第１号に規定する精神病床に係る病棟として地方厚生局長等に届出のあったものをいう。\n以下この表において同じ。）であって、看護配置、看護師比率、平均在院日数その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に係る区分に従い、それぞれ所定点数を算定する。\n\
  - ２注１に規定する病棟以外の精神病棟については、当分の間、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た場合に限り、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、特別入院基本料として、566点を算定できる。\n\
  ただし、注１に規定する別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出ていた病棟であって、当該基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た病棟については、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に適合しなくなった後の直近３月に限り、月平均夜勤時間超過減算として、それぞれの所定点数から100分の15に相当する点数を減算する。\n\
  なお、別に厚生労働大臣が定める場合には、算定できない。\n- ３当該病棟の入院患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\n    - イ14日以内の期間465点（特別入院基本料等については、300点）\n\
  \    - ロ15日以上30日以内の期間250点（特別入院基本料等については、155点）\n    - ハ31日以上90日以内の期間125点（特別入院基本料等については、100点）\n    - ニ91日以上180日以内の期間10点\n\
  \    - ホ181日以上１年以内の期間３点\n- ４別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者が別に厚生労働大臣が定めるものである場合には、入院した日から起算して１月以内の期間に限り、重度認知症加算として、１日につき300点を所定点数に加算する。\n\
  - ５当該病棟に入院する患者が、入院に当たって区分番号Ａ２３８－７に掲げる精神科救急搬送患者地域連携受入加算を算定したものである場合には、入院した日から起算して14日を限度として、救急支援精神病棟初期加算として、１日につき100点を所定点数に加算する。\n\
  - ６当該病棟においては、第２節の各区分に掲げる入院基本料等加算のうち、次に掲げる加算について、同節に規定する算定要件を満たす場合に算定できる。\n    - イ地域医療支援病院入院診療加算\n    - ロ臨床研修病院入院診療加算\n \
  \   - ハ紹介受診重点医療機関入院診療加算\n    - ニ救急医療管理加算\n    - ホ妊産婦緊急搬送入院加算\n    - ヘ在宅患者緊急入院診療加算\n    - ト診療録管理体制加算\n    - チ医師事務作業補助体制加算（50対１補助体制加算、75対１補助体制加算又は100対１補助体制加算に限る。）\n\
  \    - リ乳幼児加算・幼児加算\n    - ヌ特定感染症入院医療管理加算\n    - ル難病等特別入院診療加算\n    - ヲ特殊疾患入院施設管理加算\n    - ワ超重症児（者）入院診療加算・準超重症児（者）入院診療加算\n\
  \    - カ看護配置加算\n    - ヨ看護補助加算\n    - タ地域加算\n    - レ離島加算\n    - ソ療養環境加算\n    - ツＨＩＶ感染者療養環境特別加算\n    - ネ特定感染症患者療養環境特別加算\n\
  \    - ナ精神科措置入院診療加算\n    - ラ精神科応急入院施設管理加算\n    - ム精神科隔離室管理加算\n- ウ精神病棟入院時医学管理加算\n- ヰ精神科地域移行実施加算\n- ノ精神科身体合併症管理加算（18対１入院基本料及び20対１入院基本料を算定するものを除く。）\n\
  - オ強度行動障害入院医療管理加算\n- ク依存症入院医療管理加算\n- ヤ摂食障害入院医療管理加算\n- マ栄養サポートチーム加算\n- ケ医療安全対策加算\n- フ感染対策向上加算\n- コ患者サポート体制充実加算\n- エ報告書管理体制加算\n\
  - テ褥瘡ハイリスク患者ケア加算\n- アハイリスク妊娠管理加算\n- サハイリスク分娩等管理加算（ハイリスク分娩管理加算に限る。）\n- キ精神科救急搬送患者地域連携受入加算\n- ユ後発医薬品使用体制加算\n- メバイオ後続品使用体制加算\n\
  - ミ病棟薬剤業務実施加算１\n- シデータ提出加算\n- ヱ精神科入退院支援加算\n- ヒ精神科急性期医師配置加算（10対１入院基本料又は13対１入院基本料を算定するものに限る。）\n- モ薬剤総合評価調整加算\n- セ排尿自立支援加算\n\
  - ス地域医療体制確保加算（10対１入院基本料を算定するものに限る。）ン協力対象施設入所者入院加算７別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者について、精神保健福祉士配置加算として、１日につき30点を所定点数に加算する。\n\
  - ８精神保健福祉士配置加算を算定した場合は、区分番号Ａ２３０－２に掲げる精神科地域移行実施加算、区分番号Ａ２４６－２に掲げる精神科入退院支援加算、区分番号Ｂ００５に掲げる退院時共同指導料２、区分番号Ｂ００５－１－２に掲げる介護支援等連携指導料、区分番号Ｉ０１１に掲げる精神科退院指導料及び区分番号Ｉ０１１－２に掲げる精神科退院前訪問指導料は、算定しない。\n\
  - ９注１に規定する別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出ていた病棟であって、当該基準のうち別に厚生労働大臣が定めるもののみに適合しなくなったものとして地方厚生局長等に届け出た病棟については、注２の規定にかかわらず、当該病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当分の間、夜勤時間特別入院基本料として、それぞれの所定点数の100分の70に相当する点数を算定できる。\n\
  ただし、当該点数が注２本文に規定する特別入院基本料の点数を下回る場合は、本文の規定にかかわらず、576点を算定できる。\n- 10別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の入院基本料（特別入院基本料等を含む。）は、夜間看護体制特定日減算として、次のいずれにも該当する場合に限り、所定点数の100分の５に相当する点数を減算する。\n\
  \    - イ年６日以内であること。\n    - ロ当該日が属する月が連続する２月以内であること。\n"
