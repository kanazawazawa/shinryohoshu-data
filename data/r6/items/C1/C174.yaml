raw_text: |
  Ｃ１７４在宅ハイフローセラピー装置加算
  - １自動給水加湿チャンバーを用いる場合3,500点
  - ２１以外の場合2,500点
  - 注在宅ハイフローセラピーを行っている入院中の患者以外の患者に対して、在宅ハイフローセラピー装置を使用した場合に、３月に３回に限り、第１款の所定点数に加算する。
