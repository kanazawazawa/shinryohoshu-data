raw_text: 'Ｃ１６４人工呼吸器加算

  - １陽圧式人工呼吸器7,480点

  - 注気管切開口を介した陽圧式人工呼吸器を使用した場合に算定する。

  - ２人工呼吸器6,480点

  - 注鼻マスク又は顔マスクを介した人工呼吸器を使用した場合に算定する。

  - ３陰圧式人工呼吸器7,480点

  - 注陰圧式人工呼吸器を使用した場合に算定する。

  - 注在宅人工呼吸を行っている入院中の患者以外の患者に対して、人工呼吸器を使用した場合に、いずれかを第１款の所定点数に加算する。

  '
