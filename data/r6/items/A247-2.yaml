raw_text: 'Ａ２４７－２せん妄ハイリスク患者ケア加算（入院中１回）100点

  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、せん妄ハイリスク患者ケア加算を算定できるものを現に算定している患者に限る。）について、せん妄のリスクを確認し、その結果に基づいてせん妄対策の必要を認め、当該対策を行った場合に、入院中１回に限り、所定点数に加算する。

  '
