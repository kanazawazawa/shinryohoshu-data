  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: 'Ａ２３６褥瘡

  ハイリスク患者ケア加算（入院中１回）500点

  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、褥瘡ハイリスク患者ケア加算を算定できるものを現に算定している患者に限る。）について、重点的な褥瘡ケアを行う必要を認め、計画的な褥瘡対策が行われた場合に、入院中１回に限り、所定点数に加算する。

  - ２医療提供体制の確保の状況に鑑み別に厚生労働大臣が定める地域に所在する保険医療機関であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出たものについては、注１に規定する届出の有無にかかわらず、当該加算の点数に代えて、褥瘡ハイリスク患者ケア加算（特定地域）として、250点を所定点数に加算することができる。

  '
