raw_text: 'Ｂ０１０診療情報提供料（Ⅱ）500点

  - 注保険医療機関が、治療法の選択等に関して当該保険医療機関以外の医師の意見を求める患者からの要望を受けて、治療計画、検査結果、画像診断に係る画像情報その他の別の医療機関において必要な情報を添付し、診療状況を示す文書を患者に提供することを通じて、患者が当該保険医療機関以外の医師の助言を得るための支援を行った場合に、患者１人につき月１回に限り算定する。

  '
