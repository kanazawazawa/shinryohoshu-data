raw_text: |
  Ｍ００３電磁波温熱療法（一連につき）１深在性悪性腫瘍に対するもの9,000点
  - ２浅在性悪性腫瘍に対するもの6,000点Ｍ００４密封小線源治療（一連につき）１外部照射80点
  - ２腔内照射
      - イ高線量率イリジウム照射を行った場合又は新型コバルト小線源治療装置を用いた場合12,000点
      - ロその他の場合5,000点
  - ３組織内照射
      - イ前立腺癌に対する永久挿入療法48,600点
      - ロ高線量率イリジウム照射を行った場合又は新型コバルト小線源治療装置を用いた場合23,000点
      - ハその他の場合19,000点
  - ４放射性粒子照射（本数に関係なく）8,000点
  - 注１疾病、部位又は部位数にかかわらず、一連につき算定する。
  - ２使用した高線量率イリジウムの費用として、購入価格を50円で除して得た点数を加算する。
  - ３使用した低線量率イリジウムの費用として、購入価格を10円で除して得た点数を加算する。
  - ４前立腺癌に対する永久挿入療法を行った場合は、線源使用加算として、使用した線源の費用として１個につき630点を所定点数に加算する。
  ただし、この場合において、注６の加算は算定できない。
  - ５食道用アプリケーター又は気管、気管支用アプリケーターを使用した場合は、食道用アプリケーター加算又は気管、気管支用アプリケーター加算として、それぞれ6,700点又は4,500点を所定点数に加算する。
  - ６使用した放射性粒子の費用として、購入価格を10円で除して得た点数を加算する。
  - ７使用したコバルトの費用として、購入価格を1,000円で除して得た点数を加算する。
  - ８別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、放射線治療を専ら担当する常勤の医師が画像誘導密封小線源治療（ＩＧＢＴ）（２のイに係るものに限る。）を行った場合には、画像誘導密封小線源治療加算として、一連につき1,200点を所定点数に加算する。
