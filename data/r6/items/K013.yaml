raw_text: 'Ｋ０１３分層植皮術

  - １25平方センチメートル未満3,520点

  - ２25平方センチメートル以上100平方センチメートル未満6,270点

  - ３100平方センチメートル以上200平方センチメートル未満9,000点

  - ４200平方センチメートル以上25,820点

  - 注広範囲皮膚欠損の患者に対して行う場合は、頭頸部、左上肢、左下肢、右上肢、右下肢、腹部（胸部を含む。）又は背部のそれぞれの部位ごとに所定点数を算定する。

  '
