  \    - ル第13部第１節病理標本作製料（区分番号Ｎ００３に掲げる術中迅速病理組織標本作製（１手術につき）を除く。）５看護職員の負担の軽減及び処遇の改善を図るための看護業務の補助の体制その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者については、看護補助体制加算として、当該基準に係る区分に従い、入院した日から起算して14日を限度として、それぞれ所定点数に加算する。\n\
  \    - イ25対１看護補助体制加算（看護補助者５割以上）240点\n    - ロ25対１看護補助体制加算（看護補助者５割未満）220点\n    - ハ50対１看護補助体制加算200点\n    - ニ75対１看護補助体制加算160点\n\
  - ６夜間における看護業務の補助の体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者（看護補助体制加算を算定する患者に限る。）については、夜間看護補助体制加算として、当該基準に係る区分に従い、１日につき次に掲げる点数をそれぞれ更に所定点数に加算する。\n\
  \    - イ夜間30対１看護補助体制加算125点\n    - ロ夜間50対１看護補助体制加算120点\n    - ハ夜間100対１看護補助体制加算105点\n- ７夜間における看護業務の体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者（看護補助体制加算を算定する患者に限る。）については、夜間看護体制加算として、71点を更に所定点数に加算する。\n\
  - ８看護職員の負担の軽減及び処遇の改善を図るための看護業務の補助に係る十分な体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者（看護補助体制加算を算定する患者に限る。）については、看護補助体制充実加算として、当該基準に係る区分に従い、１日につきそれぞれ更に所定点数に加算する。\n\
  ただし、当該患者について、身体的拘束を実施した日は、看護補助体制充実加算３の例により所定点数に加算する。\n    - イ看護補助体制充実加算１25点\n    - ロ看護補助体制充実加算２15点\n    - ハ看護補助体制充実加算３５点\n\
  - ９別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者については、看護職員夜間配置加算として、当該基準に係る区分に従い、入院した日から起算して14日を限度として所定点数に加算する。\n\
  \    - イ看護職員夜間12対１配置加算\n  - （１）看護職員夜間12対１配置加算１110点\n  - （２）看護職員夜間12対１配置加算２90点\n    - ロ看護職員夜間16対１配置加算\n  - （１）看護職員夜間16対１配置加算１70点\n\
  \  - （２）看護職員夜間16対１配置加算２45点\n- 10リハビリテーション、栄養管理及び口腔管理を連携・推進する体制につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者については、リハビリテーション・栄養・口腔連携加算として、リハビリテーション、栄養管理及び口腔管理に係る計画を作成した日から起算して14日を限度として80点を所定点数に加算する。\n\
  この場合において、区分番号Ａ２３３－２に掲げる栄養サポートチーム加算は別に算定できない。\n"
