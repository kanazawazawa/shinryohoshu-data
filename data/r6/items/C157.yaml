raw_text: 'Ｃ１５７酸素ボンベ加算

  - １携帯用酸素ボンベ880点

  - ２１以外の酸素ボンベ3,950点

  - 注在宅酸素療法を行っている入院中の患者以外の患者（チアノーゼ型先天性心疾患の患者を除く。）に対して、酸素ボンベを使用した場合に、３月に３回に限り、第１款の所定点数に加算する。

  '
