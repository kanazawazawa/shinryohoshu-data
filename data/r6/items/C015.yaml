  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: 'Ｃ０１５在宅がん患者緊急時医療情報連携指導料200点

  - 注訪問診療を実施している保険医療機関の保険医が、在宅での療養を行っている患者であって通院が困難なもの（区分番号Ｃ００２に掲げる在宅時医学総合管理料の注15（区分番号Ｃ００２－２の注５の規定により準用する場合を含む。）又は区分番号Ｃ００３に掲げる在宅がん医療総合診療料の注９に規定する在宅医療情報連携加算を算定しているものに限る。）の同意を得て、末期の悪性腫瘍の患者の病状の急変等に伴い、当該保険医療機関と連携する他の保険医療機関の保険医、歯科訪問診療を実施している保険医療機関の保険医である歯科医師、訪問薬剤管理指導を実施している保険薬局の保険薬剤師、訪問看護ステーションの保健師、助産師、看護師、理学療法士、作業療法士若しくは言語聴覚士、管理栄養士、介護支援専門員又は相談支援専門員等であって当該患者に関わる者が電子情報処理組織を使用する方法その他の情報通信の技術を利用する方法を用いて記録した当該患者に係る人生の最終段階における医療・ケアに関する情報を取得した上で、療養上必要な指導を行った場合に、月１回に限り算定する。

  '
