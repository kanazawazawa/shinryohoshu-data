raw_text: 'Ｃ１１０在宅自己疼痛管理指導管理料1,300点

  - 注疼痛除去のため植込型脳・脊髄刺激装置を植え込んだ後に、在宅において自己疼痛管理を行っている入院中の患者以外の難治性慢性疼痛の患者に対して、在宅自己疼痛管理に関する指導管理を行った場合に算定する。

  '
