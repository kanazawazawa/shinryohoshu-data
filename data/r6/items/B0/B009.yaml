  text: |
    別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、患者の紹介を行う際に、検査結果、画像情報、画像診断の所見、投薬内容、注射内容、退院時要約等の診療記録のうち主要なものについて、他の保険医療機関に対し、電子的方法により閲覧可能な形式で提供した場合又は電子的に送受される診療情報提供書に添付した場合に、検査・画像情報提供加算として、次に掲げる点数をそれぞれ所定点数に加算する。
