  text: 保険医療機関が、患者の同意を得て、当該患者が入院又は入所する保険医療機関又は介護老人保健施設若しくは介護医療院に対して文書で診療情報を提供する際、当該患者に対して定期的に訪問看護を行っている訪問看護ステーションから得た療養に係る情報を添付して紹介を行った場合は、療養情報提供加算として、50点を所定点数に加算する。
