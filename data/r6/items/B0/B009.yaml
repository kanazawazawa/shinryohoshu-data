code: B009
name: 診療情報提供料（Ⅰ）
version: r6
points: 250
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００９診療情報提供料（Ⅰ）250点
  - 注１保険医療機関が、診療に基づき、別の保険医療機関での診療の必要を認め、これに対して、患者の同意を得て、診療状況を示す文書を添えて患者の紹介を行った場合に、紹介先保険医療機関ごとに患者１人につき月１回に限り算定する。
  - ２保険医療機関が、診療に基づき患者の同意を得て、当該患者の居住地を管轄する市町村又は介護保険法第46条第１項に規定する指定居宅介護支援事業者、同法第58条第１項に規定する指定介護予防支援事業者、障害者の日常生活及び社会生活を総合的に支援するための法律第51条の17第１項第１号に規定する指定特定相談支援事業者、児童福祉法第24条の26第１項第１号に規定する指定障害児相談支援事業者等に対して、診療状況を示す文書を添えて、当該患者に係る保健福祉サービスに必要な情報を提供した場合に、患者１人につき月１回に限り算定する。
  - ３保険医療機関が、診療に基づき保険薬局による在宅患者訪問薬剤管理指導の必要を認め、在宅での療養を行っている患者であって通院が困難なものの同意を得て、当該保険薬局に対して、診療状況を示す文書を添えて、当該患者に係る在宅患者訪問薬剤管理指導に必要な情報を提供した場合に、患者１人につき月１回に限り算定する。
  - ４保険医療機関が、精神障害者である患者であって、障害者の日常生活及び社会生活を総合的に支援するための法律に規定する障害福祉サービスを行う施設又は福祉ホーム（以下「精神障害者施設」という。）に入所若しくは通所しているもの又は介護老人保健施設に入所しているものの同意を得て、当該精神障害者施設又は介護老人保健施設に対して、診療状況を示す文書を添えて、当該患者の社会復帰の促進に必要な情報を提供した場合に、患者１人につき月１回に限り算定する。
  - ５保険医療機関が、診療に基づき患者の同意を得て、介護老人保健施設又は介護医療院に対して、診療状況を示す文書を添えて患者の紹介を行った場合に、患者１人につき月１回に限り算定する。
  - ６保険医療機関が、認知症の状態にある患者について、診断に基づき認知症に関する専門の保険医療機関等での鑑別診断等の必要を認め、当該患者又はその家族等の同意を得て、認知症に関する専門の保険医療機関等に対して診療状況を示す文書を添えて患者の紹介を行った場合に、患者１人につき月１回に限り算定する。
  - ７保険医療機関が、児童福祉法第６条の２第３項に規定する小児慢性特定疾病医療支援の対象である患者、同法第56条の６第２項に規定する障害児である患者又はアナフィラキシーの既往歴のある患者若しくは食物アレルギー患者について、診療に基づき当該患者又はその家族等の同意を得て、当該患者が通園又は通学する同法第39条第１項に規定する保育所又は学校教育法（昭和22年法律第26号）第１条に規定する学校（大学を除く。）等の学校医等に対して、診療状況を示す文書を添えて、当該患者が学校生活等を送るに当たり必要な情報を提供した場合に、患者１人につき月１回に限り算定する。
  - ８保険医療機関が、患者の退院日の属する月又はその翌月に、添付の必要を認め、当該患者の同意を得て、別の保険医療機関、精神障害者施設又は介護老人保健施設若しくは介護医療院に対して、退院後の治療計画、検査結果、画像診断に係る画像情報その他の必要な情報を添付して紹介を行った場合は、200点を所定点数に加算する。
  - ９区分番号Ｂ００５－４に掲げるハイリスク妊産婦共同管理料（Ⅰ）の施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、ハイリスク妊産婦共同管理料（Ⅰ）に規定する別に厚生労働大臣が定める状態等の患者の同意を得て、検査結果、画像診断に係る画像情報その他の必要な情報を添付してハイリスク妊産婦共同管理料（Ⅰ）に規定する別の保険医療機関に対して紹介を行った場合は、ハイリスク妊婦紹介加算として、当該患者の妊娠中１回に限り200点を所定点数に加算する。
  - 10保険医療機関が、認知症の疑いのある患者について専門医療機関での鑑別診断等の必要を認め、当該患者又はその家族等の同意を得て、当該専門医療機関に対して、診療状況を示す文書を添えて、患者の紹介を行った場合は、認知症専門医療機関紹介加算として、100点を所定点数に加算する。
  - 11保険医療機関が、認知症の専門医療機関において既に認知症と診断された患者であって入院中の患者以外のものについて症状が増悪した場合に、当該患者又はその家族等の同意を得て、当該専門医療機関に対して、診療状況を示す文書を添えて当該患者の紹介を行った場合は、認知症専門医療機関連携加算として、50点を所定点数に加算する。
  - 12精神科以外の診療科を標榜する保険医療機関が、入院中の患者以外の患者について、うつ病等の精神障害の疑いによりその診断治療等の必要性を認め、当該患者の同意を得て、精神科を標榜する別の保険医療機関に当該患者が受診する日の予約を行った上で患者の紹介を行った場合は、精神科医連携加算として、200点を所定点数に加算する。
  - 13保険医療機関が、治療計画に基づいて長期継続的にインターフェロン治療が必要な肝炎の患者であって入院中の患者以外のものの同意を得て、当該保険医療機関と連携して治療を行う肝疾患に関する専門医療機関に対して、治療計画に基づく診療状況を示す文書を添えて当該患者の紹介を行った場合は、肝炎インターフェロン治療連携加算として、50点を所定点数に加算する。
  - 14保険医療機関が、患者の口腔機能の管理の必要を認め、歯科診療を行う他の保険医療機関に対して、患者又はその家族等の同意を得て、診療情報を示す文書を添えて、当該患者の紹介を行った場合は、歯科医療機関連携加算１として、100点を所定点数に加算する。
  - 15保険医療機関が、周術期等における口腔機能管理の必要を認め、患者又はその家族等の同意を得て、歯科を標榜する他の保険医療機関に当該患者が受診する日の予約を行った上で当該患者の紹介を行った場合は、歯科医療機関連携加算２として100点を所定点数に加算する。
  - 16別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、患者の退院日の属する月又はその翌月に、連携する保険医療機関において区分番号Ａ２４６の注４に掲げる地域連携診療計画加算を算定して当該連携保険医療機関を退院した患者（あらかじめ共有されている地域連携診療計画に係る入院中の患者以外の患者に限る。）の同意を得て、当該連携保険医療機関に対して、診療状況を示す文書を添えて当該患者の地域連携診療計画に基づく療養に係る必要な情報を提供した場合に、地域連携診療計画加算として、50点を所定点数に加算する。
  - 17保険医療機関が、患者の同意を得て、当該患者が入院又は入所する保険医療機関又は介護老人保健施設若しくは介護医療院に対して文書で診療情報を提供する際、当該患者に対して定期的に訪問看護を行っている訪問看護ステーションから得た療養に係る情報を添付して紹介を行った場合は、療養情報提供加算として、50点を所定点数に加算する。
  - 18別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、患者の紹介を行う際に、検査結果、画像情報、画像診断の所見、投薬内容、注射内容、退院時要約等の診療記録のうち主要なものについて、他の保険医療機関に対し、電子的方法により閲覧可能な形式で提供した場合又は電子的に送受される診療情報提供書に添付した場合に、検査・画像情報提供加算として、次に掲げる点数をそれぞれ所定点数に加算する。
  ただし、イについては、注８に規定する加算を算定する場合は算定しない。
      - イ退院する患者について、当該患者の退院日の属する月又はその翌月に、必要な情報を提供した場合200点
      - ロ入院中の患者以外の患者について、必要な情報を提供した場合30点
