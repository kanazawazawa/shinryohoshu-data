raw_text: "Ｄ０１１免疫血液学的検査\n- １ＡＢＯ血液型、Ｒh（Ｄ）血液型24点\n- ２Ｃｏｏｍｂｓ試験\n    - イ直接34点\n    - ロ間接47点\n- ３Ｒh（その他の因子）血液型148点\n- ４不規則抗体159点\n\
  - 注第10部手術第７款の各区分に掲げる胸部手術、同部第８款の各区分に掲げる心・脈管手術、同部第９款の各区分に掲げる腹部手術又は同部第11款の各区分に掲げる性器手術のうち区分番号Ｋ８９８に掲げる帝王切開術等を行った場合に算定する。\n- ５ＡＢＯ血液型関連糖転移酵素活性181点\n\
  - ６血小板関連ＩｇＧ（ＰＡ－ＩｇＧ）190点\n- ７ＡＢＯ血液型亜型260点\n- ８抗血小板抗体261点\n- ９血小板第４因子－ヘパリン複合体抗体（ＩｇＧ抗体）376点\n- 10血小板第４因子－ヘパリン複合体抗体（ＩｇＧ、ＩｇＭ及びＩｇＡ抗体）390点\n\
  - 11血小板第４因子－ヘパリン複合体抗体定性420点\n"
