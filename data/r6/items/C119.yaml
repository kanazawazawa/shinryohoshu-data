raw_text: 'Ｃ１１９在宅経肛門的自己洗腸指導管理料800点

  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、在宅で経肛門的に自己洗腸を行っている入院中の患者以外の患者に対して、経肛門的自己洗腸療法に関する指導管理を行った場合に算定する。

  - ２経肛門的自己洗腸を初めて実施する患者について、初回の指導を行った場合は、当該初回の指導を行った月に限り、導入初期加算として、500点を所定点数に加算する。

  '
