raw_text: 'Ａ２４３－２バイオ後続品使用体制加算（入院初日）100点

  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、バイオ後続品使用体制加算を算定できるものを現に算定している患者に限る。）であって、バイオ後続品のある先発バイオ医薬品（バイオ後続品の適応のない患者に対して使用する先発バイオ医薬品は除く。）及びバイオ後続品を使用する患者について、バイオ後続品使用体制加算として、入院初日に限り所定点数に加算する。

  '
