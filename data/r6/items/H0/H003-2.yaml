chapter:
  chapter: 第2章 特掲診療料
  part: 第7部 リハビリテーション
  section: 第1節 リハビリテーション料
raw_text: |
  Ｈ００３－２リハビリテーション総合計画評価料
  - １リハビリテーション総合計画評価料１300点
  - ２リハビリテーション総合計画評価料２240点
  - 注１１について、心大血管疾患リハビリテーション料（Ⅰ）、脳血管疾患等リハビリテーション料（Ⅰ）、脳血管疾患等リハビリテーション料（Ⅱ）、廃用症候群リハビリテーション料（Ⅰ）、廃用症候群リハビリテーション料（Ⅱ）、運動器リハビリテーション料（Ⅰ）、運動器リハビリテーション料（Ⅱ）、呼吸器リハビリテーション料（Ⅰ）、がん患者リハビリテーション料又は認知症患者リハビリテーション料に係る別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届出を行った保険医療機関において、医師、看護師、理学療法士、作業療法士、言語聴覚士等の多職種が共同してリハビリテーション計画を策定し、当該計画に基づき心大血管疾患リハビリテーション料、呼吸器リハビリテーション料、がん患者リハビリテーション料若しくは認知症患者リハビリテーション料を算定すべきリハビリテーションを行った場合又は介護リハビリテーションの利用を予定している患者以外の患者に対し、脳血管疾患等リハビリテーション料、廃用症候群リハビリテーション料又は運動器リハビリテーション料を算定すべきリハビリテーションを行った場合に、患者１人につき１月に１回に限り算定する。
  - ２２について、脳血管疾患等リハビリテーション料（Ⅰ）、脳血管疾患等リハビリテーション料（Ⅱ）、廃用症候群リハビリテーション料（Ⅰ）、廃用症候群リハビリテーション料（Ⅱ）、運動器リハビリテーション料（Ⅰ）又は運動器リハビリテーション料（Ⅱ）に係る別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届出を行った保険医療機関において、医師、看護師、理学療法士、作業療法士、言語聴覚士等の多職種が共同してリハビリテーション計画を策定し、当該計画に基づき、介護リハビリテーションの利用を予定している患者に対し、脳血管疾患等リハビリテーション料、廃用症候群リハビリテーション料又は運動器リハビリテーション料を算定すべきリハビリテーションを行った場合に、患者１人につき１月に１回に限り算定する。
  - ３当該保険医療機関の医師、看護師、理学療法士、作業療法士又は言語聴覚士が、患家等を訪問し、当該患者（区分番号Ａ３０８に掲げる回復期リハビリテーション病棟入院料を算定する患者に限る。）の退院後の住環境等を評価した上で、当該計画を策定した場合に、入院時訪問指導加算として、入院中１回に限り、150点を所定点数に加算する。
  - ４脳血管疾患等リハビリテーション料（Ⅰ）又は脳血管疾患等リハビリテーション料（Ⅱ）に係る別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届出を行った保険医療機関において、別に厚生労働大臣が定める患者に対して、当該保険医療機関の医師、理学療法士又は作業療法士が運動量増加機器を用いたリハビリテーション計画を策定し、当該機器を用いて、脳血管疾患等リハビリテーション料を算定すべきリハビリテーションを行った場合に、運動量増加機器加算として、月１回に限り150点を所定点数に加算する。
