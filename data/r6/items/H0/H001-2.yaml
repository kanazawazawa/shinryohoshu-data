code: H001-2
name: 廃用症候群リハビリテーション料
version: r6
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第7部 リハビリテーション
  section: 第1節 リハビリテーション料
raw_text: |
  Ｈ００１－２廃用症候群リハビリテーション料
  - １廃用症候群リハビリテーション料（Ⅰ）（１単位）
      - イ理学療法士による場合180点
      - ロ作業療法士による場合180点
      - ハ言語聴覚士による場合180点
      - ニ医師による場合180点
  - ２廃用症候群リハビリテーション料（Ⅱ）（１単位）
      - イ理学療法士による場合146点
      - ロ作業療法士による場合146点
      - ハ言語聴覚士による場合146点
      - ニ医師による場合146点
  - ３廃用症候群リハビリテーション料（Ⅲ）（１単位）
      - イ理学療法士による場合77点
      - ロ作業療法士による場合77点
      - ハ言語聴覚士による場合77点
      - ニ医師による場合77点
      - ホイからニまで以外の場合77点
  - 注１別に厚生労働大臣が定める基準に適合している保険医療機関において、急性疾患等に伴う安静による廃用症候群の患者であって、一定程度以上の基本動作能力、応用動作能力、言語聴覚能力及び日常生活能力の低下を来しているものに対して個別療法であるリハビリテーションを行った場合に、当該基準に係る区分に従って、それぞれ廃用症候群の診断又は急性増悪から120日を限度として所定点数を算定する。
  ただし、別に厚生労働大臣が定める患者について、治療を継続することにより状態の改善が期待できると医学的に判断される場合その他の別に厚生労働大臣が定める場合には、120日を超えて所定点数を算定することができる。
  - ２注１本文に規定する患者であって入院中のものに対してリハビリテーションを行った場合は、当該患者の廃用症候群に係る急性疾患等の発症、手術若しくは急性増悪又は当該患者の廃用症候群の急性増悪から30日を限度として、早期リハビリテーション加算として、１単位につき25点を所定点数に加算する。
  - ３別に厚生労働大臣が定める施設基準を満たす保険医療機関において、注１本文に規定する患者であって入院中のものに対してリハビリテーションを行った場合は、当該患者の廃用症候群に係る急性疾患等の発症、手術若しくは急性増悪又は当該患者の廃用症候群の急性増悪から14日を限度として、初期加算として、１単位につき45点を更に所定点数に加算する。
  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、注１本文に規定する患者（入院中のものに限る。）であって、リハビリテーションを実施する日において別に厚生労働大臣が定める患者であるものに対してリハビリテーションを行った場合は、当該患者の廃用症候群に係る急性疾患等の発症、手術若しくは急性増悪又は当該患者の廃用症候群の急性増悪から14日を限度として、急性期リハビリテーション加算として、１単位につき50点を更に所定点数に加算する。
  - ５注１本文の規定にかかわらず、注１本文に規定する患者であって、要介護被保険者等以外のものに対して、必要があってそれぞれ廃用症候群の診断又は急性増悪から120日を超えてリハビリテーションを行った場合は、１月13単位に限り算定できるものとする。
  - ６注１本文の規定にかかわらず、注１本文に規定する患者であって、入院中の要介護被保険者等に対して、必要があってそれぞれ廃用症候群の診断又は急性増悪から120日を超えてリハビリテーションを行った場合は、１月13単位に限り、注１に規定する施設基準に係る区分に従い、次に掲げる点数を算定できるものとする。
      - イ廃用症候群リハビリテーション料（Ⅰ）（１単位）
    - （１）理学療法士による場合108点
    - （2）作業療法士による場合108点
    - （3）言語聴覚士による場合108点
    - （4）医師による場合108点
      - ロ廃用症候群リハビリテーション料（Ⅱ）（１単位）
    - （１）理学療法士による場合88点
    - （2）作業療法士による場合88点
    - （3）言語聴覚士による場合88点
    - （4）医師による場合88点
      - ハ廃用症候群リハビリテーション料（Ⅲ）（１単位）
    - （１）理学療法士による場合46点
    - （2）作業療法士による場合46点
    - （3）言語聴覚士による場合46点
    - （4）医師による場合46点
    - （5）
    - （１）から（4）まで以外の場合46点
  - ７注１本文に規定する患者（要介護被保険者等に限る。）に対し、それぞれ廃用症候群の診断又は急性増悪から40日を経過した後に、引き続きリハビリテーションを実施する場合において、過去３月以内にＨ００３－４に掲げる目標設定等支援・管理料を算定していない場合には、所定点数の100分の90に相当する点数により算定する。
  - ８別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、当該保険医療機関における診療報酬の請求状況、診療の内容に関するデータを継続して厚生労働省に提出している場合であって、注１本文に規定する患者であって入院中の患者以外のものに対してリハビリテーションを行った場合は、リハビリテーションデータ提出加算として、月１回に限り50点を所定点数に加算する。
