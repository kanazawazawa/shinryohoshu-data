chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: "Ａ２２０－２特定感染症患者療養環境特別加算（１日につき）１個室加算300点\n- ２陰圧室加算200点\n- 注保険医療機関に入院している次に掲げる感染症の患者及びそれらの疑似症患者であって個室又は陰圧室に入院させる必要性が特に高い患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、特定感染症患者療養環境特別加算を算定できるものを現に算定している患者に限る。）について、必要を認めて個室又は陰圧室に入院させた場合に、個室加算又は陰圧室加算として、それぞれ所定点数に加算する。\n\
  ただし、疑似症患者については、初日に限り所定点数に加算する。\n    - イ感染症法第６条第３項に規定する二類感染症\n    - ロ感染症法第６条第４項に規定する三類感染症\n    - ハ感染症法第６条第５項に規定する四類感染症\n\
  \    - ニ感染症法第６条第６項に規定する五類感染症\n    - ホ感染症法第６条第７項に規定する新型インフルエンザ等感染症\n    - ヘ感染症法第６条第８項に規定する指定感染症Ａ２２１重症者等療養環境特別加算（１日につき）１個室の場合300点\n\
  - ２２人部屋の場合150点\n- 注別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病室に入院している重症者等（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、重症者等療養環境特別加算を算定できるものを現に算定している患者に限り、小児療養環境特別加算又は無菌治療室管理加算を算定するものを除く。）について、所定点数に加算する。\n"
