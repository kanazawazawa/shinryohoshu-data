code: A302
name: 新生児特定集中治療室管理料（１日につき）１新生児特定集中治療室管理料
version: r6
points: 110584
unit: 日
chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第3節 特定入院料
raw_text: "Ａ３０２新生児特定集中治療室管理料（１日につき）１新生児特定集中治療室管理料１10,584点\n- ２新生児特定集中治療室管理料２8,472点\n- 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、必要があって新生児特定集中治療室管理が行われた場合に、当該基準に係る区分に従い、区分番号Ａ３０２－２に掲げる新生児特定集中治療室重症児対応体制強化管理料、区分番号Ａ３０３の２に掲げる新生児集中治療室管理料及び区分番号Ａ３０３－２に掲げる新生児治療回復室入院医療管理料を算定した期間と通算して21日（出生時体重が1,500グラム以上であって、別に厚生労働大臣が定める疾患を主病として入院している新生児にあっては35日、出生時体重が1,000グラム未満の新生児にあっては90日（出生時体重が500グラム以上750グラム未満であって慢性肺疾患の新生児にあっては105日、出生時体重が500グラム未満であって慢性肺疾患の新生児にあっては110日）、出生時体重が1,000グラム以上1,500グラム未満の新生児にあっては60日）を限度として、それぞれ所定点数を算定する。\n\
  - ２第１章基本診療料並びに第２章第３部検査、第６部注射、第９部処置及び第13部病理診断のうち次に掲げるものは、新生児特定集中治療室管理料に含まれるものとする。\n    - イ入院基本料\n    - ロ入院基本料等加算（臨床研修病院入院診療加算、超急性期脳卒中加算、医師事務作業補助体制加算、特定感染症入院医療管理加算、難病等特別入院診療加算（二類感染症患者入院診療加算に限る。）、地域加算、離島加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、重症患者初期支援充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、病棟薬剤業務実施加算２、データ提出加算、入退院支援加算（１のイ及び３に限る。）、排尿自立支援加算及び地域医療体制確保加算を除く。）\n\
  \    - ハ第２章第３部の各区分の検査（同部第１節第２款の検体検査判断料を除く。）\n    - ニ点滴注射\n    - ホ中心静脈注射\n    - ヘ酸素吸入（使用した酸素及び窒素の費用を除く。）\n    - トインキュベーター（使用した酸素及び窒素の費用を除く。）\n\
  \    - チ第13部第１節の病理標本作製料Ａ３０２－２新生児特定集中治療室重症児対応体制強化管理料（１日につき）14,539点\n- 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める状態の患者に対して、必要があって新生児特定集中治療室管理が行われた場合に、区分番号Ａ３０２に掲げる新生児特定集中治療室管理料、区分番号Ａ３０３の２に掲げる新生児集中治療室管理料及び区分番号Ａ３０３－２に掲げる新生児治療回復室入院医療管理料を算定した期間と通算して、当該管理料の届出を行っている病床を有する治療室に入室した日から起算して７日を限度として、所定点数を算定する。\n\
  - ２第１章基本診療料並びに第２章第３部検査、第６部注射、第９部処置及び第13部病理診断のうち次に掲げるものは、新生児特定集中治療室重症児対応体制強化管理料に含まれるものとする。\n    - イ入院基本料\n    - ロ入院基本料等加算（臨床研修病院入院診療加算、超急性期脳卒中加算、医師事務作業補助体制加算、特定感染症入院医療管理加算、難病等特別入院診療加算（二類感染症患者入院診療加算に限る。）、地域加算、離島加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、重症患者初期支援充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、病棟薬剤業務実施加算２、データ提出加算、入退院支援加算（１のイ及び３に限る。）、排尿自立支援加算及び地域医療体制確保加算を除く。）\n\
  \    - ハ第２章第３部の各区分の検査（同部第１節第２款の検体検査判断料を除く。）\n    - ニ点滴注射\n    - ホ中心静脈注射\n    - ヘ酸素吸入（使用した酸素及び窒素の費用を除く。）\n    - トインキュベーター（使用した酸素及び窒素の費用を除く。）\n\
  \    - チ第13部第１節の病理標本作製料Ａ３０３総合周産期特定集中治療室管理料（１日につき）１母体・胎児集中治療室管理料7,417点\n- ２新生児集中治療室管理料10,584点\n- 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、必要があって総合周産期特定集中治療室管理が行われた場合に、１については妊産婦である患者に対して14日を限度として、２については新生児である患者に対して区分番号Ａ３０２に掲げる新生児特定集中治療室管理料、区分番号Ａ３０２－２に掲げる新生児特定集中治療室重症児対応体制強化管理料及び区分番号Ａ３０３－２に掲げる新生児治療回復室入院医療管理料を算定した期間と通算して21日（出生時体重が1,500グラム以上であって、別に厚生労働大臣が定める疾患を主病として入院している新生児にあっては35日、出生時体重が1,000グラム未満の新生児にあっては90日（出生時体重が500グラム以上750グラム未満であって慢性肺疾患の新生児にあっては105日、出生時体重が500グラム未満であって慢性肺疾患の新生児にあっては110日）、出生時体重が1,000グラム以上1,500グラム未満の新生児にあっては60日）を限度として、それぞれ所定点数を算定する。\n\
  - ２第１章基本診療料並びに第２章第３部検査、第６部注射、第９部処置及び第13部病理診断のうち次に掲げるものは、総合周産期特定集中治療室管理料（ロに掲げる術後疼痛管理チーム加算及びトにあっては母体・胎児集中治療室管理料に限り、チにあっては新生児集中治療室管理料に限る。）に含まれるものとする。\n\
  \    - イ入院基本料\n    - ロ入院基本料等加算（臨床研修病院入院診療加算、超急性期脳卒中加算、妊産婦緊急搬送入院加算、医師事務作業補助体制加算、特定感染症入院医療管理加算、難病等特別入院診療加算（二類感染症患者入院診療加算に限る。）、地域加算、離島加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、重症患者初期支援充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、術後疼痛管理チーム加算、病棟薬剤業務実施加算２、データ提出加算、入退院支援加算（１のイ及び３に限る。）、精神疾患診療体制加算、排尿自立支援加算及び地域医療体制確保加算を除く。）\n\
  \    - ハ第２章第３部の各区分の検査（同部第１節第２款の検体検査判断料を除く。）\n    - ニ点滴注射\n    - ホ中心静脈注射\n    - ヘ酸素吸入（使用した酸素及び窒素の費用を除く。）\n    - ト留置カテーテル設置\n\
  \    - チインキュベーター（使用した酸素及び窒素の費用を除く。）\n    - リ第13部第１節の病理標本作製料３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、胎児が重篤な状態であると診断された、又は疑われる妊婦に対して、当該保険医療機関の医師、助産師、看護師、社会福祉士、公認心理師等が共同して必要な支援を行った場合に、成育連携支援加算として、入院中１回に限り、1,200点を所定点数に加算する。\n"
