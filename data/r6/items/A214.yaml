raw_text: "Ａ２１４看護補助加算（１日につき）１看護補助加算１141点\n- ２看護補助加算２116点\n- ３看護補助加算３88点\n- 注１別に厚生労働大臣が定める基準に適合しているものとして保険医療機関が地方厚生局長等に届け出て当該基準による看護を行う病棟に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、看護補助加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、所定点数に加算する。\n\
  - ２別に厚生労働大臣が定める基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者については、夜間75対１看護補助加算として、入院した日から起算して20日を限度として55点を更に所定点数に加算する。\n- ３夜間における看護業務の体制につき別に厚生労働大臣が定める基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者については、夜間看護体制加算として、入院初日に限り176点を更に所定点数に加算する。\n\
  - ４看護職員の負担の軽減及び処遇の改善を図るための看護業務の補助に係る十分な体制につき別に厚生労働大臣が定める基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者について、当該基準に係る区分に従い、１日につき次に掲げる点数をそれぞれ更に所定点数に加算する。\n\
  ただし、当該患者について、身体的拘束を実施した日は、看護補助体制充実加算２の例により算定する。\n    - イ看護補助体制充実加算１20点\n    - ロ看護補助体制充実加算２５点\n"
