code: A105
name: 専門病院入院基本料（１日につき）１７対１入院基本料
version: r6
points: 1705
unit: 日
chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第1節 入院基本料
raw_text: |
  Ａ１０５専門病院入院基本料（１日につき）１７対１入院基本料1,705点
  - ２10対１入院基本料1,421点
  - ３13対１入院基本料1,191点
  - 注１専門病院（主として悪性腫瘍、循環器疾患等の患者を入院させる保険医療機関であって高度かつ専門的な医療を行っているものとして地方厚生局長等に届け出たものをいう。）の一般病棟であって、看護配置、看護師比率、平均在院日数その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に係る区分に従い、それぞれ所定点数を算定する。
  ただし、通則第６号に規定する保険医療機関の病棟については、この限りでない。
  - ２当該病棟の入院患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
      - イ14日以内の期間512点
      - ロ15日以上30日以内の期間207点
  - ３当該病棟に入院している患者の看護必要度につき別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た病棟に入院している患者については、当該基準に係る区分に従い、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
      - イ看護必要度加算１55点
      - ロ看護必要度加算２45点
      - ハ看護必要度加算３25点
  - ４別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た病棟において、当該患者の看護必要度について測定を行った場合には、一般病棟看護必要度評価加算として、１日につき５点を所定点数に加算する。
  - ５退院が特定の時間帯に集中しているものとして別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める患者の退院日の入院基本料は、所定点数の100分の92に相当する点数により算定する。
  - ６入院日及び退院日が特定の日に集中しているものとして別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の入院基本料は、所定点数の100分の92に相当する点数により算定する。
  - ７当該病棟においては、第２節の各区分に掲げる入院基本料等加算のうち、次に掲げる加算について、同節に規定する算定要件を満たす場合に算定できる。
      - イ臨床研修病院入院診療加算
      - ロ救急医療管理加算
      - ハ超急性期脳卒中加算
      - ニ妊産婦緊急搬送入院加算
      - ホ在宅患者緊急入院診療加算
      - ヘ診療録管理体制加算
      - ト医師事務作業補助体制加算
      - チ急性期看護補助体制加算
      - リ看護職員夜間配置加算
      - ヌ乳幼児加算・幼児加算
      - ル特定感染症入院医療管理加算
      - ヲ難病等特別入院診療加算（難病患者等入院診療加算に限る。）
      - ワ超重症児（者）入院診療加算・準超重症児（者）入院診療加算
      - カ看護補助加算
      - ヨ地域加算
      - タ離島加算
      - レ療養環境加算
      - ソＨＩＶ感染者療養環境特別加算
      - ツ特定感染症患者療養環境特別加算
      - ネ重症者等療養環境特別加算
      - ナ小児療養環境特別加算
      - ラ無菌治療室管理加算
      - ム放射線治療病室管理加算
  - ウ緩和ケア診療加算
  - ヰ小児緩和ケア診療加算
  - ノ精神科リエゾンチーム加算
  - オ強度行動障害入院医療管理加算
  - ク依存症入院医療管理加算
  - ヤ摂食障害入院医療管理加算
  - マがん拠点病院加算
  - ケリハビリテーション・栄養・口腔連携体制加算（７対１入院基本料又は10対１入院基本料を算定するものに限る。）
  - フ栄養サポートチーム加算
  - コ医療安全対策加算
  - エ感染対策向上加算
  - テ患者サポート体制充実加算
  - ア報告書管理体制加算
  - サ褥瘡ハイリスク患者ケア加算
  - キハイリスク妊娠管理加算
  - ユ呼吸ケアチーム加算
  - メ術後疼痛管理チーム加算
  - ミ後発医薬品使用体制加算
  - シバイオ後続品使用体制加算
  - ヱ病棟薬剤業務実施加算１
  - ヒデータ提出加算
  - モ入退院支援加算（１のイ、２のイ又は３に限る。）
  - セ医療的ケア児（者）入院前支援加算
  - ス認知症ケア加算ン精神疾患診療体制加算イイ薬剤総合評価調整加算イロ排尿自立支援加算イハ地域医療体制確保加算（７対１入院基本料又は10対１入院基本料を算定するものに限る。）イニ協力対象施設入所者入院加算８当該病棟のうち、保険医療機関が地方厚生局長等に届け出たものに入院している患者であって、当該病棟に90日を超えて入院するものについては、注１から注７までの規定にかかわらず、区分番号Ａ１０１に掲げる療養病棟入院料１の例により算定する。
  - ９別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の入院基本料は、夜間看護体制特定日減算として、次のいずれにも該当する場合に限り、所定点数の100分の５に相当する点数を減算する。
      - イ年６日以内であること。
      - ロ当該日が属する月が連続する２月以内であること。
