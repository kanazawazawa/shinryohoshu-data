code: A104
name: 特定機能病院入院基本料（１日につき）
version: r6
points: null
unit: 日
chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第1節 入院基本料
raw_text: |
  Ａ１０４特定機能病院入院基本料（１日につき）１一般病棟の場合
      - イ７対１入院基本料1,822点
      - ロ10対１入院基本料1,458点
  - ２結核病棟の場合
      - イ７対１入院基本料1,822点
      - ロ10対１入院基本料1,458点
      - ハ13対１入院基本料1,228点
      - ニ15対１入院基本料1,053点
  - ３精神病棟の場合
      - イ７対１入院基本料1,551点
      - ロ10対１入院基本料1,393点
      - ハ13対１入院基本料1,038点
      - ニ15対１入院基本料948点
  - 注１特定機能病院の一般病棟、結核病棟又は精神病棟であって、看護配置、看護師比率、平均在院日数その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者（第３節の特定入院料を算定する患者を除く。）について、当該基準に係る区分に従い、それぞれ所定点数を算定する。
  - ２注１の規定にかかわらず、別に厚生労働大臣が定める患者については、区分番号Ａ１０２に掲げる結核病棟入院基本料の注３に規定する特別入院基本料の例により算定する。
  - ３当該病棟の入院患者の入院期間に応じ、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
      - イ一般病棟の場合
    - （１）14日以内の期間712点
    - （２）15日以上30日以内の期間207点
      - ロ結核病棟の場合
    - （１）30日以内の期間330点
    - （２）31日以上90日以内の期間200点
      - ハ精神病棟の場合
    - （１）14日以内の期間505点
    - （２）15日以上30日以内の期間250点
    - （３）31日以上90日以内の期間125点
    - （４）91日以上180日以内の期間30点
    - （５）181日以上１年以内の期間15点
  - ４当該病棟（精神病棟に限る。）に入院している患者が別に厚生労働大臣が定めるものである場合には、入院した日から起算して１月以内の期間に限り、重度認知症加算として、１日につき300点を所定点数に加算する。
  - ５当該病棟に入院している患者の重症度、医療・看護必要度（以下この表において「看護必要度」という。）につき別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た病棟に入院している患者については、当該基準に係る区分に従い、次に掲げる点数をそれぞれ１日につき所定点数に加算する。
      - イ看護必要度加算１55点
      - ロ看護必要度加算２45点
      - ハ看護必要度加算３25点
  - ６退院が特定の時間帯に集中しているものとして別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める患者の退院日の入院基本料（一般病棟に限る。）は、所定点数の100分の92に相当する点数により算定する。
  - ７入院日及び退院日が特定の日に集中しているものとして別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の入院基本料（一般病棟に限る。）は、所定点数の100分の92に相当する点数により算定する。
  - ８当該病棟においては、第２節の各区分に掲げる入院基本料等加算のうち、次に掲げる加算について、同節に規定する算定要件を満たす場合に算定できる。
      - イ臨床研修病院入院診療加算
      - ロ救急医療管理加算
      - ハ超急性期脳卒中加算（一般病棟に限る。）
      - ニ妊産婦緊急搬送入院加算
      - ホ在宅患者緊急入院診療加算
      - ヘ診療録管理体制加算
      - ト医師事務作業補助体制加算
      - チ急性期看護補助体制加算（一般病棟に限る。）
      - リ看護職員夜間配置加算（一般病棟に限る。）
      - ヌ乳幼児加算・幼児加算
      - ル特定感染症入院医療管理加算
      - ヲ難病等特別入院診療加算（二類感染症患者入院診療加算は一般病棟又は精神病棟に限る。）
      - ワ超重症児（者）入院診療加算・準超重症児（者）入院診療加算
      - カ看護補助加算（一般病棟を除く。）
      - ヨ地域加算
      - タ離島加算
      - レ療養環境加算
      - ソＨＩＶ感染者療養環境特別加算
      - ツ特定感染症患者療養環境特別加算
      - ネ重症者等療養環境特別加算（一般病棟に限る。）
      - ナ小児療養環境特別加算（一般病棟に限る。）
      - ラ無菌治療室管理加算（一般病棟に限る。）
      - ム放射線治療病室管理加算（一般病棟に限る。）
  - ウ緩和ケア診療加算（一般病棟に限る。）
  - ヰ小児緩和ケア診療加算（一般病棟に限る。）
  - ノ精神科措置入院診療加算（精神病棟に限る。）
  - オ精神科応急入院施設管理加算（精神病棟に限る。）
  - ク精神科隔離室管理加算（精神病棟に限る。）
  - ヤ精神病棟入院時医学管理加算（精神病棟に限る。）
  - マ精神科地域移行実施加算（精神病棟に限る。）
  - ケ精神科身体合併症管理加算（精神病棟に限る。）
  - フ精神科リエゾンチーム加算（一般病棟に限る。）
  - コ強度行動障害入院医療管理加算（一般病棟又は精神病棟に限る。）
  - エ依存症入院医療管理加算（一般病棟又は精神病棟に限る。）
  - テ摂食障害入院医療管理加算（一般病棟又は精神病棟に限る。）
  - アがん拠点病院加算（一般病棟に限る。）
  - サリハビリテーション・栄養・口腔連携体制加算（一般病棟に限る。）
  - キ栄養サポートチーム加算
  - ユ医療安全対策加算
  - メ感染対策向上加算
  - ミ患者サポート体制充実加算
  - シ報告書管理体制加算
  - ヱ褥瘡ハイリスク患者ケア加算
  - ヒハイリスク妊娠管理加算
  - モハイリスク分娩等管理加算（ハイリスク分娩管理加算に限る。）（一般病棟又は精神病棟に限る。）
  - セ呼吸ケアチーム加算（一般病棟に限る。）
  - ス術後疼痛管理チーム加算（一般病棟又は結核病棟に限る。）ン後発医薬品使用体制加算イイバイオ後続品使用体制加算イロ病棟薬剤業務実施加算１イハデータ提出加算イニ入退院支援加算（一般病棟は１のイ、２のイ又は３に限り、結核病棟は１のロ又は２のロに限る。）イホ精神科入退院支援加算（精神病棟に限る。）イヘ医療的ケア児（者）入院前支援加算（一般病棟又は結核病棟に限る。）イト認知症ケア加算（一般病棟又は結核病棟に限る。）イチせん妄ハイリスク患者ケア加算（一般病棟に限る。）イリ精神疾患診療体制加算（精神病棟を除く。）イヌ精神科急性期医師配置加算（精神病棟の７対１入院基本料、10対１入院基本料又は13対１入院基本料を算定するものに限る。）イル薬剤総合評価調整加算イヲ排尿自立支援加算イワ地域医療体制確保加算（７対１入院基本料又は10対１入院基本料を算定するものに限る。）イカ協力対象施設入所者入院加算９当該病棟（一般病棟に限る。）のうち、保険医療機関が地方厚生局長等に届け出たものに入院している患者であって、当該病棟に90日を超えて入院するものについては、注１から注８までの規定にかかわらず、区分番号Ａ１０１に掲げる療養病棟入院料１の例により算定する。
  - 10別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病棟に入院している患者に対して、管理栄養士が必要な栄養管理を行った場合には、入院栄養管理体制加算として、入院初日及び退院時にそれぞれ１回に限り、270点を所定点数に加算する。
  この場合において、区分番号Ａ２３３に掲げるリハビリテーション・栄養・口腔連携体制加算、区分番号
