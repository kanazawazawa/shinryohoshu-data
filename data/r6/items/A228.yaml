raw_text: 'Ａ２２８精神科応急入院施設管理加算（入院初日）2,500点

  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、精神保健福祉法第33条の６第１項に規定する入院等に係る患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、精神科応急入院施設管理加算を算定できるものを現に算定している患者に限る。）について、当該措置に係る入院初日に限り所定点数に加算する。

  '
