chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第3節 特定入院料
raw_text: "Ａ３０３－２新生児治療回復室入院医療管理料（１日につき）5,728点\n- 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、必要があって新生児治療回復室入院医療管理が行われた場合に、区分番号Ａ３０２に掲げる新生児特定集中治療室管理料、区分番号Ａ３０２－２に掲げる新生児特定集中治療室重症児対応体制強化管理料及び区分番号Ａ３０３の２に掲げる新生児集中治療室管理料を算定した期間と通算して30日（出生時体重が1,500グラム以上であって、別に厚生労働大臣が定める疾患を主病として入院している新生児にあっては50日、出生時体重が1,000グラム未満の新生児にあっては120日（出生時体重が500グラム以上750グラム未満であって慢性肺疾患の新生児にあっては135日、出生時体重が500グラム未満であって慢性肺疾患の新生児にあっては140日）、出生時体重が1,000グラム以上1,500グラム未満の新生児にあっては90日）を限度として算定する。\n\
  - ２第１章基本診療料並びに第２章第３部検査、第６部注射、第９部処置及び第13部病理診断のうち次に掲げるものは、新生児治療回復室入院医療管理料に含まれるものとする。\n    - イ入院基本料\n    - ロ入院基本料等加算（臨床研修病院入院診療加算、超急性期脳卒中加算、医師事務作業補助体制加算、特定感染症入院医療管理加算、難病等特別入院診療加算（二類感染症患者入院診療加算に限る。）、地域加算、離島加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、重症患者初期支援充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、データ提出加算、入退院支援加算（１のイ及び３に限る。）、排尿自立支援加算及び地域医療体制確保加算を除く。）\n\
  \    - ハ第２章第３部の各区分の検査（同部第１節第２款の検体検査判断料を除く。）\n    - ニ点滴注射\n    - ホ中心静脈注射\n    - ヘ酸素吸入（使用した酸素及び窒素の費用を除く。）\n    - トインキュベーター（使用した酸素及び窒素の費用を除く。）\n\
  \    - チ第13部第１節の病理標本作製料Ａ３０４地域包括医療病棟入院料（１日につき）3,050点\n- 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟を有する保険医療機関において、当該届出に係る病棟に入院している患者について、所定点数を算定する。\n\
  ただし、90日を超えて入院するものについては、区分番号Ａ１００に掲げる一般病棟入院基本料の地域一般入院料３の例により、算定する。\n- ２入院した日から起算して14日を限度として、初期加算として、１日につき150点を所定点数に加算する。\n\
  - ３別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の特定入院料は、夜間看護体制特定日減算として、次のいずれにも該当する場合に限り、所定点数の100分の５に相当する点数を減算する。\n    - イ年６日以内であること。\n\
  \    - ロ当該日が属する月が連続する２月以内であること。\n- ４診療に係る費用のうち次に掲げるものは、地域包括医療病棟入院料に含まれるものとする。\n    - イ入院基本料\n    - ロ入院基本料等加算（臨床研修病院入院診療加算、救急医療管理加算、在宅患者緊急入院診療加算、医師事務作業補助体制加算、地域加算、離島加算、特定感染症患者療養環境特別加算、栄養サポートチーム加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、病棟薬剤業務実施加算（１に限る。）、データ提出加算、入退院支援加算（１のイに限る。）、医療的ケア児（者）入院前支援加算、認知症ケア加算、薬剤総合評価調整加算、排尿自立支援加算、地域医療体制確保加算及び協力対象施設入所者入院加算を除く。）\n\
  \    - ハ第２章第１部医学管理等（区分番号Ｂ０００に掲げる特定疾患療養管理料、Ｂ００１に掲げる特定疾患治療管理料、Ｂ００１－２に掲げる小児科外来診療料、Ｂ００１－２－２に掲げる地域連携小児夜間・休日診療料、Ｂ００１－２－３に掲げる乳幼児育児栄養指導料、Ｂ００１－２－４に掲げる地域連携夜間・休日診療料、Ｂ００１－２－５に掲げる院内トリアージ実施料、Ｂ００１－２－６に掲げる夜間休日救急搬送医学管理料、Ｂ００１－２－７に掲げる外来リハビリテーション診療料、Ｂ００１－２－８に掲げる外来放射線照射診療料、Ｂ００１－２－９に掲げる地域包括診療料、Ｂ００１－２－10に掲げる認知症地域包括診療料、Ｂ００１－２－11に掲げる小児かかりつけ診療料、Ｂ００１－２－12に掲げる外来腫瘍化学療法診療料、Ｂ００１－３に掲げる生活習慣病管理料（Ⅰ）、Ｂ００１－３－２に掲げるニコチン依存症管理料、Ｂ００１－３－３に掲げる生活習慣病管理料（Ⅱ）、Ｂ００１－６に掲げる肺血栓塞栓症予防管理料、Ｂ００１－７に掲げるリンパ浮腫指導管理料、Ｂ００１－８に掲げる臍ヘルニア圧迫指導管理料、Ｂ００１－９に掲げる療養・就労両立支援指導料、Ｂ００２に掲げる開放型病院共同指導料（Ⅰ）、Ｂ００３に掲げる開放型病院共同指導料（Ⅱ）、Ｂ００４に掲げる退院時共同指導料１、Ｂ００５に掲げる退院時共同指導料２、Ｂ００５－１－２に掲げる介護支援等連携指導料、Ｂ００５－１－３に掲げる介護保険リハビリテーション移行支援料、Ｂ００５－４に掲げるハイリスク妊産婦共同管理料（Ⅰ）、Ｂ００５－５に掲げるハイリスク妊産婦共同管理料（Ⅱ）、Ｂ００５－６に掲げるがん治療連携計画策定料、Ｂ００５－６－２に掲げるがん治療連携指導料、Ｂ００５－６－３に掲げるがん治療連携管理料、Ｂ００５－６－４に掲げる外来がん患者在宅連携指導料、Ｂ００５－７に掲げる認知症専門診断管理料、Ｂ００５－７－２に掲げる認知症療養指導料、Ｂ００５－７－３に掲げる認知症サポート指導料、Ｂ００５－８に掲げる肝炎インターフェロン治療計画料、Ｂ００５－９に掲げる外来排尿自立指導料、Ｂ００５－10に掲げるハイリスク妊産婦連携指導料１、Ｂ００５－10－２に掲げるハイリスク妊産婦連携指導料２、Ｂ００５－11に掲げる遠隔連携診療料、Ｂ００５－12に掲げるこころの連携指導料（Ⅰ）、Ｂ００５－13に掲げるこころの連携指導料（Ⅱ）、Ｂ００５－14に掲げるプログラム医療機器等指導管理料、Ｂ００６に掲げる救急救命管理料、Ｂ００６－３に掲げる退院時リハビリテーション指導料、Ｂ００７に掲げる退院前訪問指導料、Ｂ００７－２に掲げる退院後訪問指導料、Ｂ００８に掲げる薬剤管理指導料、Ｂ００８－２に掲げる薬剤総合評価調整管理料、Ｂ００９に掲げる診療情報提供料（Ⅰ）、Ｂ００９－２に掲げる電子的診療情報評価料、Ｂ０１０に掲げる診療情報提供料（Ⅱ）、Ｂ０１０－２に掲げる診療情報連携共有料、Ｂ０１１に掲げる連携強化診療情報提供料、Ｂ０１１－３に掲げる薬剤情報提供料、Ｂ０１１－４に掲げる医療機器安全管理料、Ｂ０１１－５に掲げるがんゲノムプロファイリング評価提供料、Ｂ０１１－６に掲げる栄養情報連携料、Ｂ０１２に掲げる傷病手当金意見書交付料、Ｂ０１３に掲げる療養費同意書交付料、Ｂ０１４に掲げる退院時薬剤情報管理指導料、Ｂ０１５に掲げる精神科退院時共同指導料及びＢ２００に掲げる特定保険医療材料（区分番号Ｂ０００に掲げる特定疾患療養管理料、Ｂ００１に掲げる特定疾患治療管理料、Ｂ００１－２に掲げる小児科外来診療料、区分番号Ｂ００１－２－２に掲げる地域連携小児夜間・休日診療料、Ｂ００１－２－３に掲げる乳幼児育児栄養指導料、Ｂ００１－２－４に掲げる地域連携夜間・休日診療料、Ｂ００１－２－５に掲げる院内トリアージ実施料、Ｂ００１－２－６に掲げる夜間休日救急搬送医学管理料、Ｂ００１－２－７に掲げる外来リハビリテーション診療料、Ｂ００１－２－８に掲げる外来放射線照射診療料、Ｂ００１－２－９に掲げる地域包括診療料、Ｂ００１－２－10に掲げる認知症地域包括診療料、Ｂ００１－２－11に掲げる小児かかりつけ診療料、Ｂ００１－２－12に掲げる外来腫瘍化学療法診療料、Ｂ００１－３に掲げる生活習慣病管理料（Ⅰ）、Ｂ００１－３－２に掲げるニコチン依存症管理料、Ｂ００１－３－３に掲げる生活習慣病管理料（Ⅱ）、Ｂ００１－６に掲げる肺血栓塞栓症予防管理料、Ｂ００１－７に掲げるリンパ浮腫指導管理料、Ｂ００１－８に掲げる臍ヘルニア圧迫指導管理料、Ｂ００１－９に掲げる療養・就労両立支援指導料、Ｂ００２に掲げる開放型病院共同指導料（Ⅰ）、Ｂ００３に掲げる開放型病院共同指導料（Ⅱ）、Ｂ００４に掲げる退院時共同指導料１、Ｂ００５に掲げる退院時共同指導料２、Ｂ００５－１－２に掲げる介護支援等連携指導料、Ｂ００５－１－３に掲げる介護保険リハビリテーション移行支援料、Ｂ００５－４に掲げるハイリスク妊産婦共同管理料（Ⅰ）、Ｂ００５－５に掲げるハイリスク妊産婦共同管理料（Ⅱ）、Ｂ００５－６に掲げるがん治療連携計画策定料、Ｂ００５－６－２に掲げるがん治療連携指導料、Ｂ００５－６－３に掲げるがん治療連携管理料、Ｂ００５－６－４に掲げる外来がん患者在宅連携指導料、Ｂ００５－７に掲げる認知症専門診断管理料、Ｂ００５－７－２に掲げる認知症療養指導料、Ｂ００５－７－３に掲げる認知症サポート指導料、Ｂ００５－８に掲げる肝炎インターフェロン治療計画料、Ｂ００５－９に掲げる外来排尿自立指導料、Ｂ００５－10に掲げるハイリスク妊産婦連携指導料１、Ｂ００５－10－２に掲げるハイリスク妊産婦連携指導料２、Ｂ００５－11に掲げる遠隔連携診療料、Ｂ００５－12に掲げるこころの連携指導料（Ⅰ）、Ｂ００５－13に掲げるこころの連携指導料（Ⅱ）、Ｂ００５－14に掲げるプログラム医療機器等指導管理料、Ｂ００６に掲げる救急救命管理料、Ｂ００６－３に掲げる退院時リハビリテーション指導料、Ｂ００７に掲げる退院前訪問指導料、Ｂ００７－２に掲げる退院後訪問指導料、Ｂ００８に掲げる薬剤管理指導料、Ｂ００８－２に掲げる薬剤総合評価調整管理料、Ｂ００９に掲げる診療情報提供料（Ⅰ）、Ｂ００９－２に掲げる電子的診療情報評価料、Ｂ０１０に掲げる診療情報提供料（Ⅱ）、Ｂ０１０－２に掲げる診療情報連携共有料、Ｂ０１１に掲げる連携強化診療情報提供料、Ｂ０１１－３に掲げる薬剤情報提供料、Ｂ０１１－４に掲げる医療機器安全管理料、Ｂ０１１－５に掲げるがんゲノムプロファイリング評価提供料、Ｂ０１１－６に掲げる栄養情報連携料、Ｂ０１２に掲げる傷病手当金意見書交付料、Ｂ０１３に掲げる療養費同意書交付料、Ｂ０１４に掲げる退院時薬剤情報管理指導料及びＢ０１５に掲げる精神科退院時共同指導料に係るものに限る。）を除く。）\n\
  \    - ニ第３部検査（区分番号Ｄ２０６に掲げる心臓カテーテル法による諸検査（一連の検査について）、Ｄ２９５に掲げる関節鏡検査（片側）、Ｄ２９６に掲げる喉頭直達鏡検査、Ｄ２９６－２に掲げる鼻咽腔直達鏡検査、Ｄ２９６－３に掲げる内視鏡用テレスコープを用いた咽頭画像等解析（インフルエンザの診断の補助に用いるもの）、Ｄ２９８に掲げる嗅裂部・鼻咽腔・副鼻腔入口部ファイバースコピー（部位を問わず一連につき）、Ｄ２９８－２に掲げる内視鏡下嚥下機能検査、Ｄ２９９に掲げる喉頭ファイバースコピー、Ｄ３００に掲げる中耳ファイバースコピー、Ｄ３００－２に掲げる顎関節鏡検査（片側）、Ｄ３０２に掲げる気管支ファイバースコピー、Ｄ３０２－２に掲げる気管支カテーテル気管支肺胞洗浄法検査、Ｄ３０３に掲げる胸腔鏡検査、Ｄ３０４に掲げる縦隔鏡検査、Ｄ３０６に掲げる食道ファイバースコピー、Ｄ３０８に掲げる胃・十二指腸ファイバースコピー、Ｄ３０９に掲げる胆道ファイバースコピー、Ｄ３１０に掲げる小腸内視鏡検査、Ｄ３１０－２に掲げる消化管通過性検査、Ｄ３１１に掲げる直腸鏡検査、Ｄ３１１－２に掲げる肛門鏡検査、Ｄ３１２に掲げる直腸ファイバースコピー、Ｄ３１２－２に掲げる回腸嚢ファイバースコピー、Ｄ３１３に掲げる大腸内視鏡検査、Ｄ３１４に掲げる腹腔鏡検査、Ｄ３１５に掲げる腹腔ファイバースコピー、Ｄ３１６に掲げるクルドスコピー、Ｄ３１７に掲げる膀胱尿道ファイバースコピー、Ｄ３１７－２に掲げる膀胱尿道鏡検査、Ｄ３１８に掲げる尿管カテーテル法（ファイバースコープによるもの）（両側）、Ｄ３１９に掲げる腎盂尿管ファイバースコピー（片側）、Ｄ３２０に掲げるヒステロスコピー、Ｄ３２１に掲げるコルポスコピー、Ｄ３２２に掲げる子宮ファイバースコピー、Ｄ３２３に掲げる乳管鏡検査、Ｄ３２４に掲げる血管内視鏡検査、Ｄ３２５に掲げる肺臓カテーテル法、肝臓カテーテル法、膵臓カテーテル法、Ｄ４０１に掲げる脳室穿刺、Ｄ４０２に掲げる後頭下穿刺、\n"
notes:
- id: 注1
  text: 別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、必要があって新生児治療回復室入院医療管理が行われた場合に、区分番号Ａ３０２に掲げる新生児特定集中治療室管理料、区分番号Ａ３０２－２に掲げる新生児特定集中治療室重症児対応体制強化管理料及び区分番号Ａ３０３の２に掲げる新生児集中治療室管理料を算定した期間と通算して30日（出生時体重が1,500グラム以上であって、別に厚生労働大臣が定める疾患を主病として入院している新生児にあっては50日、出生時体重が1,000グラム未満の新生児にあっては120日（出生時体重が500グラム以上750グラム未満であって慢性肺疾患の新生児にあっては135日、出生時体重が500グラム未満であって慢性肺疾患の新生児にあっては140日）、出生時体重が1,000グラム以上1,500グラム未満の新生児にあっては90日）を限度として算定する。
- id: 注2
  text: "第１章基本診療料並びに第２章第３部検査、第６部注射、第９部処置及び第13部病理診断のうち次に掲げるものは、新生児治療回復室入院医療管理料に含まれるものとする。\n    - イ入院基本料\n    - ロ入院基本料等加算（臨床研修病院入院診療加算、超急性期脳卒中加算、医師事務作業補助体制加算、特定感染症入院医療管理加算、難病等特別入院診療加算（二類感染症患者入院診療加算に限る。）、地域加算、離島加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、重症患者初期支援充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、データ提出加算、入退院支援加算（１のイ及び３に限る。）、排尿自立支援加算及び地域医療体制確保加算を除く。）\n\
    \    - ハ第２章第３部の各区分の検査（同部第１節第２款の検体検査判断料を除く。）\n    - ニ点滴注射\n    - ホ中心静脈注射\n    - ヘ酸素吸入（使用した酸素及び窒素の費用を除く。）\n    - トインキュベーター（使用した酸素及び窒素の費用を除く。）\n\
    \    - チ第13部第１節の病理標本作製料Ａ３０４地域包括医療病棟入院料（１日につき）3,050点"
- id: 注1
  text: '別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟を有する保険医療機関において、当該届出に係る病棟に入院している患者について、所定点数を算定する。

    ただし、90日を超えて入院するものについては、区分番号Ａ１００に掲げる一般病棟入院基本料の地域一般入院料３の例により、算定する。'
- id: 注2
  text: 入院した日から起算して14日を限度として、初期加算として、１日につき150点を所定点数に加算する。
  additions:
  - name: 初期加算
    points: 150
- id: 注3
  text: "別に厚生労働大臣が定める保険医療機関においては、別に厚生労働大臣が定める日の特定入院料は、夜間看護体制特定日減算として、次のいずれにも該当する場合に限り、所定点数の100分の５に相当する点数を減算する。\n    - イ年６日以内であること。\n\
    \    - ロ当該日が属する月が連続する２月以内であること。"
- id: 注4
  text: "診療に係る費用のうち次に掲げるものは、地域包括医療病棟入院料に含まれるものとする。\n    - イ入院基本料\n    - ロ入院基本料等加算（臨床研修病院入院診療加算、救急医療管理加算、在宅患者緊急入院診療加算、医師事務作業補助体制加算、地域加算、離島加算、特定感染症患者療養環境特別加算、栄養サポートチーム加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、病棟薬剤業務実施加算（１に限る。）、データ提出加算、入退院支援加算（１のイに限る。）、医療的ケア児（者）入院前支援加算、認知症ケア加算、薬剤総合評価調整加算、排尿自立支援加算、地域医療体制確保加算及び協力対象施設入所者入院加算を除く。）\n\
    \    - ハ第２章第１部医学管理等（区分番号Ｂ０００に掲げる特定疾患療養管理料、Ｂ００１に掲げる特定疾患治療管理料、Ｂ００１－２に掲げる小児科外来診療料、Ｂ００１－２－２に掲げる地域連携小児夜間・休日診療料、Ｂ００１－２－３に掲げる乳幼児育児栄養指導料、Ｂ００１－２－４に掲げる地域連携夜間・休日診療料、Ｂ００１－２－５に掲げる院内トリアージ実施料、Ｂ００１－２－６に掲げる夜間休日救急搬送医学管理料、Ｂ００１－２－７に掲げる外来リハビリテーション診療料、Ｂ００１－２－８に掲げる外来放射線照射診療料、Ｂ００１－２－９に掲げる地域包括診療料、Ｂ００１－２－10に掲げる認知症地域包括診療料、Ｂ００１－２－11に掲げる小児かかりつけ診療料、Ｂ００１－２－12に掲げる外来腫瘍化学療法診療料、Ｂ００１－３に掲げる生活習慣病管理料（Ⅰ）、Ｂ００１－３－２に掲げるニコチン依存症管理料、Ｂ００１－３－３に掲げる生活習慣病管理料（Ⅱ）、Ｂ００１－６に掲げる肺血栓塞栓症予防管理料、Ｂ００１－７に掲げるリンパ浮腫指導管理料、Ｂ００１－８に掲げる臍ヘルニア圧迫指導管理料、Ｂ００１－９に掲げる療養・就労両立支援指導料、Ｂ００２に掲げる開放型病院共同指導料（Ⅰ）、Ｂ００３に掲げる開放型病院共同指導料（Ⅱ）、Ｂ００４に掲げる退院時共同指導料１、Ｂ００５に掲げる退院時共同指導料２、Ｂ００５－１－２に掲げる介護支援等連携指導料、Ｂ００５－１－３に掲げる介護保険リハビリテーション移行支援料、Ｂ００５－４に掲げるハイリスク妊産婦共同管理料（Ⅰ）、Ｂ００５－５に掲げるハイリスク妊産婦共同管理料（Ⅱ）、Ｂ００５－６に掲げるがん治療連携計画策定料、Ｂ００５－６－２に掲げるがん治療連携指導料、Ｂ００５－６－３に掲げるがん治療連携管理料、Ｂ００５－６－４に掲げる外来がん患者在宅連携指導料、Ｂ００５－７に掲げる認知症専門診断管理料、Ｂ００５－７－２に掲げる認知症療養指導料、Ｂ００５－７－３に掲げる認知症サポート指導料、Ｂ００５－８に掲げる肝炎インターフェロン治療計画料、Ｂ００５－９に掲げる外来排尿自立指導料、Ｂ００５－10に掲げるハイリスク妊産婦連携指導料１、Ｂ００５－10－２に掲げるハイリスク妊産婦連携指導料２、Ｂ００５－11に掲げる遠隔連携診療料、Ｂ００５－12に掲げるこころの連携指導料（Ⅰ）、Ｂ００５－13に掲げるこころの連携指導料（Ⅱ）、Ｂ００５－14に掲げるプログラム医療機器等指導管理料、Ｂ００６に掲げる救急救命管理料、Ｂ００６－３に掲げる退院時リハビリテーション指導料、Ｂ００７に掲げる退院前訪問指導料、Ｂ００７－２に掲げる退院後訪問指導料、Ｂ００８に掲げる薬剤管理指導料、Ｂ００８－２に掲げる薬剤総合評価調整管理料、Ｂ００９に掲げる診療情報提供料（Ⅰ）、Ｂ００９－２に掲げる電子的診療情報評価料、Ｂ０１０に掲げる診療情報提供料（Ⅱ）、Ｂ０１０－２に掲げる診療情報連携共有料、Ｂ０１１に掲げる連携強化診療情報提供料、Ｂ０１１－３に掲げる薬剤情報提供料、Ｂ０１１－４に掲げる医療機器安全管理料、Ｂ０１１－５に掲げるがんゲノムプロファイリング評価提供料、Ｂ０１１－６に掲げる栄養情報連携料、Ｂ０１２に掲げる傷病手当金意見書交付料、Ｂ０１３に掲げる療養費同意書交付料、Ｂ０１４に掲げる退院時薬剤情報管理指導料、Ｂ０１５に掲げる精神科退院時共同指導料及びＢ２００に掲げる特定保険医療材料（区分番号Ｂ０００に掲げる特定疾患療養管理料、Ｂ００１に掲げる特定疾患治療管理料、Ｂ００１－２に掲げる小児科外来診療料、区分番号Ｂ００１－２－２に掲げる地域連携小児夜間・休日診療料、Ｂ００１－２－３に掲げる乳幼児育児栄養指導料、Ｂ００１－２－４に掲げる地域連携夜間・休日診療料、Ｂ００１－２－５に掲げる院内トリアージ実施料、Ｂ００１－２－６に掲げる夜間休日救急搬送医学管理料、Ｂ００１－２－７に掲げる外来リハビリテーション診療料、Ｂ００１－２－８に掲げる外来放射線照射診療料、Ｂ００１－２－９に掲げる地域包括診療料、Ｂ００１－２－10に掲げる認知症地域包括診療料、Ｂ００１－２－11に掲げる小児かかりつけ診療料、Ｂ００１－２－12に掲げる外来腫瘍化学療法診療料、Ｂ００１－３に掲げる生活習慣病管理料（Ⅰ）、Ｂ００１－３－２に掲げるニコチン依存症管理料、Ｂ００１－３－３に掲げる生活習慣病管理料（Ⅱ）、Ｂ００１－６に掲げる肺血栓塞栓症予防管理料、Ｂ００１－７に掲げるリンパ浮腫指導管理料、Ｂ００１－８に掲げる臍ヘルニア圧迫指導管理料、Ｂ００１－９に掲げる療養・就労両立支援指導料、Ｂ００２に掲げる開放型病院共同指導料（Ⅰ）、Ｂ００３に掲げる開放型病院共同指導料（Ⅱ）、Ｂ００４に掲げる退院時共同指導料１、Ｂ００５に掲