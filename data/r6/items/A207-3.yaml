raw_text: "Ａ２０７－３急性期看護補助体制加算（１日につき）１25対１急性期看護補助体制加算（看護補助者５割以上）240点\n- ２25対１急性期看護補助体制加算（看護補助者５割未満）220点\n- ３50対１急性期看護補助体制加算200点\n\
  - ４75対１急性期看護補助体制加算160点\n- 注１看護職員の負担の軽減及び処遇の改善を図るための看護業務の補助の体制その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）のうち、急性期看護補助体制加算を算定できるものを現に算定している患者に限る。）について、入院した日から起算して14日を限度として所定点数に加算する。\n\
  - ２夜間における看護業務の補助の体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者については、当該基準に係る区分に従い、１日につき次に掲げる点数をそれぞれ更に所定点数に加算する。\n\
  \    - イ夜間30対１急性期看護補助体制加算125点\n    - ロ夜間50対１急性期看護補助体制加算120点\n    - ハ夜間100対１急性期看護補助体制加算105点\n- ３夜間における看護業務の体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者については、夜間看護体制加算として、71点を更に所定点数に加算する。\n\
  - ４看護職員の負担の軽減及び処遇の改善を図るための看護業務の補助に係る十分な体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者について、当該基準に係る区分に従い、１日につき次に掲げる点数をそれぞれ更に所定点数に加算する。\n\
  ただし、当該患者について、身体的拘束を実施した日は、看護補助体制充実加算２の例により算定する。\n    - イ看護補助体制充実加算１20点\n    - ロ看護補助体制充実加算２５点Ａ２０７－４看護職員夜間配置加算（１日につき）１看護職員夜間12対１配置加算\n\
  \    - イ看護職員夜間12対１配置加算１110点\n    - ロ看護職員夜間12対１配置加算２90点\n- ２看護職員夜間16対１配置加算\n    - イ看護職員夜間16対１配置加算１70点\n    - ロ看護職員夜間16対１配置加算２45点\n\
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た病棟に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）のうち、看護職員夜間配置加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、入院した日から起算して14日を限度として所定点数に加算する。\n"
