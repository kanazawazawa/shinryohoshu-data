raw_text: 'Ｄ４０４に掲げる骨髄穿

  刺、Ｄ４０４－２に掲げる骨髄生検、Ｄ４０５に掲げる関節穿刺（片側）、Ｄ４０６に掲げる上顎洞穿刺（片側）、Ｄ４０６－２に掲げる扁桃周囲炎又は扁桃周囲膿瘍における試験穿刺（片側）、Ｄ４０７に掲げる腎嚢胞又は水腎症穿刺、Ｄ４０８に掲げるダグラス窩穿刺、Ｄ４０９に掲げるリンパ節等穿刺又は針生検、Ｄ４０９－２に掲げるセンチネルリンパ節生検（片側）、Ｄ４１０に掲げる乳腺穿刺又は針生検（片側）、Ｄ４１１に掲げる甲状腺穿刺又は針生検、Ｄ４１２に掲げる経皮的針生検法（透視、心電図検査及び超音波検査を含む。）、Ｄ４１２－２に掲げる経皮的腎生検法、Ｄ４１２－３に掲げる経頸静脈的肝生検、Ｄ４１３に掲げる前立腺針生検法、Ｄ４１４に掲げる内視鏡下生検法（１臓器につき）、Ｄ４１４－２に掲げる超音波内視鏡下穿刺吸引生検法（ＥＵＳ－ＦＮＡ）、Ｄ４１５に掲げる経気管肺生検法、

