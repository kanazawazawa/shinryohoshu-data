code: C001-2
name: 在宅患者訪問診療料（Ⅱ）（１日につき）
version: r6
points: 150
unit: 日
chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: "Ｃ００１－２在宅患者訪問診療料（Ⅱ）（１日につき）150点\n- 注１有料老人ホーム等に併設される保険医療機関が、当該施設に入居している患者に対して、次のいずれかに該当する訪問診療を行った場合に算定する。\nこの場合において、区分番号Ａ０００に掲げる初診料、区分番号Ａ００１に掲げる再診料、区分番号Ａ００２に掲げる外来診療料又は区分番号Ｃ０００に掲げる往診料は、算定しない。\n\
  \    - イ当該保険医療機関が、区分番号Ｃ００２に掲げる在宅時医学総合管理料又は区分番号Ｃ００２－２に掲げる施設入居時等医学総合管理料の算定要件を満たす保険医療機関として、当該患者の同意を得て、計画的な医学管理の下に定期的に訪問して診療を行った場合（区分番号Ａ０００に掲げる初診料を算定する初診の日に訪問して診療を行った場合を除く。）\n\
  \    - ロ区分番号Ｃ００２に掲げる在宅時医学総合管理料、区分番号Ｃ００２－２に掲げる施設入居時等医学総合管理料又は区分番号Ｃ００３に掲げる在宅がん医療総合診療料の算定要件を満たす他の保険医療機関の求めに応じ、当該他の保険医療機関から紹介された患者に対して、当該患者の同意を得て、計画的な医学管理の下に訪問して診療を行った場合２注１のイの場合については、当該患者１人につき週３回（別に厚生労働大臣が定める疾病等の患者に対する場合を除く。）に限り算定する。\n\
  - ３注１のロの場合については、当該患者１人につき訪問診療を開始した日の属する月から起算して６月（別に厚生労働大臣が定める疾病等の患者に対する場合を除く。）を限度として、月１回に限り算定する。\n- ４注１のイの場合について、保険医療機関が、診療に基づき、患者の急性増悪等により一時的に頻回の訪問診療を行う必要性を認め、計画的な医学管理の下に、訪問診療を行った場合は、注２の規定にかかわらず、１月に１回に限り、当該診療の日から14日以内に行った訪問診療については14日を限度として算定する。\n\
  - ５患者の居住する有料老人ホーム等で死亡した患者（往診又は訪問診療を行った後、24時間以内に当該有料老人ホーム等以外で死亡した患者を含む。）に対してその死亡日及び死亡日前14日以内に、２回以上の往診若しくは訪問診療を実施した場合（注１のイの場合に限る。）又は区分番号Ｂ００４に掲げる退院時共同指導料１を算定し、かつ、訪問診療を実施した場合（注１のイの場合に限る。）には、在宅ターミナルケア加算として、次に掲げる点数を、それぞれ所定点数に加算する。\n\
  この場合において、区分番号Ｃ０００の注３に規定する在宅ターミナルケア加算は算定できない。\nただし、別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た保険医療機関が行った場合は、当該基準に掲げる区分に従い、在宅緩和ケア充実診療所・病院加算、在宅療養実績加算１又は在宅療養実績加算２として、それぞれ1,000点、750点又は500点を、がん患者に対して酸素療法を行っていた場合は酸素療法加算として2,000点を、更に所定点数に加算する。\n\
  \    - イ在宅療養支援診療所又は在宅療養支援病院であって別に厚生労働大臣が定めるものの場合\n  - （１）病床を有する場合6,200点\n  - （２）病床を有しない場合5,200点\n    - ロ在宅療養支援診療所又は在宅療養支援病院（イに規定するものを除く。）の場合4,200点\n\
  \    - ハイ及びロに掲げるもの以外の場合3,200点\n- ６区分番号Ｃ００１の注４、注５、注７、注８、注10、注12及び注13の規定は、在宅患者訪問診療料（Ⅱ）について準用する。\nこの場合において、同注７中「在宅」とあるのは「患者の入居する有料老人ホーム等」と、「１を算定する場合」とあるのは「注１のイの場合」と、同注８中「１を算定する場合」とあるのは「注１のイの場合」と、「注７に規定する加算」とあるのは「注６において準用するＣ００１の注７に規定する加算」、同注12中「１について」とあるのは「注１のイについて」と読み替えるものとする。\n"
