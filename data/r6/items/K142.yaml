raw_text: 'Ｋ１４２脊椎固定術、椎弓切除術、椎弓形成術（多椎間又は多椎弓の場合を含む。）１前方椎体固定41,710点

  - ２後方又は後側方固定32,890点

  - ３後方椎体固定41,160点

  - ４前方後方同時固定74,580点

  - ５椎弓切除13,310点

  - ６椎弓形成24,260点

  - 注１椎間又は椎弓が併せて２以上の場合は、１椎間又は１椎弓を追加するごとに、追加した当該椎間又は当該椎弓に実施した手術のうち主たる手術の所定点数の100分の50に相当する点数を加算する。

  ただし、加算は椎間又は椎弓を併せて４を超えないものとする。

  - ２２から４までに掲げる手術の所定点数には、注１の規定にかかわらず、当該手術を実施した椎間に隣接する椎弓に係る５及び６に掲げる手術の所定点数が含まれる。

  '
