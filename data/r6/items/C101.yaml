chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第2節 在宅療養指導管理料
  subsection: 第1款 在宅療養指導管理料
raw_text: "Ｃ１０１在宅自己注射指導管理料\n- １複雑な場合1,230点\n- ２１以外の場合\n    - イ月27回以下の場合650点\n    - ロ月28回以上の場合750点\n- 注１別に厚生労働大臣が定める注射薬の自己注射を行っている入院中の患者以外の患者に対して、自己注射に関する指導管理を行った場合に算定する。\n\
  ただし、同一月に区分番号Ｂ００１－２－12に掲げる外来腫瘍化学療法診療料又は第６部の通則第６号に規定する外来化学療法加算を算定している患者については、当該管理料を算定できない。\n- ２初回の指導を行った日の属する月から起算して３月以内の期間に当該指導管理を行った場合には、導入初期加算として、３月を限度として、580点を所定点数に加算する。\n\
  - ３処方の内容に変更があった場合には、注２の規定にかかわらず、当該指導を行った日の属する月から起算して１月を限度として、１回に限り導入初期加算を算定できる。\n- ４患者に対し、バイオ後続品に係る説明を行い、バイオ後続品を処方した場合には、バイオ後続品導入初期加算として、当該バイオ後続品の初回の処方日の属する月から起算して３月を限度として、150点を所定点数に加算する。\n\
  - ５別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、在宅自己注射指導管理料を算定すべき医学管理を情報通信機器を用いて行った場合は、１又は２のイ若しくはロの所定点数に代えて、それぞれ1,070点又は566点若しくは653点を算定する。\n"
notes:
