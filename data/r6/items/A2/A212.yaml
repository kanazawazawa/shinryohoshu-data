raw_text: |
  Ａ２１２超重症児（者）入院診療加算・準超重症児（者）入院診療加算（１日につき）１超重症児（者）入院診療加算
      - イ６歳未満の場合800点
      - ロ６歳以上の場合400点
  - ２準超重症児（者）入院診療加算
      - イ６歳未満の場合200点
      - ロ６歳以上の場合100点
  - 注１超重症児（者）入院診療加算は、保険医療機関に入院している患者であって、別に厚生労働大臣が定める超重症の状態にあるもの（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、超重症児（者）入院診療加算・準超重症児（者）入院診療加算を算定できるものを現に算定している患者に限る。）について、所定点数に加算する。
  - ２準超重症児（者）入院診療加算は、保険医療機関に入院している患者であって、別に厚生労働大臣が定める準超重症の状態にあるもの（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、超重症児（者）入院診療加算・準超重症児（者）入院診療加算を算定できるものを現に算定している患者に限る。）について、所定点数に加算する。
  - ３当該患者が自宅から入院した患者又は他の保険医療機関から転院してきた患者であって、当該他の保険医療機関において区分番号Ａ３０１に掲げる特定集中治療室管理料の注２に規定する小児加算、区分番号Ａ３０１－４に掲げる小児特定集中治療室管理料、区分番号Ａ３０２に掲げる新生児特定集中治療室管理料、区分番号Ａ３０２－２に掲げる新生児特定集中治療室重症児対応体制強化管理料又は区分番号Ａ３０３の２に掲げる新生児集中治療室管理料を算定したことのある者である場合には、入院した日から起算して５日を限度として、救急・在宅重症児（者）受入加算として、１日につき200点を更に所定点数に加算する。
  - ４超重症児（者）入院診療加算・準超重症児（者）入院診療加算は、一般病棟に入院している患者（区分番号Ａ１０６に掲げる障害者施設等入院基本料、区分番号Ａ３０６に掲げる特殊疾患入院医療管理料及び区分番号Ａ３０９に掲げる特殊疾患病棟入院料を算定するものを除く。）については、入院した日から起算して90日を限度として、所定点数に加算する。
