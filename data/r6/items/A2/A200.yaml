raw_text: |
  Ａ２００総合入院体制加算（１日につき）１総合入院体制加算１260点
  - ２総合入院体制加算２200点
  - ３総合入院体制加算３120点
  - 注急性期医療を提供する体制、医療従事者の負担の軽減及び処遇の改善に対する体制その他の事項につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、総合入院体制加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、入院した日から起算して14日を限度として所定点数に加算する。
  この場合において、区分番号Ａ２００－２に掲げる急性期充実体制加算は別に算定できない。
