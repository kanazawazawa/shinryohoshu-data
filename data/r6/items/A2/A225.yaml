raw_text: |
  Ａ２２５放射線治療病室管理加算（１日につき）１治療用放射性同位元素による治療の場合6,370点
  - ２密封小線源による治療の場合2,200点
  - 注１１については、別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病室において、治療上の必要があって放射線治療病室管理が行われた入院患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、放射線治療病室管理加算を算定できるものを現に算定している患者であって、治療用放射性同位元素による治療が行われたものに限る。）について、所定点数に加算する。
  - ２２については、別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関が地方厚生局長等に届け出た病室において、治療上の必要があって放射線治療病室管理が行われた入院患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、放射線治療病室管理加算を算定できるものを現に算定している患者であって、密封小線源による治療が行われたものに限る。）について、所定点数に加算する。
