chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: |
  Ａ２５０薬剤総合評価調整加算（退院時１回）100点
  - 注１入院中の患者について、次のいずれかに該当する場合に、退院時１回に限り所定点数に加算する。
      - イ入院前に６種類以上の内服薬（特に規定するものを除く。）が処方されていた患者について、当該処方の内容を総合的に評価した上で、当該処方の内容を変更し、かつ、療養上必要な指導を行った場合
      - ロ精神病棟に入院中の患者であって、入院直前又は退院１年前のいずれか遅い時点で抗精神病薬を４種類以上内服していたものについて、当該抗精神病薬の処方の内容を総合的に評価した上で、当該処方の内容を変更し、かつ、療養上必要な指導を行った場合２次のいずれかに該当する場合に、薬剤調整加算として150点を更に所定点数に加算する。
      - イ注１のイに該当する場合であって、当該患者の退院時に処方する内服薬が２種類以上減少した場合
      - ロ注１のロに該当する場合であって、退院日までの間に抗精神病薬の種類数が２種類以上減少した場合その他これに準ずる場合Ａ２５１排尿自立支援加算（週１回）200点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、排尿自立支援加算を算定できるものを現に算定している患者に限る。）であって別に厚生労働大臣が定めるものに対して、包括的な排尿ケアを行った場合に、患者１人につき、週１回に限り12週を限度として所定点数に加算する。
