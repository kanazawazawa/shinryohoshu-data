raw_text: |
  Ａ２３４－４重症患者初期支援充実加算（１日につき）300点
  - 注特に重篤な患者及びその家族等に対する支援体制につき別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第３節の特定入院料のうち、重症患者初期支援充実加算を算定できるものを現に算定している患者に限る。）について、入院した日から起算して３日を限度として所定点数に加算する。
