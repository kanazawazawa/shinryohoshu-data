chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第2節 在宅療養指導管理料
  subsection: 第2款 在宅療養指導管理材料加算
raw_text: "Ｃ１５０血糖自己測定器加算\n- １月20回以上測定する場合350点\n- ２月30回以上測定する場合465点\n- ３月40回以上測定する場合580点\n- ４月60回以上測定する場合830点\n- ５月90回以上測定する場合1,170点\n\
  - ６月120回以上測定する場合1,490点\n- ７間歇スキャン式持続血糖測定器によるもの1,250点\n- 注１１から４までについては、入院中の患者以外の患者であって次に掲げるものに対して、血糖自己測定値に基づく指導を行うため血糖自己測定器を使用した場合に、３月に３回に限り、第１款の所定点数に加算する。\n\
  \    - イインスリン製剤又はヒトソマトメジンＣ製剤の自己注射を１日に１回以上行っている患者（１型糖尿病の患者及び膵全摘後の患者を除く。）\n    - ロインスリン製剤の自己注射を１日に１回以上行っている患者（１型糖尿病の患者又は膵全摘後の患者に限る。）\n\
  \    - ハ12歳未満の小児低血糖症の患者\n    - ニ妊娠中の糖尿病患者又は妊娠糖尿病の患者（別に厚生労働大臣が定める者に限る。）２５及び６については、入院中の患者以外の患者であって次に掲げるものに対して、血糖自己測定値に基づく指導を行うため、血糖自己測定器を使用した場合に、３月に３回に限り、第１款の所定点数に加算する。\n\
  \    - イインスリン製剤の自己注射を１日に１回以上行っている患者（１型糖尿病の患者又は膵全摘後の患者に限る。）\n    - ロ12歳未満の小児低血糖症の患者\n    - ハ妊娠中の糖尿病患者又は妊娠糖尿病の患者（別に厚生労働大臣が定める者に限る。）３７については、インスリン製剤の自己注射を１日に１回以上行っている入院中の患者以外の患者に対して、血糖自己測定値に基づく指導を行うため、間歇スキャン式持続血糖測定器を使用した場合に、３月に３回に限り、第１款の所定点数に加算する。\n\
  - ４ＳＧＬＴ２阻害薬を服用している１型糖尿病の患者に対して、血中ケトン体自己測定器を使用した場合は、血中ケトン体自己測定器加算として、３月に３回に限り、40点を更に第１款の所定点数に加算する。\n"
