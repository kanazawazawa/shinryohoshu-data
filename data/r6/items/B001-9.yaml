  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: 'Ｂ００１－９療養・就労両立支援指導料

  - １初回800点

  - ２２回目以降400点

  - 注１１については、別に厚生労働大臣が定める疾患に罹患している患者に対して、当該患者と当該患者を使用する事業者が共同して作成した勤務情報を記載した文書の内容を踏まえ、就労の状況を考慮して療養上の指導を行うとともに、当該患者の同意を得て、当該患者が勤務する事業場において選任されている労働安全衛生法（昭和47年法律第57号）第13条第１項に規定する産業医、同法第10条第１項に規定する総括安全衛生管理者、同法第12条に規定する衛生管理者若しくは同法第12条の２に規定する安全衛生推進者若しくは衛生推進者又は同法第13条の２の規定により労働者の健康管理等を行う保健師（以下「産業医等」という。）に対し、病状、治療計画、就労上の措置に関する意見等当該患者の就労と療養の両立に必要な情報を提供した場合に、月１回に限り算定する。

  - ２２については、当該保険医療機関において１を算定した患者について、就労の状況を考慮して療養上の指導を行った場合に、１を算定した日の属する月又はその翌月から起算して３月を限度として、月１回に限り算定する。

  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、当該患者に対して、看護師、社会福祉士、精神保健福祉士又は公認心理師が相談支援を行った場合に、相談支援加算として、50点を所定点数に加算する。

  - ４注１の規定に基づく産業医等への文書の提供に係る区分番号Ｂ００９に掲げる診療情報提供料（Ⅰ）又は区分番号Ｂ０１０に掲げる診療情報提供料（Ⅱ）の費用は、所定点数に含まれるものとする。

  - ５別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、療養・就労両立支援指導料を算定すべき医学管理を情報通信機器を用いて行った場合は、１又は２の所定点数に代えて、それぞれ696点又は348点を算定する。

  '
