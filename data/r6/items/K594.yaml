raw_text: "Ｋ５９４不整脈手術\n- １副伝導路切断術89,250点\n- ２心室頻拍症手術147,890点\n- ３メイズ手術98,640点\n- ４左心耳閉鎖術\n    - イ開胸手術によるもの37,800点\n    - ロ胸腔鏡下によるもの37,800点\n\
  \    - ハ経カテーテル的手術によるもの34,930点\n- 注１４のイについては、別に厚生労働大臣が定める患者に対して実施した場合であって、区分番号Ｋ５５２、Ｋ５５２－２、Ｋ５５４、Ｋ５５５、Ｋ５５７からＫ５５７－３まで、Ｋ５６０又はＫ５９４の３に掲げる手術と併せて実施した場合に限り算定する。\n\
  - ２４のハについては、手術に伴う画像診断及び検査の費用は算定しない。\n"
