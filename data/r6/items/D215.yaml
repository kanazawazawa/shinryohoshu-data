chapter:
  chapter: 第2章 特掲診療料
  part: 第3部 検査
  section: 第3節 生体検査料
raw_text: "Ｄ２１５超音波検査（記録に要する費用を含む。）１Ａモード法150点\n- ２断層撮影法（心臓超音波検査を除く。）\n    - イ訪問診療時に行った場合400点\n- 注訪問診療時に行った場合は、月１回に限り算定する。\n\
  \    - ロその他の場合\n  - （１）胸腹部530点\n  - （２）下肢血管450点\n  - （３）その他（頭頸部、四肢、体表、末梢血管等）350点\n- ３心臓超音波検査\n    - イ経胸壁心エコー法880点\n    -\
  \ ロＭモード法500点\n    - ハ経食道心エコー法1,500点\n    - ニ胎児心エコー法300点\n- 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に、月１回に限り算定する。\n\
  - ２当該検査に伴って診断を行った場合は、胎児心エコー法診断加算として、1,000点を所定点数に加算する。\n    - ホ負荷心エコー法2,010点\n- ４ドプラ法（１日につき）\n    - イ胎児心音観察、末梢血管血行動態検査20点\n\
  \    - ロ脳動脈血流速度連続測定150点\n    - ハ脳動脈血流速度マッピング法400点\n- ５血管内超音波法4,290点\n- 注１２又は３について、造影剤を使用した場合は、造影剤使用加算として、180点を所定点数に加算する。\n\
  この場合において、造影剤注入手技料及び麻酔料（区分番号Ｌ００８に掲げるマスク又は気管内挿管による閉鎖循環式全身麻酔に係るものを除く。）は、加算点数に含まれるものとする。\n- ２２について、パルスドプラ法を行った場合は、パルスドプラ法加算として、150点を所定点数に加算する。\n\
  - ３心臓超音波検査に伴って同時に記録した心電図、心音図、脈波図及び心機図の検査の費用は、所定点数に含まれるものとする。\n- ４ドプラ法について、ロ及びハを併せて行った場合は、主たるものの所定点数のみにより算定する。\n- ５血管内超音波法について、呼吸心拍監視、新生児心拍・呼吸監視、カルジオスコープ（ハートスコープ）、カルジオタコスコープ、血液ガス分析、心拍出量測定、脈圧測定、透視、造影剤注入手技、造影剤使用撮影及びエックス線診断の費用は、所定点数に含まれるものとする。\n\
  - ６血管内超音波法と同一月中に行った血管内視鏡検査は所定点数に含まれるものとする。\n- ７４のロについて、微小栓子シグナル（ＨＩＴＳ／ＭＥＳ）の検出を行った場合は、微小栓子シグナル加算として、150点を所定点数に加算する。\n"
