chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: 'Ｂ００２開放型病院共同指導料（Ⅰ）350点

  - 注１診察に基づき紹介された患者が、別に厚生労働大臣が定める開放利用に係る施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関（以下この表において「開放型病院」という。）に入院中である場合において、当該開放型病院に赴いて、当該患者に対して療養上必要な指導を共同して行った場合に、患者１人１日につき１回算定する。

  - ２区分番号Ａ０００に掲げる初診料、区分番号Ａ００１に掲げる再診料、区分番号Ａ００２に掲げる外来診療料、区分番号Ｃ０００に掲げる往診料、区分番号Ｃ００１に掲げる在宅患者訪問診療料（Ⅰ）又は区分番号Ｃ００１－２に掲げる在宅患者訪問診療料（Ⅱ）は別に算定できない。

  '
