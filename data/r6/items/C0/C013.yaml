chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ０１３在宅患者訪問褥瘡管理指導料750点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、重点的な褥瘡管理を行う必要が認められる患者（在宅での療養を行っているものに限る。）に対して、当該患者の同意を得て、当該保険医療機関の保険医、管理栄養士又は当該保険医療機関以外の管理栄養士及び看護師又は連携する他の保険医療機関等の看護師が共同して、褥瘡管理に関する計画的な指導管理を行った場合には、初回のカンファレンスから起算して６月以内に限り、当該患者１人につき３回に限り所定点数を算定する。
  - ２区分番号Ｃ００１に掲げる在宅患者訪問診療料（Ⅰ）、区分番号Ｃ００１－２に掲げる在宅患者訪問診療料（Ⅱ）、区分番号Ｃ００５に掲げる在宅患者訪問看護・指導料又は区分番号Ｃ００９に掲げる在宅患者訪問栄養食事指導料は別に算定できない。
  ただし、カンファレンスを行う場合にあっては、この限りでない。
