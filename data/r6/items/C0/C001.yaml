code: C001
name: 在宅患者訪問診療料（Ⅰ）（１日につき）
version: r6
points: null
unit: 日
chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ００１在宅患者訪問診療料（Ⅰ）（１日につき）１在宅患者訪問診療料１
      - イ同一建物居住者以外の場合888点
      - ロ同一建物居住者の場合213点
  - ２在宅患者訪問診療料２
      - イ同一建物居住者以外の場合884点
      - ロ同一建物居住者の場合187点
  - 注１１については、在宅で療養を行っている患者であって通院が困難なものに対して、当該患者の同意を得て、計画的な医学管理の下に定期的に訪問して診療を行った場合（区分番号Ａ０００に掲げる初診料を算定する初診の日に訪問して診療を行った場合及び有料老人ホーム等に併設される保険医療機関が、当該有料老人ホーム等に入居している患者に対して行った場合を除く。）に、当該患者が同一建物居住者（当該患者と同一の建物に居住する他の患者に対して当該保険医療機関が同一日に訪問診療を行う場合の当該患者をいう。
  以下この区分番号において同じ。）以外である場合はイを、当該患者が同一建物居住者である場合はロを、それぞれ、当該患者１人につき週３回（同一の患者について、イ及びロを併せて算定する場合において同じ。）に限り（別に厚生労働大臣が定める疾病等の患者に対する場合を除く。）算定する。
  この場合において、区分番号Ａ００１に掲げる再診料、区分番号Ａ００２に掲げる外来診療料又は区分番号Ｃ０００に掲げる往診料は、算定しない。
  - ２２については、区分番号Ｃ００２に掲げる在宅時医学総合管理料、区分番号Ｃ００２－２に掲げる施設入居時等医学総合管理料又は区分番号Ｃ００３に掲げる在宅がん医療総合診療料の算定要件を満たす他の保険医療機関の求めに応じ、当該他の保険医療機関から紹介された患者に対して、当該患者の同意を得て、計画的な医学管理の下に訪問して診療を行った場合（有料老人ホーム等に併設される保険医療機関が、当該有料老人ホーム等に入居している患者に対して行った場合を除く。）に、当該患者が同一建物居住者以外である場合はイを、当該患者が同一建物居住者である場合はロを、当該患者１人につき、訪問診療を開始した日の属する月から起算して６月（別に厚生労働大臣が定める疾病等の患者に対する場合を除く。）を限度として、月１回に限り算定する。
  この場合において、区分番号Ａ０００に掲げる初診料、区分番号Ａ００１に掲げる再診料、区分番号Ａ００２に掲げる外来診療料又は区分番号Ｃ０００に掲げる往診料は、算定しない。
  - ３１について、保険医療機関が、診療に基づき、患者の急性増悪等により一時的に頻回の訪問診療を行う必要性を認め、計画的な医学的管理の下に、在宅での療養を行っている患者であって通院が困難なものに対して訪問診療を行った場合は、注１の規定にかかわらず、１月に１回に限り、当該診療の日から14日以内に行った訪問診療については14日を限度として算定する。
  - ４６歳未満の乳幼児に対して訪問診療を行った場合には、乳幼児加算として、400点を所定点数に加算する。
  - ５患家における診療時間が１時間を超えた場合は、患家診療時間加算として、30分又はその端数を増すごとに、100点を所定点数に加算する。
  - ６在宅で死亡した患者（往診又は訪問診療を行った後、24時間以内に在宅以外で死亡した患者を含む。）に対してその死亡日及び死亡日前14日以内に、２回以上の往診若しくは訪問診療を実施した場合（１を算定する場合に限る。）又は区分番号Ｂ００４に掲げる退院時共同指導料１を算定し、かつ、訪問診療を実施した場合（１を算定する場合に限る。）には、当該患者に係る区分等に従い、在宅ターミナルケア加算として、次に掲げる点数を、それぞれ所定点数に加算する。
  この場合において、区分番号Ｃ０００の注３に規定する在宅ターミナルケア加算は算定できない。
  ただし、別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た保険医療機関が行った場合は、当該基準に掲げる区分に従い、在宅緩和ケア充実診療所・病院加算、在宅療養実績加算１又は在宅療養実績加算２として、それぞれ1,000点、750点又は500点を、がん患者に対して酸素療法を行っていた場合は酸素療法加算として2,000点を更に所定点数に加算する。
      - イ有料老人ホーム等に入居する患者以外の患者
    - （１）在宅療養支援診療所又は在宅療養支援病院であって別に厚生労働大臣が定めるものの場合①病床を有する場合6,500点②病床を有しない場合5,500点
    - （２）在宅療養支援診療所又は在宅療養支援病院（（１）に規定するものを除く。）の場合4,500点
    - （３）
    - （１）及び（２）に掲げるもの以外の場合3,500点
      - ロ有料老人ホーム等に入居する患者
    - （１）在宅療養支援診療所又は在宅療養支援病院であって別に厚生労働大臣が定めるものの場合①病床を有する場合6,500点②病床を有しない場合5,500点
    - （２）在宅療養支援診療所又は在宅療養支援病院（（１）に規定するものを除く。）の場合4,500点
    - （３）
    - （１）及び（２）に掲げるもの以外の場合3,500点
  - ７往診又は訪問診療を行い、在宅で患者を看取った場合（１を算定する場合に限る。）には、看取り加算として、3,000点を所定点数に加算する。
  - ８死亡診断を行った場合（１を算定する場合に限る。）には、死亡診断加算として、200点を所定点数に加算する。
  ただし、注７に規定する加算を算定する場合は、算定できない。
  - ９保険医療機関の所在地と患家の所在地との距離が16キロメートルを超えた場合又は海路による訪問診療を行った場合で、特殊の事情があったときの在宅患者訪問診療料（Ⅰ）は、別に厚生労働大臣が定めるところによって算定する。
  - 10往診料を算定する往診の日の翌日までに行った訪問診療（在宅療養支援診療所又は在宅療養支援病院の保険医が行ったものを除く。）の費用は算定しない。
  - 11訪問診療に要した交通費は、患家の負担とする。
  - 12１について、在宅療養支援診療所又は在宅療養支援病院であって別に厚生労働大臣が定める基準に適合しなくなった場合には、当該基準に適合しなくなった後の直近１月に限り、同一患者につき同一月において訪問診療を５回以上実施した場合における５回目以降の当該訪問診療については、所定点数の100分の50に相当する点数により算定する。
  - 13別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、健康保険法第３条第13項に規定する電子資格確認等により得られる情報を踏まえて計画的な医学管理の下に、訪問して診療を行った場合は、在宅医療ＤＸ情報活用加算として、月１回に限り10点を所定点数に加算する。
  ただし、区分番号Ａ０００に掲げる初診料の注15、区分番号Ａ００１に掲げる再診料の注19若しくは区分番号Ａ００２に掲げる外来診療料の注10にそれぞれ規定する医療情報取得加算、区分番号Ａ０００に掲げる初診料の注16に規定する医療ＤＸ推進体制整備加算、区分番号Ｃ００３に掲げる在宅がん医療総合診療料の注８に規定する在宅医療ＤＸ情報活用加算又は区分番号Ｃ００５に掲げる在宅患者訪問看護・指導料の注17（区分番号Ｃ００５－１－２の注６の規定により準用する場合を含む。）若しくは区分番号Ｉ０１２に掲げる精神科訪問看護・指導料の注17にそれぞれ規定する訪問看護医療ＤＸ情報活用加算を算定した月は、在宅医療ＤＸ情報活用加算は算定できない。
