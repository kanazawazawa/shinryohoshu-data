raw_text: |
  Ｈ００７－４リンパ浮腫複合的治療料
  - １重症の場合200点
  - ２１以外の場合100点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、リンパ浮腫の患者に複合的治療を実施した場合に、患者１人１日につき１回算定する。
  - ２１の場合は月１回（当該治療を開始した日の属する月から起算して２月以内は計11回）に限り、２の場合は６月に１回に限り、それぞれ所定点数を算定する。
