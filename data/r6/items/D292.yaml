  chapter: 第2章 特掲診療料
  part: 第3部 検査
  section: 第3節 生体検査料
raw_text: 'Ｄ２９２体外からの計測によらない諸検査

  - １循環血液量測定、血漿量測定480点

  - ２血球量測定800点

  - ３吸収機能検査、赤血球寿命測定1,550点

  - ４造血機能検査、血小板寿命測定2,600点

  - 注１同一のラジオアイソトープを用いて区分番号Ｄ２９２若しくはＤ２９３に掲げる検査又は区分番号Ｅ１００からＥ１０１－４までに掲げる核医学診断のうちいずれか２以上を行った場合の検査料又は核医学診断料は、主たる検査又は核医学診断に係るいずれかの所定点数のみにより算定する。

  - ２検査に数日を要した場合であっても同一のラジオアイソトープを用いた検査は、一連として１回の算定とする。

  - ３核種が異なる場合であっても同一の検査とみなすものとする。

  '
