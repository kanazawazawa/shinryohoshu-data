chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: 'Ｃ０１１在宅患者緊急時等カンファレンス料200点

  - 注訪問診療を実施している保険医療機関の保険医が、在宅での療養を行っている患者であって通院が困難なものの状態の急変等に伴い、当該保険医の求め又は当該患者の在宅療養を担う保険医療機関の保険医の求めにより、歯科訪問診療を実施している保険医療機関の保険医である歯科医師等、訪問薬剤管理指導を実施している保険薬局の保険薬剤師、訪問看護ステーションの保健師、助産師、看護師、理学療法士、作業療法士若しくは言語聴覚士、介護支援専門員又は相談支援専門員と共同でカンファレンスを行い又はカンファレンスに参加し、それらの者と共同で療養上必要な指導を行った場合に、月２回に限り算定する。

  '
