raw_text: 'Ｈ００８集団コミュニケーション療法料（１単位）50点

  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める患者に対して、集団コミュニケーション療法である言語聴覚療法を行った場合に、患者１人につき１日３単位まで算定する。

  '
