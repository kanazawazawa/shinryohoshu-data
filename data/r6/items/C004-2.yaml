  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: 'Ｃ００４－２救急患者連携搬送料

  - １入院中の患者以外の患者の場合1,800点

  - ２入院初日の患者の場合1,200点

  - ３入院２日目の患者の場合800点

  - ４入院３日目の患者の場合600点

  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、救急外来を受診した患者に対する初期診療を実施し、連携する他の保険医療機関において入院医療を提供することが適当と判断した上で、当該他の保険医療機関において入院医療を提供する目的で医師、看護師又は救急救命士が同乗の上、搬送を行った場合に算定する。

  この場合において、区分番号Ｃ００４に掲げる救急搬送診療料は別に算定できない。

  '
notes:
