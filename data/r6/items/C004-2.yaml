  text: '別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、救急外来を受診した患者に対する初期診療を実施し、連携する他の保険医療機関において入院医療を提供することが適当と判断した上で、当該他の保険医療機関において入院医療を提供する目的で医師、看護師又は救急救命士が同乗の上、搬送を行った場合に算定する。

