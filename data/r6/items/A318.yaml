name: 地域移行機能強化病棟入院料（１日につき）
version: r6
points: 1557
unit: 日
chapter:
  chapter: 第2章 第１部医学管理等の区分番号Ｂ０１５に掲げる精神科退院時共同指導料
raw_text: "Ａ３１８地域移行機能強化病棟入院料（１日につき）1,557点\n- 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た精神病棟を有する保険医療機関において、当該届出に係る精神病棟に入院している患者について算定する。\n\
  ただし、当該病棟に入院した患者が当該入院料に係る算定要件に該当しない場合は、区分番号Ａ１０３に掲げる精神病棟入院基本料の15対１入院基本料の例により算定する。\n- ２当該病棟に入院している統合失調症の患者に対して、計画的な医学管理の下に非定型抗精神病薬による治療を行い、かつ、療養上必要な指導を行った場合には、当該患者が使用した１日当たりの抗精神病薬が２種類以下の場合に限り、非定型抗精神病薬加算として、１日につき15点を所定点数に加算する。\n\
  - ３別に厚生労働大臣が定める状態の患者については、重症者加算として、当該患者に係る区分に従い、次に掲げる点数をそれぞれ１日につき所定点数に加算する。\nただし、重症者加算１については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者についてのみ加算する。\n\
  \    - イ重症者加算１60点\n    - ロ重症者加算２30点\n- ４診療に係る費用（注２及び注３本文に規定する加算、第２節に規定する臨床研修病院入院診療加算、医師事務作業補助体制加算（50対１補助体制加算、75対１補助体制加算又は100対１補助体制加算に限る。）、地域加算、離島加算、特定感染症患者療養環境特別加算、精神科措置入院診療加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、データ提出加算、精神科入退院支援加算、薬剤総合評価調整加算及び排尿自立支援加算、第２章第１部医学管理等の区分番号Ｂ０１５に掲げる精神科退院時共同指導料２、第８部精神科専門療法（区分番号Ｉ０１１に掲げる精神科退院指導料及び区分番号Ｉ０１１－２に掲げる精神科退院前訪問指導料を除く。）、第14部その他並びに除外薬剤・注射薬に係る費用を除く。）は、地域移行機能強化病棟入院料に含まれるものとする。\n"
