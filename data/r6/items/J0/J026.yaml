raw_text: |
  Ｊ０２６間歇
  的陽圧吸入法（１日につき）160点
  - 注１間歇的陽圧吸入法と同時に行う喀痰吸引、酸素吸入又は酸素テントは、所定点数に含まれるものとする。
  - ２区分番号Ｃ１０３に掲げる在宅酸素療法指導管理料、区分番号Ｃ１０７に掲げる在宅人工呼吸指導管理料又は区分番号Ｃ１０７－３に掲げる在宅ハイフローセラピー指導管理料を算定している患者に対して行った間歇的陽圧吸入法の費用は算定しない。
