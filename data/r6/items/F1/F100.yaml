chapter:
  chapter: 第2章 特掲診療料
  part: 第5部 投薬
  section: 第2節 処方料
raw_text: |
  Ｆ１００処方料
  - １３種類以上の抗不安薬、３種類以上の睡眠薬、３種類以上の抗うつ薬、３種類以上の抗精神病薬又は４種類以上の抗不安薬及び睡眠薬の投薬（臨時の投薬等のもの及び３種類の抗うつ薬又は３種類の抗精神病薬を患者の病状等によりやむを得ず投与するものを除く。）を行った場合18点
  - ２１以外の場合であって、７種類以上の内服薬の投薬（臨時の投薬であって、投薬期間が２週間以内のもの及び区分番号Ａ００１に掲げる再診料の注12に掲げる地域包括診療加算を算定するものを除く。）を行った場合又は不安若しくは不眠の症状を有する患者に対して１年以上継続して別に厚生労働大臣が定める薬剤の投薬（当該症状を有する患者に対する診療を行うにつき十分な経験を有する医師が行う場合又は精神科の医師の助言を得ている場合その他これに準ずる場合を除く。）を行った場合29点
  - ３１及び２以外の場合42点
  - 注１入院中の患者以外の患者に対する１回の処方について算定する。
  - ２麻薬、向精神薬、覚醒剤原料又は毒薬を処方した場合は、麻薬等加算として、１処方につき１点を所定点数に加算する。
  - ３入院中の患者に対する処方を行った場合は、当該処方の費用は、第１章第２部第１節に掲げる入院基本料に含まれるものとする。
  - ４３歳未満の乳幼児に対して処方を行った場合は、乳幼児加算として、１処方につき３点を所定点数に加算する。
  - ５診療所又は許可病床数が200床未満の病院である保険医療機関において、入院中の患者以外の患者（別に厚生労働大臣が定める疾患を主病とするものに限る。）に対して薬剤の処方期間が28日以上の処方を行った場合は、特定疾患処方管理加算として、月１回に限り、１処方につき56点を所定点数に加算する。
  - ６別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関（許可病床数が200床以上の病院に限る。）において、治療の開始に当たり投薬の必要性、危険性等について文書により説明を行った上で抗悪性腫瘍剤を処方した場合には、抗悪性腫瘍剤処方管理加算として、月１回に限り、１処方につき70点を所定点数に加算する。
  - ７区分番号Ａ０００に掲げる初診料の注２又は注３、区分番号Ａ００２に掲げる外来診療料の注２又は注３を算定する保険医療機関において、別に厚生労働大臣が定める薬剤を除き、１処方につき投与期間が30日以上の投薬を行った場合には、所定点数の100分の40に相当する点数により算定する。
  - ８別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において投薬を行った場合には、外来後発医薬品使用体制加算として、当該基準に係る区分に従い、１処方につき次に掲げる点数をそれぞれ所定点数に加算する。
      - イ外来後発医薬品使用体制加算１８点
      - ロ外来後発医薬品使用体制加算２７点
      - ハ外来後発医薬品使用体制加算３５点
  - ９抗不安薬、睡眠薬、抗うつ薬又は抗精神病薬（以下この区分番号及び区分番号Ｆ４００において「抗不安薬等」という。）が処方されていた患者であって、当該処方の内容を総合的に評価及び調整し、当該患者に処方する抗不安薬等の種類数又は投薬量が減少したものについて、薬剤師、看護師又は准看護師に対し、薬剤の種類数又は投薬量が減少したことによる症状の変化等の確認を指示した場合に、向精神薬調整連携加算として、月１回に限り、１処方につき12点を所定点数に加算する。
  ただし、同一月において、区分番号Ａ２５０に掲げる薬剤総合評価調整加算及び区分番号Ｂ００８－２に掲げる薬剤総合評価調整管理料は別に算定できない。
