raw_text: 'Ｃ１６２在宅経管栄養法用栄養管セット加算2,000点

  - 注在宅成分栄養経管栄養法、在宅小児経管栄養法又は在宅半固形栄養経管栄養法を行っている入院中の患者以外の患者（在宅半固形栄養経管栄養法を行っている患者については、区分番号Ｃ１０５－３に掲げる在宅半固形栄養経管栄養法指導管理料を算定しているものに限る。）に対して、栄養管セットを使用した場合に、第１款の所定点数に加算する。

  '
