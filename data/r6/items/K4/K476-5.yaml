raw_text: |
  Ｋ４７６－５乳腺悪性腫瘍ラジオ波焼灼
  療法（一連として）15,000点
  - 注１フュージョンイメージングを用いて行った場合は、フュージョンイメージング加算として、200点を所定点数に加算する。
  - ２放射性同位元素及び色素を用いたセンチネルリンパ節生検を行った場合又はインドシアニングリーンを用いたリンパ節生検を行った場合には、乳癌センチネルリンパ節生検加算１として、5,000点を所定点数に加算する。
  ただし、当該検査に用いた色素の費用は、算定しない。
  - ３放射性同位元素又は色素を用いたセンチネルリンパ節生検を行った場合には、乳癌センチネルリンパ節生検加算２として、3,000点を所定点数に加算する。
  ただし、当該検査に用いた色素の費用は、算定しない。
  （胸壁）
