  chapter: 第2章 特掲診療料
  part: 第6部 注射
  section: 第1節 注射料
  subsection: 第1款 注射実施料
raw_text: |
  Ｇ００５中心静脈注射（１日につき）140点
  - 注１血漿成分製剤の注射を行う場合であって、１回目の注射に当たって、患者に対して注射の必要性、危険性等について文書による説明を行ったときは、血漿成分製剤加算として、当該注射を行った日に限り、50点を所定点数に加算する。
  - ２中心静脈注射の費用を算定した患者については、同一日に行われた区分番号Ｇ００４に掲げる点滴注射の費用は算定しない。
  - ３区分番号Ｃ１０４に掲げる在宅中心静脈栄養法指導管理料を算定している患者に対して行った中心静脈注射の費用は算定しない。
  - ４区分番号Ｃ１０８に掲げる在宅麻薬等注射指導管理料、区分番号Ｃ１０８－２に掲げる在宅腫瘍化学療法注射指導管理料、区分番号Ｃ１０８－３に掲げる在宅強心剤持続投与指導管理料又は区分番号Ｃ１０８－４に掲げる在宅悪性腫瘍患者共同指導管理料を算定している患者について、区分番号Ｃ００１に掲げる在宅患者訪問診療料（Ⅰ）又は区分番号Ｃ００１－２に掲げる在宅患者訪問診療料（Ⅱ）を算定する日に併せて行った中心静脈注射の費用は算定しない。
  - ５６歳未満の乳幼児に対して行った場合は、乳幼児加算として、50点を所定点数に加算する。
