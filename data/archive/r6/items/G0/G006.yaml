raw_text: |
  Ｇ００６植込型カテーテルによる中心静脈注射（１日につき）125点
  - 注１区分番号Ｃ１０４に掲げる在宅中心静脈栄養法指導管理料を算定している患者に対して行った植込型カテーテルによる中心静脈注射の費用は算定しない。
  - ２区分番号Ｃ１０８に掲げる在宅麻薬等注射指導管理料、区分番号Ｃ１０８－２に掲げる在宅腫瘍化学療法注射指導管理料、区分番号Ｃ１０８－３に掲げる在宅強心剤持続投与指導管理料又は区分番号Ｃ１０８－４に掲げる在宅悪性腫瘍患者共同指導管理料を算定している患者について、区分番号Ｃ００１に掲げる在宅患者訪問診療料（Ⅰ）又は区分番号Ｃ００１－２に掲げる在宅患者訪問診療料（Ⅱ）を算定する日に併せて行った植込型カテーテルによる中心静脈注射の費用は算定しない。
  - ３６歳未満の乳幼児に対して行った場合には、乳幼児加算として、50点を所定点数に加算する。
