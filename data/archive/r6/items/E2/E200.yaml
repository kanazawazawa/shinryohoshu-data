name: コンピューター断層撮影（ＣＴ撮影）（一連につき）
version: r6
points: null
unit: 一連
chapter:
  chapter: 第2章 特掲診療料
  part: 第4部 画像診断
  section: 第3節 コンピューター断層撮影診断料
raw_text: |
  Ｅ２００コンピューター断層撮影（ＣＴ撮影）（一連につき）１ＣＴ撮影
      - イ64列以上のマルチスライス型の機器による場合
    - （１）共同利用施設において行われる場合1,020点
    - （２）その他の場合1,000点
      - ロ16列以上64列未満のマルチスライス型の機器による場合900点
      - ハ４列以上16列未満のマルチスライス型の機器による場合750点
      - ニイ、ロ又はハ以外の場合560点
  - ２脳槽ＣＴ撮影（造影を含む。）2,300点
  - 注１ＣＴ撮影のイ、ロ及びハについては、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。
  - ２ＣＴ撮影及び脳槽ＣＴ撮影（造影を含む。）に掲げる撮影のうち２以上のものを同時に行った場合にあっては、主たる撮影の所定点数のみにより算定する。
  - ３ＣＴ撮影について造影剤を使用した場合は、造影剤使用加算として、500点を所定点数に加算する。
  この場合において、造影剤注入手技料及び麻酔料（区分番号Ｌ００８に掲げるマスク又は気管内挿管による閉鎖循環式全身麻酔を除く。）は、加算点数に含まれるものとする。
  - ４ＣＴ撮影について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、冠動脈のＣＴ撮影を行った場合は、冠動脈ＣＴ撮影加算として、600点を所定点数に加算する。
  - ５脳槽ＣＴ撮影（造影を含む。）に係る造影剤注入手技料及び麻酔料（区分番号Ｌ００８に掲げるマスク又は気管内挿管による閉鎖循環式全身麻酔を除く。）は、所定点数に含まれるものとする。
  - ６ＣＴ撮影について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、全身外傷に対して行った場合には、外傷全身ＣＴ加算として、800点を所定点数に加算する。
  - ７ＣＴ撮影のイ又はロについて、別に厚生労働大臣が定める施設基準を満たす保険医療機関において、大腸のＣＴ撮影（炭酸ガス等の注入を含む。）を行った場合は、大腸ＣＴ撮影加算として、それぞれ620点又は500点を所定点数に加算する。
  この場合において、造影剤注入手技料及び麻酔料（区分番号Ｌ００８に掲げるマスク又は気管内挿管による閉鎖循環式全身麻酔を除く。）は、所定点数に含まれるものとする。
  - ８ＣＴ撮影のイの（１）については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合又は診断撮影機器での撮影を目的として別の保険医療機関に依頼し行われる場合に限り算定する。
