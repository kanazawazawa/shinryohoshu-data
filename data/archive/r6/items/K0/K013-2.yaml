  Ｋ０１３－２全層植皮術
  - １25平方センチメートル未満10,000点
  - ２25平方センチメートル以上100平方センチメートル未満12,500点
  - ３100平方センチメートル以上200平方センチメートル未満28,210点
  - ４200平方センチメートル以上40,290点
  - 注広範囲皮膚欠損の患者に対して行う場合は、頭頸部、左上肢、左下肢、右上肢、右下肢、腹部（胸部を含む。）又は背部のそれぞれの部位ごとに所定点数を算定する。
