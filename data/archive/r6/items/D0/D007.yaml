code: D007
name: 血液化学検査
version: r6
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第3部 検査
  section: 第1節 検体検査料
  subsection: 第1款 検体検査実施料
raw_text: |
  Ｄ００７血液化学検査
  - １総ビリルビン、直接ビリルビン又は抱合型ビリルビン、総蛋白、アルブミン（ＢＣＰ改良法・ＢＣＧ法）、尿素窒素、クレアチニン、尿酸、アルカリホスファターゼ（ＡＬＰ）、コリンエステラーゼ（ＣｈＥ）、γ－グルタミルトランスフェラーゼ（γ－ＧＴ）、中性脂肪、ナトリウム及びクロール、カリウム、カルシウム、マグネシウム、クレアチン、グルコース、乳酸デヒドロゲナーゼ（ＬＤ）、アミラーゼ、ロイシンアミノペプチダーゼ（ＬＡＰ）、クレアチンキナーゼ（ＣＫ）、アルドラーゼ、遊離コレステロール、鉄（Ｆｅ）、血中ケトン体・糖・クロール検査（試験紙法・アンプル法・固定化酵素電極によるもの）、不飽和鉄結合能（ＵＩＢＣ）（比色法）、総鉄結合能（ＴＩＢＣ）（比色法）11点
  - ２リン脂質15点
  - ３ＨＤＬ－コレステロール、無機リン及びリン酸、総コレステロール、アスパラギン酸アミノトランスフェラーゼ（ＡＳＴ）、アラニンアミノトランスフェラーゼ（ＡＬＴ）17点
  - ４ＬＤＬ－コレステロール、蛋白分画18点
  - ５銅（Ｃｕ）23点
  - ６リパーゼ24点
  - ７イオン化カルシウム26点
  - ８マンガン（Ｍｎ）27点
  - ９ケトン体30点
  - 10アポリポ蛋白
      - イ１項目の場合31点
      - ロ２項目の場合62点
      - ハ３項目以上の場合94点
  - 11アデノシンデアミナーゼ（ＡＤＡ）32点
  - 12グアナーゼ35点
  - 13有機モノカルボン酸、胆汁酸47点
  - 14ＡＬＰアイソザイム、アミラーゼアイソザイム、γ－ＧＴアイソザイム、ＬＤアイソザイム、重炭酸塩48点
  - 15ＡＳＴアイソザイム、リポ蛋白分画49点
  - 16アンモニア50点
  - 17ＣＫアイソザイム、グリコアルブミン55点
  - 18コレステロール分画57点
  - 19ケトン体分画、遊離脂肪酸59点
  - 20レシチン・コレステロール・アシルトランスフェラーゼ（Ｌ－ＣＡＴ）70点
  - 21グルコース－６－リン酸デヒドロゲナーゼ（Ｇ－６－ＰＤ）、リポ蛋白分画（ＰＡＧディスク電気泳動法）、１，５－アンヒドロ－Ｄ－グルシトール（１，５ＡＧ）、グリココール酸80点
  - 22ＣＫ－ＭＢ（蛋白量測定）90点
  - 23ＬＤアイソザイム１型、総カルニチン、遊離カルニチン95点
  - 24ＡＬＰアイソザイム及び骨型アルカリホスファターゼ（ＢＡＰ）96点
  - 25フェリチン半定量、フェリチン定量102点
  - 26エタノール105点
  - 27リポ蛋白（ａ）107点
  - 28ヘパリン、ＫＬ－６108点
  - 29心筋トロポニンＩ、心筋トロポニンＴ（ＴｎＴ）定性・定量、アルミニウム（Ａｌ）109点
  - 30シスタチンＣ112点
  - 3125－ヒドロキシビタミン117点
  - 32ペントシジン118点
  - 33イヌリン120点
  - 34リポ蛋白分画（ＨＰＬＣ法）129点
  - 35肺サーファクタント蛋白－Ａ（ＳＰ－Ａ）、ガラクトース130点
  - 36血液ガス分析、Ⅳ型コラーゲン、ミオグロビン定性、ミオグロビン定量、心臓由来脂肪酸結合蛋白（Ｈ－ＦＡＢＰ）定性、心臓由来脂肪酸結合蛋白（Ｈ－ＦＡＢＰ）定量131点
  - 注血液ガス分析については、当該保険医療機関内で行った場合に算定する。
  - 37亜鉛（Ｚｎ）132点
  - 38アルブミン非結合型ビリルビン135点
  - 39肺サーファクタント蛋白－Ｄ（ＳＰ－Ｄ）、プロコラーゲン－Ⅲ－ペプチド（Ｐ－Ⅲ－Ｐ）、アンギオテンシンⅠ転換酵素（ＡＣＥ）、ビタミンＢ12136点
  - 40セレン144点
  - 41葉酸146点
  - 42Ⅳ型コラーゲン・７Ｓ148点
  - 43ピルビン酸キナーゼ（ＰＫ）150点
  - 44レムナント様リポ蛋白コレステロール（ＲＬＰ－Ｃ）174点
  - 45腟分泌液中インスリン様成長因子結合蛋白１型（ＩＧＦＢＰ－１）定性175点
  - 46ヒアルロン酸179点
  - 47ＡＬＰアイソザイム（ＰＡＧ電気泳動法）、アセトアミノフェン180点
  - 48心室筋ミオシン軽鎖Ⅰ184点
  - 49トリプシン189点
  - 50Ｍａｃ－２結合蛋白糖鎖修飾異性体、マロンジアルデヒド修飾ＬＤＬ（ＭＤＡ－ＬＤＬ）、オートタキシン、サイトケラチン１８フラグメント（ＣＫ－１８Ｆ）、ＥＬＦスコア194点
  - 51ホスフォリパーゼＡ２（ＰＬＡ２）204点
  - 52赤血球コプロポルフィリン210点
  - 53リポ蛋白リパーゼ（ＬＰＬ）219点
  - 54肝細胞増殖因子（ＨＧＦ）227点
  - 55ビタミンＢ２235点
  - 56ビタミンＢ１239点
  - 57ロイシンリッチα２グリコプロテイン268点
  - 58赤血球プロトポルフィリン272点
  - 59プロカルシトニン（ＰＣＴ）定量、プロカルシトニン（ＰＣＴ）半定量276点
  - 60ビタミンＣ296点
  - 61プレセプシン定量301点
  - 62インフリキシマブ定性310点
  - 63１，25－ジヒドロキシビタミンＤ３388点
  - 64血管内皮増殖因子（ＶＥＧＦ）、コクリントモプロテイン（ＣＴＰ）460点
  - 65ＦＧＦ23788点
  - 注患者から１回に採取した血液を用いて本区分の１から８までに掲げる検査を５項目以上行った場合は、所定点数にかかわらず、検査の項目数に応じて次に掲げる点数により算定する。
      - イ５項目以上７項目以下93点
      - ロ８項目又は９項目99点
      - ハ10項目以上103点
  - 注入院中の患者について算定した場合は、入院時初回加算として、初回に限り20点を所定点数に加算する。
  （生化学的検査（Ⅱ））
