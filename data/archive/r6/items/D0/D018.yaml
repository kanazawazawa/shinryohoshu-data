raw_text: |
  Ｄ０１８細菌培養同定検査
  - １口腔、気道又は呼吸器からの検体180点
  - ２消化管からの検体200点
  - ３血液又は穿刺液225点
  - ４泌尿器又は生殖器からの検体190点
  - ５その他の部位からの検体180点
  - ６簡易培養60点
  - 注１１から６までについては、同一検体について一般培養と併せて嫌気性培養を行った場合は、嫌気性培養加算として、122点を所定点数に加算する。
  - ２入院中の患者に対して、質量分析装置を用いて細菌の同定を行った場合は、質量分析装置加算として、40点を所定点数に加算する。
