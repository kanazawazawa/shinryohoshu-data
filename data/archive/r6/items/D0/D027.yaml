raw_text: |
  Ｄ０２７基本的検体検査判断料604点
  - 注１特定機能病院である保険医療機関において、尿・糞便等検査、血液学的検査、生化学的検査（Ⅰ）、免疫学的検査又は微生物学的検査の各項に掲げる検体検査を入院中の患者に対して行った場合に、当該検体検査の種類又は回数にかかわらず月１回に限り算定できるものとする。
  - ２区分番号Ｄ０２６に掲げる検体検査判断料の注４本文及び注５に規定する施設基準に適合しているものとして届出を行った保険医療機関（特定機能病院に限る。）において、検体検査を行った場合には、当該基準に係る区分に従い、患者１人につき月１回に限り、同注に掲げる点数を所定点数に加算する。
  ただし、同注に掲げる点数のうちいずれかの点数を算定した場合には、同一月において同注に掲げる他の点数は、算定しない。
