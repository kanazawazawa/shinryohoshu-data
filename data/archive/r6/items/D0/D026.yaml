code: D026
name: 検体検査判断料
version: r6
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第3部 検査
  section: 第1節 検体検査料
  subsection: 第2款 検体検査判断料
raw_text: |
  Ｄ０２６検体検査判断料
  - １尿・糞便等検査判断料34点
  - ２遺伝子関連・染色体検査判断料100点
  - ３血液学的検査判断料125点
  - ４生化学的検査（Ⅰ）判断料144点
  - ５生化学的検査（Ⅱ）判断料144点
  - ６免疫学的検査判断料144点
  - ７微生物学的検査判断料150点
  - 注１検体検査判断料は該当する検体検査の種類又は回数にかかわらずそれぞれ月１回に限り算定できるものとする。
  ただし、区分番号Ｄ０２７に掲げる基本的検体検査判断料を算定する患者については、尿・糞便等検査判断料、遺伝子関連・染色体検査判断料、血液学的検査判断料、生化学的検査（Ⅰ）判断料、免疫学的検査判断料及び微生物学的検査判断料は別に算定しない。
  - ２注１の規定にかかわらず、区分番号Ｄ０００に掲げる尿中一般物質定性半定量検査の所定点数を算定した場合にあっては、当該検査については尿・糞便等検査判断料は算定しない。
  - ３区分番号Ｄ００４－２の１、区分番号Ｄ００６－２からＤ００６－９まで、区分番号Ｄ００６－11からＤ００６－20まで及び区分番号Ｄ００６－22からＤ００６－30までに掲げる検査は、遺伝子関連・染色体検査判断料により算定するものとし、尿・糞便等検査判断料又は血液学的検査判断料は算定しない。
  - ４検体検査管理に関する別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において検体検査を行った場合には、当該基準に係る区分に従い、患者（検体検査管理加算（Ⅱ）、検体検査管理加算（Ⅲ）及び検体検査管理加算（Ⅳ）については入院中の患者に限る。）１人につき月１回に限り、次に掲げる点数を所定点数に加算する。
  ただし、いずれかの検体検査管理加算を算定した場合には、同一月において他の検体検査管理加算は、算定しない。
      - イ検体検査管理加算（Ⅰ）40点
      - ロ検体検査管理加算（Ⅱ）100点
      - ハ検体検査管理加算（Ⅲ）300点
      - ニ検体検査管理加算（Ⅳ）500点
  - ５別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、検体検査管理加算（Ⅱ）、検体検査管理加算（Ⅲ）又は検体検査管理加算（Ⅳ）を算定した場合は、国際標準検査管理加算として、40点を所定点数に加算する。
  - ６別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、難病に関する検査（区分番号Ｄ００６－４に掲げる遺伝学的検査、区分番号Ｄ００６－20に掲げる角膜ジストロフィー遺伝子検査、区分番号Ｄ００６－26に掲げる染色体構造変異解析及び区分番号Ｄ００６－30に掲げる遺伝性網膜ジストロフィ遺伝子検査をいう。
  以下同じ。）又は遺伝性腫瘍に関する検査（区分番号Ｄ００６－19に掲げるがんゲノムプロファイリング検査を除く。）を実施し、その結果について患者又はその家族等に対し遺伝カウンセリングを行った場合には、遺伝カウンセリング加算として、患者１人につき月１回に限り、1,000点を所定点数に加算する。
  ただし、遠隔連携遺伝カウンセリング（情報通信機器を用いて、他の保険医療機関と連携して行う遺伝カウンセリング（難病に関する検査に係るものに限る。）をいう。）を行う場合は、別に厚生労働大臣が定める施設基準を満たす保険医療機関において行う場合に限り算定する。
  - ７別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、区分番号Ｄ００６－19に掲げるがんゲノムプロファイリング検査を実施し、その結果について患者又はその家族等に対し遺伝カウンセリングを行った場合には、遺伝性腫瘍カウンセリング加算として、患者１人につき月１回に限り、1,000点を所定点数に加算する。
  - ８区分番号Ｄ００５の14に掲げる骨髄像を行った場合に、血液疾患に関する専門の知識を有する医師が、その結果を文書により報告した場合は、骨髄像診断加算として、240点を所定点数に加算する。
  - ９区分番号Ｄ０１５の17に掲げる免疫電気泳動法（抗ヒト全血清）又は24に掲げる免疫電気泳動法（特異抗血清）を行った場合に、当該検査に関する専門の知識を有する医師が、その結果を文書により報告した場合は、免疫電気泳動法診断加算として、50点を所定点数に加算する。
