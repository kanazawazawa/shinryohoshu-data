code: B005
name: 退院時共同指導料
version: r6
points: 2400
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第1部 医学管理等
  section: 第1節 医学管理料等
raw_text: |
  Ｂ００５退院時共同指導料２400点
  - 注１保険医療機関に入院中の患者について、当該保険医療機関の保険医又は看護師等、薬剤師、管理栄養士、理学療法士、作業療法士、言語聴覚士若しくは社会福祉士が、入院中の患者に対して、当該患者の同意を得て、退院後の在宅での療養上必要な説明及び指導を、在宅療養担当医療機関の保険医若しくは当該保険医の指示を受けた看護師等、薬剤師、管理栄養士、理学療法士、作業療法士、言語聴覚士若しくは社会福祉士又は在宅療養担当医療機関の保険医の指示を受けた訪問看護ステーションの看護師等（准看護師を除く。）、理学療法士、作業療法士若しくは言語聴覚士と共同して行った上で、文書により情報提供した場合に、当該患者が入院している保険医療機関において、当該入院中１回に限り算定する。
  ただし、別に厚生労働大臣が定める疾病等の患者については、当該患者が入院している保険医療機関の保険医又は看護師等が、在宅療養担当医療機関の保険医若しくは当該保険医の指示を受けた看護師等又は在宅療養担当医療機関の保険医の指示を受けた訪問看護ステーションの看護師等（准看護師を除く。）と１回以上、共同して行う場合は、当該入院中２回に限り算定できる。
  - ２注１の場合において、入院中の保険医療機関の保険医及び在宅療養担当医療機関の保険医が共同して指導を行った場合に、300点を所定点数に加算する。
  ただし、注３に規定する加算を算定する場合は、算定できない。
  - ３注１の場合において、入院中の保険医療機関の保険医又は看護師等が、在宅療養担当医療機関の保険医若しくは看護師等、保険医である歯科医師若しくはその指示を受けた歯科衛生士、保険薬局の保険薬剤師、訪問看護ステーションの看護師等（准看護師を除く。）、理学療法士、作業療法士若しくは言語聴覚士、介護支援専門員（介護保険法第７条第５項に規定する介護支援専門員をいう。
  以下同じ。）又は相談支援専門員（障害者の日常生活及び社会生活を総合的に支援するための法律に基づく指定計画相談支援の事業の人員及び運営に関する基準（平成24年厚生労働省令第28号）第３条第１項又は児童福祉法に基づく指定障害児相談支援の事業の人員及び運営に関する基準（平成24年厚生労働省令第29号）第３条第１項に規定する相談支援専門員をいう。
  以下同じ。）のうちいずれか３者以上と共同して指導を行った場合に、多機関共同指導加算として、2,000点を所定点数に加算する。
  - ４注１の規定にかかわらず、区分番号Ａ２４６に掲げる入退院支援加算を算定する患者にあっては、当該保険医療機関において、疾患名、当該保険医療機関の退院基準、退院後に必要とされる診療等の療養に必要な事項を記載した退院支援計画を策定し、当該患者に説明し、文書により提供するとともに、これを在宅療養担当医療機関と共有した場合に限り算定する。
  - ５区分番号Ｂ００３に掲げる開放型病院共同指導料（Ⅱ）は別に算定できない。
