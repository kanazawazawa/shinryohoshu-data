raw_text: |
  Ｂ００５－４ハイリスク妊産婦共同管理料（Ⅰ）800点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、診療に基づき紹介した患者（別に厚生労働大臣が定める状態等であるものに限る。）が病院である別の保険医療機関（区分番号Ａ２３６－２に掲げるハイリスク妊娠管理加算の注又は区分番号Ａ２３７に掲げるハイリスク分娩管理加算の注１に規定する施設基準に適合しているものとして届け出た保険医療機関に限る。）に入院中である場合において、当該病院に赴いて、当該病院の保険医と共同してハイリスク妊娠又はハイリスク分娩に関する医学管理を共同して行った場合に、当該患者を紹介した保険医療機関において患者１人につき１回算定する。
