raw_text: |
  Ｂ００１の10に掲げる入院栄養食事指導料及び区分番号Ｂ０１１－６に掲げる
  栄養情報連携料、第２部在宅医療、第７部リハビリテーションの費用（別に厚生労働大臣が定める費用を除く。）、第２節に規定する臨床研修病院入院診療加算、医師事務作業補助体制加算、地域加算、離島加算、特定感染症患者療養環境特別加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、データ提出加算、入退院支援加算（１のイに限る。）、認知症ケア加算、薬剤総合評価調整加算及び排尿自立支援加算、区分番号Ｊ０３８に掲げる人工腎臓、区分番号Ｊ０４２に掲げる腹膜灌流及び区分番号Ｊ４００に掲げる特定保険医療材料（区分番号Ｊ０３８に掲げる人工腎臓又は区分番号Ｊ０４２に掲げる腹膜灌流に係るものに限る。）、第14部その他並びに除外薬剤・注射薬の費用を除く。）は、特定機能病院リハビリテーション病棟入院料に含まれるものとする。
