raw_text: |
  Ｌ１０１神経ブロック（神経破壊剤、高周波凝固法又はパルス高周波法使用）１下垂体ブロック、三叉神経半月神経節ブロック、腹腔神経叢ブロック、くも膜下脊髄神経ブロック、神経根ブロック、下腸間膜動脈神経叢ブロック、上下腹神経叢ブロック、腰神経叢ブロック3,000点
  - ２胸・腰交感神経節ブロック、頸・胸・腰傍脊椎神経ブロック、眼神経ブロック、上顎神経ブロック、下顎神経ブロック、舌咽神経ブロック、蝶形口蓋神経節ブロック、顔面神経ブロック1,800点
  - ３眼窩上神経ブロック、眼窩下神経ブロック、おとがい神経ブロック、舌神経ブロック、副神経ブロック、滑車神経ブロック、耳介側頭神経ブロック、閉鎖神経ブロック、不対神経節ブロック、前頭神経ブロック800点
  - ４迷走神経ブロック、横隔神経ブロック、上喉頭神経ブロック、浅頸神経叢ブロック、肋間神経ブロック、腸骨下腹神経ブロック、腸骨鼠径神経ブロック、外側大腿皮神経ブロック、大腿神経ブロック、坐骨神経ブロック、陰部神経ブロック、経仙骨孔神経ブロック、後頭神経ブロック、仙腸関節枝神経ブロック、頸・胸・腰椎後枝内側枝神経ブロック、脊髄神経前枝神経ブロック340点
  - 注上記以外の神経ブロック（神経破壊剤、高周波凝固法又はパルス高周波法使用）は、区分番号Ｌ１０２に掲げる神経幹内注射で算定する。
