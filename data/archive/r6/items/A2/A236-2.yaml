raw_text: |
  Ａ２３６－２ハイリスク妊娠管理加算（１日につき）1,200点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、別に厚生労働大臣が定める患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、ハイリスク妊娠管理加算を算定できるものを現に算定している患者に限る。）について、入院中にハイリスク妊娠管理を行った場合に、１入院に限り20日を限度として所定点数に加算する。
