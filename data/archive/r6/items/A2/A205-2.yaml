raw_text: |
  Ａ２０５－２超急性期脳卒中加算（入院初日）10,800点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、超急性期脳卒中加算を算定できるものを現に算定している患者に限る。）であって別に厚生労働大臣が定めるものに対して、組織プラスミノーゲン活性化因子を投与した場合又は当該施設基準に適合しているものとして地方厚生局長等に届け出た他の保険医療機関の外来において、組織プラスミノーゲン活性化因子の投与後に搬送され、入院治療を行った場合に、入院初日に限り所定点数に加算する。
