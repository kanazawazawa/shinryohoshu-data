  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: |
  Ａ２４６－２精神科入退院支援加算（退院時１回）1,000点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、次に掲げる入退院支援のいずれかを行った場合に、退院時１回に限り、所定点数に加算する。
  ただし、区分番号Ａ１０３に掲げる精神病棟入院基本料の注７若しくは区分番号Ａ３１２に掲げる精神療養病棟入院料の注５に規定する精神保健福祉士配置加算、区分番号Ａ２３０－２に掲げる精神科地域移行実施加算又は区分番号Ｉ０１１に掲げる精神科退院指導料を算定する場合は、算定できない。
      - イ退院困難な要因を有する入院中の患者であって、在宅での療養を希望するもの（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、精神科入退院支援加算を算定できるものを現に算定している患者に限る。）に対して入退院支援を行った場合
      - ロ連携する他の保険医療機関において当該加算を算定した患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、精神科入退院支援加算を算定できるものを現に算定している患者に限る。）の転院（１回の転院に限る。）を受け入れ、当該患者に対して入退院支援を行った場合２精神保健福祉法第29条又は第29条の２に規定する入院措置に係る患者について、都道府県、保健所を設置する市又は特別区と連携して退院に向けた支援を行った場合に、精神科措置入院退院支援加算として、退院時１回に限り、300点を更に所定点数に加算する。
