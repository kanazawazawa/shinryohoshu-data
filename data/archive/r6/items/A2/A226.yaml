raw_text: |
  Ａ２２６重症皮膚潰瘍管理加算（１日につき）18点
  - 注別に厚生労働大臣が定める施設基準を満たす保険医療機関において、重症皮膚潰瘍を有している患者に対して、当該保険医療機関が計画的な医学管理を継続して行い、かつ、療養上必要な指導を行った場合に、当該患者（第１節の入院基本料（特別入院基本料等を含む。）のうち、重症皮膚潰瘍管理加算を算定できるものを現に算定している患者に限る。）について、所定点数に加算する。
