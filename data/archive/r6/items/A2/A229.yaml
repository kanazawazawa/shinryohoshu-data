raw_text: |
  Ａ２２９精神科隔離室管理加算（１日につき）220点
  - 注精神科を標榜する病院である保険医療機関において、入院中の精神障害者である患者に対して、精神保健福祉法第36条第３項の規定に基づいて隔離を行った場合に、当該患者（第１節の入院基本料（特別入院基本料等を含む。）のうち、精神科隔離室管理加算を算定できるものを現に算定している患者に限る。）について、月７日に限り、所定点数に加算する。
  ただし、同法第33条の６第１項に規定する入院に係る患者について、精神科応急入院施設管理加算を算定した場合には、当該入院中は精神科隔離室管理加算を算定しない。
notes:
