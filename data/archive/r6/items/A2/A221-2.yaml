  Ａ２２１－２小児療養環境特別加算（１日につき）300点
  - 注治療上の必要があって、保険医療機関において、個室に入院した15歳未満の小児（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、小児療養環境特別加算を算定できるものを現に算定している患者に限り、ＨＩＶ感染者療養環境特別加算、重症者等療養環境特別加算又は無菌治療室管理加算を算定するものを除く。）について、所定点数に加算する。
