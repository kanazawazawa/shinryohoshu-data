raw_text: |
  Ａ２３１－４摂食障害入院医療管理加算（１日につき）１30日以内200点
  - ２31日以上60日以内100点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、摂食障害入院医療管理加算を算定できるものを現に算定している患者に限る。）であって別に厚生労働大臣が定めるものに対して必要な治療を行った場合に、入院した日から起算して60日を限度として、当該患者の入院期間に応じ、それぞれ所定点数に加算する。
