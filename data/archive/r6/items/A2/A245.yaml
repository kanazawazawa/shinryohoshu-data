chapter:
  chapter: 第1章 基本診療料
  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: |
  Ａ２４５データ提出加算
  - １データ提出加算１（入院初日）
      - イ許可病床数が200床以上の病院の場合145点
      - ロ許可病床数が200床未満の病院の場合215点
  - ２データ提出加算２（入院初日）
      - イ許可病床数が200床以上の病院の場合155点
      - ロ許可病床数が200床未満の病院の場合225点
  - ３データ提出加算３（入院期間が90日を超えるごとに１回）
      - イ許可病床数が200床以上の病院の場合145点
      - ロ許可病床数が200床未満の病院の場合215点
  - ４データ提出加算４（入院期間が90日を超えるごとに１回）
      - イ許可病床数が200床以上の病院の場合155点
      - ロ許可病床数が200床未満の病院の場合225点
  - 注１１及び２については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、当該保険医療機関における診療報酬の請求状況、手術の実施状況等の診療の内容に関するデータを継続して厚生労働省に提出している場合に、当該保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、データ提出加算を算定できるものを現に算定している患者に限る。）について、当該基準に係る区分に従い、入院初日に限り所定点数に加算する。
  - ２３及び４については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、当該保険医療機関における診療報酬の請求状況、手術の実施状況等の診療の内容に関するデータを継続して厚生労働省に提出している場合に、当該保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、データ提出加算を算定できるものを現に算定している患者に限る。）であって、療養病棟入院基本料、結核病棟入院基本料、精神病棟入院基本料、障害者施設等入院基本料、特殊疾患入院医療管理料、回復期リハビリテーション病棟入院料、特殊疾患病棟入院料、緩和ケア病棟入院料、児童・思春期精神科入院医療管理料、精神療養病棟入院料、認知症治療病棟入院料、精神科地域包括ケア病棟入院料又は地域移行機能強化病棟入院料を届け出た病棟又は病室に入院しているものについて、当該基準に係る区分に従い、入院期間が90日を超えるごとに１回、所定点数に加算する。
