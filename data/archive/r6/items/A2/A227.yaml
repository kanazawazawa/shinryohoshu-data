raw_text: |
  Ａ２２７精神科措置入院診療加算（入院初日）2,500点
  - 注精神保健及び精神障害者福祉に関する法律（昭和25年法律第123号。
  以下「精神保健福祉法」という。）第29条又は第29条の２に規定する入院措置に係る患者（第１節の入院基本料（特別入院基本料等を含む。）又は第３節の特定入院料のうち、精神科措置入院診療加算を算定できるものを現に算定している患者に限る。）について、当該措置に係る入院初日に限り所定点数に加算する。
