  part: 第2部 入院料等
  section: 第2節 入院基本料等加算
raw_text: |
  Ａ２３７ハイリスク分娩
  等管理加算（１日につき）１ハイリスク分娩管理加算3,200点
  - ２地域連携分娩管理加算3,200点
  - 注１１については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、別に厚生労働大臣が定める患者（第１節の入院基本料（特別入院基本料等を除く。）又は第３節の特定入院料のうち、ハイリスク分娩管理加算を算定できるものを現に算定している患者に限る。）について、分娩を伴う入院中にハイリスク分娩管理を行った場合に、１入院に限り８日を限度として所定点数に加算する。
  - ２２については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、別に厚生労働大臣が定める患者（第１節の入院基本料（特別入院基本料等を除く。）のうち、地域連携分娩管理加算を算定できるものを現に算定している患者に限る。）について、分娩を伴う入院中に地域連携分娩管理を行った場合に、１入院に限り８日を限度として所定点数に加算する。
  - ３ハイリスク分娩管理又は地域連携分娩管理と同一日に行うハイリスク妊娠管理に係る費用は、１又は２に含まれるものとする。
