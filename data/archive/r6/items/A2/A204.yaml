raw_text: |
  Ａ２０４地域医療支援病院入院診療加算（入院初日）1,000点
  - 注地域医療支援病院である保険医療機関に入院している患者（第１節の入院基本料（特別入院基本料等を除く。）のうち、地域医療支援病院入院診療加算を算定できるものを現に算定している患者に限る。）について、入院初日に限り所定点数に加算する。
  この場合において、区分番号Ａ２０４－３に掲げる紹介受診重点医療機関入院診療加算は別に算定できない。
