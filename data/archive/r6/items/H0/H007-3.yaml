raw_text: |
  Ｈ００７－３認知症患者リハビリテーション料（１日につき）240点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、重度認知症の状態にある患者（区分番号Ａ３１４に掲げる認知症治療病棟入院料を算定するもの又は認知症に関する専門の保険医療機関に入院しているものに限る。）に対して、個別療法であるリハビリテーションを20分以上行った場合に、入院した日から起算して１年を限度として、週３回に限り算定する。
notes:
- id: 注1
  text: |
    別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、重度認知症の状態にある患者（区分番号Ａ３１４に掲げる認知症治療病棟入院料を算定するもの又は認知症に関する専門の保険医療機関に入院しているものに限る。）に対して、個別療法であるリハビリテーションを20分以上行った場合に、入院した日から起算して１年を限度として、週３回に限り算定する。
