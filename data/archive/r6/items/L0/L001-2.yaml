  Ｌ００１－２静脈麻酔
  - １短時間のもの120点
  - ２十分な体制で行われる長時間のもの（単純な場合）600点
  - ３十分な体制で行われる長時間のもの（複雑な場合）1,100点
  - 注１３歳以上６歳未満の幼児に対して静脈麻酔を行った場合は、幼児加算として、所定点数にそれぞれ所定点数の100分の10に相当する点数を加算する。
  - ２３については、静脈麻酔の実施時間が２時間を超えた場合は、麻酔管理時間加算として、100点を所定点数に加算する。
