  part: 第11部 麻酔
  section: 第1節 麻酔料
raw_text: |
  Ｌ０１０麻酔管理料（Ⅱ）１硬膜外麻酔又は脊椎麻酔を行った場合150点
  - ２マスク又は気管内挿管による閉鎖循環式全身麻酔を行った場合450点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行った場合に算定する。
  - ２２について、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関に入院している患者に対して、当該保険医療機関の薬剤師が、病棟等において薬剤関連業務を実施している薬剤師等と連携して、周術期に必要な薬学的管理を行った場合は、周術期薬剤管理加算として、75点を所定点数に加算する。
