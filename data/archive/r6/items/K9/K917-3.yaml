raw_text: |
  Ｋ９１７－３胚凍結保存管理料
  - １胚凍結保存管理料（導入時）
      - イ１個の場合5,000点
      - ロ２個から５個までの場合7,000点
      - ハ６個から９個までの場合10,200点
      - ニ10個以上の場合13,000点
  - ２胚凍結保存維持管理料3,500点
  - 注１については、初期胚又は胚盤胞の凍結保存を開始した場合に、凍結する初期胚又は胚盤胞の数に応じて算定し、２については、初期胚又は胚盤胞の凍結保存の開始から１年を経過している場合であって、凍結胚の保存に係る維持管理を行った場合に、１年に１回に限り算定する。
