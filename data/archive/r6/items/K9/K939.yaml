raw_text: |
  Ｋ９３９画像等手術支援加算
  - １ナビゲーションによるもの2,000点
  - 注区分番号Ｋ０５５－２、Ｋ０５５－３、Ｋ０８０の１、Ｋ０８１の１、Ｋ０８２の１、Ｋ０８２－３の１、Ｋ１３１－２、Ｋ１３４－２、Ｋ１３６、Ｋ１４０からＫ１４１－２まで、Ｋ１４２（６を除く。）、Ｋ１４２－２の１及び２のイ、Ｋ１４２－３、Ｋ１５１－２、Ｋ１５４－２、Ｋ１５８、Ｋ１６１、Ｋ１６７、Ｋ１６９からＫ１７２まで、Ｋ１７４の１、Ｋ１９１からＫ１９３まで、Ｋ２３５、Ｋ２３６、Ｋ３１３、Ｋ３１４、Ｋ３４０－３からＫ３４０－７まで、Ｋ３４２、Ｋ３４３、Ｋ３４３－２の２、Ｋ３５０からＫ３６５まで、Ｋ５１１の２、Ｋ５１３の２からＫ５１３の４まで、Ｋ５１４の２、Ｋ５１４－２の２、Ｋ６９５、Ｋ６９５－２並びにＫ６９７－４に掲げる手術に当たって、ナビゲーションによる支援を行った場合に算定する。
  - ２実物大臓器立体モデルによるもの2,000点
  - 注区分番号Ｋ０５５－２、Ｋ０５５－３、Ｋ１３６、Ｋ１４２の６、Ｋ１４２－２、Ｋ１５１－２、Ｋ１６２、Ｋ１８０、Ｋ２２７、Ｋ２２８、Ｋ２３６、Ｋ２３７、Ｋ３１３、Ｋ３１４の２、Ｋ４０６の２、Ｋ４２７、Ｋ４２７－２、Ｋ４２９、Ｋ４３３、Ｋ４３４及びＫ４３６からＫ４４４－２までに掲げる手術に当たって、実物大臓器立体モデルによる支援を行った場合に算定する。
  - ３患者適合型手術支援ガイドによるもの2,000点
  - 注区分番号Ｋ０８２、Ｋ０８２－３、Ｋ４３７からＫ４３９まで及びＫ４４４に掲げる手術に当たって、患者適合型手術支援ガイドによる支援を行った場合に算定する。
