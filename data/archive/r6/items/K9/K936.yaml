raw_text: |
  Ｋ９３６自動縫合器加算2,500点
  - 注１区分番号Ｋ４８８－４、Ｋ５１１、Ｋ５１３、Ｋ５１４からＫ５１４－６まで、Ｋ５１７、Ｋ５２２－３、Ｋ５２４－２、Ｋ５２４－３、Ｋ５２５、Ｋ５２９からＫ５２９－３まで、Ｋ５２９－５、Ｋ５３１からＫ５３２－２まで、Ｋ５９４の３及び４（ハを除く。）、Ｋ６４５、Ｋ６４５－２、Ｋ６５４－３、Ｋ６５５、Ｋ６５５－２、Ｋ６５５－４、Ｋ６５５－５、Ｋ６５６－２、Ｋ６５７、Ｋ６５７－２、Ｋ６６２、Ｋ６６２－２、Ｋ６７４、Ｋ６７４－２、Ｋ６７５の２からＫ６７５の５まで、Ｋ６７７、Ｋ６７７－２、Ｋ６８０、Ｋ６８４－２、Ｋ６９５の４からＫ６９５の７まで、Ｋ６９５－２の４からＫ６９５－２の６まで、Ｋ６９６、Ｋ６９７－４、Ｋ７００からＫ７００－４まで、Ｋ７０２からＫ７０３－２まで、Ｋ７０４、Ｋ７０５の２、Ｋ７０６、Ｋ７０９－２からＫ７０９－５まで、Ｋ７１１－２、Ｋ７１６からＫ７１６－６まで、Ｋ７１９からＫ７１９－３まで、Ｋ７１９－５、Ｋ７３２の２、Ｋ７３５、Ｋ７３５－３、Ｋ７３５－５、Ｋ７３９、Ｋ７３９－３、Ｋ７４０、Ｋ７４０－２、Ｋ７７９－３、Ｋ８０３からＫ８０３－３まで並びにＫ８１７の３に掲げる手術に当たって、自動縫合器を使用した場合に算定する。
  - ２区分番号Ｋ５５２、Ｋ５５２－２、Ｋ５５４、Ｋ５５５、Ｋ５５７からＫ５５７－３まで、Ｋ５６０、Ｋ５９４の３及びＫ５９４の４のロに掲げる手術に当たって左心耳閉塞用クリップを使用した場合に算定する。
