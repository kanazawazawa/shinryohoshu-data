code: M001
name: 体外照射
version: r6
points: null
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第12部 放射線治療
  section: 第1節 放射線治療管理・実施料
raw_text: |
  Ｍ００１体外照射
  - １エックス線表在治療
      - イ１回目110点
      - ロ２回目33点
  - ２高エネルギー放射線治療
      - イ１回目
    - （１）１門照射又は対向２門照射を行った場合840点
    - （２）非対向２門照射又は３門照射を行った場合1,320点
    - （３）４門以上の照射、運動照射又は原体照射を行った場合1,800点
      - ロ２回目
    - （１）１門照射又は対向２門照射を行った場合420点
    - （２）非対向２門照射又は３門照射を行った場合660点
    - （３）４門以上の照射、運動照射又は原体照射を行った場合900点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関以外の保険医療機関において行われる場合は、所定点数の100分の70に相当する点数により算定する。
  - ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、１回の線量が2.5Ｇｙ以上の全乳房照射を行った場合は、一回線量増加加算として、690点を所定点数に加算する。
  - ３強度変調放射線治療（ＩＭＲＴ）3,000点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める患者に対して、放射線治療を実施した場合に算定する。
  - ２別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、１回の線量が３Ｇｙ以上の前立腺照射を行った場合は、一回線量増加加算として、1,400点を所定点数に加算する。
  - 注１疾病、部位又は部位数にかかわらず、１回につき算定する。
  - ２術中照射療法を行った場合は、術中照射療法加算として、患者１人につき１日を限度として、5,000点を所定点数に加算する。
  - ３体外照射用固定器具を使用した場合は、体外照射用固定器具加算として、1,000点を所定点数に加算する。
  - ４別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、放射線治療を専ら担当する常勤の医師が画像誘導放射線治療（ＩＧＲＴ）による体外照射を行った場合（イの場合は、乳房照射に係るもの、ロ及びハの場合は、２のイの（３）若しくはロの（３）又は３に係るものに限る。）には、画像誘導放射線治療加算として、患者１人１日につき１回に限り、次に掲げる区分に従い、いずれかを所定点数に加算する。
      - イ体表面の位置情報によるもの150点
      - ロ骨構造の位置情報によるもの300点
      - ハ腫瘍の位置情報によるもの450点
  - ５別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、呼吸性移動対策を行った場合は、体外照射呼吸性移動対策加算として、150点を所定点数に加算する。
