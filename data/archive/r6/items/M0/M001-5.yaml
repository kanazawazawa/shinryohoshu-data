raw_text: |
  Ｍ００１－５ホウ素中性子捕捉療法（一連につき）187,500点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、別に厚生労働大臣が定める患者に対して行われる場合に限り算定する。
  - ２ホウ素中性子捕捉療法の適応判定体制に関する別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、ホウ素中性子捕捉療法の適応判定に係る検討が実施された場合には、ホウ素中性子捕捉療法適応判定加算として、40,000点を所定点数に加算する。
  - ３別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、ホウ素中性子捕捉療法に関する専門の知識を有する医師が策定した照射計画に基づく医学的管理を行った場合には、ホウ素中性子捕捉療法医学管理加算として、10,000点を所定点数に加算する。
  - ４体外照射用固定器具を使用した場合は、体外照射用固定器具加算として、1,000点を所定点数に加算する。
