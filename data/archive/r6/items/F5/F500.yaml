raw_text: |
  Ｆ５００調剤技術基本料
  - １入院中の患者に投薬を行った場合42点
  - ２その他の患者に投薬を行った場合14点
  - 注１薬剤師が常時勤務する保険医療機関において投薬を行った場合（処方箋を交付した場合を除く。）に算定する。
  - ２同一の患者につき同一月内に調剤技術基本料を算定すべき投薬を２回以上行った場合においては、調剤技術基本料は月１回に限り算定する。
  - ３１において、調剤を院内製剤の上行った場合は、院内製剤加算として10点を所定点数に加算する。
  - ４区分番号Ｂ００８に掲げる薬剤管理指導料又は区分番号Ｃ００８に掲げる在宅患者訪問薬剤管理指導料を算定している患者については、算定しない。
