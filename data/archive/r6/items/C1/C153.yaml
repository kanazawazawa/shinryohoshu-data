raw_text: |
  Ｃ１５３注入器用注射針加算
  - １治療上の必要があって、１型糖尿病若しくは血友病の患者又はこれらの患者に準ずる状態にある患者に対して処方した場合200点
  - ２１以外の場合130点
  - 注別に厚生労働大臣が定める注射薬の自己注射を行っている入院中の患者以外の患者に対して、注入器用の注射針を処方した場合に、第１款の所定点数に加算する。
