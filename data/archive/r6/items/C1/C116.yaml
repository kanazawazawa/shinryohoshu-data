  Ｃ１１６在宅植込型補助人工心臓（非拍動流型）指導管理料45,000点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、体内植込型補助人工心臓（非拍動流型）を使用している患者であって入院中の患者以外のものに対して、療養上必要な指導を行った場合に算定する。
