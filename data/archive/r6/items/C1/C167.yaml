raw_text: |
  Ｃ１６７疼痛等管理用送信器加算600点
  - 注疼痛除去等のため植込型脳・脊髄刺激装置又は植込型迷走神経刺激装置を植え込んだ後に、在宅疼痛管理、在宅振戦管理又は在宅てんかん管理を行っている入院中の患者以外の患者に対して、疼痛等管理用送信器（患者用プログラマを含む。）を使用した場合に、第１款の所定点数に加算する。
