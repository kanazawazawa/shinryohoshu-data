  part: 第2部 在宅医療
  section: 第2節 在宅療養指導管理料
  subsection: 第1款 在宅療養指導管理料
raw_text: |
  Ｃ１０２－２在宅血液透析指導管理料10,000点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、在宅血液透析を行っている入院中の患者以外の患者に対して在宅血液透析に関する指導管理を行った場合に算定するものとし、頻回に指導管理を行う必要がある場合には、当該指導管理料を最初に算定した日から起算して２月までの間は、同一月内の２回目以降１回につき2,000点を月２回に限り算定する。
  - ２当該指導管理を算定する同一月内に区分番号Ｊ０３８に掲げる人工腎臓を算定する場合は、注１に規定する２回目以降の費用は、算定しない。
  - ３注１に規定する患者であって継続的に遠隔モニタリングを実施したものに対して当該指導管理を行った場合は、遠隔モニタリング加算として、月１回に限り115点を所定点数に加算する。
