code: C161
name: 注入ポンプ加算
version: r6
points: 1250
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第2節 在宅療養指導管理料
  subsection: 第2款 在宅療養指導管理材料加算
raw_text: |
  Ｃ１６１注入ポンプ加算1,250点
  - 注次のいずれかに該当する入院中の患者以外の患者に対して、注入ポンプを使用した場合に、２月に２回に限り、第１款の所定点数に加算する。
      - イ在宅中心静脈栄養法、在宅成分栄養経管栄養法又は在宅小児経管栄養法を行っている患者
      - ロ次のいずれかに該当する患者
    - （１）悪性腫瘍の患者であって、在宅において麻薬等の注射を行っている末期の患者
    - （2）筋萎縮性側索硬化症又は筋ジストロフィーの患者であって、在宅において麻薬等の注射を行っている患者
    - （3）
    - （１）又は（2）に該当しない場合であって、緩和ケアを要する心不全又は呼吸器疾患の患者に対して、在宅において麻薬の注射を行っている末期の患者
      - ハ悪性腫瘍の患者であって、在宅において抗悪性腫瘍剤等の注射を行っている患者
      - ニ在宅強心剤持続投与を行っている患者
      - ホ別に厚生労働大臣が定める注射薬の自己注射を行っている患者
