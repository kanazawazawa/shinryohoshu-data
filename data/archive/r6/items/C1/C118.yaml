raw_text: |
  Ｃ１１８在宅腫瘍治療電場療法指導管理料2,800点
  - 注別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において、入院中の患者以外の患者であって、在宅腫瘍治療電場療法を行っているものに対して、療養上必要な指導を行った場合に算定する。
