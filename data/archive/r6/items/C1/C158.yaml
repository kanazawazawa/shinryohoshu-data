raw_text: |
  Ｃ１５８酸素濃縮装置加算4,000点
  - 注在宅酸素療法を行っている入院中の患者以外の患者（チアノーゼ型先天性心疾患の患者を除く。）に対して、酸素濃縮装置を使用した場合に、３月に３回に限り、第１款の所定点数に加算する。
  ただし、この場合において、区分番号Ｃ１５７に掲げる酸素ボンベ加算の２は算定できない。
