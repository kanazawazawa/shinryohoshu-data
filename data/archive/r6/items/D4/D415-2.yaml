raw_text: |
  Ｄ４１５－２に掲げる超音波気管支鏡下穿
  刺吸引生検法（ＥＢＵＳ－ＴＢＮＡ）、Ｄ４１５－３に掲げる経気管肺生検法（ナビゲーションによるもの）、Ｄ４１５－４に掲げる経気管肺生検法（仮想気管支鏡を用いた場合）、Ｄ４１５－５に掲げる経気管支凍結生検法、Ｄ４１６に掲げる臓器穿刺、組織採取、Ｄ４１７に掲げる組織試験採取、切採法、Ｄ４１８に掲げる子宮腟部等からの検体採取、Ｄ４１９に掲げるその他の検体採取、Ｄ４１９－２に掲げる眼内液（前房水・硝子体液）検査、Ｄ５００に掲げる薬剤（区分番号Ｄ２０６に掲げる心臓カテーテル法による諸検査（一連の検査について）、Ｄ２９５に掲げる関節鏡検査（片側）、Ｄ２９６に掲げる喉頭直達鏡検査、Ｄ２９６－２に掲げる鼻咽腔直達鏡検査、Ｄ２９６－３に掲げる内視鏡用テレスコープを用いた咽頭画像等解析（インフルエンザの診断の補助に用いるもの）、Ｄ２９８に掲げる嗅裂部・鼻咽腔・副鼻腔入口部ファイバースコピー（部位を問わず一連につき）、Ｄ２９８－２に掲げる内視鏡下嚥下機能検査、Ｄ２９９に掲げる喉頭ファイバースコピー、Ｄ３００に掲げる中耳ファイバースコピー、Ｄ３００－２に掲げる顎関節鏡検査（片側）、Ｄ３０２に掲げる気管支ファイバースコピー、Ｄ３０２－２に掲げる気管支カテーテル気管支肺胞洗浄法検査、Ｄ３０３に掲げる胸腔鏡検査、Ｄ３０４に掲げる縦隔鏡検査、Ｄ３０６に掲げる食道ファイバースコピー、Ｄ３０８に掲げる胃・十二指腸ファイバースコピー、Ｄ３０９に掲げる胆道ファイバースコピー、Ｄ３１０に掲げる小腸内視鏡検査、Ｄ３１０－２に掲げる消化管通過性検査、Ｄ３１１に掲げる直腸鏡検査、Ｄ３１１－２に掲げる肛門鏡検査、Ｄ３１２に掲げる直腸ファイバースコピー、Ｄ３１２－２に掲げる回腸嚢ファイバースコピー、Ｄ３１３に掲げる大腸内視鏡検査、
