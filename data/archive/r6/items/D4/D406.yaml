raw_text: |
  Ｄ４０６に掲げる上顎洞穿
  刺（片側）、Ｄ４０６－２に掲げる扁桃周囲炎又は扁桃周囲膿瘍における試験穿刺（片側）、Ｄ４０７に掲げる腎嚢胞又は水腎症穿刺、Ｄ４０８に掲げるダグラス窩穿刺、Ｄ４０９に掲げるリンパ節等穿刺又は針生検、Ｄ４０９－２に掲げるセンチネルリンパ節生検（片側）、Ｄ４１０に掲げる乳腺穿刺又は針生検（片側）、Ｄ４１１に掲げる甲状腺穿刺又は針生検、Ｄ４１２に掲げる経皮的針生検法（透視、心電図検査及び超音波検査を含む。）、Ｄ４１２－２に掲げる経皮的腎生検法、Ｄ４１２－３に掲げる経頸静脈的肝生検、Ｄ４１３に掲げる前立腺針生検法、Ｄ４１４に掲げる内視鏡下生検法（１臓器につき）、Ｄ４１４－２に掲げる超音波内視鏡下穿刺吸引生検法（ＥＵＳ－ＦＮＡ）、Ｄ４１５に掲げる経気管肺生検法、Ｄ４１５－２に掲げる超音波気管支鏡下穿刺吸引生検法（ＥＢＵＳ－ＴＢＮＡ）、Ｄ４１５－３に掲げる経気管肺生検法（ナビゲーションによるもの）、Ｄ４１５－４に掲げる経気管肺生検法（仮想気管支鏡を用いた場合）、Ｄ４１５－５に掲げる経気管支凍結生検法、Ｄ４１６に掲げる臓器穿刺、組織採取、Ｄ４１７に掲げる組織試験採取、切採法、Ｄ４１８に掲げる子宮腟部等からの検体採取、Ｄ４１９に掲げるその他の検体採取及びＤ４１９－２に掲げる眼内液（前房水・硝子体液）検査に係るものに限る。）を除く。）
      - ホ第４部画像診断（通則第４号及び第６号に掲げる画像診断管理加算１、通則第５号及び第７号に掲げる画像診断管理加算２、画像診断管理加算３及び画像診断管理加算４、区分番号Ｅ００３に掲げる造影剤注入手技（３のイ（注１及び注２を含む。）に限る。）、Ｅ３００に掲げる薬剤（区分番号Ｅ００３に掲げる造影剤注入手技（３のイ（注１及び注２を含む。）に限る。）に係るものに限る。）並びにＥ４０１に掲げる特定保険医療材料（区分番号Ｅ００３に掲げる造影剤注入手技（３のイ（注１及び注２を含む。）に限る。）に係るものに限る。）を除く。）
      - ヘ第５部投薬（除外薬剤・注射薬に係る費用を除く。）
      - ト第６部注射（区分番号Ｇ０２０に掲げる無菌製剤処理料及び除外薬剤・注射薬に係る費用を除く。）
      - チ第７部第２節薬剤料
      - リ第８部第２節薬剤料
      - ヌ第９部処置（区分番号Ｊ００１に掲げる熱傷処置（５に限る。）、Ｊ００３に掲げる局所陰圧閉鎖処置（入院）、Ｊ００３－３に掲げる局所陰圧閉鎖処置（腹部開放創）、Ｊ００３－４に掲げる多血小板血漿処置、Ｊ００７－２に掲げる硬膜外自家血注入、Ｊ０１０－２に掲げる経皮的肝膿瘍等穿刺術、Ｊ０１７に掲げるエタノールの局所注入、Ｊ０１７－２に掲げるリンパ管腫局所注入、Ｊ０２７に掲げる高気圧酸素治療、Ｊ０３４－３に掲げる内視鏡的結腸軸捻転解除術、Ｊ０３８に掲げる人工腎臓、Ｊ０３８－２に掲げる持続緩徐式血液濾過、
