raw_text: |
  Ｄ４１６に掲げる臓器穿
  刺、組織採取、Ｄ４１７に掲げる組織試験採取、切採法、Ｄ４１８に掲げる子宮腟部等からの検体採取、Ｄ４１９に掲げるその他の検体採取及びＤ４１９－２に掲げる眼内液（前房水・硝子体液）検査に係るものに限る。）及びＤ６００に掲げる特定保険医療材料（区分番号Ｄ２０６に掲げる心臓カテーテル法による諸検査（一連の検査について）、Ｄ２９５に掲げる関節鏡検査（片側）、Ｄ２９６に掲げる喉頭直達鏡検査、Ｄ２９６－２に掲げる鼻咽腔直達鏡検査、Ｄ２９６－３に掲げる内視鏡用テレスコープを用いた咽頭画像等解析（インフルエンザの診断の補助に用いるもの）、Ｄ２９８に掲げる嗅裂部・鼻咽腔・副鼻腔入口部ファイバースコピー（部位を問わず一連につき）、Ｄ２９８－２に掲げる内視鏡下嚥下機能検査、Ｄ２９９に掲げる喉頭ファイバースコピー、Ｄ３００に掲げる中耳ファイバースコピー、Ｄ３００－２に掲げる顎関節鏡検査（片側）、Ｄ３０２に掲げる気管支ファイバースコピー、Ｄ３０２－２に掲げる気管支カテーテル気管支肺胞洗浄法検査、Ｄ３０３に掲げる胸腔鏡検査、Ｄ３０４に掲げる縦隔鏡検査、Ｄ３０６に掲げる食道ファイバースコピー、Ｄ３０８に掲げる胃・十二指腸ファイバースコピー、Ｄ３０９に掲げる胆道ファイバースコピー、Ｄ３１０に掲げる小腸内視鏡検査、Ｄ３１０－２に掲げる消化管通過性検査、Ｄ３１１に掲げる直腸鏡検査、Ｄ３１１－２に掲げる肛門鏡検査、Ｄ３１２に掲げる直腸ファイバースコピー、Ｄ３１２－２に掲げる回腸嚢ファイバースコピー、Ｄ３１３に掲げる大腸内視鏡検査、Ｄ３１４に掲げる腹腔鏡検査、Ｄ３１５に掲げる腹腔ファイバースコピー、Ｄ３１６に掲げるクルドスコピー、Ｄ３１７に掲げる膀胱尿道ファイバースコピー、Ｄ３１７－２に掲げる膀胱尿道鏡検査、Ｄ３１８に掲げる尿管カテーテル法（ファイバースコープによるもの）（両側）、Ｄ３１９に掲げる腎盂尿管ファイバースコピー（片側）、Ｄ３２０に掲げるヒステロスコピー、Ｄ３２１に掲げるコルポスコピー、Ｄ３２２に掲げる子宮ファイバースコピー、Ｄ３２３に掲げる乳管鏡検査、Ｄ３２４に掲げる血管内視鏡検査、Ｄ３２５に掲げる肺臓カテーテル法、肝臓カテーテル法、膵臓カテーテル法、Ｄ４０１に掲げる脳室穿刺、Ｄ４０２に掲げる後頭下穿刺、Ｄ４０３に掲げる腰椎穿刺、胸椎穿刺、頸椎穿刺（脳脊髄圧測定を含む。）、Ｄ４０４に掲げる骨髄穿刺、Ｄ４０４－２に掲げる骨髄生検、Ｄ４０５に掲げる関節穿刺（片側）、
