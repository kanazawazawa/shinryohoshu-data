code: C000
name: 往診料
version: r6
points: 720
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ０００往診料720点
  - 注１別に厚生労働大臣が定める時間において入院中の患者以外の患者に対して診療に従事している場合に緊急に行う往診、夜間（深夜を除く。）又は休日の往診、深夜の往診を行った場合には、在宅療養支援診療所、在宅療養支援病院（地域において在宅療養を提供する診療所がないことにより、当該地域における退院後の患者に対する在宅療養の提供に主たる責任を有する病院であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出たものをいう。
  以下この表において同じ。）等の区分に従い、次に掲げる点数を、それぞれ所定点数に加算する。
      - イ別に厚生労働大臣が定める患者に対し、在宅療養支援診療所又は在宅療養支援病院であって別に厚生労働大臣が定めるものの保険医が行う場合
    - （１）病床を有する場合①緊急往診加算850点②夜間・休日往診加算1,700点③深夜往診加算2,700点
    - （２）病床を有しない場合①緊急往診加算750点②夜間・休日往診加算1,500点③深夜往診加算2,500点
      - ロ別に厚生労働大臣が定める患者に対し、在宅療養支援診療所又は在宅療養支援病院（イに規定するものを除く。）の保険医が行う場合
    - （１）緊急往診加算650点
    - （２）夜間・休日往診加算1,300点
    - （３）深夜往診加算2,300点
      - ハ別に厚生労働大臣が定める患者に対し、イからロまでに掲げるもの以外の保険医療機関の保険医が行う場合
    - （１）緊急往診加算325点
    - （２）夜間・休日往診加算650点
    - （３）深夜往診加算1,300点
      - ニ別に厚生労働大臣が定める患者以外の患者に対して行う場合
    - （１）緊急往診加算325点
    - （２）夜間・休日往診加算405点
    - （３）深夜往診加算485点
  - ２患家における診療時間が１時間を超えた場合は、患家診療時間加算として、30分又はその端数を増すごとに、100点を所定点数に加算する。
  - ３在宅で死亡した患者（往診を行った後、24時間以内に在宅以外で死亡した患者を含む。）に対して、その死亡日及び死亡日前14日以内に、区分番号Ｂ００４に掲げる退院時共同指導料１を算定し、かつ、往診を実施した場合には、当該患者に係る区分等に従い、在宅ターミナルケア加算として、次に掲げる点数をそれぞれ所定点数に加算する。
  この場合において、区分番号Ｃ００１の注６に規定する在宅ターミナルケア加算及び区分番号Ｃ００１－２の注５に規定する在宅ターミナルケア加算は算定できない。
  ただし、別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た保険医療機関が行った場合は、当該基準に掲げる区分に従い、在宅緩和ケア充実診療所・病院加算、在宅療養実績加算１又は在宅療養実績加算２として、それぞれ1,000点、750点又は500点を、がん患者に対して酸素療法を行っていた場合は酸素療法加算として2,000点を更に所定点数に加算する。
      - イ有料老人ホームその他これに準ずる施設（以下この区分番号、区分番号Ｃ００１及び区分番号Ｃ００１－２において「有料老人ホーム等」という。）に入居する患者以外の患者
    - （１）在宅療養支援診療所又は在宅療養支援病院であって別に厚生労働大臣が定めるものの場合①病床を有する場合6,500点②病床を有しない場合5,500点
    - （2）在宅療養支援診療所又は在宅療養支援病院（（１）に規定するものを除く。）の場合4,500点
    - （３）
    - （１）及び（2）に掲げるもの以外の場合3,500点
      - ロ有料老人ホーム等に入居する患者
    - （１）在宅療養支援診療所又は在宅療養支援病院であって別に厚生労働大臣が定めるものの場合①病床を有する場合6,500点②病床を有しない場合5,500点
    - （2）在宅療養支援診療所又は在宅療養支援病院（（１）に規定するものを除く。）の場合4,500点
    - （３）
    - （１）及び（2）に掲げるもの以外の場合3,500点
  - ４往診を行い、在宅で患者を看取った場合（注３に規定する在宅ターミナルケア加算を算定する場合に限る。）には、看取り加算として、3,000点を所定点数に加算する。
  この場合において、区分番号Ｃ００１の注７（区分番号Ｃ００１－２の注６の規定により準用する場合を含む。）に規定する看取り加算は算定できない。
  - ５患家において死亡診断を行った場合は、死亡診断加算として、200点を所定点数に加算する。
  ただし、注４に規定する加算を算定する場合は、算定できない。
  - ６保険医療機関の所在地と患家の所在地との距離が16キロメートルを超えた場合又は海路による往診を行った場合で、特殊の事情があったときの往診料は、別に厚生労働大臣が定めるところにより算定する。
  - ７往診に要した交通費は、患家の負担とする。
  - ８注１のイからハまでについては、別に厚生労働大臣が定める施設基準に適合するものとして地方厚生局長等に届け出た保険医療機関の保険医が行った場合は、当該基準に掲げる区分に従い、在宅緩和ケア充実診療所・病院加算、在宅療養実績加算１又は在宅療養実績加算２として、100点、75点又は50点を、それぞれ更に所定点数に加算する。
  - ９在宅療養支援診療所又は在宅療養支援病院が、当該保険医療機関と連携する他の保険医療機関（在宅療養支援診療所又は在宅療養支援病院以外の保険医療機関に限る。）によって計画的な医学管理の下に主治医として定期的に訪問診療を行っている患者に対して、往診を行った場合、往診時医療情報連携加算として200点を所定点数に加算する。
  - 10別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、介護老人保健施設、介護医療院及び特別養護老人ホーム（以下この注において「介護保険施設等」という。）の協力医療機関であって、当該介護保険施設等に入所している患者の病状の急変等に伴い、往診を行った場合に、介護保険施設等連携往診加算として、200点を所定点数に加算する。
