code: C010
name: 在宅患者連携指導料
version: r6
points: 900
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ０１０在宅患者連携指導料900点
  - 注１訪問診療を実施している保険医療機関（診療所、在宅療養支援病院及び許可病床数が200床未満の病院（在宅療養支援病院を除く。）に限る。）の保険医が、在宅での療養を行っている患者であって通院が困難なものに対して、当該患者の同意を得て、歯科訪問診療を実施している保険医療機関、訪問薬剤管理指導を実施している保険薬局又は訪問看護ステーションと文書等により情報共有を行うとともに、共有された情報を踏まえて療養上必要な指導を行った場合に、月１回に限り算定する。
  - ２区分番号Ａ０００に掲げる初診料を算定する初診の日に行った指導又は当該初診の日から１月以内に行った指導の費用は、初診料に含まれるものとする。
  - ３当該保険医療機関を退院した患者に対して退院の日から起算して１月以内に行った指導の費用は、第１章第２部第１節に掲げる入院基本料に含まれるものとする。
  - ４区分番号Ｂ００１の１に掲げるウイルス疾患指導料、区分番号Ｂ００１の６に掲げるてんかん指導料、区分番号Ｂ００１の７に掲げる難病外来指導管理料又は区分番号Ｂ００１の12に掲げる心臓ペースメーカー指導管理料を算定している患者については算定しない。
  - ５在宅患者連携指導料を算定すべき指導を行った場合においては、区分番号Ｂ０００に掲げる特定疾患療養管理料及び区分番号Ｂ００１の８に掲げる皮膚科特定疾患指導管理料を算定すべき指導管理の費用は、所定点数に含まれるものとする。
  - ６区分番号Ｂ００９に掲げる診療情報提供料（Ⅰ）、区分番号Ｃ００２に掲げる在宅時医学総合管理料、区分番号Ｃ００２－２に掲げる施設入居時等医学総合管理料又は区分番号Ｃ００３に掲げる在宅がん医療総合診療料を算定している患者については算定しない。
