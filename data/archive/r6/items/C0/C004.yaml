code: C004
name: 救急搬送診療料
version: r6
points: 1300
unit: 回
chapter:
  chapter: 第2章 特掲診療料
  part: 第2部 在宅医療
  section: 第1節 在宅患者診療・指導料
raw_text: |
  Ｃ００４救急搬送診療料1,300点
  - 注１患者を救急用の自動車等で保険医療機関に搬送する際、診療上の必要から、当該自動車等に同乗して診療を行った場合に算定する。
  - ２新生児又は６歳未満の乳幼児（新生児を除く。）に対して当該診療を行った場合には、新生児加算又は乳幼児加算として、それぞれ1,500点又は700点を所定点数に加算する。
  - ３注１に規定する場合であって、当該診療に要した時間が30分を超えた場合には、長時間加算として、700点を所定点数に加算する。
  - ４注１に規定する場合であって、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関が、重篤な患者に対して当該診療を行った場合には、重症患者搬送加算として、1,800点を所定点数に加算する。
