raw_text: |
  Ｊ１１９消炎鎮痛等処置（１日につき）１マッサージ等の手技による療法35点
  - ２器具等による療法35点
  - ３湿布処置35点
  - 注１１から３までの療法を行った場合に、療法の種類、回数又は部位数にかかわらず、本区分により算定する。
  - ２同一の患者につき同一日において、１から３までの療法のうち２以上の療法を行った場合は、主たる療法の所定点数のみにより算定する。
  - ３３については、診療所において、入院中の患者以外の患者に対し、半肢の大部又は頭部、頸部及び顔面の大部以上にわたる範囲の湿布処置が行われた場合に算定できる。
  - ４区分番号Ｃ１０９に掲げる在宅寝たきり患者処置指導管理料を算定している患者に対して行った消炎鎮痛等処置の費用は算定しない。
