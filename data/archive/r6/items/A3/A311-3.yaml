  chapter: 第2章 第１部医学管理等の区分番号Ｂ０１５に掲げる精神科退院時共同指導料
raw_text: |
  Ａ３１１－３精神科救急・合併症入院料（１日につき）１30日以内の期間3,624点
  - ２31日以上60日以内の期間3,323点
  - ３61日以上90日以内の期間3,123点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た精神病棟を有する保険医療機関において、当該届出に係る精神病棟に入院している患者（別に厚生労働大臣が定める基準に適合するものに限る。）について算定する。
  ただし、当該病棟に入院した患者が当該入院料に係る算定要件に該当しない場合は、区分番号Ａ１０３に掲げる精神病棟入院基本料の15対１入院基本料の例により算定する。
  - ２診療に係る費用（注３及び注４に規定する加算、第２節に規定する臨床研修病院入院診療加算、妊産婦緊急搬送入院加算、医師事務作業補助体制加算、地域加算、離島加算、特定感染症患者療養環境特別加算、精神科措置入院診療加算、精神科応急入院施設管理加算、精神科身体合併症管理加算、依存症入院医療管理加算、摂食障害入院医療管理加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、精神科救急搬送患者地域連携紹介加算、データ提出加算、精神科入退院支援加算、薬剤総合評価調整加算、排尿自立支援加算及び地域医療体制確保加算、第２章第１部医学管理等の区分番号Ｂ０１５に掲げる精神科退院時共同指導料２、第７部リハビリテーションの区分番号Ｈ０００に掲げる心大血管疾患リハビリテーション料、Ｈ００１に掲げる脳血管疾患等リハビリテーション料、Ｈ００１－２に掲げる廃用症候群リハビリテーション料、Ｈ００２に掲げる運動器リハビリテーション料、Ｈ００３に掲げる呼吸器リハビリテーション料、区分番号Ｈ００４に掲げる摂食機能療法、区分番号Ｈ００７に掲げる障害児（者）リハビリテーション料及び区分番号Ｈ００７－２に掲げるがん患者リハビリテーション料、第８部精神科専門療法、第９部処置の区分番号Ｊ０３８に掲げる人工腎臓、区分番号Ｊ０４２に掲げる腹膜灌流及び区分番号Ｊ４００に掲げる特定保険医療材料（区分番号
