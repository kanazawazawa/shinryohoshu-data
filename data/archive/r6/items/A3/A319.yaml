raw_text: |
  Ａ３１９特定機能病院リハビリテーション病棟入院料2,229点
  （生活療養を受ける場合にあっては、2,215点）注１主として回復期リハビリテーションを行う病棟に関する別に厚生労働大臣が定める施設基準に適合しているものとして保険医療機関（特定機能病院に限る。）が地方厚生局長等に届け出た病棟に入院している患者であって、別に厚生労働大臣が定める回復期リハビリテーションを要する状態にあるものについて、当該病棟に入院した日から起算して、それぞれの状態に応じて別に厚生労働大臣が定める日数を限度として所定点数を算定する。
  ただし、当該病棟に入院した患者が当該入院料に係る算定要件に該当しない場合は、区分番号Ａ１００に掲げる一般病棟入院基本料の注２に規定する特別入院基本料の例により算定する。
  - ２診療に係る費用（当該患者に対して行った第２章第１部医学管理等の区分番号
