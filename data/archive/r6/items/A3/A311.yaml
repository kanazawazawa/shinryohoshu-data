  chapter: 第1章 基本診療料
  part: 第13部 第２節病理診断・判断料及び第14部その他の費用並びに第２節に規定する
raw_text: |
  Ａ３１１精神科救急急性期医療入院料（１日につき）１30日以内の期間2,420点
  - ２31日以上60日以内の期間2,120点
  - ３61日以上90日以内の期間1,918点
  - 注１別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た精神病棟を有する保険医療機関において、当該届出に係る精神病棟に入院している患者（別に厚生労働大臣が定める基準に適合するものに限る。）について算定する。
  ただし、当該病棟に入院した患者が当該入院料に係る算定要件に該当しない場合は、区分番号Ａ１０３に掲げる精神病棟入院基本料の15対１入院基本料の例により算定する。
  - ２診療に係る費用（注３から注５までに規定する加算、第２節に規定する臨床研修病院入院診療加算、医師事務作業補助体制加算、地域加算、離島加算、特定感染症患者療養環境特別加算、精神科措置入院診療加算、精神科応急入院施設管理加算、精神科身体合併症管理加算、医療安全対策加算、感染対策向上加算、患者サポート体制充実加算、報告書管理体制加算、褥瘡ハイリスク患者ケア加算、精神科救急搬送患者地域連携紹介加算、データ提出加算、精神科入退院支援加算、精神科急性期医師配置加算（精神科救急急性期医療入院料を算定するものに限る。）、薬剤総合評価調整加算、排尿自立支援加算及び地域医療体制確保加算、
