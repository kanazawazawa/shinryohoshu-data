raw_text: |
  Ｊ０４２腹膜灌
  流（１日につき）１連続携行式腹膜灌流330点
  - 注１導入期の14日の間に限り、導入期加算として、１日につき500点を加算する。
  - ２６歳未満の乳幼児の場合は、導入期の14日の間又は15日目以降30日目までの間に限り、注１の規定にかかわらず、乳幼児加算として、それぞれ１日につき1,100点又は550点を加算する。
  - ３区分番号Ｃ１０２に掲げる在宅自己腹膜灌流指導管理料を算定している患者に対して行った場合には、区分番号Ｊ０３８に掲げる人工腎臓の実施回数と併せて週１回に限り、算定する。
  - ２その他の腹膜灌流1,100点Ｊ０４３新生児高ビリルビン血症に対する光線療法（１日につき）140点
