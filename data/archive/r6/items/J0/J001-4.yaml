chapter:
  chapter: 第2章 特掲診療料
  part: 第9部 処置
  section: 第1節 処置料
raw_text: |
  Ｊ００１－４重度褥瘡
  処置（１日につき）１100平方センチメートル未満90点
  - ２100平方センチメートル以上500平方センチメートル未満98点
  - ３500平方センチメートル以上3,000平方センチメートル未満150点
  - ４3,000平方センチメートル以上6,000平方センチメートル未満280点
  - ５6,000平方センチメートル以上500点
  - 注１重度の褥瘡処置を必要とする患者に対して、初回の処置を行った日から起算して２月を経過するまでに行われた場合に限り算定し、それ以降に行う当該処置については、区分番号Ｊ０００に掲げる創傷処置の例により算定する。
  - ２１については、入院中の患者以外の患者及び手術後の患者（入院中の患者に限る。）についてのみ算定する。
  ただし、手術後の患者（入院中の患者に限る。）については手術日から起算して14日を限度として算定する。
