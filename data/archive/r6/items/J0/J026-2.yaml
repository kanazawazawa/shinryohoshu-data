raw_text: |
  Ｊ０２６－２鼻マスク式補助換気法（１日につき）160点
  - 注１鼻マスク式補助換気法と同時に行われる喀痰吸引、酸素吸入又は酸素テントの費用は、所定点数に含まれるものとする。
  - ２区分番号Ｃ１０３に掲げる在宅酸素療法指導管理料、区分番号Ｃ１０７に掲げる在宅人工呼吸指導管理料又は区分番号Ｃ１０７－３に掲げる在宅ハイフローセラピー指導管理料を算定している患者に対して行った鼻マスク式補助換気法の費用は算定しない。
