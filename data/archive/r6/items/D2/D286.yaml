raw_text: |
  Ｄ２８６肝及び腎のクリアランステスト150点
  - 注１検査に当たって、尿管カテーテル法、膀胱尿道ファイバースコピー又は膀胱尿道鏡検査を行った場合は、区分番号Ｄ３１８に掲げる尿管カテーテル法、Ｄ３１７に掲げる膀胱尿道ファイバースコピー又はＤ３１７－２に掲げる膀胱尿道鏡検査の所定点数を併せて算定する。
  - ２検査に伴って行った注射、採血及び検体測定の費用は、所定点数に含まれるものとする。
