  Ｄ２３５脳波検査（過呼吸、光及び音刺激による負荷検査を含む。）720点
  - 注１検査に当たって睡眠賦活検査又は薬物賦活検査を行った場合は、賦活検査加算として、これらの検査の別にかかわらず250点を所定点数に加算する。
  - ２当該保険医療機関以外の医療機関で描写した脳波について診断を行った場合は、１回につき70点とする。
