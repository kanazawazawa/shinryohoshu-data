  chapter: 第2章 特掲診療料
  part: 第3部 検査
  section: 第3節 生体検査料
raw_text: |
  Ｄ２３８脳波検査判断料
  - １脳波検査判断料１350点
  - ２脳波検査判断料２180点
  - 注１脳波検査等の種類又は回数にかかわらず月１回に限り算定するものとする。
  - ２１については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関において行われる場合に限り算定する。
  - ３遠隔脳波診断を行った場合については、別に厚生労働大臣が定める施設基準に適合しているものとして地方厚生局長等に届け出た保険医療機関間で行われた場合に限り算定する。
  この場合において、受信側の保険医療機関が脳波検査判断料１の届出を行った保険医療機関であり、当該保険医療機関において常勤の医師が脳波診断を行い、その結果を送信側の保険医療機関に文書等により報告した場合は、脳波検査判断料１を算定することができる。
  （神経・筋検査）
