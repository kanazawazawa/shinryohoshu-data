raw_text: |
  Ｄ２０７体液量等測定
  - １体液量測定、細胞外液量測定60点
  - ２血流量測定、皮膚灌流圧測定、皮弁血流検査、循環血流量測定（色素希釈法によるもの）、電子授受式発消色性インジケーター使用皮膚表面温度測定100点
  - ３心拍出量測定、循環時間測定、循環血液量測定（色素希釈法以外によるもの）、脳循環測定（色素希釈法によるもの）150点
  - 注１心拍出量測定に際してカテーテルを挿入した場合は、心拍出量測定加算として、開始日に限り1,300点を所定点数に加算する。
  この場合において、挿入に伴う画像診断及び検査の費用は算定しない。
  - ２カテーテルの交換の有無にかかわらず一連として算定する。
  - ４血管内皮機能検査（一連につき）200点
  - ５脳循環測定（笑気法によるもの）1,350点
