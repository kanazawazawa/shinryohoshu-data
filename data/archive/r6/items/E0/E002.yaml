raw_text: |
  Ｅ００２撮影
  - １単純撮影
      - イアナログ撮影60点
      - ロデジタル撮影68点
  - ２特殊撮影（一連につき）
      - イアナログ撮影260点
      - ロデジタル撮影270点
  - ３造影剤使用撮影
      - イアナログ撮影144点
      - ロデジタル撮影154点
  - ４乳房撮影（一連につき）
      - イアナログ撮影192点
      - ロデジタル撮影202点
  - 注１間接撮影を行った場合は、所定点数の100分の50に相当する点数により算定する。
  - ２新生児、３歳未満の乳幼児（新生児を除く。）又は３歳以上６歳未満の幼児に対して撮影を行った場合は、新生児加算、乳幼児加算又は幼児加算として、当該撮影の所定点数にそれぞれ所定点数の100分の80、100分の50又は100分の30に相当する点数を加算する。
  - ３造影剤使用撮影について、脳脊髄腔造影剤使用撮影を行った場合は、脳脊髄腔造影剤使用撮影加算として、148点を所定点数に加算する。
  - ４造影剤使用撮影について、心臓及び冠動脈造影を行った場合は、一連につき区分番号Ｄ２０６に掲げる心臓カテーテル法による諸検査の所定点数により算定するものとし、造影剤使用撮影に係る費用及び造影剤注入手技に係る費用は含まれるものとする。
  - ５造影剤使用撮影について、胆管・膵管造影法を行った場合は、画像診断に係る費用も含め、一連につき区分番号Ｄ３０８に掲げる胃・十二指腸ファイバースコピーの所定点数（加算を含む。）により算定する。
  - ６乳房撮影（一連につき）について、乳房トモシンセシス撮影を行った場合は、乳房トモシンセシス加算として、100点を所定点数に加算する。
