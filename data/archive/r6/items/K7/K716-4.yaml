  Ｋ７１６－４生体部分小腸移植術164,240点
  - 注１生体部分小腸を移植した場合は、生体部分小腸の摘出のために要した提供者の療養上の費用として、この表に掲げる所定点数により算定した点数を加算する。
  - ２小腸移植者に係る組織適合性試験の費用は、所定点数に含まれる。
  - ３抗ＨＬＡ抗体検査を行う場合には、抗ＨＬＡ抗体検査加算として、4,000点を所定点数に加算する。
