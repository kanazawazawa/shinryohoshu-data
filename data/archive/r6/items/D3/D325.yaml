raw_text: |
  Ｄ３２５肺臓カテーテル法、肝臓カテーテル法、膵臓カテーテル法3,600点
  - 注１新生児又は３歳未満の乳幼児（新生児を除く。）に対して当該検査を行った場合は、新生児加算又は乳幼児加算として、それぞれ10,800点又は3,600点を所定点数に加算する。
  - ２カテーテルの種類、挿入回数によらず一連として算定し、諸監視、血液ガス分析、心拍出量測定、脈圧測定、肺血流量測定、透視、造影剤注入手技、造影剤使用撮影及びエックス線診断の費用は、全て所定点数に含まれるものとする。
  - ３エックス線撮影に用いられたフィルムの費用は、区分番号Ｅ４００に掲げるフィルムの所定点数により算定する。
