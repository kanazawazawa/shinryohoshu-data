raw_text: |
  Ｄ３１０小腸内視鏡検査
  - １バルーン内視鏡によるもの6,800点
  - ２スパイラル内視鏡によるもの6,800点
  - ３カプセル型内視鏡によるもの1,700点
  - ４その他のもの1,700点
  - 注１２種類以上行った場合は、主たるもののみ算定する。
  - ２３について、15歳未満の患者に対して、内視鏡的挿入補助具を用いて行った場合は、内視鏡的留置術加算として、260点を所定点数に加算する。
  - ３４について、粘膜点墨法を行った場合は、粘膜点墨法加算として、60点を所定点数に加算する。
